body:
  text: 巴縣居士了庵劉道開編演成都沙門離指方示鑒定此下證釋別有結元之疑也舊注謂此牒前不見所結云何知解而重問若是則無謂之甚良以上文明說六為賊媒自劫家寶詳示根結之由解根之法何阿難忽又不知六根是結而勞佛重答耶當知阿難已領六根是結而今更請之結元即俱生無明生死結根也不知六根當體即是離此別無故佛下答汝欲識知俱生無明生死結根惟汝六根更無他物是也阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧惟願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示此別索生死結元也阿難白佛言世尊如來雖說第二義門詳示根結之由及解根之法已知六根是結矣但不知離此六根向上還別有深根以為結之本元否我觀世間解結之人若不知所結之元終不能解豈惟世人我及會中有學聲聞亦復如是所以然者我等從無始際與諸無明俱滅俱生一出母胎或啼或笑不待教而自能謂之無始虗習亦名俱生無明由生至滅滅而又生展轉浪流常淪生死我雖得此多聞善根名為出家然得開悟時暫似解脫而入塵勞時依舊被縛所謂說時似悟對境還迷乍寒乍熱如隔日瘧此皆俱生無明力之所使惟願大慈哀愍淪溺的示今日我等身心云何是結之本元作何法以解之不惟現會大衆普獲利益亦令未來衆生得免輪回三有之苦作是語已云云無上開示焉阿難之意蓋疑俱生無明方是生死結根而為結元也豈知六根即是哉爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩阿難頂即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祗陀林灌如來頂是諸大衆得未曾有於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物此諸佛共證六根為解結之元也爾時世尊憐愍阿難大衆及為未來衆生為出世因使之修證有賴作將來眼使之信解不迷於是以手摩阿難頂表以頂法開示也即時十方世界六種震動表六根將必解除也十方如來各有寶光從有頂出自彼世界來灌如來頂表此根中妙性無上頂法是十方薄伽梵一路涅槃門也是諸大衆得此希有之瑞又聞十方微塵如來異口同音而告阿難曰善哉阿難汝欲識知俱生無明使汝輪轉生死而為結根者乎即汝當下六根便是無他物也蓋此根性即是俱生無明之元首固結生死之深根離此六根更無結元耳且不但只是妄元仍是真元蓋罪之魁而功之首矣汝復欲知無上菩提以如如智證如如理令汝速證四德斷果者乎亦汝當下六根便是非他物也所謂解鈴即是繫鈴人也諸佛同宣如此可見非一佛之私言而尤當信受矣阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物佛告阿難根塵同源縛脫無二識性虗妄猶如空華阿難由塵發知因根有相相見無性同於交蘆過於常蘆生必二莖交抱而立單則仆矣又其體外實內空今長行惟取交倚不能自立偈頌則仍取外實內空以喻根塵空有俱非也是故汝今知即內之意根見即外之五根立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物此細釋結解皆由六根也阿難雖聞如是法音心猶未明故復請問輪生死證妙常云何皆是六根更無他物意疑如來常說法相最要略者亦有十八界等今何惟是六根而六塵六識皆不與耶世尊抽條引蔓復與詮注而告之言我之獨舉根而不舉塵者非遺乎六塵也良以根之與塵執相而觀則根為內身而屬有情塵為外器而屬無情似永異也然相見二分皆依自證而起本惟一心妄分情器遡流窮源仍是一體惟根塵同源故縛則同縛脫則同脫而縛脫無二唯無二故舉根而塵在其中矣所以不舉識者以識性無源乃前塵虗妄相想猶若空華了無實體既非縛結之本又非解脫之要故舉根而識亦在其中矣六塵既無別體六識又極虗無故諸佛同言結解唯是六根也且根塵何由而立乎阿難由外六塵而後發六根之知是根託塵而立也因內六根而後有六塵之相是塵託根而立也塵離根固無獨立之自性根離塵亦無獨立之自性是則相塵見根二法交倚而生同於交蘆之二莖相抱單則仆地不能立矣況交蘆外實內空亦可喻根塵之空有俱非也夫根塵既無兩體是以縛脫但惟在根是故汝今若不達空有俱非之旨而於有知有見六根之性上妄立空有二知如凡夫迷六根之性為有二乘晦六根之性為空皆立知也凡夫俱足五住而長淪分段皆迷有以為之本二乘尚餘第五而未出變易皆晦空以為之本即此立知非即無明本乎若於知見之根性上而無空有二見如凡夫除執有之見二乘除偏空之見皆無見也凡夫除前四住先得有餘涅槃二乘除第五住究竟無餘涅槃即此無見非即涅槃無漏真淨乎知見立知是結以根結也知見離見是解以根解也結惟根結而更無他物能為結元解惟根解而亦無他物能為解元云何是結中解中而可容他物以為本元哉然則汝之別請結元者真為誤矣問此之知見與法華知見及本經圓彰三藏之後所說知見同耶異耶答更無別法但泛切不同耳法華標名未及釋義泛之甚也斯經金口自釋圓彰三藏即佛知見亦取衆生本具非取修證所成然於衆生現前未曾指其具於何處是猶未的切也今此處於衆生現具六根中性指出如來知見方甚為的切而非泛也蓋以知即內之意根見即外之五根而此根性既周遍常住為菩提涅槃元清淨體而三藏圓具非如來知見而何單傳直指亦密指於此而已前云因明立所此云知見立知立之為害如此故有道者見無所見知無所知一法不立則立處皆真矣宗鏡云世間生死出世涅槃皆從知見文字所立若無知見文字名體本空於妙明心中更有何物為緣為礙瑞鹿遇安禪師得法於韶國師嘗閲首楞嚴至此乃破句讀云知見立句知即無明本知見無句見斯即涅槃於此有省有人語師曰破句了也師曰此是我悟處畢生不易賀云知見二字即前文所謂見聞覺知蓋指六根也若於知見處明暗妄形黏湛發見流逸奔色即此知見便是無明根本若於知見處不隨前塵脫黏內伏內瑩發光即此知見便是涅槃根本立知即無明本故曰輪轉生死唯汝六根無見即涅槃故曰安樂妙常亦汝六根阿難問云何是結從何名解知見立知即是結也知見無見即名解也爾時世尊欲重宣此義而說偈言偈分二科一祗夜此云應頌即頌上長行也二伽陀此云諷頌不因長行但諷美而頌之也真性有為空真淨謂其語倒應云有為真性空緣生故如幻無為無起滅不實如空華即起滅而本無起滅則二義齊銷圓實義也對起滅而立無起滅則二皆非實權小義也此頌識性虗妄猶如空華也法相宗五位唯識前四有為第五無為應頌之意若曰甚矣根性之為用大也若論識耳有為之識無真自性悉是虗妄以其仗因托緣而生故喻之如幻無為之識對起滅而立無起滅二皆不實喻若空華然則識之有為與識之無為二皆非實我故曰識性虗妄猶如空華也賀云諸注引掌珍論釋此四句謂雙破有為無為玩本文似與掌珍論不同蓋四句總是一意正顯有為即無為耳有為通指根塵識前云決定棄捐諸有為相又云汝但不循十二諸有為相阿難將謂離此有為之外別有無為故疑云何同是六根更非他物佛言汝今分妄分真總未達根塵之源耳源者何真性是也以真性觀之諸有為法當體即空全是無為所謂性色真空性空真色求起滅不可得求真妄不可得求能所不可得何必離縛求脫離結求解離有為求無為哉言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交盧此頌根塵同源也夫識性虗妄如此言妄則顯諸真矣然而對妄所顯之真二俱成妄畢竟非真何以故以妄居真外則妄實有體反乃不成妄義如影有實體影義不成也真居妄外則理不攝事反乃不成真義如鏡不現影鏡義不成也二義不成故二俱同妄矣既不成真是非真也又不成妄是非非真也對妄顯真猶非真非非真真妄尚無二體況能見之根與所見之塵云何乃有異源乎所以根塵相倚而立中間無有各自實性但如交蘆有二相而無二體矣我故曰根塵同源也結解同所因聖凡無二路此頌縛脫無二也根塵既無二體所以縛脫惟是六根故結則同結解則同解結解皆是此根同所因也結則為凡解則為聖聖凡皆是此根無二路也然則離六根豈復別有縛脫哉我故曰縛脫無二也汝觀交中性空有二俱非此重頌根塵同源也且根塵二法喻若交蘆不但取其相倚而已汝觀交蘆之體性外實內空適言其有其中元空適言其空其外元實以喻根塵適言其有則其體空廓自在無繫適言其空則其用圓融周遍法界蓋空有二俱非焉必極於空有俱非而同源之義始盡也迷晦即無明發明便解脫此重頌縛脫無二也惟根塵二法空有俱非如此所以凡夫迷六根為有則失其自在無繫之體二乘晦六根為空則失其遍現互融之用故俱墮五住二死而迷晦即是無明所謂知見立知即無明本也若翻迷發悟而不復著有轉晦成明而不復沉空則遠離五住二死而發明便是解脫所謂知見無見斯即涅槃無漏真淨也至是而縛脫無二之義尚有餘蘊哉祗夜頌上長行竟解結因次第六解一亦亡根選擇圓通入流成正覺此開後綰巾示倫冥授選根科也諷頌之意若曰夫縛脫既惟是六根矣根之結也元有次第則根之解也亦必因於次第雖然非一非六者根也若總解除尚不名一六云何成故六解則一亦亡矣然又非於六根而遍解之也根貴於選而選根貴擇最圓通之根若選而擇焉而得其所為真圓通者則一門深入從入流忘所乃至寂滅現前頓成無上正覺矣陀那此云執持微細識深隱而非淺顯曰微精妙而非粗浮曰細習氣成瀑流真非真恐迷我常不開演此頌六根當體即是八識也陀那者第八識受轉之別名權小欽仰陀那而忽慢六根不知此根性即是陀那微細之體我前判二種根本時即呼根性為識精明元職此故也是則即妄而真矣然是陀那所持種子謂之習氣以此習種能引生諸趣根身器界流轉無停故如瀑流是則即真而妄矣由其即是陀那細識故真由其帶持瀑流習氣故非真我若說其為真其奈帶持種子妄習不除衆生將迷妄為真未免瀑流漂轉也我若說其為非真其奈體即微細離此無真衆生將棄真為妄未免向外馳求也真與非真二俱難言是故非時非機我寧常祕之而不言不令衆生墮彼二種之迷耳是知此法祕密時乃說之非常說之法也自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立此承上科真與非真二俱易迷如此故此憫其迷而示以出迷之要也且夫迷雖易迷悟亦易悟原其最初但因不悟見相二分惟一自心而乃誤以能見之心妄取所見之境是自心取自心也由是從無人無法非幻境中攬塵結根幻生法相人相所謂從非幻而成幻法也前既妄見攬塵橫生幻法今乃旋根脫塵不復取著即此不取工夫不惟無幻法也并非幻亦無之非幻且無人法俱空之境尚亦不生而法相人相種種幻法豈能存立乎苟能了此則破妄出迷之方亦甚簡要直捷矣是名妙蓮華金剛王寶覺夫此根性法門衆生現具如蓮之方華即果是名妙蓮華而為法華之堂奧也抑此根性法門最堅最利名金剛王寶覺而為甚深般若也兼備二經之尊勝豈不為諸經之王哉如幻三摩提此云等持謂定慧平等任持也彈指超無學又此根性法門知真本有達妄本空無修而修無斷而斷謂之如幻三摩提而非如權小染實之修也由其如幻故一修一切修一斷一切斷而此根初解先得人空已與無學齊等空性圓明成法解脫即超無學遠矣何況俱空不生乃至於無上知覺乎此阿毗達摩此云無比法十方薄伽梵即如來也一路涅槃門極而論之此根性教法非他教法可比故曰無比法而是無比之法乃三世十方諸佛共由之達道直至萬德周融五住永寂究竟無餘涅槃極樂果地不過此根中圓湛不生滅性以為因地門戶而已豈有他岐捷徑別可遵循者哉夫既為無比教法而又與涅槃為門戶足顯斯經以無上醍醐為教相而非酥酪之可及矣不因長行諷美而頌竟證釋別有結元之疑竟賀云當知此偈總是發明如幻之意首提緣生如幻次明結解俱幻然後以自心取自心結成如幻三摩之意故次卷觀世音如幻聞薰云云可見此偈已暗選觀音法門矣後五十五位真菩提路又以如幻結之此下綰巾以示倫次也前偈云解結因次第六解一亦亡正開此科故阿難躡此二句作兩節而問佛亦作兩節答之正脉謂喻中六結實有次第法中六根本無次第故以六結但喻根中豎推之六重斯亦有理然細玩經文則汝六根亦復如是分明以結喻根似無容鑿今斷自六解一亡亦復如是以上仍以六結喻六根由汝無始心性狂亂以下兼喻六根中各各具有之六重庶前後俱不相悖矣於是阿難及諸大衆聞佛如來無上慈誨祗夜伽陀雜糅精瑩妙理清徹心目開朗歎未曾有阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次惟垂大慈再愍斯會及與將來施以法音洗滌沉垢沉垢即細惑也此因領悟而復請未明也於是阿難云云伽陀文如織綿義若貫珠而雜糅精瑩真妄交陳根塵互舉而妙理清徹但覺心目開明不復認攀緣為心浮根為目矣歎未曾有未嘗開演者今始開演矣阿難合掌頂禮白佛我今聞佛知無不言言無不了略無遮護此皆從大悲心中流出此根性又淨又妙又常為最真最實之法句我心已得領悟矣所未達者六自為六一自為一何故六解而一遂亡乎結固同結解亦同解何故舒之與結皆有倫次乎惟垂大慈云云洗滌沉垢焉即時如來於師子座整涅槃僧裏衣也斂僧伽梨大衣也攬七寶几引手於几取劫波羅天時分即夜摩天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結疊華西天之帛價值無量今天獻尤為貴重可知此先示結有倫次者欲顯因有六種迷根而一巾遂成六結如明暗發見動靜發聽等是也夫言相並彰令人易省即時如來於師子座整頓裏衣收斂大衣攬七寶之几案外手於几取夜摩天所奉疊華之巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來又綰一結又如此問阿難大衆亦如此答此亦名結如是次第綰至六結一一結成一一持問阿難大衆次第酬答皆曰此名為結即示結時元有倫次顯然矣正脉謂不是橫喻眼耳等六以彼根結元非先眼後耳等然佛語圓妙無所不可即諸先眼後耳亦無不可也佛告阿難此疊華巾先實一條此在次二句正脉以為倒亂恐是譯寫之誤故正之我初綰巾汝名為結此是首二句第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此中祗有六結終不至七亦不停五云何如來祗許初時第二第三不名為結一巾喻業識也六結喻六根也一巾應成一結何故成六故佛又反詰云此疊華巾先實一條耳我初綰成一結汝名為結矣至於第二第三云何亦名為結若是乎巾一而結多耶阿難答言世尊此疊華寶巾緝績所成雖是一條本無多體然我思維一綰而得一結若百綰即名百結矣今此巾祗有六結多不至七少不停五明明六結非屬強名云何如來祗許初結為結而第二第三即不名結耶此科詰問要令阿難答出巾體是一因結成六以顯六結全是一巾所成也佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生我今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中生畢竟異此亦故問反激令其自辨可不也佛告阿難此寶華巾汝既知其元是一條因我六綰而有六結矣汝又詳審觀察未結之先巾體是同一相不立六相何有既結之後因結有異六相定別一相奚存於汝意下云何因初綰而名第一至六綰而名第六我今欲將第六以當第一如將意根作眼根用如是得不世尊以性中相知故難其可能以六成一也阿難答言不也世尊六結現存斯名第六終非第一縱竭我歷生聰明才辨亦不能令此六結錯亂而名尊者以用中相背故答六結不可亂名也佛迎而許之云汝言如是六結雖然不同若還顧本因元是一巾所造但一既成六一不可見六不可亂令其雜亂終不得成則汝現前六根亦復如是未結之先元是一體本無異同既結之後各有界限分隔則意不可為眼用眼不可為意用從畢竟同中而生畢竟異蓋真心本體一相尚不可得六結豈可得哉所謂畢竟同也及其從真起妄而六結已成則其序尚不可亂而其六豈能暫忘哉所謂成畢竟異也正脉謂六結喻竪出六層於同異二字終說不去蓋一動二靜三聞四覺五空六滅只可云次第不可云同異也佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此六根方可言彼此若喻竪推六重豈可分彼此耶尚不名一六云何成佛言六解一亡亦復如是此復審以明六解一亡也佛告阿難我綰華巾成結汝必嫌之而不欲其成六結惟願其還成一巾者用何籌策方可得成阿難言六結若存則彼此各有定位復有定名若以六作一則諍論鋒起決不可得以此結非彼結彼結非此結故也如來今日若將六結一總解除既無有結即無彼此彼此既無即一尚不可得而況六乎佛即就喻以印之云所謂六解一亡亦如此耳蓋六根全體是箇識精由粘妄發光故在眼名見在耳名聞等故六根解而識精空猶六結解而一巾空也然一亡亦非並其真體而失之但是不對乎六結自不立乎一真而已答六解一亡竟由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相此答舒結倫次之問而先示結生次第也夫六根雖同六結而六根中又各具六重結相由汝無始以來妙明本覺心性橫起無明為狂無明所生三細為亂此即第一結成圓通中當於滅結也於是知見妄發見法實有乃法執位即二三結成圓通中當於空覺二結也於是發妄不息勞見發塵見我及我所乃人執位餘三結成圓通中勞見即當根結發塵即當動靜二結也所謂勞見發塵者譬如勞目之睛則見狂華於湛精明中無因亂起可見一切世間山河大地諸有為相生死涅槃諸有為法皆是心性狂勞中顛倒亂起之華相而已豈有真哉由六根中各各具此六重故從真起妄自細向粗而結之倫次歷然可見矣此涅槃對生死而立即二乘執相見為無而墮法見者張拙謂涅槃生死等空華正謂此也阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏掣右邊又問阿難如是解不不也世尊佛告阿難我今以手左右各牽竟不能解汝設方便云何解成阿難白佛言當於結心解即分散佛告阿難如是如是若欲解除當於結心此復問解結之方而密示其要也阿難問言此勞見發塵之勞即是一巾所成之結不知用何等工夫方得解除如來以手將所結巾偏掣其左問云如是解不曰不也世尊此譬凡夫之滯六根為有而長淪生死豈能解根也旋復以手偏牽右邊又問如是解不曰不也世尊此譬二乘之觀六根為空而永晦涅槃安得圓通也蓋空有二執皆是以結去結盡屬偏邪俱不能解於是佛告阿難我今左右各牽既不能解汝有何方便方可解得阿難答云世尊當從結心下手解即分散矣所謂從命根下一刀千了百當是也向後二十五聖無非從結心下手以破除識陰故皆證圓通耳佛印之云如是如是若要解結信非結心不可夫結心雖譬中道然非兼彼空有合成中道亦非離彼空有別立中道乃是悟此根性體自在而無繫本不屬有不迷為有而已更不勞於觀空破有也達此根性用遍現而互融本不屬空不晦為空而已更不勞於觀有破空也如後耳根圓通既不執有亦不觀空惟一反聞忘塵頓入由是而二空漸證妙體現而有自破也俱空不生大用起而空自離也是則反聞自性即是結心雙超空有之中道矣前人不達強以別安三觀其說支離真蛇足哉諸家以斷常為左右中道為結心詳前後文都無此意蓮師曰左右者解於結之末也故勞而無功結心者解於結之本也故逸而有成良由虗妄狂心迷而取境因此成結此結心也若不於結心中解其餘解法左之右之舍一取一莫能得也則所謂斷常空有等種種諸法亦攝盡矣阿難我說佛法從因緣生非取世間和合粗相如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待此激其欲從結心必選圓根為發悟之緣也阿難我前此痛斥因緣矣然而佛法未嘗不從因緣生但我所說之因緣非取世間四緣和合而生識三緣和合而生人二緣和合而生物之類今說因緣是欲揀選圓根一門深入發明大事因緣也然我觀察六凡四聖世間出世間法一一知其本因皆從緣出如六凡以善惡不動業為因以趣生時所見憎愛二境為緣四聖以多生積薰諸乘教理為因以所遇善知識開導為緣如是乃至極難知者如恆沙界外雨滴皆知其數現前松直棘曲鵠白烏玄皆了緣由佛智如此則所說解法決無差謬所許證取決不賺誤是故阿難汝當確信選根從六根中選一圓根一門深入根結若除塵相自滅即五根應拔圓脫也諸妄鎖亡不真何待即云何不成無上知覺也舍選根而求結心吾不知之矣阿難我今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除佛言六根解除亦復如是此明解有倫次也阿難我今問汝此巾六結現前我將同時解其縈繫可得應手同除不須次第不阿難言不也世尊是結本以自一至六次第綰生今欲解之亦當自一至六次第而解何也六結雖同巾體而綰結元不同時則佛言同除無有是處佛言六根解除亦復如是蓋六根之結雖非先眼後耳先鼻後舌等然六根中各各具有六重結相則未嘗無次第也既有次第而解欲同除可乎哉蓮師曰結解次第非眼結解已次解耳結次解鼻結之謂也六結不能一時齊解必須一根先解次五根任運而解也六根解除亦復如是當屬上文此根初解以下別是一意上明解結次第下明結解所得之功能也此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍以解之次第言之根之結也由心性狂亂以至勞見發塵自細向粗以順而成則根之解也由勞見發塵以遡心性狂亂由粗反細以逆而銷是以此根初解先得人空蓋初忘動塵入流忘所為除第六結次忘靜塵動靜不生除第五結此當須陀洹果斷於我執分別即見惑也次盡聞根聞所聞盡除第四結此當後三果斷於我執俱生即思惑也既得人空則人執已除而所謂勞見發塵一切世間生死俱盡矣由是空性圓明成法解脫先捨智愛覺所覺空即斷法執分別為除第三結次捨理愛空所空滅即斷法執俱生為除第二結蓋空人而不空法但得空之少分而非圓明故法解脫位方得圓明既法執已除則所謂知見妄發出世間涅槃俱盡矣由是解脫法已俱空不生由證人空則分別俱生二種我見不起由證法空則分別俱生二種法見亦亡然雖證二空尚有二空相在此復空其二空故曰俱空不生生滅既滅寂滅現前為除第一結而所謂心性狂亂者俱盡山河大地應念化成無上知覺此其時矣解結至此是名菩薩從三摩地之妙因得無生忍之妙果菩薩住此忍中不見有少法生不見有少法滅故謂之無生忍而入發心住也汝問舒結倫次其序如此而六解一亡亦無餘蘊矣鍾云得人空者於我無著破煩惱障也空性圓明成法解脫則破所知障得法空矣俱空者人法俱空而俱空亦空是從正受得無生忍矣如澄濁水沙土自沉此之謂也人空法空六根之人法也根根有人法二執亦根根有人法二空雖有先後法爾如然無先後中之先後也此正結心解除之實也譬如有人本因元氣受傷標現寒熱二症愚者或服熱藥或服寒藥皆不能愈智者不用熱藥亦不用寒藥但用直扶元氣之藥則此病初愈先退熱症熱症平復寒症亦除寒熱除已調理亦忘法中根性被縛如元氣受傷也空有二執俱結如標現寒熱二症也凡小用空有二邊皆不能解如愚人服寒熱二藥皆不能愈也今經令不著空有如不用寒熱二藥也惟令旋根脫塵如惟用直扶元氣之藥也此根初解先得人空如此病初愈先除熱症也空性圓明成法解脫如熱病平復寒病亦除也解脫法已俱空不生如寒熱除已調理亦忘也答舒結倫次竟阿難及諸大衆蒙佛開示慧即始覺覺即本覺圓通即六根互用得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別惟垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授此正請圓通本根為入華屋之門也阿難及諸大衆蒙佛開示於慧覺圓通之理雖未豁然而證實亦決定分明了無疑惑矣於是合掌頂禮而白佛言我等今日由悟六解故身無礙一亡故心無礙然雖悟知六解一亡實猶未達六根中誰為圓通本根而為我所當選用者世尊我輩飄零流轉諸趣積劫以來無師導引而孤無德庇身而露何心何慮為佛之弟預佛天倫於流轉時忽霑法乳如失乳兒忽遇慈母自慶出於望外若復因此際遇得成聖果不負為如來之弟今我雖得如來開示密語猶是多聞記持非己智分還同數他家寶未有一毫新證實與未聞之時無有差別惟願垂大慈悲惠我祕密妙嚴成就如來最後開示究竟全分之慈誨作是語已五體投地即起默聽退藏於密冀佛冥授蓋望佛的指一門令得深入也曰冥授者意含不必佛說也是則大權施設之宜師資簧鼓之意於茲備見之矣爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學菩薩亦稱無學者志公云不起絲毫修學心無相光中常自在是菩薩無學之明證也吾今問汝最初發心悟十八界不言七大者六塵攝前五大根識攝後二大也誰為圓通從何方便入三摩地此令二十五聖各陳圓通以答阿難之請也爾時世尊不復自言但告會中諸大菩薩大阿羅漢云汝等生於我法之中勤苦修行得到無學田地吾今問汝最初從那一法上發菩提心悟此十八界中誰為圓通從何方便入三摩地汝當盡言無隱我將擇而取焉問此下各陳圓通與宗門見色聞聲入道者同耶異耶答不盡同而亦不盡異也宗門人據現生悟處未必是彼修習法門如靈雲豈以桃華為修門耶但是參究疑情逼拶功極忽於見色處瞥的透露而已今四諦不淨嘗藥觀法多是所修法門功久證入若此則未敢言同也然宗門人亦有差別因緣具眼師家能預知之如緣在聲處決不於色處悟乃至於人於經棒喝言句等皆各一定不得錯亂推其過去未必不是彼熟習使然也不然則師家何預知之若此則與諸聖亦未敢言異也惟香嚴跋陀等聞香覺觸等似一時忽然之事則與宗門現生之悟相似耳智者審之鍾疏云二十五聖證圓通處頭頭拈來頭頭皆是其著眼下手不知從何悟入從何透出不待證果之後即因地已極圓通矣宗門一派分明是諸老逗出又云但言十八則已攝七故前云十方如來於十八界一一修行皆得圓滿無上菩提又此十八只是六根而各開根境識三則但言六其義亦周故前文云令汝生死輪轉安樂妙常同是六根更非他物憍陳那此云火器五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園皆古帝王養畜之地觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多此云解妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上此陳聲塵悟入也爾時憍陳那五比丘即從座起頂禮佛足而白佛言我昔棄佛在於鹿苑雞園各自修行及佛成道先來度我故我觀見如來最初成道佛為我等三轉四諦皆借音聲我等悟明四諦亦賴音聲佛問比丘誰得悟者惟我最先解悟故如來即以解名印證於我且佛以一音說法衆生隨類得解當說四諦時實行聲聞但領生滅之旨而妙音密圓徹於無作四諦惟我密發深解證圓實理即音聲而悟入無聲三昧得大乘阿羅漢今佛問圓通如我所證音聲為上此方真教體清淨在音聞故集經者以陳那為始而觀音為終也如來藏妙音即音之實相密圓者密悟圓理也四諦苦集滅道也優婆尼沙陀此云近少亦云色性謂微塵是色之少分故即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名離沙陀塵色既淨妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上此因色塵悟入也優婆尼沙陀云云白佛言我亦觀佛最初成道因多貪欲佛令作九想觀以治之觀此身內有三十六物外則九孔惡露常流從生至死終無一淨轉好心而成惡心生大厭離悟諸色性始從不淨歸於白骨微塵畢竟是空以色為病以空為藥既歸於空則病愈藥除空色二無忽然證入成無學道如來印我即名色性於是相盡性現普觀諸色皆是佛色皆即如來藏心周遍法界密而且圓是故我從色相得阿羅漢佛問圓通如我所證色因為上蓋佛法從因緣生而我以色為入圓之因也九想者一肨脹想二青瘀想三壞想四血塗漫想五膿爛想六蟲噉想七散想八骨想九燒想也香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齊見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上以妙香莊嚴法身故號香嚴此因香塵悟入也香嚴童子云云白佛言昔者我承如來教我於一切處諦觀根塵識等諸有為相我時辭佛宴坐晦息於清齊之中但見諸比丘燒沉水香香氣寂然來入鼻中夫香亦有為中一法也我即諦觀此氣非木也而不從自出非煙火也而不從他出非和合也而不從共出非空也而不從無因出四性皆無倐聚倐散去無所著或斷或續來無所從由是意銷入無分別發明無漏達熾然香體即如來藏心故如來印我得香嚴號從此相盡性現塵氣倐滅妙香密圓一切香皆是法身香我從香嚴得阿羅漢佛問圓通即我所證香嚴為上此與跋陀酷似宗門悟處而尚多假於分別宗家未必若是然宗家悟後見諦雖同而證之淺深隨於宿根實不可定此之諸聖洞見藏心亦無不同而初心證位定在七信以上通於初住是證亦同也不然則不可同語圓通位矣後皆放此藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦醋鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩佛問圓通如我所證味因為上此因味塵悟入也藥王藥上二法王子云云而白佛言我從無始劫來為世良醫口中嘗此世間諸味名數凡有十萬八千悉知其五味之味與無味之淡并衆味共成之和合直爾采用之俱生修煉炮炙之變異其中或冷或熱有毒無毒悉能遍知承事如來宿習不忘即從味處觀察了知味性舌與藥觸熾然味現故非空雖觸舌現實無形相故非有舌即身也舌識即心也諸藥不來則舌與識不自現於苦等故非即身心舌識不嘗諸藥豈能自現苦等故非離身心分別味因一一追究味因何有忽爾悟得熾然諸味元不從於諸藥及與身心本如來藏妙真如性蒙佛如來印我兄弟為藥王藥上二菩薩名蓋如來塵劫為我導師如是印我故我今於會中為法王子約初發悟時但因味覺明藏心開悟以至位登菩薩雖復高證元不改其初名也佛問圓通如我所證味因為上跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅賢守亦云賢護妙觸宣明成佛子住佛問圓通如我所證觸因為上此因觸塵悟入也跋陀婆羅并其同伴云云白佛言我等先於威音王佛時聞法出家遇隨僧浴忽悟水因當沐浴時以身觸水以水觸身中間熾然冷暖觸現由是追究此觸因何而有若言因洗塵垢而有耶則塵本無情何能現觸是不因洗塵而現觸也若言因洗勝義根之覺體而有耶則覺知之體非洗可著是亦不因洗體而現觸也推塵推體兩楹中間安然自在得無所有達此觸塵杳無來處從此悟入妙真如性故在威音時已得見諦今從佛化又得無學昔為初心今證深位彼佛名我跋陀婆羅從此一觸則觸處道場觸目菩提而妙觸宣明證於初住佛問圓通如我所證觸因為上水因者即水為導悟之因也此科當勿迷於論觸蓋觸之為塵以身根而合色塵中間覺其冷暖澀滑者是其相也蓮師曰塵體二字衆說不一不足深辨只重悟水因耳此水洗塵乎塵自無體何塵被洗此水洗體乎體屬四大四大本空何體被洗外塵內體內外既無安有中間為水洗者夫觸之為義以水與我交涉而得名今皆無之觸果安在無觸而觸觸實無觸非因非緣及與自然本如來藏妙真如性故曰妙觸宣明也雖然此亦義解將此當悟尚未尚未摩訶迦葉大飲光及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫金光塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞法塵為總前五為別蓋觀前五塵謝落影子兼總別而稱六也惟以空寂修於滅盡身心乃能度百千劫猶如彈指今持金襽袈裟於雞足山入定待彌勒下生此其證也我以空法成阿羅漢世尊說我頭陀為最頭陀此云抖擻以能抖擻法塵也妙法開明銷滅諸漏佛問圓通如我所證法因為上此因法塵悟入也摩訶迦葉云云而白佛言我於往劫值日月燈佛聞其法而修學之此佛滅後我則供養舍利然燈以繼續光明常以紫光之金塗佛形像以此二種勝因故感歷劫紫金身光袒衣吞日此紫金光比丘尼等乃我眷屬與我同時發心者故身光亦同也我觀世間總別六塵託意識暫現剎那剎那念念生滅厭此變壞加修空觀入滅盡定此定能滅意根空法塵定深則身心不動忘處忘時甚久同暫度百千劫猶如彈指我以空法觀破法塵相盡性現悟入藏心成阿羅漢以能抖擻法塵故世尊說我頭陀為最惟其不縛於塵故六塵皆妙遍一切處頭頭皆是入路動作施為無非佛事華飛釧動並可棲神法融藏心故妙開明藏心既入永無漏落故銷滅諸漏此果之實也佛問圓通如我所證法因為上六塵圓通竟此下陳五根圓通也六根缺一者留耳根為殿後所以當此方之機也兼詳五根四中俱有旋反字面以根性法門均是旋根脫塵之旨塵識不然細玩可見阿那律陀此云無貧亦云如意乃白飯王之子佛之堂弟過去以一飯施辟支佛感九十一劫受如意樂也即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類咄咄胡為睡螺螄蚌蛤類一睡一千年不聞佛名字我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見即旋見忘塵照明即發本明耀金剛三昧天眼現前如金剛堅固不可破壞非如肉眼易破壞也我不因眼觀見十方精真洞然即如來藏心發本明耀心眼洞開也如觀掌果如來印我成阿羅漢佛既開本均屬內祕凡所修證何法不圓佛問圓通如我所證旋見循元斯為第一此因眼根悟入也阿那律陀云云失其雙目幸世尊示我以樂見照明金剛三昧此全是反見見自性之功夫由修此三昧得天眼通以蒲桃朵而換天眼於是明不循根寄根明發不假肉眼觀見一佛世界精真洞然如觀掌果此則位齊初果如是漸增見所見盡則位齊七信四果故如來印我成阿羅漢佛問圓通如我所證反其見以見性曰旋見不循塵而循根曰循元旋見循元斯為第一方便而已矣樂見照明略似修淨土之作日觀目雖不見而以心目樂見樂見之極忽得照明也不失不壞故名金剛周利盤特迦此云繼道亦云蛇奴即誦帚比丘也即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細得定則微細窮盡定深則窮盡生初起曰生住不斷曰住異漸微曰異滅已斷曰滅諸行即四相遷流也剎那最短也其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證反息循空斯為第一此因鼻根悟入也周利槃特迦云云白佛言我昔過去為大法師祕吝佛法不肯教人感愚鈍報闕於記持無多聞性以宿善故最初值佛聞法出家如來以苕帚二字當一句伽陀使我憶持於一百日中得苕忘帚得帚忘苕佛乃愍我曰此人之愚也遠因雖本於暗鈍近緣亦由於雜亂遂設方便教我安居端坐而數息焉初數漸調心息相依心漸微而息亦漸細我又默默返觀於息微細處又窮其生住異滅乃至推窮一念復具九十剎那一剎那復具九百生滅如此專力既久向冷灰裏一粒豆𪹼便得心息兩忘豁然虗通得大無礙所謂一息不存道將來契也從此漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證惟是反窮氣息至極細處亦歸於空意所謂圓通者斯為第一而無復有加耳昔莫將尚書謁南堂靜禪師咨決心要堂使其好處提撕適入廁聞穢氣急以手掩鼻遂有省乃呈偈云從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來元在鼻尖頭此亦從氣息邊打失鼻孔也調息興數息不同天台止觀離風氣喘等而幽綿自在調息也數出不數入雙數則病數息也憍梵鉢提此云牛呞即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門賜之數珠教嘗念佛我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢消塵法眼清淨想相為塵識情為垢二俱遠離則汝法眼應時清明即此意也成阿羅漢如來親印登無學道佛問圓通如我所證還味旋知斯為第一此因舌根悟入也憍梵鉢提云云白佛言我昔過去因見老僧無齒而食笑其似牛故世世生生感生牛舌嘗如牛之虗噍輕弄之報如此幸遇如來為我遮謗賜我數珠念佛斷諸雜緣純一淨念是為一味清淨心地法門既教其止散入寂故我得滅心先入念佛三昧又教其從寂起照故我觀察嘗味知性非從根體亦非從物味良以外味不來根不自嘗故非體舌不觸知物不自味故非物非體非物應念之間忽然悟入本是如來藏性頓超諸漏如日出霜消於是內脫身心解根脫縛外遺世界超越器界達三有本空而遠離之更無依正纏縛如鳥出籠所向無礙離垢銷塵法眼清淨宛然信滿入住成阿羅漢如來親印登無學道非同小乘之果矣佛問圓通如我所證還味旋知味有多種知無兩般反觀嘗性悟入藏心斯為第一畢陵伽婆蹉此云餘習宿有尊貴習氣如罵河神為婢是也即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來說諸世間不可樂事乞食城中心思法門法門即苦諦也不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學佛問圓通如我所證純覺遺身斯為第一此因身根悟入也畢陵伽婆蹉云云白佛言我初發心從佛出家數聞如來說四諦中苦諦如三苦四苦八苦等俄而乞食城中心思此苦諦法門不覺路中毒刺傷足毒延於身舉身疼痛因念不可樂事遂觸不可樂境亦碎啄同時也我念先有知痛之知方能知此深痛正當知此深痛時不為痛轉即便觀察此知痛者即是身覺覺有深痛而我本覺清淨心體痛所不及實無有痛能痛此覺心者如是詳思正痛之時有知痛之覺有痛所不及之覺豈此一身寧有雙覺身既是一覺豈有二所謂一則真二則妄也如此推窮攝念一處惟隨順無痛清淨之真覺而不復隨順知痛之妄覺攝念之極真純妄絶未久之間身覺俱忘三七日中漏心都盡藏性現前而欲有無明了不可得位齊四果七信成阿羅漢得親印記發明無學宛然信滿入住矣佛問圓通如我所證唯一圓融清淨寶覺更無身相斯為第一宗家如臨濟三問而三次遭棒庶幾純覺遺身從痛處得入者鍾云木石無知故刀割香塗了無所覺我惟有知故知此痛身空故無痛者心空故無覺痛者純覺遺身身心俱遺不言心者省文也須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發明性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一此因意根悟入也須菩提云云白佛言我曠遠劫來已證空性心得無礙無隔陰之昏出胎之昧自憶受生如恆河沙之多當初在母胎時即知五蘊皆空生體了不可得此正報空也自母身外洎山河大地悉同空寂此依報空也此猶屬於自空也及至出胎廣化衆生同悟空理各各證得空性則具足二利矣宿因已是如此又蒙如來為我發明性覺真空性空真覺之理知此空性圓明清淨本然周遍法界由證此覺得阿羅漢頓入如來寶明空海與如來把手共行此即寂同於佛矣又得同佛知見如前圓彰三藏所謂大智慧光明者此則照同於佛矣於是如來印我成此無學人法俱空一切解脫所證空理乃一真本有真空不空之性體窮盡空理更無加尚佛問圓通如我所證自我相人相衆生相壽者相及與法相皆入於非相而能非與所非俱盡初以空空諸相而人法雙空次以空空其空相而藥病雙除唯旋此心法即意根中知性非法塵也歸畢竟空斯為第一所謂諸行無常一切空即是如來大圓覺也別經明須菩提乃過去青龍如來觀此自說深心無復隱祕於十地大人復何所歉而舊解皆作小乘分判抑深為淺抗佛誣聖多矣五根圓通境此下陳六識圓通也夫經初徵破識心訶為生死根本衆生誤認枉入輪回權小依修竟無實果何今復可入圓通乎蓋前於識大遍周中已申斯辨今請重申夫識雖塵影虗妄之極而離一真見分無別自體譬影之於水雖極虗妄而離水無別自體但迷執者認識忘真而橫成流轉譬癡人認影忘水而誤遭淪溺利害非細不得不訶也倘悟者即識見真而識非真外圓通何疑如智者觀影知水而影非水外尚可得水之用豈遭其淪溺乎故此六聖并後彌勒皆能即識見真故皆證於圓通而無礙也問如何不即令人即識見真而必教人依根以入乎答偈云聖性無不通順逆皆方便初心入正定遲速不同倫正以塵識皆遲而惟根最速故也譬訶二乘豈是終不成佛但劫經塵點遲鈍之極故訶初學勿發是心也又眼耳鼻舌身五識頗似無分別之根性故與前五根混而隨念分別頗似意識之計度又與後意識混愚法聲聞罔不迷之不可不辨今請略明眼識之相餘四準知如眼照鏡時一念不動但如鏡中無別分析此眼根之見性也於中用目循歷黑白大小多少善惡等性歷然不混不帶名言隨念粗略分別即眼識也由是次第標指追究分析無量差別此遍執名言計度即眼家俱意識也今但取於第二眼識而根性與俱意俱不得混濫之然則性宗學者當勿忽於法相可也舍利弗即從座起頂禮佛足而白佛言我曠劫來心見即眼識清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於路中逢迦葉波兄弟相逐兄弟三人名見目連通中宣說因緣佛偈云因緣所生法我說即是空亦名為假名亦名中道義此四句即藏通別圓四教而鶖子所解決徹圓理也悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生二句簡別於羅睺佛問圓通如我所證心見發光光極知見斯為第一此因眼識悟入也舍利弗云云白佛言我從曠遠劫來眼識明利如是受生如恆河沙之多於世間出世間差別幻妄種種變化但眼識一掠而過洞然無礙不勞意識深窮細究而後知多生如此其在今生未嘗知佛也偶於路中逢迦葉波兄弟相逐而行為我宣說四句因緣一聞此偈便得悟藏心周遍法界含吐十虗無有邊際於是從佛出家向之見地雖徹尚未能窮深詣遠登峰造極至此則眼識明圓事事明了無不徹透而說法具四無畏蓋恐畏生於不足惟見之徹故說之無歉耳從此成阿羅漢而智慧第一身德俱長為佛長子因問佛說而悟法身是從佛口生也在教法中長養聖胎法身從微而著是從法化生也佛問圓通如我所證從眼識證徹而發光明其光明與眼識俱極於無際斯為第一而已矣別經言身子乃過去金龍如來則知七日達法半月證果皆示現而已普賢菩薩行彌法界曰普位鄰極聖曰賢此非地前菩薩與文殊皆古佛影響故陳敘中亦與衆聖稍異但言久證而末後方表出本因元從耳識也即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞即耳識也分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我於其人暗中摩頂擁護安慰令其成就佛問圓通我說本因心聞發明分明自在斯為第一此因耳識悟入也普賢菩薩云云白佛言我自無量劫來已曾與恆沙如來為法王子矣紹佛家業助揚佛化凡十方如來教其弟子具菩薩圓頓根者修普賢行如十大願王一色一香俱周法界者是凡修我行皆從我立名亦名普賢垂範之廣如此世尊我於爾時但用耳識分別衆生知見擇普賢行而成就之若他方恆沙界外有一衆生心中發明普賢行者隨其發心我即乘六牙象分無量身而至其前障輕者得見於我則顯然加被障深者未得見我則暗中摩頂於以擁護之令無魔障安慰之令無退墮而淺位深位無不成就焉佛問圓通我雖歷劫久證乎若還溯本因亦有最初方便惟用耳識隨念分別普照羣機得大自在以斯為入圓之第一而已矣按文殊普賢觀音勢至諸大菩薩皆非迦文弟子故不言得印成果之事溯其助宣大教不過如普化之於臨濟耳然一佛既提正令諸佛皆拜下風何先後名位之足拘哉孫陀羅難陀此云艷喜佛之親弟即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及拘絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸消鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提佛問圓通我以銷息息久發明明圓滅漏斯為第一此因鼻識悟入也雖陳鼻識而亦不取嗅香時鼻識分別但取觀息之意也孫陀羅難陀云云白佛言我初出家從佛學道雖秉佛戒律而於三摩地中心常散亂未獲無漏愛心鼓動定心不成難以破惑故未剋果世尊教我及拘絺羅共稟鼻識法門攝其散心觀鼻尖白相我初諦觀經三七日見鼻中氣出入如煙一般蓋息由風火而起鼓煩惱濁故其狀如黑煙昧者不覺惟諦觀能見之淨觀發明則定相漸成煩惱漸消內徹五臟外徹大千內明外虗而煙消成白由是藏心顯現煩惱無餘諸出入息黑煙變白者又化為光明照十方界合心境而一如焉於是世尊記我當來成佛證圓果矣佛問圓通我以逆銷鼻息由黑而白由白而光息久發明相盡性現光明圓滿諸漏消滅斯為第一鍾云前調息依根所以攝心此觀息依識所以駐心富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣說苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我說法無上佛問圓通我以法音降伏魔冤消滅諸漏斯為第一此因舌識悟入也滿慈子云云白佛言我曠劫來辨才無礙宣說苦空二乘權義深達實相一乘實義如是乃至恆沙如來祕密法門或久默不說之法或半明半暗之法或言東言西之法我皆能微妙開示曲盡其意而發揚之既極其善巧又得四無所畏焉今在如來會下世尊知我有大辨才於身口意三輪中專以音聲一輪令我助揚佛化是故我於佛前助佛轉輪上輔佛教因師子吼下化衆生始於利他終於自利成阿羅漢世尊在法華會上印我為說法無上焉今佛問圓通我以舌識法音內而降伏心魔冤尤因說破而除滅外而降伏天魔冤害因顯發而消藏消滅諸漏入於圓通斯為第一問此何不取別味而獨取於說法乎答二俱舌識功能而說法為勝故偏取之然說法似須意識深細分別而今獨用舌識亦見說法自在但用隨念不勞計度而發無不盡也法華會上世尊說諸大弟子皆是內祕外現助佛揚化之人故在楞嚴會中諸大弟子方敢恣口自陳遠因皆非一劫兩劫種善根悉從無量劫中種善根者其稱無漏無學阿羅漢亦非尋常證人空之流所得竝驅也鍾云說法乃舌根而咀嚼法味則舌識也優婆離此云上首又翻近執即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏貪欲欲漏也諸漏有漏及無明漏也承佛教戒先授二百五十條聲聞戒也如是乃至三千威儀八萬微細此菩薩戒也行住坐臥律儀各二百五十對三聚成三千配身口七支成二萬一千復配貪嗔癡及等分四分煩惱成八萬四千也性業謂所戒之法體性即惡如殺盜淫等也遮業謂所戒之法體性非惡但能開諸惡門為前方便故止絶以遮諸惡如酒等是也悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推為上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一此因身識悟入也優婆離云云白佛言我是如來為太子時親近執侍之臣最初隨佛踰城出家左右不離親觀如來道未成時六年勤苦親見如來道既成時降伏諸魔制諸外道解脫世間貪欲等漏於是承佛教我比丘二百五十戒乃至三千八萬菩薩具戒性業遮業悉皆清淨由比丘戒以寂其身由菩薩戒以滅其心因戒生定而身心寂滅即因定生慧而成阿羅漢我是如來衆中綱紀上首如來親印我心持戒修身衆推無上佛問圓通我初因比丘戒以執身身得自在而無毀犯次因菩薩戒以執心心得通達而發定慧然後身心一切通利從身識而證入圓通斯為第一此不取覺觸之用而但取持戒功能亦以覺觸之用劣於持戒故也大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺此云木瓜癃胸前有癃如木瓜故伽耶那提伽耶山名那提水名三迦葉波宣說如來因緣深義檢非世間和合粗相也我頓發心得大通達如來惠我袈娑著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧惟世尊十方如來歎我神力圓明清淨自在無畏佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一此因意識悟入也大目犍連云云白佛言我初於路乞食逢遇優樓頻螺等三迦葉波為我宣說如來因緣深義非比小乘所證淺因緣法於是我從意識頓發菩提心即由意識而頓入圓通得大通達如來惠我袈裟著身鬚髮自落皆佛神力隨言成就我遊十方得無罣礙神通發明推為無上既得意識圓通之體又發意識圓通之用從此證果成阿羅漢寧惟世尊即十方如來咸歎我之神力全發性真而圓明遠離依業而清淨無不如意而自在無能推制而無畏總皆由意識而獲此神通也佛問圓通我以旋意識而復妙湛致令心光發妙妙用顯現旋識如澄濁流發宣如成清瑩轉意識而證如來藏心斯為第一問前言意識起滅無端今言圓通何以致然答了見意識起於藏心離藏心無別意識由是即入藏心而圓證也六識圓通竟烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王說多淫入成猛火聚教我遍觀百骸四肢諸冷暖氣冷字譯誤應云諸暖觸氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔冤佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶𦦨登無上覺斯為第一此因火大悟入也火頭金剛於如來前合掌禮足而白佛言不言從座起者金剛不坐也我常憶久遠劫前在凡實因性多淫欲爾時有佛出世名曰空王如來說多淫之人本由暖觸迫發生為欲火死為業火業力增盛成猛火聚教我遍觀百骸四支中火大欲其知懼而頓息淫心然後將錯就錯可成妙觀於我禪觀中神光內凝見遍身中惟一火聚既怖且厭而遠離欲念然火雖熱惱而體具光明今淫心既息而無復熱惱惟見光明即是轉多淫心而成智慧火故我渾身住在火光三昧中從是諸佛皆以火頭呼我雖表其名亦同印許矣我以火光三昧力故遍十方界惟一火光由此正受成阿羅漢發如來藏性火真空性空真火成因地心證七信以去入於住位又以火光三昧雖是內境能現外相火烈則魔望而畏之我乃發心但遇諸佛成道時願為力士為伏魔冤其證果發願有如此今佛問圓通我以諦觀身中欲火皆由淫心身心暖觸總目火大淫心已滅而不成業火故無礙神光智火融於藏心周遍法界故流通以智慧火燒煩惱薪何所不盡故諸漏皆銷以火大圓通之妙用摧魔護法無量威力故生大寶𦦨從此登無上覺則大本齊佛而示居輔化之位矣所問圓通意者惟斯為第一乎按諸聖德位相侔而迹有權實言有隱顯學者當略迹取本得意忘言不可妄分大小也蓮師云三大灾水從貪致火因嗔生今以多淫為猛火者法無定喻自淫心漬漸潤生死根則喻水自淫心昌熾枯清淨種則喻火也持地菩薩先平外地因了心地遂持本悟圓證藏心故名持地即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤市垣也闠市門處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛此云遍一切自在現在世時世多飢荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齊我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸故於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一此亦可悟妄想生出世界及法華授記佛土清淨之義此因地大悟入也持地菩薩云云白佛言我念往昔普光如來在世時我為比丘專修平地苦行於一切陸地要路水程津口其間田地或高深而險或迫狹而隘有不如法而妨損車馬者我皆平之填之或作橋梁以利津口或負沙土以治要路如是勤苦經無量佛出現於世不少懈怠又修捨力之行或有衆生於闤闠處要人擎物者我為擎之至其所詣之處放物即行而不取其顧直豐時全捨如此當毗舍浮佛時世多飢荒我為背負飢人遷移就食無問遠近惟取一錢飢年節取如此積劫願行故感福報而具神力或有車牛被於泥溺我以神力為其推輪而拔其苦惱神力拔苦又如此夫平地之行志在普利效力之行不檢親疏其心亦已平矣然猶屬事相平心耳時國之大王設齊延佛我於爾時即修佛過之路以待之毗舍如來憫我事行久勞攝受加持令其歸理乃摩我之頂而謂我曰世界之不平天地之有憾也奚用是勞勞為哉但當平汝心地則世界地一切皆平矣故知娑婆心險感陵谷之高深極樂心平致地平之如掌此其驗也我時一聞此語即便心開悟得身微塵為內地大世界微塵為外地大此二地大等無差別既無差別則身即界界即身自性本空不相觸摩乃至刀兵亦外地大類也以觸內地大之身如斬光截影了無所傷所謂將頭臨白刃一似斬春風也自曠劫為事行菩薩至莊嚴劫尾方斷見思悟無生忍成阿羅漢且取生空譬如打鐵粗垢先落及賢劫初即回向真乘入菩薩位中聞賢劫四佛及十方現在如來法華會上說佛知見契我地大故我先為證明而為法華上首今佛問圓通我以諦觀身界二塵所謂內外二地大者等無差別但是如來藏性循業妄現發此塵相而已塵銷智圓相盡性現成無上道已入最上一乘之知見由從凡入聖自權尚實皆持地大為起行入理之門以當圓通斯為第一而已矣月光童子童子乃菩薩別名表童真德也儒者聞大權經說孔子為定光童子則怒其𢍉小不知文殊為釋迦九世師祖而亦稱童子何有𢍉小之意乎即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣欲知羅漢有病無病當明子果二縛宿種今種應召來果而尚未受身者謂之子縛宿種所召今已受身即身應受謂之果縛若實行聲聞新證四果已將子縛斷盡不受後有然現身尚未灰滅則果縛猶存所有病苦即應身受故舍利頭痛畢陵眼痛皆斯類也若入滅後悲願再來則二縛俱無更無實病苦矣云何今日忽生心痛將無退失爾時童子捷來我前說如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一此因水大悟入也月光童子云云白佛言我憶往昔恆河沙劫以前有佛出世名曰水天此佛亦從水大入圓者故教諸菩薩皆修習水觀而入三昧水觀若何先觀身中水性不相乖異初從涕唾以至津液精血大小便利無不窮盡涕唾便利近外水相津液精血涉內水相由外及內自內而外而身中旋復又涕唾津液水之清相精血便利水之濁相清濁雖異而水性一同如是用觀觀內既熟引伸外廣見此身中之水與世界外華藏海中有大蓮華其蓮華中有無量香水海一一海中各有一華上擎二十重剎種纍高如幢曰浮幢王剎其中諸香水海更無紀極者等無差別觀心所融故身水非小海水非大也我於是時初成此觀觀力尚淺但見其水水相未亡全水即身身相猶在去無身尚遠也更憶一事當為比丘室中坐禪時弟子窺窗惟見清水滿室戲擲瓦礫而去我出定後頓覺心痛如舍利弗為鬼所掌出定頭痛一般我乃念曰今我已證得阿羅漢道子縛已斷況是久證再來果縛亦無久離病緣何故忽有心痛之病將無退失道心而致此耶爾時童子乃前說投瓦之事我則告言汝若更見此者當開門而除去之童子奉教果復見水果除瓦礫然後出定如初不復病矣夫水相係獨影境惟自見之而乃能令他人見之豈非觀力殊勝不思議境哉從茲以還更經多劫逢無量佛如是至於山海自在通王如來出世時則深觀方成執破蘊空此身既空水觀亦空方得與所謂性水真空性空真水清淨周遍者打成一片無二無別矣是則前之淺觀雖云久證羅漢而斯之深觀方是超過七信而入於初住也今者得逢如來預此會中具童子之真德證菩薩之法空雖由宿因所積敢忘法乳之恩耶佛問圓通我以身中水性一味流通與界外剎海無異性合真空得無生忍證徹法界圓滿菩提斯為第一而已矣問月光入定童子投瓦此一瓦礫畢竟在心內在心外若在心外不應作痛若在心內則此瓦礫從何處入答瓦礫且置即此室中之水畢竟在身外在身內若在身外入定之後此水從何處出若在身內出定之後此水從何處入若知水之出入即知瓦礫之內外矣問室中之水是從何來答定心所化定果色也昔外道以堅執心化石則定心化水何足異哉漢州綿竹縣水觀和尚迹全類是蓮師曰幸是瓦礫止令心痛脫投刀劒奈何經言初成此觀未得無身身存因有小苦觀成終無大害縱投刀劒亦止心痛不能傷也未無身者身水為二猶有我身同彼水也亡身者身水為一求於我身不可得也既無身矣誰能苦之琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲聲乃臍輪風起鼓之而出此亦名合風大開示菩薩本覺妙明本覺即法身妙即解脫明即般若觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此羣動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心聞乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一此因風大悟入也琉璃光法王子云云白佛言我憶往昔恆沙劫前有佛出世名無量聲此亦從萬竅怒號邊證入故無量聲如來開示菩薩本覺妙明性具三德以為發照之源能觀之體即令觀此世界及衆生身為依為正皆屬風力所轉由妄心緣動所感搖明風出而風力又能轉此器界根身總為所觀之妄境也我於爾時如法修觀觀此界之安立由於風輪執持觀世之遷變由於風氣密移觀察此身一動一止皆是風之所鼓觀察此心念念遷流新新不住皆是風之所搖如此觀察世界身心諸動不同究其所因皆從一念無明風動而有等無差別我時了知此羣動之性來無所從去無所至宛然風體若實有從有至即非虗妄既無從無至可見十方微塵顛倒衆生皆顛顛倒倒於風中而同一虗妄而已推而極之乃至三千大千盡一佛所管世界之內所有衆生譬如一器之中貯百蚊蚋其聲啾啾亂鳴不出分寸器中鼓發狂閙豈不淡哉觀破羣動如此所以逢無量聲如來未幾即了來無所從去無所至萬法當體皆無生滅速入無生忍位已悟無生故本覺心開見動中不動而親於東方不動佛國與不動如來為法王子乃至遍事十方諸佛無不克肖又不獨紹隆一佛而已由是了妄身心皆屬風力見法身真心放大光明洞徹無礙如淨琉璃而琉璃光之名所自來矣佛問圓通我以觀察風力無依而了妄悟菩提心而達真入三摩地而證性空真風性風真空合十方佛而上同佛果傳一妙心而下化衆生以當圓通斯為第一鍾云東為羣動之首而佛名不動即動而靜也傳一妙心者證無動本覺也虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身即十身中虗空身也與法身雖無異體而法身遍融一切此則偏融空大爾時手執四大寶珠舊注誤因後文四大無依之句即以地水火風為四珠不知四大是所觀之境須取能觀之智應是人空法空俱空真空四珠也照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來一鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一此因空大悟入也虗空藏菩薩云云白佛言憶昔我與如來同在定光佛所得無邊虗空身有大神力非同凡小所取頑斷沉冥無用之境爾時以得四智手執此四大寶珠照見十方微塵佛剎化成虗空是會色歸空也又於自心現大圓鏡智從一鏡智而現十智同真如是十種微妙寶光流灌十方盡虗空際悉成嚴妙是融空即色也但見諸幢王剎海來入法身鏡內由理攝故涉入色身毛孔身同虗空不相妨礙由事攝故是攝剎入身無身非剎也又見身能善入微塵國土隨機普應廣行佛事自利利他得大隨順是分身入剎無剎非身也如上會色融空攝剎分身諸大神力果何以臻之哉蓋凡外小乘執四大心外實有成大障礙由我諦觀此四大本無所依元從妄想生滅而有終歸於空既又觀察虗空無二佛國本同是則空不異土土不異空乃於色空同處忽然發明得無生忍寂滅現前入圓通境焉佛問圓通我以觀察虗空無邊入三摩地故得空色無礙身土相入而妙力圓明以斯為第一矣彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓此遠因實事不必回互爾時世尊教我修習唯心識定入三摩地歷劫以來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執圓成如麻依他如繩遍計如蛇得無生忍斯為第一此因識大悟入也彌勒菩薩云云白佛言我憶往昔微塵劫前有佛出世名日月燈明我從彼佛而得出家身雖出家心慕豪貴好遊族姓親近國王大臣爾時日月燈明如來教我修習唯心識定令其通達萬境惟我心識變現一如夢幻生滅非實豈可不究明心識而反重其所變之境乎由是但自觀察唯識止其外慕馳散而定心成就入三摩地歷劫以來以此三昧事恆沙佛唯識定深萬境如電外輕內重無復馳求故求世名心歇滅無有至然燈佛時我乃得成無上妙圓識心三昧蓋前所習者不離五位唯識尚屬權宗至此窮極識理所謂性識明知覺明真識妙覺湛然遍周法界融入如來藏性矣一者世界唯識乃至盡空如來國土淨穢有無皆從變識不自外來二者諸佛唯識世尊我既了此唯心識故從法身識性中流出報身應身無量如來如來尚從識性流出況餘九界衆生流出可知夫窮極唯識圓證法界既見諸佛依正皆是自心而自心豈不成佛故得授補處記即補釋迦佛位次當作佛佛問圓通我以諦觀十方唯識識心圓明圓滿成就諸法實性既入圓成實悟證真實體性不復為名相所迷遠離有相無性之依他及有名無體之遍計執而得無生忍證入圓通斯為第一依他起性即業識及業識所現相見二分也遍計執性即從相見二分復生周遍計度所謂我法二執也遠離依他遍計即是圓成蓮師曰不悟唯識故背心逐境若了唯識則攝境歸心視世間名聞利養如夢如幻尚何惑著哉大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫無量光無邊光無著光端嚴光愛光喜光可觀光不思議光無等光不可稱量光映蔽日光映蔽月光超日月光是為十二如來也其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一鍾云如人負債投於王家債主莫敢誰何所依者勝也衆生修念佛三昧皈命於佛則生死衆魔莫敢侵嬰蓋生死海中唯佛為可恃耳此因見大悟入也獨舉見者見該六根故大勢至法王子與其同類五十二菩薩云云白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼而成一劫其最後佛名曰超日月光彼佛教我念佛三昧若據理念念即始覺佛即本覺若據事念冥記不忘之謂念放光接引之謂佛也念佛若何譬如有二人於此一人專憶一人專忘專憶故若逢若見專忘故不逢不見若二人俱憶二憶俱深必定相逢相見乃至從生至生如形影相隨而不相乖異矣夫十方如來憐念衆生如母憶子即一人專憶也然子若逃逝雖憶何為即一人專忘也子若憶母如母憶子即二憶念深也則母子歷生不相違遠即從生至生同於形影不相乖異也而念佛可知矣若衆生心憶佛焉而兼事相圓融二種觀門念佛焉而兼事一心理一心二種三昧則現前必定見佛或於定中見或於夢中見也當來必定見佛報終陰壞見佛接引彈指往生華開覩佛也然西方極樂只在當處非真有十萬億國土之遙故去佛不遠更不必別假方便而得心開近佛染佛故心亦成佛如近香染香故身亦成香故知心開非同淺淺應是本覺佛現也以念佛香光莊嚴法性本佛此則名曰香光莊嚴我本因地以念佛心一念不生六根湛寂遂至信滿入住證無生忍今於此娑婆世界威力加持攝念佛人歸於淨土具足二利如此佛問圓通我於根中無所選擇一心念佛則六根都攝如眼不取色是眼念佛乃至意不緣法是意念佛惟其都攝六根故得淨念相繼得三摩地而證圓通境現位雖在等覺初心一同衆之信滿入住以當圓通斯為第一一心念佛與決志參禪者本無二致故念佛之後而繼之參禪也則知此方唯有二門為入道之要路蓋觀音勢至皆彌陀輔弼之臣一以念佛接人一以參禪誨衆皆是就此界根機各開戶牖乃世人例以參禪為高而卑視念佛者吾知其不惟不知念佛之奧訣亦不知參禪之妙旨也苟不以一心不亂之訣去參禪則禪決不悟若不以如猫捕鼠之心去念佛則淨土必不生勿謂念佛易而參禪難當知難則俱難易則俱易是在當人信力淺深習氣濃淡耳七大圓通竟通論二十五門尋常六塵皆始於色今始於聲而復留耳根在最後者正以此方真教體清淨在音聞故始於音而終於聞所以為教體之綱領而獨當此方之機也又七大始於地大而此中火大為先以多淫召火合此經墮淫起教所以警多聞人先除欲漏也又七大終於識大而今終於根大者以勢至念佛圓通稍次觀音觀音所修乃諸佛一路涅槃門泥洹極果今令不能修自心泥洹者其次莫若念佛求往生也此因經文不終彌勒而終勢至之深意與本卷至後卷選擇圓通竟俱備闡決定第二義之旨
