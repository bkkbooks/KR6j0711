body:
  text: 巴縣了庵居士劉道開纂述成都昭覺沙門方示鑒定阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵衆天此下明色界四禪十八天而此先明初禪第一天也阿難世間一切所修心人凡迷冥修各各自謂真正修心然而不假禪那無首楞嚴定無有智慧無金剛慧但以有漏靜慮為因心制彼淫習而執身不淫或行或坐於一切時想念俱無愛染不生夫六欲縱強忘情不免身犯此身全遠梵行方成由彼身心俱潔下無卜居故臨終時應念而生梵世為梵民如是一類名梵衆天而較之欲界穢濁又高出一層矣通後十八天雖離欲染尚有色質故通名色界又通名梵世謂已離欲染也通號四禪為已離散動也欲天但十善感生此天兼禪定感生然特有漏禪觀六事行耳六行者厭欲界是苦是粗是障欣色界是淨是妙是離此則凡夫伏惑超欲界道也問前天亦間有禪定而此界方名禪者何故答以前結云形雖出動心迹尚交自此以上絶無女人心迹俱離無所交接兼無食眠三欲俱忘稍覺飢倦即入禪定出定則飽滿精明是但以禪悅為食為息而稍離粗重身心也又此天獨顯戒德而未彰定慧後二天略顯定慧至文自見也欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天此明初禪第二天此天戒與定共也夫前天欲習雖除心相未至顯現此則離欲清淨心相現發著明於諸梵行戒品愛樂而悅豫隨順而輕安此即與定共之相也是人臨終宿習不妄應念而行梵德不但清淨身心亦且弘揚德化如是一類名梵輔天而能匡弼梵王矣身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王如是一類名大梵天此明初禪第三天此天戒與慧俱也夫初天由執身而攝心次天由心現而行德此則雙攝身心得一如無二之妙滿足分量之圓於是行住坐臥皆妙圓而威儀不缺以此清淨禁戒而又加以明悟從定戒中發生智慧此即與慧俱之相也由其慧勝前天堪為梵主是人臨終應念而生梵天統攝梵衆為大梵王如是一類為大梵天其德皆足以長人矣阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪此統結三天名初禪也阿難此三天者皆勝欲界諸趣同名勝流已離欲界八苦故苦惱不逼雖非正修真三摩地去首楞嚴大定甚遠然彼戒心清淨漏雖未伏亦自遏抑不動初得禪定無有剎那雜念間入故統而名之曰初禪焉禪有四類一有漏禪即今四禪也二無漏禪謂九想八背等也三亦有漏亦無漏禪謂六妙通明等也四非有漏非無漏禪即今經首楞嚴大定也以上三天疑非竪分夫天民天臣天王各居一層何成一統且臣民若許衆多而天王滿天獨居一層彼此皆王何所使令或是以德之優劣相較堪為民為輔為王耳故列為三者非一天盡臣民而無王一天盡王而無臣民也又初之二天尋伺皆有第三天無尋有伺由內有尋伺故外感火災而火災壞初禪也阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天此二禪初天也阿難其次二禪即此大梵天統攝梵人者而能圓滿梵行至於澄心不動則寂湛之極而生光明但光明尚劣未極其量如是一類又升梵天一層名少光天所謂泰宇定而天光發但非周遍湛寂之比耳此天疑從彼天中修來蓋躡前行而但加圓滿則升此天矣問此與菩薩寂照何殊答人法二執毫髮未動但以離欲得定定深生照而已此其別也又前有覺觀粗動發生三識今內淨一心已無覺觀惟緣內塵不同初禪有三識也光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天此二禪第二天也從前少光更發多光光光相然照耀無盡映十方界成琉璃色此雖已極其量猶未成音如是一類名無量光天然非如淨琉璃內含寶月之比也按此天雖不能映諸大千而於本界亦覆小千當滿一千箇四天下十方界也吸持圓光成就教體發化清淨應用無盡如是一類名光音天此二禪第三天也夫光光相然則成圓光矣由是吸攬保持此圓光即以光明代其言音而成就教體於以闡揚梵教發清淨化隨機開示應用無盡如是一類名光音天謂其不假言詮而以光為音也按此天已無尋伺故無語言而但用光明作佛事然亦非盡無語言也如世間紙墨文字雖代言教豈盡廢其言語哉阿難此三勝流一切憂懸懸不安也或作愁字之誤所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪此總結三天名二禪也阿難此三勝流當定生時與喜俱發以有定喜滅世間憂愁故憂懸不能逼雖非正修三摩去楞嚴大定尚遠然而清淨心中已伏粗漏較初禪之漏心不動而未能伏者已進一籌故統而名之曰二禪焉地持論目第二禪名喜俱禪此三天總名定生喜樂地憂懸與苦惱不同苦惱乃粗重切於身心憂懸輕細但涉於念慮而已粗漏已伏者謂以定力伏前五識由伏前五故無尋伺未伏第六故有喜樂內有喜水擾動故外感水災而水災壞二禪也前三天以戒勝此三天以定勝也阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天此三禪第一天也阿難由前天人既以圓光而為教體矣披光即披音也披音則妙理自露然有喜心分別亂動能障定樂此天能依此妙理發成精行而通寂滅樂離前喜動而生淨樂恬泊寂靜故名寂滅由伏第六識故相似二乘之寂滅非生滅既滅寂滅現前之比也如是一類名少淨天定樂才通淨空初顯故名少淨也能通而已尚未能成以猶劣故名少淨焉淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天此三禪第二天也由伏六識而似得人空故淨空現前前但得淨此更發空漸以虗豁至無邊際且前通寂滅但樂內心此則身心內外皆得輕安積中發外廓然廣大則寂滅已成淨空無量如是一類名無量淨天而升少淨一層矣世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天此三禪第三天也前天淨樂止在身心未名為遍此則合世界身心觸處無非妙樂是謂一切圓淨既世界身心圓淨豈非淨德成就乎然雖淨德成就原非可託可歸之地此天人便認此為終身託宿之地而勝託現前認此為清淨極樂之鄉而歸寂滅樂將謂安身立命唯此已而由前未融世界雖淨而不遍今並融之故如是一類名遍淨天又升無量淨一層矣阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪此總結三天名三禪也阿難此三勝流隨順淨樂至無量周遍其為隨順也大矣且初二禪心有喜受故多散動不得身親受樂今則喜受既除身心安穩自在受用無量妙樂此雖非正得真三摩地乎而安穩心中歡喜畢具夫喜者動心所發也樂者靜心所融也若在飛動心縱樂而仍是喜支也若在安穩心縱喜而仍是樂支也今歡喜而出於安穩是謂離喜之喜妙樂之樂離喜妙樂故統而名之曰三禪焉地持論目第三禪為樂俱禪此三天總名離喜妙樂地蓋前二禪雖有樂支為喜支所障今滅喜純樂故得其名也又此三天已伏意識雖無喜受尚有出入息擾亂故外感風災而風災壞三禪也阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天此下明四禪九天而此明第一天也然天雖有九而四禪報境但有三天第四無想乃廣果別開是外道報境此四之上五不還天乃聖賢別修靜慮與凡夫不同也阿難復次三禪天人初苦禪惱離二禪憂懸盡皆能不逼身心苦因已盡第三禪則無苦有樂然而樂亦不當受之也蓋樂非常住久必壞生壞即成苦矣此天既已離苦亦不受樂將苦樂二心一時頓捨樂既不受壞亦不生苦壞雙超故粗重相滅一切下地災患已斷而清淨福性油然發生由捨生福名福生天焉可見不能捨樂則壞生矣苟能捨樂則福生矣捨不捨之間此天之別於前天也捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天此四禪第二天也前天初專於捨未免偏空此既純熟漸不礙有是謂捨心圓融前以捨樂為清淨此則樂受既空復不礙有是謂勝解清淨以勝淨生勝福故福無遮限有所願求無不如意得妙隨順直窮於未來際焉然雖受報無窮亦非真得常住如是一類名福愛天謂諸天之福惟此天為最可愛也阿難從是天中有二岐路此明四禪第三天而先別其有二路也阿難從是福愛天而升焉有兩條岐路一直往而趣廣果一迂僻而趣無想心念行業各自不同學者可弗辨耶賀云二岐路者一精進一斷滅也不取苦樂亦不厭苦樂但以四無量心薰修福德證廣大果名廣果天若以苦樂為可厭而執著捨心精研不斷所謂苦樂心滅厭捨心生全是生滅之因矣從此窮極捨道獲受灰心之果彼自以為不生不滅豈知生滅之因必不能發明無生滅之性乎初生此天未全無想經半劫始無後半劫復生矣若於先心無量淨光福德圓明修證而住如是一類名廣果天何謂二岐一者若於福愛天中圓融捨心所發無量淨光於是光中但修四無量心滋長福德至於增盛圓明剋取修證以為常住如是一類名廣果天蓋福德圓明則證果廣大色界諸天所感福報至此為極故名廣果也要知四禪報境惟此三天第四無想是福愛之差及五不還天乃三果聖人之別寓耳若於捨心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發生不生滅性初半劫滅後半劫生如是一類名無想天二者若於福愛天中捨樂之心雙厭苦樂者而精以研之深搜細索相續不斷而勤勇無間圓窮捨道而必求究竟不惟樂受捨而捨樂之心亦捨以捨定滅除捨心至於身心灰滅渾成晦昧冥然一空如所謂稿木死灰者其壽經歷五百大劫若是其長不知其所謂灰凝者非真不生滅也如夾冰魚如壓石草其微細生滅流注何嘗止息蓋是人本以生滅為因錯依六識生死根本為本修因強令灰凝安能認取識精明元而發生圓湛不生滅性乎所以初生此天習定半劫始得滅想此天報盡至四百九十九劫半後想心復生也如是一類名無想天而並廣果為二岐矣按廣果天厭苦樂而增修福慧此天則厭苦樂而精研捨心此兩天所以分岐也橫列岐路則亦非竪分矣問此無想定與滅盡定有何差別答滅盡定既滅第六識兼滅第七染分無想但滅六識分別見而諸邪見尚未能盡何況其他問身界俱空與下四空何異答出定則有故不同也又按三界總有二十八天二惟凡位五惟聖位其餘皆是凡聖同居二凡位者謂大梵天妄説能造天物人物憍慢輕蔑故聖賢不居此無想天惟是外道修無想定者生之受五百劫無心之報也五聖位者即下五那含也阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪此總結四天名四禪也阿難此四勝流同修雙捨故世間苦樂二境所不能動以其不能動也而遽謂之不動地焉可乎夫聖位第八證真無為名不動地斯真不動也此天雖非此地之比而有所得心有為功用至此已覺純熟故統而名之曰四禪焉蓋真不動地者以其滅六盡七也有所得心者但能伏六識也聖凡疆域判然不濫矣以上禪天初禪伏鼻舌二識無段食故三禪伏前五識三禪伏意識分別現行故得妙樂四禪伏意識分別種子故得妙捨總是伏第六分別見惑耳然則孟子之四十不動莊生之死生不動較之禪天不動已隔天淵況如來真三摩地不動之體便欲竊而擬之哉地持論目四禪為捨俱禪阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙忘下無卜居故於捨心衆同分中安立居處此明五不還天寄居廣果之由也阿難此廣果天中復有五不還天為三果聖人所居蓋三果阿那含於下界五趣雜居地中九品思惑俱已斷盡故苦忘而欲界無卜居復將斷上三地各九品故樂忘而色界三地無卜居惟四禪捨念清淨是其同分故獨於此中安立居處住此已斷七十二品最細貪嗔癡慢希成阿羅漢矣梵語阿那含此云不還謂不復欲界受生也亦名五淨居習氣即思惑種子思惑謂貪嗔癡慢任運而起微細之惑非同分別中粗惑也由彼難除故分八十一品斷之蓋於三界分九地欲界共一地色界四禪分四地無色界四空分四地地各分九品共九九八十一也五不還天既有勝劣豈不均斷惑之淺深而分居之是則前四天似以次而斷色界四地之惑第五天似斷無色界四地之惑也然五天之所以異於四禪者五天是聖四禪是凡凡夫伏惑而不能斷聖人斷惑而不止伏此其所由分也五天斷惑雖漸斷四地至其寄居止在第四禪之廣果以捨俱禪與捨念清淨地獨為同分而三禪以下皆非同分也俱舍論云雜修靜慮有五品不同故生五淨居天雜修者以有漏無漏間雜而修也靜慮者定慧均等之謂也五品者下中上上勝上極也五天既皆從劣向勝則按品分之似亦無差也阿難苦樂兩亡鬪心不交如是一類名無煩天此明五不還天第一天也阿難人當苦樂未亡則厭苦欣樂交戰胸中心豈不鬪今苦樂兩亡則鬪心不交入於清冷有何煩燥如是一類名無煩天準五品當在下品準斷惑應斷初禪離生喜樂地中九品思惑也賀云鬪心指苦樂交戰之心非謂心與境鬪也機括獨行研交無地如是一類名無熱天此不還第二天也念之放謂之機念之收謂之括此天惟一捨念或放起或收止更無餘念雜於其間是謂機括獨行前雖鬪心不交尚有交地今并其交地亦復研盡則心如冰壺清涼透徹何熱之有如是一類名無熱天準五品當在中品準斷惑應斷二禪定生喜樂地中九品思惑也內無能交之心尚覺外有所交之地至於機括獨行則往來自由研窮所交之地了不可得此二種天依希塵既不緣根無所偶矣十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天此不還第三天也煩熱既除內心澄瑩發天眼通見量遍十方界觸處皆妙為妙見圓澄外焉觀境更無障礙是無塵象也內焉觀心更無留滯是無沉垢也心境兩亡所見皆善如是一類名善見天準五品當在上品準斷惑應斷三禪離喜妙樂地中九品思惑也塵象指境界言沉垢指煩惱言至此依希十方國土皎然清淨矣精見現前陶鑄無礙如是一類名善現天此不還第四天也前天定體圓而定用未勝此天即前之精見現前者而天眼所通隨心成就惟我陶冶鎔鑄而無所礙亦同摩醯首羅隨心造化一切萬物而特不同其貪權妄宰也如是一類顯具變現之用名善現天準五品當在上勝品準斷惑應斷四禪捨念清淨地中九品思惑也按此天正與四禪同分故合前三天後一天而卜居廣果焉陶鑄無礙者鎔鍊諸惑不作障礙能起十四變化自在如陶人範土冶人鑄器隨心轉變也至此依稀所謂一切變現不為煩惱矣所以與彼不同者彼我法二執俱空此尚未得我空也舊注以陶鑄為造化萬物不知此帝釋天之事非聖人事也究竟羣機窮色性性入無邊際如是一類名色究竟天此不還第五天也夫前天曰精見曰妙見見猶有色也此則窮色而至於幾微且不但窮色而已復能窮色性之性從何處起則知性色真空性空真色清淨本然周遍法界故入無邊際如是而究方知色之究竟故名色究竟天準五品當在上極品準斷惑應斷四空四地中三十六品思惑也阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見此結示五天惟是聖居也阿難此五不還天者惟三果聖人得生而居之雖不離廣果一天而彼諸四禪即四位天王亦但欽聞其名而不知其處不見其形天王且然況天人乎所以然者以四禪修有漏凡定五天修無漏聖定斷惑與伏惑粗細懸殊故但仰嘉名而不知其受用不見其依正也其不知不見者譬如今之世間凡曠野深山如天台竹林峩眉五臺皆是聖道場地皆有阿羅漢於中住持特世間粗人自不能見耳五天之寓廣果何異道場之寓世間哉細玩五天未嘗竪分五層似但居廣果一天如聖寄人間但聞而不見耳若竪分為五上下懸絶自然不見何必云此況佛初只言此中而未言此上尤可證也昔雲居膺結茆三峰經旬不赴堂洞山問曰子近日何不赴堂曰每日有天人送供山曰我將謂汝是箇人猶作這等見解汝晚來膺晚至山召曰不思善不思惡是甚麼膺回庵寂然晏坐天人尋覓三日不見乃絶四王之不見五天亦猶天人之不見雲居也唯識謂二禪以上不分王臣此言四王者或推尊上首略似於王耳阿難是十八天獨行無交未盡形纍自此以還名為色界此總結色界也阿難此十八天者俱無情欲故獨行無交尚有色質故未盡形纍自此色究竟天以還直至梵衆天同名色界而已矣復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢此標聖獨出也復次阿難由前究竟天居色之頂故曰有頂與無色鄰故曰色邊際從是有頂色邊際中其間上升復有二種岐路焉何謂二岐由三果人根有利鈍其根利者若於捨心發人空智思惑盡而空智滿慧光圓通便可超過無色橫出三界而直入菩薩乘如是一類名為回心大阿羅漢謂回其欣上厭下之心而頓出三界回其捨大取小之心而速入大乘也然此等根器豈可多得哉足知鈍根者亦由捨心欣上厭下生無色界漸斷漸證而竪出三界矣此亦順序而談故就便直約色究竟天其實凡夫廣果外道無想俱與空鄰俱可上入四天也賀云二岐路者一即色會空一厭色入空也若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處此下明無色界四天而此第一天也四天皆依偏空修進初厭色依空二厭空依識三色空識三都滅而依識性四依識性以滅窮研而不得真滅是皆有為增上善果未出輪回不成聖道者也以無色界第一天言之大阿羅漢不可得矣若在前捨心捨厭成就者覺有身為質礙而不自在即修空觀而滅身歸無是謂銷礙入空蓋厭色身如牢獄而必欲出離以其厭色依空故報生空處名空處定焉夫不悟性色真空而勤劬於銷礙豈知捨有而歸無何異逃峰而赴壑乎長水曰捨心有二若於有頂用無漏道斷惑入空即樂定那含也二者若於廣果用有漏道伏惑入空即凡夫外道也諸礙既銷無礙無滅其中惟留阿賴耶識全於末那半分微細如是一類名為識處此無色界第二天也前天諸礙既銷而無則不依於色此天無礙之無亦滅則不依於空其中惟留第八阿賴耶識全分俱在及第七末那識半分微細良以色空若在全分末那俱在今色空既盡故惟半分末那入微細也以其厭空依識故報生識處名識處定焉在彼固自以為離色離空即性真也而豈知迷實同於無想乎問末那賴耶羅漢未了凡外那含何以知之答此自佛眼了見與之作名非許彼知也法華云衆生住於種種諸地惟有如來如實知之是也空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處此無色第三天也前天空色既亡惟留識在此天厭患於識憑深定力二識現行俱伏不行識心都滅但見十方世界寂然逈無不復前進所謂杳杳冥冥之處昏昏默默之鄉外道執為冥諦老莊呼為混成皆在於此以其厭識歸無故報生無所有處名無所有處定焉只是前天更進深定能所緣息暫名都滅豈同羅漢現行種子俱斷之謂乎識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處此無色第四天也前天方亡識心現行未亡識性種子故識性堅確不曾動搖此天強憑滅定之力窮之欲盡研之欲透然而決不可盡也於無盡中強以發宣必欲盡其識性而後已於是二識如殘燈然半滅半明良以滅定所逼故如存不存似燈半滅也種體莫動故若盡非盡似燈半明也由其如存不存也則非有想矣由其若盡非盡也則非無想矣如是一類報生非想非非想處名為非想非非想處定焉行人至此可謂極矣豈知依然未出三界乎此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉此總明聖凡出墜之地也此等天人初天窮色而歸空次天窮空而歸識三天窮識心以歸無四天窮識性以歸盡前二窮境後二窮心欲令心境皆空故總名窮空如此窮空豈惟不達圓頓性色真空之旨即人法二空之理皆所不了而妄欲起心銷之空之滅之盡之豈知終不能銷空滅盡也故自五不還天窮空而入此天者其根本尚正名不回心鈍根阿羅漢與前回心大阿羅漢相反俟其八萬劫滿斷盡思惑而亦出三界矣若從無想諸外道天窮空而入此天者其根本原邪以彼迷有漏天作無為解故八萬劫後受報已滿無所歸託仍入輪轉矣可不畏哉問前於色頂已判思惑斷盡不審斯人在四空中何所修斷答前約利根鈍豈能同鈍根在五天時前四斷惑同於利根至第五天不回欣厭之心但加功銷礙求生四空後半之惑期於彼天斷之四空四地每地九品故至非想劫滿方盡也阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界此段經文錯簡在後今正而前之此總結無色也阿難是四空天前二天全無身境是身滅盡後二天伏識現行是心滅盡身心俱滅故定性現前在定時有定果色隨化依正自在受用非若欲色二界業報所感根身器界皆業果色也始從空處終至非想統名無色界焉而三界備矣結名無色者但憑定力二十萬劫暫無依正非真蘊空永絶業果也阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩地漸次增進回向聖倫所修行路此段錯簡在前今正而後之此通結三界天人天主凡聖各別也阿難從四王天以逮非想是諸天上有臣有民則天人也有君有主則天王也是各各天人都是凡夫因中修十善八定而以六欲四禪酬之酬答既盡又入輪回所謂勢力盡而箭還墜也若彼諸天之天王則是菩薩寄位進修不落輪回如華嚴初地為閻浮王二地為輪王三地為忉利天王四地為夜摩天王乃至十地為摩醯首羅天王是也問上界無惡何亦有直墮三塗者答藏識雜種遠劫不忘次第而熟不能逾越故天福報終隨彼熟種任運而墮此如來所以苦勸念佛而求橫出也此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特迦羅各從其類補特迦羅此云數取趣即中有身也此總結三界皆妄也合而言之此三界二十八天皆由不能了達本有妙覺明心從迷積迷妄生三界中間天人業報既盡不免又隨七趣沉溺數數受生取於諸趣補特迦羅各從其類不得休息若能了妙覺明心則三界盡空七趣皆滅應念化成無上知覺又安有積妄沉溺之苦哉諸天趣竟復次阿難是三界中渾標三界其實但居欲界耳復有四種阿修羅類阿修羅此云非天以其多嗔有天福而無天行故亦云無端正以夫醜而婦美故亦云無酒以嗔無和氣釀酒不成故若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝鬼道是前因言彼原從鬼趣發心護持經呪禪戒以此法力乘神通而入空界與三夜叉天為鄰卵生飛空因果類鬼故入鬼攝也若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝天中是其前身彼在天中或有損德或天福已盡俱同貶墜居鄰日月生從胎出故人趣所攝也有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝四種之中此為最勝故稱王以別執持世界者驅役鬼神興災作福也力洞無畏者力量廣大通貫人天無所恐怖也既能司禍福但其專權不及諸天故每怒而爭之經稱化身十六萬八千由旬手撼須彌諸天震恐帝釋四天常與戰鬪今言梵王亦爭者或帝釋不勝則梵王以下俱助力也化生福力俱等於天故天趣攝也阿難別有一分下劣修羅生大海心沉水穴口但遊虗空暮歸水宿此阿修羅因溼氣有畜生趣攝須彌入水八萬四千由旬修羅分四級而居即此類也以居水底是溼生類以下劣故是畜生攝經云修羅衣食自然冠纓服飾純以七寶鮮潔同天所餐飲食隨念而生悉皆百味惟彼凡所食時末後一口變為青泥故不如人也修羅趣竟詳明七趣已竟阿難如是地獄餓鬼畜生人及神仙天及修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒此總結虗妄也阿難如是地獄等七趣若精細而研究之皆是昏沉之惑發為有為之業而妄想又惑業之因故隨妄想而受生亦隨妄想而受報惑業苦三如惡叉聚然於業果不縛之妙空有不墮之圓惑障不覆之明不由取舍修證之無作而同名本心者在此心中直如空中之華全無著落惟是一槩虗妄而已豈有根蒂頭緒之可得哉七趣皆病而此經大定是藥如來所以深明病態者意在激其速用藥也阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨須殺盜淫故反此三種則又出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事此因病切藥而勸修大定也上言無根緒矣而此又指病根者蓋妄雖無體起固無因而妄理相應續非無故故復指也阿難我所謂妙圓明無作本心者人人皆有箇箇不無無奈此等衆生不識此心自有而自昧之如持燈覓吹衣珠行乞所以受此輪回經無量劫不得真淨欲界固不淨也即色界無色界自謂已淨而尚有隨眠亦非真淨也揆厥所由豈無其故哉彼殺盜淫所謂三惡也衆生隨順三惡習矣不知其下墜三塗無足怪者及稍有根器之人反此三種惡道則又以無殺無盜無淫為貴而出生三善庸詎知有之而成三惡固是鬼倫也無之而成三善亦但天趣而已於是奪有成無從下升上奪無成有從上墜下傾奪不已正是輪回之性而輪回所從起者豈知不思善不思惡乃本來面目正所謂本心乎欲識本心更無別法惟是尅體對機耳根圓通三摩提一門耳若得妙發此三摩提者則聞性三德應時呈現妙矣而無七趣繫縛也常矣而無七趣生滅也寂矣而無七趣流轉也蓋能反聞常住此性則有之三惡無之三善二俱遠離曰有無二無此先得人空而出三界矣無是二者之無亦復銷滅曰無二亦滅此成法解脫而越二乘矣當此之時尚無不殺不偷不淫如金屑不留於眼中也輕病且無何況重病而更隨殺盜淫事哉是則欲識本心而免輪回信非修大定不可矣賀云從上段至此又歸重持戒作七趣結尾也上云皆由隨順殺盜淫故已揭出受病元因矣恐人疑云天趣持此三戒何以不免轉回不知此非持戒之過乃以有漏心持戒之過也無漏學中纖塵不立尚無持戒何況毀戒正痛絶三業之語蓋此經始終重戒豈肯作遊移之説也阿難不斷三業各各有私因各各私衆私同分非無定處自妄發生生妄無因無可尋究汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不除落於魔道雖欲除妄倍加虗偽如來説為可哀憐者汝妄自造非菩提咎作是説者名為正説若他説者即魔王説此結答問詞而戒勗真修也阿難汝問地獄為有定處為復自然彼彼發業各各私受乎自我言之造業則私造也受報則同分也既曰同分非無定處矣然此定處從何所來元是自妄之所招感既所生是妄實無有因故不可究其起處也然則汝今勉而修行欲得菩提者當遵何道乎夫三惡三善總皆是業而由不達此三為繫縛之本障智之端故又名三惑汝之修行須要除此三惑不但只除有三而無三亦除之何以故以三惑不可不盡也若但除世惡而不除世善則對待不盡縱得神通如天仙之類皆是世間有為功用伏現行而不除種子習氣不滅遇緣復起而終落魔道矣既落魔道雖有明眼人欲其除妄彼且自謂得無上道而倍加虗偽乘通造業違遠圓通背涅槃城枉費功力翻成惡因如來説為可憐憫者且汝初問佛體真實云何復有諸趣得非以諸趣之有歸咎菩提乎今而知種種諸妄皆汝自造則非菩提之咎也明矣菩提無咎佛體安咎哉信乎三業之不可不斷三惑之不可不除也若使末世勸人離此三種者此人即為佛説若讚此三種以為無礙者即魔王説其尚著眼辨識無使羣言亂聖魚目混珠可也嗚呼三摩之妙如此而不肯勉力七趣之苦如彼而不思厭離衆生衆生吾末如之何也已矣勸離七趣竟第二大科無始生死流轉根本竟即時如來將罷法座於師子床攬七寶几回紫金山再來憑倚普告大衆及阿難言汝等有學無學四陰已破但餘第五識陰其天魔鬼神等粗外魔境皆已不至故此全談五陰魔曲為有學是以特舉也緣覺聲聞今日回心趣大菩提無上妙覺吾今已説真修行法汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄汝應諦聽吾今為汝仔細分別阿難起立并其會中同有學者歡喜頂禮伏聽慈誨此下詳辨魔境也當機但知請定而定中所發微細魔境非其智力所及故無問佛既開導大定而魔軍勝敗實大定成壞所關利害非細故動深慈將罷復留不待問而自説也即時如來説法已畢將罷法座矣猶有不盡真慈故攬几於床回山再倚普告大衆及阿難言汝等有學緣覺聲聞今日回心向大吾今已説真修行法指示反聞一門矣然汝猶未識修奢摩等性修二定者中有許多微細魔事此等魔境不知不覺忽爾現前皆能契合人心使汝不能識其為邪為正若汝胸中有一毫邪心未曾洗盡彼則乘此一毫之隙便能勾汝落於邪見矣何謂諸魔或汝陰魔如色陰中十種方是初心自現尚無外魔受陰中十種雖已召外魔猶且潛入身中而魔未現身也或復天魔或著鬼神或遭魑魅則想陰中十種也正當魔現之時全要辦得一副辨龍蛇眼方不為彼所惑若道眼不明為彼身轉則認賊為子立使家寶盡劫矣或自認為聖或認魔為聖皆認賊為子也又有行陰所發十種心魔識陰所發十種見魔皆無外境但是自心邪見得少為為足試舉一以例之如第四禪無聞比丘但修無想為極則事自謂成無上道及天報已畢衰相現前想心復生不知自己本非證聖反謗阿羅漢身遭後有而佛言不受後有者為妄以謗法故遂墮地獄其毒如此可不畏哉汝等回心趣大菩提豈可不知其利害耶故我為汝仔細分別非草草也於是阿難起立恭敬并其會中有學諸人歡喜頂禮而復聽如來之慈誨焉世尊一往指示真修行路而阿難等尚未親歷不知途中艱阻世尊是過來人險阻艱虞歷歷自試故將罷座而回身復留一一指明途中所遇令其自識預備不虞如愛子遠行慈母於臨行時囑付途中利害教其萬分保重如來不盡之慈意亦如是也佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發遍迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元十方世界悉皆銷殞云何空中所有國土而不振裂此言動魔之由也佛告阿難及諸大衆汝知魔之所由來而惱汝乎汝等當知世界衆生本覺心體妙明圓者原與諸佛無二無別謂衆生即佛可也謂佛即衆生可也良由妄想一動遂迷此覺圓之理而成過咎於是業相為癡轉相為愛二種無明瞥爾發生既一生已則覺體遍迷迷成空性所謂晦昧為空也既將全法界俱迷為頑空於是化迷不息遂生世界所謂依空立世界也是則十方有漏微塵國土皆是迷頑妄想之所安立妄想總體也即根本無明也迷則能生有情見分頑則能生無情相分故皆彼立也當知虗空之生汝心內也不過如片雲之點太清耳況諸世界之在虗空者耶可見其虗幻微茫易以銷殞矣且舉世之人盡皆發妄不息循聲逐色未有一人發真者若汝等衆中有一人焉住大定入圓通真顯妄破而發真歸元乎將見此十方虗空應時粉碎皆悉銷殞何況虗空中所有之國土而不振蕩分裂者耶蓋內動外感凡事皆然又何疑於大定也問自古至今發真不少何故世界宛然如故答世界元是衆生共業所感一人發真一人之世界銷殞若舉世界人發真則舉世界皆銷殞矣然而安得有此此世界所以宛然如故也道開曰此方聖人云致中和天地位焉萬物育焉西方聖人云一人發真歸元十方世界皆悉銷殞乃孔子大聖何嘗位育春秋釋迦成佛亦未銷殞世界固知存其理者不必著其事也賀云衆生不可盡世界不可盡一人發真衆復感結暫雖震動旋復凝結耳汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通吻當處湛然一切魔王及與鬼神諸凡夫天即無想天也見其宮殿無故崩裂大地振坼水河精海精之類陸山林土地之類飛騰大力鬼王飛行夜叉之類無不驚懾凡夫昏暗不覺遷訛彼等咸得五種神通惟除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝此言動魔致惱也夫一人發真而十方銷殞國土振裂魔宮其先受之矣汝輩修禪於行住坐臥中嚴飭三摩或反聞或休歇不昧不斷毫無滲漏正當發真時與諸菩薩及諸無漏大阿羅漢氣味相投心精通吻混合為一故當處湛然清淨不動汝不動而魔動矣於是上自天魔及與鬼神諸凡夫天見其宮殿無故而崩裂大地無故而振坼於是魔王之在水居陸居及空居飛騰者無不驚怖惟下界凡夫瞢然不覺見大地動搖或訛言陰陽失度或謬傳神鰲動目而無驚恐耳夫彼驚懾之魔王等非他皆得五種神通而但未證乎漏盡一通者也五通既具必知是汝定力所為況皆戀此塵勞必獲所居之處如何甘心令汝摧裂其處乎既不令汝摧裂故決定不容於汝入三昧時彼衆同來惱亂意欲亂其禪定彼始得安居也魔來之故如此然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅冰暖氣漸鄰不日消殞徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼羣邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼惟呪汝破佛律儀八萬行中秪毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救此言禦魔之方悟則無咎迷則受邪也然雖如此行人不必懼也彼諸魔者雖有大力而發大怒終是塵勞中物豈若汝為妙覺中人湛然空廓周遍十方乎縱欲加害於汝如風吹光如刀斷水終不能令光水之有動損也不但不能加害而汝反能化彼汝喻如沸湯也彼喻如堅冰也沸湯若近堅冰則暖氣逼而冰自銷殞矣吾何畏彼哉且彼雖恃其五通神力而實勞擾無停暫留不住但為其客耳所以成就其破亂禪定者不在於客悉由汝心中五陰之主人若使主人心中不明認賊為子客則乘間而入為惱為亂若使主人當處禪那惺惺了了不受顢頇則彼魔事雖強無由動汝其奈汝何譬如賊劫主人若主人深居不動賊乃莫測愈近愈恐俗云強賊怕弱主是也若主人自守不定驚慌出走鮮不為賊所執矣夫其無奈汝何者非汝力能勝彼也良由明能破暗耳蓋汝住禪定陰氣已銷已入大光明藏彼則咸受幽氣住於昏沈冥漠之鄉以暗近明正如梟之入晝羅剎之向陽自然銷殞喪魄而去安能久留擾亂汝之禪定耶信乎惟覺悟者為無惑也反是而若不明悟則必被陰所迷於彼虗幻境界欣怖憎愛亡失照理不惟不能化彼而反墮彼類汝阿難如是必為魔子而成就魔人矣即如摩登伽其人殊眇劣也縱能呪汝祗破一戒其害尚小也且汝心猶清淨未至淪溺也若此等魔王豈登伽之比哉汝為魔子而成就魔人彼乃隳汝之寶覺全身壞盡道果入無間獄喻如宰臣之家忽遭天王籍沒則不但失官罷職而身且不免於刑戮展轉飄零無可哀救矣魔害如此可不警懼而慎察哉此下詳分五魔境相也上科知動魔由於定切則於魔之發端不驚而預防無患知成亂由於主迷則於魔之究竟不動而自守惟堅然而所現境相多端不詳剖析未必其不迷也故今詳與分辨之此雖談魔而進修下手之旨存焉學者不可不盡心也阿難當知汝坐道場坐八角壇等是事道場反聞專注心不流逸是理道場銷落諸念其念若盡即寂寂也則諸離念起信所謂心體離念等虗空界也一切精明即惺惺也動靜不移憶亡如一識忽起而為憶如影現鏡中識忽滅而為忘如影滅鏡內鏡體如故故曰如一當住此處入三摩地如明目人處大幽暗散心之人但對目前現境惟覺一區光明曾不知餘處皆暗譬如黑夜對一室燈光而室外無邊昏黑也今一旦不顧目前現境專注聞中無邊法界此定成就則現境都失方覺十方悉皆黑暗譬如吹滅室燈連室也沒了通天徹地渾成黑暗故曰如明目人處大幽暗籠潭吹燈發明德山正令入此三昧耳又目前朗見山河等境乃無明幻出能見所見皆無明所為以其聚見於眼開眼則明合眼則暗見不脫於根塵光全居於黑暗執之為實何有悟期如夢中人不知是夢但見目前明朗謂實明了全不覺在昏沉黑暗之中豈有醒時今入三摩地者要須頓捨目前幻身幻境絲毫不緣努力反聞當在此中方覺無邊黑暗即同夢中人覺知是夢捨彼夢境不更復緣努力求醒方覺昏沉黑暗覆壓迷悶也精性妙淨離念自體精而不雜曰精性逈脫根塵曰妙雙超空有曰淨心未發光此則名為色陰區宇暗室區覆曰區牆字局滯曰宇若目明朗十方洞開洞達一界或至小千無復幽黯名色陰盡如五重衣服初脫最上一重也是人則能超越劫濁常途劫濁以人壽百歲時運入劫濁總統五濁而名惡世今此自晦昧為空結暗為色即入劫濁無量劫來長眠黑暗生死之中然此濁體全依色陰幽暗為之故今色陰盡時晦昧即開而超劫濁也觀其所由堅固妄想以為其本堅執固結妄情癡想於外四大堅執為身外實有於內四大堅執為心所住處由是固結不解成此色陰黑暗之體也十一色俱是色陰皆屬堅固妄想觀其所由説者謂惟盡乃能觀之似不必然只是出色陰之由補上節之略耳此敘色陰始終之相也阿難當知我所謂魔不出色受想行識而已先以色陰言之汝坐道場專注反聞銷落諸念所謂居一切時不起妄念也其念既盡是名離念此離念相猶如虗空於一切時惺惺不昧故曰精明於是與動靜之境無干而動靜不移與憶忘之識無預而憶忘如一此正打成一片時也當住此離念精明之處便可入耳根圓照三昧此之定境如明目人處大幽暗眼所不見固暗眼之所見亦暗也眼之所見固暗能見之眼亦暗也此緣色陰所覆精性妙淨之心未能發光故目前所見惟是黑暗此黑暗相即是色陰區局性真如屋宇然故名色陰區宇此即色陰未破之相也若使心光發泄障礙皆通即肉眼所見明明朗朗十方洞開而前之黑暗皆化成光明內徹五臟外徹山河天上人間悉如指掌名色陰盡此即色陰已破之相也是破色陰之人則能超越劫濁以劫濁乃空晦暗中結暗所成離此色陰原無體故所以盡則遂超耳自今觀之始知色陰之由元從堅固妄想以為其本如伐樹者去其覆土方見本根今劫濁既開觀見色陰之由亦自然之理矣問諸色尚見何以言盡答圓融中道豈盡色成空耶但盡陰不蓋覆而已良由真心元能隨緣現色而色不異心本自明徹如珠有光還照珠體但從無始迷己為物遍成障隔又認物為己而聚見於眼是以永沉黑暗盡失其遍界之明豈惟不知本明兼亦不覺現暗彼時有學者尚屬比量而知方以覺得現暗未能現量而見豈即親證本明到此躡解成行入三摩地於幽暗中忍住一番功夫到日忽爾色陰雲開親證本明一切堅頑暗昧根塵皆如琉璃內外瑩徹且不聚見於眼而六根皆見遠近皆如目前是之謂色陰盡豈壞色成空者可比其萬一哉此下色陰中間十境也中間者即色陰將破未破中間所謂交互之處也良以藏心統含四土不離當處不越毫端秪因色陰所覆豈惟不見上三即同居一土現前朗見能幾何哉尅論現見特塵剎中一剎一剎中一界一界中一洲一洲中一國一國中一邑一邑之中亦但於所住所到之處一區之明而已一區之外悉皆不見悉是黑暗之境然此黑暗中一國一剎乃至塵剎四土無不包含今入定者既復捨彼一區之明而全處無邊之暗當色陰未開之際反聞逼拶之深心光所流或近徹身境或遠照十方或淺射同居或深臻三土所謂忽遠忽近乍淺乍深皆色陰將開之前兆暫爾非常有此十相行人於此作證不作證間魔佛異路可不戒慎而加察哉四土者同居穢土同居淨土方便土常寂光土也阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪鐘云雖是善相取著成邪任是惡相若不取著邪亦成正境隨心轉也此明外徹也阿難行人當在此幽暗之中正好著力精究研窮此妙明聞性著些精彩挨排將去由斯研究故得四大虗融如雲如影不復密織堅實少頃之間此身透牆過壁了無隔礙此名心光泄露流溢於目前堅礙之境特因其精研功夫逼拶之極暫得如是虗融隨即失之非同聖人證果一得永得也若使行人遇此境時平平坦坦略不介意動止尋常不生歡喜不作證聖之心則此境界亦是過去宿習善根發相未來入位開心先兆可增信心可誘精進名為善祥境界本無過咎也若行人自無識見又缺涵養一遇此境輒起證聖之解則魔得其便乘間而入即受羣邪欺誑簸弄漸成大害至不可救矣近世悟人云上得秦公嶺望見四部洲從他四部洲依然顧話頭所謂不作聖心也阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此明內徹也阿難行人復以此惺惺不昧之心精研妙明聞性其身忽然內徹五臟開明親見蟯蛔以手拈出而身相宛然亦無傷毀此是精光流溢於形體亦但精行逼出暫現此相不可為常而非同聖證也若不作聖心則名善境界矣若作聖解即受羣邪矣所謂路途樂終未到家者也又以此心內外精研其時魂魄意志精神魂藏於肝魄藏於肺意藏於脾志藏於膽精藏於腎神藏於心除執受身餘皆涉入互為賓主忽於空中聞説法音或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此明內外俱徹也前之精研初能外虗次能內徹又以此心合內外而精研之至於二俱虗徹時除彼執受身形安然無所遷改其餘魂也魄也意也志也精也神也皆相涉入而失其故位故魂則魂為主而餘為賓乃至入神則神為主而餘為賓如是其互為賓主又聞空中説法音聲一處説也或聞十方同敷密義處處説也夫五藏內境也空中十方外境也內虗故諸臟涉入外徹故兩處齊聞據其涉入賓主處名為精魄遞相離合或精離本位而合於魄或魄離本位而合於精餘四亦然蓋離則失本位而合則就他位也此由初聞六根互用薰成善種故於定中偶一發露非若聖人證入圓通一得永得也若不作聖心則名善境界矣若作聖解即受羣邪矣今夫刻意凝神討論之極則奇文麗藻未嘗經意往往煥然得於夢寐則精苦激發神者偶現類可知也此上三科雖分合內外皆近徹身境也又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來於時忽見毗盧遮那此云光明遍照踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此現佛境也行人又以此心專注反聞至於澄露皎徹而始覺之智融透內光發明而本覺之心發泄於是十方遍作閻浮檀色無情遍成金界也一切種類化為如來有情盡作佛形也於斯時也忽見毗盧遮那佛高踞金光臺上四面有千佛圍繞一華百億國一國一釋迦而國土蓮華俱時出現此何象哉蓋因宿昔耳根曾聞維摩華嚴等經而心魂靈悟所染習氣今於反聞妙定之中心光被研照灼於此實報莊嚴諸妙勝界尊特身相夫實報深位所居豈初心遽能親見不過暫爾一見轉眼即逝非同聖人之實證也若毫不為動而不作聖心即名善境界矣若作聖解而謂真證即受羣邪矣禪家謂佛來也打魔來也打即是此意文喜親見文殊於笊籬上急用飯匙打去亦是見及此也又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此空成寶色也行人又以此心精研反聞照理綿密無絲毫間斷於過去之念更加抑按現在之念更加降伏未來之念更加制止深忍深定超越二乘及菩薩境如是用功鞭逼太過忽見虗空成七寶色或百寶色或青黃赤白等色倣佛切近寂光妙土且此寶色多分不礙同滿交雜不礙各純何緣而臻此勝妙哉良由抑按功夫勇勝處倍過常分故所見妙境非同淺淺亦過其分然不過定力逼發暫得一見耳非同聖人之一證永證也若不作聖心則亦寂光前兆名善境界矣若一作聖解即受羣邪矣鐘云觀察者審究妄心起處抑按者於起處遏捺之降伏者隨抑從順制止者恐後跳梁更加防範也又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此暗中見物也行人又以此心研究挨拶澄徹清明至於精光不亂則心光凝定不為明暗境移忽於夜半暗室之中見種種鬼神精魅奇形怪狀之物了然分明不殊白晝而此暗室中原有之物依然如故亦不除滅此何故哉蓋鬼神精魅恆雜人居而互不相見今由用心細密而見亦密澄故尋常所不見者今皆洞見然亦不過研究澄徹之功暫時發露耳非為聖證也若不作聖心名善境界若作聖解即受羣邪矣曾聞有人在靜室中坐忽見一人自地而出一人從壁中來對語良久各復原處又有見三五裸形人高一二尺竊室中米旁若無人如斯之類難盡舉也又以此心圓入虗融四肢忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此身同草木也行人又以此心反聞功切虗融之極忘身如遺忽然四體同於草木之無知燒亦不覺斫亦不知惟不覺不知故火不能爇割肉同於削木此何故哉良由五塵併銷四大排遣純覺遺身故無傷觸也然亦偶爾發露暫得如是非如聖人之證得性色真空也若不作聖心名善境界矣一作聖解即受羣邪矣又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華嚴下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪此覩界覩佛也行人又以此心成就清淨純理無雜心淨之功至此已極忽見十方大地皆成佛國七寶光明具足遍滿是見同居淨土也又見諸佛遍滿樓殿壯麗是見淨土現在如來也又見地獄天宮上下無礙是見同居穢土也此何相哉良由未入定前諸經教中聞説淨穢二土隨起欣淨厭穢之念凝想日深薰習成種今於定中反聞逼極心光所灼故悉發現雖是實境仍同幻化非同聖證真得寂光土也若不作聖心名善境界矣若作聖解即受羣邪又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪此遙見遙聞也行人又以此心窮極反聞到極深極遠處忽於中夜心境俱靜時遙見遠方市井街巷歷歷在目親戚眷屬咸聞其語此何相哉良由研究功夫逼迫其心逼極而心光飛出故障隔之處皆能見聞此亦暫時光景非同聖人證得無邊剎海不隔毫端也不作聖心名善境界若作聖解即受羣邪矣交光曰豫親見河南一僧在潞偶然靜坐忽見鄉閭市井宛然見其兄於路被官責打此是白晝計其時日不久鄉人至潞問之乃分毫不爽此必宿昔禪定善根故偶現如此惜其僧不知自重也總上九科不出四土身境一二三六七共五科同居近相也四五兩科後二土相也八九兩科同居遠相也獨方便土相未特顯著或可該攝於同居淨土之中耳又以此心研究精極見善知識行人自見形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端説法通達妙義非為聖證不作聖心魔事銷歇若作聖解即受羣邪此魔事發端也上之九科皆初心反聞入三摩地定心逼極所發善境非魔所為要須作證方成招魔之端今此科是大定中不為上之九境所遷色陰將破振裂動搖魔心慌越萃於斯時故魔擾於是而發端也又以此心研究反聞已到至精至極之地實與諸佛心精吻合而色陰將破之時行人忽見自家是箇善知識形體變移或變佛菩薩或變天龍羅漢少選之間遷改不定此由未定之先曾有邪心含受邪種至此忽然發露非真見聖也又或防心不密遭天魔入其心腹之中令行人無端説法能通達無邊妙義既現虗影又發狂慧豈為聖證哉若行人知是魔力所持而不作聖心則不為魔罥繫縛而魔事消歇矣若當作真實心開而作聖解即受羣邪矣故用心者不可不察也行人用功自淺而深魔魅肆擾由微而著故此節與下受陰十境皆且暗中入心令自發亂直至想陰中方乃飛附旁人顯然誑惑舊説善知識即作旁人説法亦即指彼所説豈有發端之初即遣實人來惑亂哉阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道此總結色陰十相而勉令覆護也阿難如是十種禪那中所現之境皆是行人自己禪觀與堅固妄想交攻互戰或勝或負現此十事如一善境現即是觀力勝妄想暫現復隱即是妄想勝觀力由互出互入不得互融此魔之所以乘間而入也衆生頑迷不自忖量己之見地與佛何似功用與佛何如但逢此暫現因緣迷而不悟便謂高登聖域是未證謂證未得謂得大妄語成墮無間獄所謂初登於天後入於地也色陰魔相如此嗚乎如來終當入滅耳況從此以後正法少而末法多汝等當依如來今日之教於如來滅後以至末法之中廣將此義宣示將來修禪觀者令彼曉了無令天魔得其方便於以保任維持遮覆護衛此大定而共成無上道焉我今囑汝汝其勉哉阿難彼善男子修三摩提奢摩他中止觀雙修耳門即入流之觀亡所之止也色陰盡者於上之十境或備經或不備經俱要明識不為所惑功夫到日色陰自有盡時後皆放此説之見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑喻若有所得也心觸客邪而不能動喻未能用也此則名為受陰區宇若魘咎歇即受陰盡也其心離身反觀其面去住自由無復留礙即能發自在用也當知此不同坐脫而不能來者彼但於前幽暗位中憑定力以坐脫耳所以九峰不許泰首坐也此則色受俱開體用俱備去來無滯洞山法慶等是其人矣名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本受陰無體虗有所明故名虗明妄想此敘受陰始終之相也阿難彼善男子修大定中前之十境不亂則色陰盡而位當初信矣此色陰盡者如明目人處大暗室到此遍成光明見諸佛心如明鏡現像蓋諸佛心即我妙覺明心衆生向外馳求終不能見今於自心開處見之本不在外豈不親切明白也既是自心而復親見故若有所得若實得其體也但未能稱體而發自在用耳喻如睡中被魘之人明見醒中之境但為心染客邪為所覆壓而不能動色陰已開受陰覆人之狀亦復如是是則名為受陰區宇謂有體而不能用便是受陰區局蓋覆處也夫心本不局身中無始執迷非局而局生局現陰死局中陰無時不局於身安有離身自由之分若魘咎一歇則其心離身而能反觀其面或去身外或住身中自由自在視此身如傳舍而無復留滯隔礙此之謂能用也此受陰已盡相也夫受陰為身見之本身見為諸見之本既受盡離身身見解脫故能超越見濁由此而觀可見心本不在身中但是受陰妄為領納虗以發明以虗故受以明故受之而不謬是則受陰之由虗明妄想以為根本而已行人可不加察哉鍾云神仙家出神與今經所説略似而實不同彼有心求之此無心得之彼自謂妙用此不作聖心前色陰中少選之間自能出礙者欲出也遙見遠方逼極飛出者漸出也此去出自由無復留礙者妙乎出也後想陰中其心離形如鳥出籠而上歷聖位得意生身者妙之妙也彼有陰神陽神之説色中二處未別陰陽受陰所説倣佛陽神想陰所説則非彼陰陽所及矣彼屬妄想精魂此修正覺三昧根源自殊總之破色受二陰而想行識三居然未破亦何足奇而生奇想便言證聖鼓發魔事宜矣阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自消歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜此下十節明受陰將破未破之相而此先明內抑生悲也阿難彼善男子當在此色陰已開受陰未破之中得大光耀十方洞開無復幽黯其心發明悟得一切衆生皆同具此光明妙理而枉受淪溺却乃自責自咎己之執迷不早悟度生而內抑過分忽於靜虗發無窮悲心以至觀見蚊虻之微亦如己子而憐其無知愍其墮落不覺流淚焉此雖亦是同體之悲但由功夫摧抑太過而發於正受中不宜有此必行人知非而悟方得無咎而非同聖人證得之同體大悲也若能覺了是妄而不為所迷所謂悟也漸悟漸止復還正念則內抑之悲久自消歇矣若作聖解自謂已得諸佛大悲則有悲魔乘間而入見人則悲啼泣不止遂失正受起無量顛倒邪念而下從淪墜矣摧抑過越者本欲興悲策進以破受陰但自抑太過失於慈柔反成招致魔附之端也阿難又彼定中諸善男子見色陰消受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越悟則無咎非為聖證覺了不迷久自消歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜見惑是受陰根本故此下皆言見色陰消也此明招致狂魔也阿難又彼修大定中諸善男子見色陰已消如脫外衣受陰明白如見內衣此時佛心明鏡勝相現前一向雖聞心佛無二未曾親見今既一旦得見故感激過分而發大勇猛其猛利之心志已齊於諸佛自謂不歷僧祇立地成佛本為進破受陰而忽高舉齊佛之念至於陵節粗率過分越禮豈知理雖頓悟事要漸除功用中安容此陵越乎是必自反知非乃得無咎而非同聖證之不歷僧祇獲法身也若能覺了不迷則此陵越之心久自消歇若作聖解而謂直下承當是聖則有猛魔乘間而入其心腑逢人自誇我慢無比乃至天上天下唯我獨尊必失正受而從淪墜矣問頓教不立階級一超直入與此何殊答彼為高惟聖境自限蹭蹬者施應病之藥耳非一向以圓融而礙行布也請詳宗門信位人位之旨則頓教人豈全廢於位耶吁破色陰之聖人謂三祇劫一念能超尚名陵率過越引狂魔而入淪墜今之自謂得向上一著效顰訶佛罵祖者不知破幾陰得何位亦敢大言自誇我慢恣肆恬不知畏聖有明文何不省也又彼定中諸善男子見色陰消受陰明白前無新證退失故居智力衰微入中隳地逈無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心病在一撮字懸在一處失於正受當從淪墜此偏於定也此明招致憶魔也又彼定中諸善男子當色消受現之時受陰未破前無新證色陰已盡歸失故居當此之際但應定慧等持入流亡所久可尅功顧乃智力衰微莫能照見墮在兩楹無所依倚入中隳地前後皆迷回無所見矣却又偏用定心絶無慧水灌溉而忽生枯渴時時刻刻深思沉憶不敢走作將此沉憶不散以為破受精進之功用此名偏用定力以修治其心無照見受體本空之智慧故自失其方便也若悟得慧少定多而還復等持庶無過咎而已豈為聖證哉若作聖解謂此心沉憶之定證聖當然則憶魔乘間而入日夜撮心懸挂一處失其本定而從淪墜矣問古人謂置心一處無事不辦何以異此答彼為散亂多者作對治藥耳非一向懸心為精進也且撮字懸字多少費力多少不自在視置心一處者是非判然矣又彼定中諸善男子見色陰消受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足此名用心亡失恆審溺於知見悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜此偏於慧也此明招致足魔也又彼定中諸善男子當色消受現之時慧力多於定力失於慧之猛利以諸殊勝之性懷抱於心胸之中謂佛性本來具足不假修成自疑己身已是盧舍那矣何處更有盧舍那更須求進乎於是得少為足不復前進所請太尊貴生也此名用心之處亡失恆審不能恆常審試自德與佛德何似唯是溺於己之知見以為即是佛知佛見而執性廢修以至於此若能省悟審知五陰尚未全空安能齊佛德用則可復於無過其非聖證也可知矣若自任舍那而作聖解廢修不進則有一種下劣易於知足之魔以類相附入其心腑大發狂言曰我得無上第一義諦言我言得具足人法二執第一義諦豈有是哉失於正定而從淪墜所必然矣問先德云心本是佛不假修成何也答此為惟執修成孤負己靈者作對治藥耳然亦有令人大死一番竿頭進步極盡今時等語何嘗廢修證哉又彼定中諸善男子見色陰消受陰明白新證未獲故心已亡此與偏定科全同歷覽二際即中隳地也自生艱險於心忽然生無盡憂如坐鐵床如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劒自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜此明招致愁魔也又彼定中諸善男子當色消受現之時破受之新證未護破色之故心已亡歷覽此色受二際前不粘村後不著岸如立懸岸恐遭墮落見此艱險心生大憂過憂不知展轉成顛如坐鐵床如飲毒藥厭活求死止想解脫此憂元從戒慎恐懼中來亦是修行但彼太甚無復解慰方便遂至如此若使解得大道甚夷放下便是有何過憂之咎且多憂豈為聖證哉若一向執憂是聖而不肯自寬自解則有常憂愁魔乘間而入或執刀劒以自割或走山林而避人發大風顛失正受而從淪墜矣祖師云大道迂濶忙作甚麼又云默默自知田地穩騰騰誰放肚皮憨又云放四大莫把捉等無量方便皆可忘憂豈使魔得其便也鍾云新證未獲故心已亡憂魔生焉前無新證歸失故居憶魔生焉何別一是見前後雙脫不欲守前不欲向後從中別求一路是以晝夜撮心懸思挂念而憶魔入也一是見前後雙脫又欲守前又欲退後二念交發不知何從是以計無所定倣徨愁悶而憂魔入也又彼定中諸善男子見色陰消受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜此明招致喜魔也又彼定中諸善男子當色消受現之時處清淨中心得安穩忽有無限喜生心中歡悅而不能自止此名偶得輕安無慧力以自禁若以慧眼觀察方得淺證何足深喜則喜風自息仍歸無咎為其非同聖證也若謂樂道乃聖心宜然喜而不止則喜魔乘間而入見人便笑自家歌舞謂刀山火聚總是道場酒肆淫房無非解脫矣豈知清淨心中纖毫不立既失正定能免淪墜哉又彼定中諸善男子見色陰消受陰明白自謂已足忽有無端大我慢起七慢之一諸慢之總七慢者單過慢增邪我卑也如是乃至慢於劣計己勝於等計己等為單慢與過慢於勝計己等於等計己勝為過慢及慢過慢於勝計己勝為慢過慢或增上慢未得謂得計劣己多為增上慢或卑劣慢對多勝者自甘劣少不敬不求為𢍉劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是疊華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失於正受當從淪墜此明招致憶魔也又彼定中諸善男子當色消受現之時便生滿足自高自大不求師印忽有無端大我慢起持己凌物趾高氣揚乃至單慢以及卑慢一時俱發彼其心中雖如來亦在所輕況聲聞以下乎此比前偏慧多狂其過更甚彼但謂本來同佛此更謂超越諸佛也慢之所起皆由見得自己尊勝無慧以救其弊若有省察之慧見得是法平等無有高下尚不見有一衆生可慢況諸聖乎是則我慢之非聖證也夫人而知之也若執迷不改而作聖解則慢魔乘間入心忽塔廟而不禮毀經像而不顧至謂檀越佛像是金銅土木佛經是樹葉疊華自身活佛反不恭敬崇此土木何為檀越信之果然毀碎埋棄誤己誤人其罪重大入阿鼻如箭亦其自失正受而甘從淪墜也伊誰責哉問臨濟之不禮祖塔丹霞之燒木佛德山説一大藏如拭涕唾帛巖頭説祖師言句是破草鞋非大我慢乎答此為執外求而不達自心執言教而不肯進修者作此竣厲語以激之乃一片真慈也若使祖師真有慢心且亦不免泥犁況其他乎近代此魔遍地皆是信口胡説大言不慙欺己欺人昧天昧地讀經至此當亦悚然知畏矣鍾云慢有七經缺邪慢又彼定中諸善男子見色陰消受陰明白於精明中即佛初示識精明元也圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤後生墮阿鼻獄失於正受當從淪墜此名招致輕魔也又彼定中諸善男子當色消受現之時色陰已破故得精明受陰將盡故能圓悟精理獲意生身故能得大隨順所向如意而忽生輕安離諸粗重輕也豁悟自在安也既生輕安遂自以為滿足成聖得大解脫矣不知此但一時開悟暫現此境覺得身心如雲如影離重濁而獲輕清耳行人悟得輕清是暫急須吐却則可無咎豈有聖證何足自滿哉若迷而不悟坐定輕清窟中不肯拖泥帶水努力向前則魔以類附使之滿足自畫卒為無聞比丘不但自誤而兼誤多人加以悔恨謗佛墮阿鼻獄失於正受而從淪墜矣又彼定中諸善男子見色陰消受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等破佛律儀誤入人罪疑是誤人入罪失於正受當從淪墜此明招致空魔也又彼定中諸善男子當色消受現之時十方洞開豁然明朗於明悟中得虗明性寂爾無法可得其心忽然歸向永滅見得無作無受撥無因果而因果皆空只見空心現前其餘一切斷滅皆由取著虗明遂至於此若悟此空是惡取空非究竟空則無過咎然則斷空豈聖證哉若作聖解而守定不改則空魔入心使其執空謗戒自謂飲酒食肉一切皆空行穢行淫無非是道見持戒者為小乘為執著見破戒者為大乘為徹悟且鬼入已久香穢莫辨甚至等屎尿於酒肉破律儀而誤人入罪其失正受而從淪墜也必矣問如志公羅什三車蜆子酒仙布袋等則又何如答此皆大菩薩應身借此以作佛事而為人解粘去縛者豈撥無因果之謂哉又彼定中諸善男子見色陰消受陰明白味其虗明上只得虗明性今則耽著愛樂矣深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證若作聖解則有欲魔入其心腑一向説欲為菩提道化諸白衣平等行欲平等猶云大家也其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬玩後王難句則凡愚似專指女人然行淫安得如是之盛佛言不妄當來末法之深將必有矣魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失於正受當從淪墜此明招致欲魔也又彼定中諸善男子當色消受現之時覺得虗明有味味著不捨深入心骨其心忽有無限愛生因味生愛愛極發狂遂變正欲而為淫欲蓋禪定中發於妙觸自在受用不可為喻有言過於淫樂者即引淫欲之端也此明是定中妙觸受用安順入心乃無慧力操持而誤入諸淫欲正好用慧觀察一切不受捨置透過庶免過咎豈可視為聖證哉若迷而不捨而作聖解則有欲魔入心令其説欲為道自己行欲又化人行欲所攝凡愚女人以供我欲者數滿千萬然所仗者魔鬼力耳及魔厭而去神通即無以攝愚故明陷王法以誤人故幽入無間宛轉零落失正受而從淪墜何可救哉上科見惑所攝此科思惑所攝也阿難如是十種禪那現境皆是受陰用心交互交互意同前科而指文小異如得光耀乃至得虗明性見觀力勝妄想也發無窮悲乃至無限愛生妄想勝觀力也故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道此總結受陰十相也阿難如是十種禪那所現之境皆是受陰與用心交攻互戰所現但衆生頑迷不肯自忖自量逢著此等因緣即不能諳其名字不覺是過而妄言登聖大妄語成則墮無間言登反墮殊可憐憫汝等亦當將我今日之語傳示將來庶令衆生開悟天魔退舍末法之中咸得保持覆護而成無上道也阿難勗哉按此十種魔事已成非但如前引發之端所以異於色陰也然亦但言魔以類至暗入人心令其不覺自顛而未及於天魔飛精所以異於想陰也阿難彼善男子修三摩提受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位五十五位前加乾慧後加妙覺為五十七并前三漸恰滿六十也問何故凡身便能歷位答此約圓頓最利之根不實取證即以凡身上歷諸位以顯圓融不礙行布如善財龍女之類非若別教皆實取證歷三祗而後得果也得意生身喻如意去疾速無礙而有三種一入三昧樂意生身謂心寂不動即相似初信至七信入空位也二覺法自性意生身謂普入佛剎以法為自性即相似心八信出假位也三種類俱生無作意生身謂了佛所證法即九信十信修中位也常笑學仙者以出陽神為勝事不知釋宗淺位三意生身妙超無比何況深位之十身乎而顧妄謂陰神真無知之言也隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇若動念盡浮想消除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本此敘想陰始終之相也阿難彼善男子修三摩提受陰盡者則見惑已盡而分別我執亦盡然思惑未除俱生我執猶在習漏未盡直至七信位不受後有方為漏盡此當二三信中故未盡也然雖不得漏盡無四果之六通十八變而受陰已盡不執身相故能心離其形如鳥出籠所向自在已能成就從是凡身上歷菩薩六十聖位舉別教之經生纍劫證得一分方到一位者能以凡身而頓歷之所謂圓融不礙行布也於是得意生身隨往無礙不疾而速不行而至焉此皆受盡之相也然雖得意生身而想陰未破正如魘咎雖歇而熟寐未醒猶作寱語此寱語人自己雖不知作何等語然所出寱言已成音韻而有倫次令醒悟人咸曉其語是則名為想陰區宇蓋為受所覆者見聞雖周而全無用喻魘不動為想所覆者雖比前有用而未能圓照生死喻魘雖去而尚説夢話非是醒言別無所知也此想陰未破之相也夫覺明如鏡浮想如塵塵動鏡靜若動念盡而浮想消除則於覺明心體如明鏡當臺一塵不受矣塵淨而鏡體自明想除而覺明自淨則三界一類分段生死皆能知其生從何來死從何去而首尾圓照此則想陰已破之相也想雖居於五陰中間而前二後二皆依妄想而粗細不同何況一切根隨煩惱離此想陰畢竟無體故想盡而超煩惱濁焉觀此想陰之由則融通妄想以為其本蓋想能融變使心隨境使境隨心如想酢梅口中水出能通質礙故曰融通妄想也想陰始終之相如此阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧爾時天魔候得其便飛精附人飛者速遣之意如飛擊飛票之飛精即魔黨諸鬼魅也附人者另附他人蓋受盡者不能入其心腑故假旁人惑之也口説經法其人不覺是其魔著自言謂得無上涅槃其人即所附之人也來彼求巧善男子處敷坐説法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人求巧之人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲此三句是魔惑行人徹底主意蓋行人三學無缺策進如飛魔宮震恐而設謀擾亂惟期破戒導淫則定慧俱納於邪身為魔子魔乃晏安若智強者即此反為照魔之鏡任其神變莫測但察毀戒誘淫即知是魔何至為彼所惑哉口中好言災祥變異或言如來某處出世或言劫火或説刀兵恐怖於人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師求巧之子説法之師俱陷王難妖言惑衆王法必誅汝當先覺不入輪回迷惑不知墮無間獄思惑是想陰根本故此下十種皆由貪愛而起也此下十節明想陰將破未破之相而此先明貪致怪鬼也阿難彼善男子受陰已盡見聞遍周而虗離身作用而妙中間不為十境所惑而不遭邪慮以此虗妙之圓定發明受盡境界行人當此三摩地中正好一念不起挨拶前去奈何心愛圓明於圓定發明者起一愛心欲令覺心圓明無不了知而善巧方便無不成就將欲度生以行教化故發憤鋭思而貪求善巧只此一貪便是動魔之本矣爾時天魔見其受盡定深己自不安乃候得其貪巧之便即飛遣精魅另附一人無故自能口説經法蓋求善巧者亦以善巧惑之也其所附之人不覺為魔所著自言己身已得無上涅槃來彼求巧人前敷座説法恐其不信又假神變以服之須臾之間或比丘或帝釋或婦女或比丘尼形像不一皆令彼見或夜寢暗室身有光明種種神異那得不動是求巧人既愚且迷見其如是即傾心曰此真菩薩也可不信其教化哉於是昔之定心今已搖蕩菩薩曰律儀可破也是人即破之菩薩曰貪欲可行也是人即潛行之所謂平生之力壞於一旦一一墮其術中不復能出矣且不特此也是説法人口中又好言災祥休咎變異怪誕之事或言如來某處出世如近世彌勒佛下生之類或言劫火該死多少人或言刀兵該死多少人如是恐怖於人令其棄家逃走家資耗散及至臨期了無其事如此者名為怪鬼即是貪習遇物成形者至於年老成魔方為魔使而惱亂是人也及其厭而去焉彼人威福頓失妖妄禍發求巧之子與説法之師皆束手被誅而陷於王法矣魔害如此可勿覺乎是故汝當先覺使眼如明鏡心如牆壁縱魔黨紛列不能窺覷何墮落輪回之有若迷而不悟皈依順從隨他腳跟所轉則毀戒宣淫其墮無間也必矣問教中聖位俱無墮義既上歷聖位何故復墮答權漸中經劫歷位剋定取證故證聖即無墮義如走者登山匐匐層梯節節歇息遲則遲矣而有升無墜若圓頓不歷僧祇一超直入中間更不取證直以初住為第一峰頭耳故曰從是凡身足見不取聖果又曰上歷聖位足見但是速以歷過而已如飛鳥升山舉翼即過無數梯層速則速矣而升墜不定或驚疑於上或牽愛於下緩翼之間已落千巖之底故知識陰未開未入圓通以來不妨有墮義也或曰若是則圓頓反劣於漸教乎曰是何言與圓頓歷時無幾而彼教經劫紆回何止如圓頓之升墜乎且圓頓以悟為要如飛者恃翼墜固易墜升亦易升如經文云悟則無咎即將墜而復升也況秉圓頓上根者多能愛求念絶凡聖情忘自無招魔之愆特佛慈曲為囑護以戒備不虞而已道開曰近世曇陽子之類即此魔也阿難又善男子受陰虗妙不遭邪慮圓定發明三摩提中心愛遊蕩飛其精思貪求經歷如南天台北五台化人之國崑崙之墟乃至十方諸佛國土無不遍往豈知無邊剎海不隔毫端果熟因圓自然發現不必貪求也爾時天魔候得其便飛精附人口説經法其人亦不覺知魔著亦言自得無上菩提來彼求遊善男子處敷座説法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚不自變而變他形成佛相者由彼貪求經歷佛土故現剎土之佛以投其好也一衆聽人各各如是得未曾有土不一佛故人人皆變化是人即求遊之人也愚迷惑為菩薩淫逸其心化定心而縱蕩不拘也破佛律儀潛行貪欲口中魔口之中好言諸佛應世其處某人當是某佛化身來此某人即是某菩薩等來化人間指目前皆是佛土者以彼好遊蕩故以此誘之也其人亦指行人也見故心生傾渴邪見密興種智消滅從他故邪見密興舍己故種智消滅也此名魃鬼淫習遇風成形者年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄二貪求經歷竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿吻綿密也吻合也澄其精思貪求契合澄者靜深不動也契合者謂以此心上契諸佛下合衆生也殊不知工夫若到寂滅現前時自然上同下合不必貪求也爾時天魔候得其便飛精附人口説經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座説法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易謂心開之人念念不同如下文所云也或得宿命或有他心或見地獄或知人間好惡諸事或口説偈或自誦經各各歡娛得未曾有自開悟至此皆現密契之事以惑其心也是人愚迷惑為菩薩綿愛其心纏綿愛欲以遂其所求也破佛律儀潛行貪欲口中魔口中也好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然由彼求上契佛心故言種種諸佛以誘其契也女佛如近世以觀世音為女人之類其人見故見其密默開心之勝事遂并其妖言而總信之洗滌本心將昔日正定之心洗滌無餘易入邪悟變易而入邪知邪解此名魅鬼誑習遇畜成形者年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄三貪求契合竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本愛窮萬化之根本窮覽物化如烏何因而黑鵠何因而白松何因而直棘何因而曲之類精爽其心奮精神竭心力也貪求辨析欲一一洞徹根底也然此皆是如來盡性之事而初心妄是見卵而求時夜也爾時天魔候得其便飛精附人口説經法其人先不覺知魔著亦言自得無上涅槃來彼求元元即根本也善男子處敷坐説法身有威神摧服求者令其座下雖未聞法自然心伏是諸人等諸人即領魔法旨遞相轉化今在會中者將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶涅槃菩提法身三常住果也父父子子雖一脈相傳而生死各不相代且畢竟有時休豈同法身之常住乎推世法而謬濫佛法非魔而何近時滿耳皆此魔言聞者當速掩耳以避之也都指現在即為佛國無別淨居及金色相此又推穢土以謬濫淨土而撥無淨居金相如今之説心淨即是西方別無蓮華化生者由彼貪求化元故指目前斷滅者為常住本穢污者為清淨根以投其欲也其人信受亡失先心身命歸依得未曾有先心本欲辨析萬法深本今因魔摧伏反以肉身相生最鄙淺事為化理元而謂佛三常住果亦不出此乃至撥無佛境但執目前是則初求妙智終淪至愚豈非大失其辨析之初心而隨人顛倒哉是等愚迷惑為菩薩推究其心將魔心推究以為至理破佛律儀潛行貪欲口中好言既令魔黨宣穢言以扇惑已復出穢言以印證眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處大意無非誘人恣淫破戒壞大定爾彼無知者信是穢言此名蠱毒魘勝惡鬼恨習遇蠱成形者年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄四貪求辨析竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應謂多生有緣諸聖來應化也周流求之不止精研竭誠求之貪求冥感希感動於本善知識也且感應之道如水清月現山鳴谷應豈可以意求一有此心邪魔乘間而應之矣爾時天魔候得其便飛精附人口説經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷坐説法能令聽衆暫見其身魔附之身如百千歲現老人相心生愛染不能捨離身為奴僕四事飲食衣服臥具藥餌供養不覺疲勞各各令其座下人心知是先師本善知識因見其年老故知是先世之師前生知識此正冥感懸應之事也別生法愛粘如膠漆得未曾有是人求感之人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言既詐現冥感之事復詐陳冥感之言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或有別言大光明天佛於中住一切如來所休居地佛何住乎魔言可笑彼無知者即求感人信是虗誑遺失本心此名厲鬼瞋習遇衰成形者年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄五貪求冥感竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入剋己辛勤樂處陰寂貪求靜謐詳玩魔事此科當是貪求宿命疑與下科顛倒差誤今補下科之文於下心愛知見勤苦研尋貪求宿命愛知見者欲盡知三世之境而研尋處貪未來宿命偏多不知知見立而邪魔入也爾時天魔候得其便飛精附人口説經法其人本不覺知魔著亦言自得無上涅槃來彼求陰知善男子處敷坐説法令其聽人各知本業即宿業也或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽伏有人起心已知其肇肇端也此二句他心通也佛律儀外重加精苦如髮薰鼻臥杵臥棘之類誹謗比丘罵詈徒衆訐露人事不避譏嫌攻發陰私欲人信伏已也似與眼耳二通無干口中好言未然禍福及至其時毫髮無失此大力鬼即上上品神通力大之鬼也年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄六貪求宿命竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研盡貪求宿命此應在前科今補前科之文於下心愛深入剋己辛勤樂處陰寂貪求靜謐靜謐是禪定極境法華所謂深固幽遠無人能到之處初心不應躁求今且不但只求寂靜意欲靜極發通備知幽隱之事此所以招感魔事也爾時天魔候得其便飛精附人口説經法其人殊不覺知魔著亦言自得無上涅槃來彼求知陰善男子處敷座説法是人求謐之人無端於説法處得大寶珠聽法得珠那能不惑其魔或時化為畜生口銜其珠及雜珍寶簡册符牘諸奇異物先授彼人後著其體此化畜生取聽法者所得之珠而授之説法之師然後著其體也或誘聽人藏於地下先以暗埋然後對衆出之誘人驚信也有明月珠照耀其處對衆之言是諸聽者得未曾有如言得珠多食藥草不餐嘉饌此下皆指魔附之人或時日餐一麻一麥其形肥充魔力持故食少形肥皆惑人之事也誹謗比丘罵詈徒衆不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人寶藏埋藏聖賢潛匿皆陰隱之事所以投求陰者之好也此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲州嶽城隍等世間所謂正神也而亦為魔使者由其宣淫破律故為魔眷而不敢違命耳可見不持戒律俱難保其為正神矣或有精進純食草木無定行事此三句似指山林之神惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄七貪求靜謐竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力神通神力但得六根互用自然具足豈可貪求一著貪求便招魔事所以古人只貴眼明不貴神通仰山點羅漢云神通即不無佛法還讓老僧也爾時天魔候得其便飛精附人口説經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座説法是人魔附之人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內如此土冷謙是也或處囊中越牖透垣曾無障礙惟於刀兵不得自在不堪刀兵顯是邪魅自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌口中常説神通自在或復令人旁見佛土鬼力惑人非有真實讚歎行淫不毀粗行將諸猥媟以為傳法如近世比臍度氣之類此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅龍亦成魅如今日黃河活龍王之類或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄八貪求神力竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空妄想盡而真空顯生滅除而寂滅現深空寂滅非可貪之境也一起貪心便有魔擾矣爾時天魔候得其便飛精附人口説經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座説法於大衆內其形忽空中無所見還從虗空特然而出存沒自在出則存入則沒或現其身洞如琉璃或垂手足作栴檀氣或大小便如厚石蜜因貪空而現空因現空而併現諸相誹謗戒律輕賤出家即此便可驗其為魔神怪何足畏乎口中常説無因無果因果空一死永滅無復後日死後空此論儒家盛執之及諸凡聖雖得空寂潛行貪欲謂諸凡之證聖者雖不空寂猶不斷貪欲我輩何為而不行乎受其欲者亦得空心受其教而行欲者亦得空心魔力攝持與之俱化也撥無因果以上皆撥無因果也此名日月薄蝕精氣二曜相迫而致相虧蝕則沴氣成精矣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土問金玉無情之物何得出生答如萇弘之血化碧此碧便非無情矣大約天壤間何所不有惟少見者多怪也年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄九貪求深空竟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生分段生死自三果以下見思未盡者皆有之頓希變易變易生死斷見思盡生法性土者受之二乘無學登地菩薩是也細相常住變粗身為細質易短壽為長齡此是羅漢境界行破之後自然得之今此躁求故招魔事也爾時天魔候得其便飛精附人口説經法其人意不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座説法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物至遠成近此五通中神境通也或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到至近成遠皆詐現可延可促以投其欲也因此心信疑佛現前驚異其事認優孟為叔敖也口中常説十方衆生皆是吾子我生諸佛我出世界我是元佛無始根元之佛出世自然不因修得衆生諸佛皆由他生其長壽豈有紀極所以投其本念也此名住世自在天魔欲界第六天上別有此魔王居處使其眷屬如遮文茶此名嫉妬女又名奴神即役使鬼也及四天王毗舍童子此云啖精氣即毗舍遮鬼隸四天王部下未發心者已發心則護人未發心則害人利其虗明利彼人定力虗明食彼精氣或不因師或時不必附人説法而親現身其修行人親自觀見稱執金剛與汝長命現金剛身則稱金剛而與長命現美女身盛行貪欲現美女則行淫欲如小説遼陽海神之類未逾年歲肝腦枯竭口兼獨言既自見魔現與之行欲他人不見謂彼獨言彼實與魔言也聽若妖魅徐而聽之即此行人亦似妖魅矣前人未詳前人即行人也不詳其意誤中其謀多陷王難以妖㒿法未及遇刑先已乾死肝腦竭也惱亂彼人以至殂殞汝當先覺不入輪回迷惑不知墮無間獄十貪求永歲竟阿難當知是十種魔於末世時在我法中出家修道昔佛住世時諸魔壞法佛神力故皆不能壞魔作誓言如來滅後依教出家破壞佛法佛即墮淚曰無奈汝何譬如師子身中蟲自食師子肉是知末世壞法比丘皆魔侶也或附人體或附比丘或自現形自現比丘皆言已成正遍知覺讚歎淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑自説法之師傳與弟子如是相傳總是一淫總是邪精所魅也近則九生多逾百世害延後世源流不絶何其長也令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄汝今未須先取寂滅縱得無學大阿羅漢留願入彼末法之中起大慈悲救度正心見諦直正深信樂欲無厭衆生令不著魔得正知見慧眼圓明洞照魔姦我今度汝已出生死汝遵佛語名報佛恩觀佛遺難足知阿囑四分入滅亦假示現而依佛留願在世冥救也此囑當機留願度生也阿難當知此十種魔者曾有誓言於後末法世時削髮披緇入我法中破壞我教雖如來無可奈何也且自起初惡魔所附之師傳與弟子代代相承淫淫不絶自九生以踰百世害亦長矣此教盛行令真修行之人生為魔眷死作魔民失正見而墮地獄再無出頭日子害亦烈矣降魔護正非子而誰是故汝今未須先取寂滅也縱使已得無學亦當且留悲願入彼末法之中起大慈悲度此正心深信之衆生令不著魔而得正知見焉庶於汝所云願今得果成寶王還度如是恆沙衆者為不虗矣況我今度汝已出生死一大事已明此恩可不報乎然汝無別可報也遵依今日佛語留願度生流通教法即名報佛之恩庶於汝所云將此身心奉塵剎是則名為報佛恩者為不虗矣汝勉乎哉吁欽聞斯囑而不痛心下淚者木石人也總結獨多此一段與前後不同者以此十魔破佛律儀更甚於四陰諸魔故須苦口叮囑也阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量此與前稍異前之忖量謂不忖己之所造勝劣與佛何如也此之不忖謂不忖説法人之真假也逢此因緣迷不自識謂言登聖此亦異前謂得聖師而登聖果也大妄語成墮無間獄汝等前專責阿難此等字兼囑大衆必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道此總結想陰十境而勉令覆護也講與前同尊者所以結集諸經者受佛囑也即今教法流通孰非尊者憫世之心悲救之力耶
