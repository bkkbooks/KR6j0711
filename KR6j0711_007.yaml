body:
  text: 巴縣居士了菴劉道開纂述成都沙門離指方示鑒定阿難汝問攝心我今先說入三摩地修學玅門求菩薩道要先持此四種律儀皎如冰霜自不能生一切枝葉心三口四生必無因阿難如是四事若不遺失心尚不緣色香味觸六塵而但舉其四語之略也一切魔事云何發生此結答問辭也阿難汝初問道場便說云何攝心我今先說入三摩地修學玅門惟在耳根一門矣然求菩提道者又要先持此婬殺偷妄四種律儀潔白無點皎如冰霜良以四為根本餘為枝葉根本既絕枝葉何由而生而貪嗔癡之心三妄言綺語兩舌惡口之口四生必無因矣阿難且如是四事若持之念念不忘纖毫不犯則心尚不緣於六塵又何有於一切魔事哉葢塵依念住念絕而塵何所依魔托塵入塵忘而魔何所托是則戒根清淨而後現業可違定慧可發矣若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚婬女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險云何當作何況此令持呪以銷宿業也夫現業易制自行可違宿習難除必假神力今行人好正而固邪欲潔而偏染隱然若有驅策而不能自已者皆宿習所召也宿習者即過去惑業種子修三昧者若有宿習不能滅除汝教是人但一心誦我佛頂光明大白傘葢無上神呪良以斯呪乃是如來無見頂相無為心佛從頂上發光坐寶蓮華所說之心呪也全是真心體用秘密章句威力無量能除宿昔惑業習種今四重正屬惑業豈不能滅除耶且汝宿世與摩登伽恩愛習氣非是一生一劫其來遠矣宜乎卒難滅除也然當我化佛宣揚及勅文殊往護時登伽愛心永脫立地成阿羅漢如塗毒鼓觸之即死如阿陀藥服之即療何其速哉夫彼尚婬女無心修行者但以呪力冥資遂爾速證無學何況汝等在會聲聞發無上心求最上乘而又能持呪有不決定成佛者哉言其成佛之易譬如順風揚塵有何艱險信乎呪力之大而誦持不可或緩矣若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後着新淨衣然香閒居誦此心佛所說神呪一百八徧然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪婬持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟此啟下道場之問而結上持戒誦呪二義也夫持戒誦呪之後道場當建矣若有末世眾生欲坐道場者先須持戒而持戒又在擇師師者人之模也模不模不而能有成者鮮矣故真清淨僧不可不遇也若戒成已後便當着新淨衣然香閒居內外一如身心俱潔誦此神呪一百八徧對滅百八煩惱戒呪具足然後結界而建立道場焉道場既立坐道場中求於十方現住如來放大悲光來灌其頂阿難不但放光灌頂而已若是末世出家在家或男或女既滅貪淫而持戒又於道場發菩薩四種弘願出入澡浴外潔其身六時行道內攝其心如是反聞自性入流亡所工夫至於久定不寐經三七日則我自現身至其人前摩頂安慰以令其開悟焉所謂啐啄同時朗然大悟也道場之益如此問阿難見相發心世尊斥之為妄何故行人必求如來灌頂耶答阿難目見如來不肯進修故令其反觀今行人既已反觀故欲親求灌頂也細玩此科總為道場而發殊無定慧意似不必蛇足阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則此請結壇軌度也阿難白佛言世尊我蒙如來四種清淨明誨心已開悟自知由此進修必證無學而道無不成矣自揣但習反聞即不須道場可也若末世修行必要建立道場不知云何結界乃合世尊清淨軌則乎佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沉水蘇合薰陸𬅕金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地此塗地法式也方圓丈六為八角壇壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沉水無令見火此結壇及壇場器用儀式也取白牛乳置十六器乳為煎餅并諸砂糖油餅乳麋蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎罏內燒令煙盡享佛菩薩此供養法式也令其四外徧懸幡華於壇室中四壁敷設十大如來及諸菩薩所有形像應於當陽設盧舍那寂場真主釋迦娑婆真主彌勒當來真主阿閦彌陀智悲真主諸大變化觀音形像上同下合真主兼金剛藏伏魔斷障真主安其左右帝釋梵王烏芻瑟摩火頭金剛并藍地迦青面金剛諸軍茶利金剛異號與毗俱胝三目持鬟髻四天王等頻那夜迦猪頭象鼻二使者張於門側左右安置此像設儀式也又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉此總明壇場法式也欲修淨行必擇淨侶欲容淨侶必得淨地既有淨地必設壇場欲設壇場必有軌則軌則既備使人不嚴而栗不肅而敬如入宗廟琅琅但見禮樂器雖欲不齊敬不可得也故人王宮殿軌則法四象五行法王壇場軌則法四智六度各以其法法之而已此中表法理所不無然亦聖心所知之境本難盡測實非修行正要學者亦不必過泥而反誤耳門正修之旨也舊說一一分表茲無取焉律禁乳酪供佛表敬自無傷耳於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恒於六時誦呪圍壇至心行道一時常行一百八徧第二七中一心專念發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛羅呪至第七日十方如來一時出現鏡光交處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃此明壇中誦呪得益也初七六時誦呪猶未純一也二七專心發願亦未純一也三七一心持呪則心心不離此壇念念不離此呪而持呪工夫純一矣至三七之第七日如來一時出現鏡光交處承佛摩頂是水清月現感應道交即凡心而見佛心時也即此道場而修正定專習反聞能令行人得大開悟身心明淨猶如琉璃一切密圓淨玅悉現其中故知顯修得密持為助而功德正等無異矣阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就從三七後端坐安居經一百日有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬汝問道場建立如是此結言道場貴淨貴專也阿難若此結界比丘本身受戒之師及同會中諸比丘等其中有一人身心不清淨者則道場功德多不成就如鼠糞一粒壞却滿鍋羮也師友之不可濫取也如此若從三七以去端坐安居經一百日其有惑障俱薄慧性明悟而稱利根者當不起於座而得須陀洹果徑入圓之初信縱其極果未成決定自知成佛不謬信得本來是佛更不向外馳求矣汝問道場我言壇法行相建立如是而已阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞惟願大慈重為宣說悲救此會諸修行輩末及當來在輪迴者承佛密旨身意解脫於時會中一切大眾普皆作禮佇聞如來秘密章句此重請說呪也阿難頂禮佛足而白佛言自我出家以來恃佛愛弟但求多聞而未肯潛心以求證無為忽遭彼邪術所禁心雖明了而力不自由猶如魘人手足宛然但心觸客邪而不能動賴遇文殊將呪往護令我解脫雖蒙神呪然文殊但是密誦以解難冥獲其力尚未親聞惟願大慈重為宣說一則現在會中諸修行輩一則末世當來在輪迴者皆得承佛密音消業離苦而身解脫破惑證真而意解脫矣阿難請已於時會中一切大眾普皆作禮虔請而佇聞秘密章句焉爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆徧示現十恒河沙金剛密跡擎山持杵徧虗空界大眾仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣說神呪此欲說呪而先放光也爾時世尊從肉髻中涌百寶光表依理起智也光中涌出千葉寶蓮表依智發行也有化如來坐寶蓮中表諸佛皆從智行流出也頂放十道百寶光明從佛頂中之佛頂放寶光中之寶光表斯呪尊中之尊玅中之玅也一一光中皆現無數金剛密跡擎山持杵徧於虗空表無量秘密神用降伏魔外無惡不摧也於是大眾仰觀既畏其威復愛其慈以此二懷承順如來求其哀祐而一心聽呪焉然必假放光如來宣說者表從毗盧法身主口中流出也南無薩怛他蘇伽多耶阿羅訶帝三藐三菩陀寫一薩怛他佛陀俱知瑟尼釤二南無薩婆勃陀勃地薩跢弊三南無薩多南三藐三菩陀俱知南四娑舍囉婆迦僧伽喃五南無盧雞阿羅漢跢喃六南無蘇盧多波那喃七南無娑羯唎陀伽彌喃八南無盧雞三藐伽跢喃九三藐伽波囉底波多那喃十南無提婆離瑟𧹞十一南無𭜧陀耶毗地耶陀囉離瑟𧹞十二舍波奴揭囉訶娑訶娑囉摩他喃十三南無䟦囉訶摩泥十四南無因陀囉耶十五南無婆伽婆帝十六嚧陀囉耶十七烏摩般帝十八娑醯夜耶十九南無婆伽婆帝二十那囉野拏耶二十一槃遮摩訶三慕陀囉二十二南無𭜧羯唎多耶二十三南無婆伽婆帝二十四摩訶迦羅耶二十五地唎般剌那伽囉二十六毗陀囉波拏迦囉耶二十七阿地目帝二十八尸摩舍那泥婆𭜧泥二十九摩怛唎伽拏三十南無𭜧羯唎多耶三十一南無婆伽婆帝三十二多他伽跢俱囉耶三十三南無般頭摩俱囉耶三十四南無䟦闍囉俱囉耶三十五南無摩尼俱囉耶三十六南無伽闍俱囉耶三十七南無婆伽婆帝三十八帝唎茶輸囉西那三十九波囉訶囉拏囉闍耶四十跢他伽多耶四十一南無婆伽婆帝四十二南無阿彌多婆耶四十三跢他伽多耶四十四阿囉訶帝四十五三藐三菩陀耶四十六南無婆伽婆帝四十七阿芻耶四十八哆他伽多耶四十九阿囉訶帝五十三藐三菩陀耶五十一南無婆伽婆帝五十二沙闍耶俱嚧吠柱唎耶五十三般囉婆囉闍耶五十四跢他伽多耶五十五南無婆伽婆帝五十六三補師毖多五十七薩憐捺囉剌闍耶五十八跢他伽多耶五十九阿囉訶帝六十三藐三菩陀耶六十一南無婆伽婆帝六十二舍雞野母那曳六十三跢他伽多耶六十四阿囉訶帝六十五三藐三菩陀耶六十六南無婆伽婆帝六十七剌怛那雞都囉闍耶六十八跢他伽多耶六十九阿囉訶帝七十三藐三菩陀耶七十一帝瓢南無薩羯唎多七十二翳曇婆伽婆多七十三薩怛他伽都瑟尼釤七十四薩怛多般怛㘕七十五南無阿婆囉視躭七十六般囉帝楊岐囉七十七薩囉婆部多揭囉訶七十八尼羯囉訶揭迦囉訶尼七十九䟦囉毖地耶叱陀你八十阿迦囉密唎柱八十一般唎怛囉耶儜揭唎八十二薩囉婆槃陀那目叉尼八十三薩囉婆突瑟叱八十四突𭜧乏般那你伐囉尼八十五赭都囉失帝南八十六羯囉訶婆訶薩囉若闍八十七毗