如毗盧印執之則權衡在手殺活由己羣魔外道悉屬指揮是降魔須呪矣十方如來若依之憑之而乘此呪心便能坐蓮普應現佛身而滿國土十方如來若含此呪心如玉蘊山輝珠藏澤媚內秘德本外演顯教便於國土轉大法輪是現身說法惟呪矣十方如來若持此呪心其自果已成者能於十方為他人摩頂授記令其成佛若自果未成者亦於十方蒙佛授記自己成佛良以佛佛授手祖祖相傳唯此一物更無他物故是自他授記皆恃此呪矣十方如來若依仗此呪心如如意寶珠無適不可故能於十方拔濟羣苦自地獄以至大小諸橫同時解脫拔濟羣難自賊難以至飢渴貧窮應念銷散是救苦救難皆恃此呪矣十方如來若隨順此呪心能令四事具足及得他心故能於十方事善知識而四威儀中供養無不如意焉又能開心通達法要故恒沙會中皆推為大法王子而事師嗣法之用有能外此呪者乎十方如來若行此呪心或施之於事物或應之於日用令人心悅誠服故凡往劫與此呪有親有因者皆得攝而受之若小根劣器與此呪無緣聞之而驚怖者令之不生驚怖而攝親轉小之用有能外此呪者乎且也十方如來從初成道以至入涅槃皆因誦此呪心也十方如來滅後付法心心相印燈燈相續自正法以至末法皆以傳此呪心也可不謂始終全用者哉然則我說是佛頂光聚般怛囉呪者實諸佛之要用而要用元自無盡雖一日之間從旦至暮音聲不斷字句不疊以至經恒沙劫終不能盡所謂一字法門海墨書而不盡也抑此呪者即是經中所說之大佛頂耳尊勝無上可不至敬奉持與況汝等有學三果以前未出分段未盡輪迴若發心至誠欲取阿羅漢果乃不持此呪而空坐道場必定招魔往往發瘋發顛多見怖人媚人境界若謂不持呪而身心自遠魔事者無有是處汝修正定欲坐道場專持此呪可矣阿難若諸世界隨所國土所有眾生隨國所生樺皮貝葉紙素白㲲晝寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害此開許不誦而書帶也阿難若諸世界隨其國土所有眾生將本國所產或樺皮或貝葉或紙素或白氎書寫此呪於上而貯於香囊之中葢是人心昏不敏未能誦憶故但令書寫或帶於身上或書於宅中當知是人盡其有生之年一切諸毒皆不能害以此呪心如阿陀藥諸毒觸之無不銷散也書寫佩帶之益如此白氎紙類天竺所產有價值無量者阿難我今為汝更說此呪救護世間得大無畏成就眾生出世間智此詳申護生助道之神用也以前勸持中略說助道護生故此詳言之阿難我今為汝更說此呪有二功能一者救護世間眾生得大無畏即救世獲安寧也二者成就眾生出世間智即出世獲常住也若我滅後末世眾生有能自誦若教他誦當知如是持誦眾生火水能燒水不能溺大毒小毒所不能害如是乃至天龍鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神磣心毒人於如是人不能起惡頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護此釋救護世間得大無畏也何謂其能救護世間乎若我滅後末世眾生有能自誦此呪或教他人誦此呪者當知如是持呪之人火不能燒水不能溺大小毒皆不能害是惡緣不能成害矣如是乃至天龍鬼神精祇魔魅所有惡呪皆不能著是惡生不能加害矣即有強欲加毒者無奈此人呪力持成三昧而心得正受舉一切呪詛厭蠱毒藥以至萬物毒氣入此人口不但不能傷抑且化成甘露上味所謂攪長河為酥酪變大地作黃金是也且不惟惡不得加并起惡亦不可得凡一切惡星鬼神及磣毒之人當此人前惡自不起所謂睹德容而意銷望慈風而心化是也且不唯不能起惡而惡變為恩禍轉為祥自頻那夜迦諸惡鬼王并其眷屬以誦呪利彼皆領其深恩而常加守護焉可見吉凶禍福轉移在己而呪力之救護世間者亦云至矣阿難當知是呪常有八萬四千那由他恒河沙俱胝金剛藏王菩薩種族一一皆有諸金剛眾而為眷屬晝夜隨侍設有眾生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰暗也速催也發彼神識是人應時心能記憶八萬四千恒河沙劫周徧了知得無疑惑自此以下至悟無生忍皆釋成就眾生出世間智也何謂其能成就出世間乎阿難護世間災鬼神可以與力助出世道非深位菩薩不可當知是呪即是金剛寶覺故同聲相應同氣相求常有無數金剛藏王菩薩并其眷屬而晝夜隨侍焉設若眾生悠悠修行其心散亂未決定常住三摩地者但心憶此呪口持此呪是金剛王亦常隨彼以其非放逸穢惡之輩亦呪心之所在故也而況乎決定發菩提心者而又持呪其隨侍當何如乎且不特隨侍而已菩薩心精與行人心精元自通脗一體況兼以呪力吾知此金剛藏王必以精心暗催行人而發其神識使是人應時心開能記憶八萬四千恒河沙劫之事決洞三世了知無疑而宿命先通焉若不先發通明則隔陰多昏豈能長劫脫惡生勝以至證果乎從第一劫乃至後身生生不生藥叉羅剎及富單那迦吒富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處此明不墮惡趣也是人以呪力故既得宿命通已從第一劫初發菩提心時乃至後身因滿降生成佛之日中間修行永無諸委曲相生生不生藥叉羅剎以至有想無想如是惡處以此呪心是白淨法是最上善故諸趣不能染也是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處此明不生下賤也是善男子於此呪心或對本而讀或背本而誦或圖印而若書若寫或密佩而若帶若藏以此諸色供養則劫劫不生貧窮下賤不可樂處以此呪心是至尊至貴之法如太子處胎貴壓羣臣也此諸眾生縱其自身不作福業十方如來所有功德悉與此人由是得於恒河沙阿僧祇不可說不可說劫常與諸佛同生一處無量功德如惡叉聚同處薰修永無分散是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒此明現獲功德也此諸持呪眾生縱其自身不作福業如來功德悉與此人由此呪心具足萬行一切如來密圓淨玅悉現其中也由前佛錫功德又感未來劫中常與諸佛同生一處葢與諸佛氣分交接心精通脗佛不離心心不離佛也既常隨佛凡佛功德一一有分行人之所修即諸佛之所證打成一片如惡叉聚親炙薰染長劫而不離也不特此也又能令破戒之人戒根清淨以呪心如靈丹一粒點鐵成金也未得戒者令其得戒呪心具戒根也未精進者令得精進呪心具進根也無智慧者令得智慧呪心具慧根也不清淨者速得清淨呪心具淨根也乃至人有宿障屢欲齋戒不得成就呪能成之或業礙地礙及無師無壇不得齋戒許但持呪同於齋戒也阿難是善男子持此呪時設犯禁戒於未受時受即持也未受即未持呪時也持呪之後眾破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也若造五逆無間重罪及諸比丘比丘尼四棄八棄四棄即殺盜淫妄四根本重罪犯此者永棄佛法之外梵語所謂波羅夷罪也比丘尼復如四棄謂觸八覆隨也誦此呪已如是重罪猶如猛風吹散沙聚悉皆滅除更無毫髮此明現滅罪業也阿難是善男子但能持此呪時設犯禁戒於未持之先者既持之後無論破戒輕重一時銷滅但罪既銷滅不可更造矣又未持之前縱經飲酒噉辛種種不淨者一持此呪則諸佛菩薩等亦不以為過或真慈開許不能具齋戒者亦聽持之雖然須是真能拳拳服膺永無忘失方說得酒肉不礙菩提路也不特此也設行人清貧不備雖著不淨破弊衣服一行一住悉同清淨人清淨處所持功德若富饒者又不在此例矣又前之壇法極難全備縱不作壇不入道場行道而一持此呪即是常住大定真寂滅場地猶愈於徒有壇相而不具定心者故還同入壇行道功德無有異也又在家人若造五逆無間重罪及出家比丘比丘尼所犯四棄八棄皆罪業之不可懺者然誦此呪已如是重業如猛風吹沙滅除殆盡更無毫髮少留然未持以前所犯可仗呪力滅除非謂持呪無畏可以肆犯此惡也阿難若有眾生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園舘如是積業猶湯消雪此滅過去業也阿難若有眾生從無量無數劫來所造一切輕重罪障前世未及懺悔若能或讀或誦或書寫此呪身上帶持或安置身所住處莊宅園舘之間如是歷生積業如湯銷雪豈難滅耶所謂千年暗室一燈能破也不久皆得悟無生忍此結前成就眾生出世間智也持呪之力既能為人生善又能對治破惡故行人不久皆得悟無生忍得此忍後罪福皆空聖凡情盡可以魔佛一如徧涉苦惡諸趣而無礙無擇斯為助道之成功矣詳前發通乃是定心成就所發今悟無生乃是慧心成就所發應知後位深於前位也若準圓教初住便證此忍若準別教當在十地以上也按六科前四即為人生善悉檀也第五對治破惡悉檀也今此科第一義入理悉檀也而前之救難後之應求乃世界歡喜悉檀也復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿此應是福利果報也身命色力亦復如是此是長命中復兼總明不衰百體康徤也命終之後隨願往生十方國土必定不生邊地下賤何況雜形此明所求如意也復次阿難云云何況雜形夫海寶千般先求如意以此呪心是如意珠取之無禁用之不竭故生時隨心自在而命終時亦得隨願往生也阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬪諍兼餘一切厄難之地寫此神呪安城四門并諸支提即招提此云何供養處或脫闍幢也上令其國土所有眾生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安置也所居宅地一切災厄悉皆銷滅此顯國界安寧也阿難若諸國土云云悉皆銷滅以此呪心是鎮國寶非和氏之璧照乘之珠所能並也阿難在在處處國土眾生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂此顯民和歲豐也阿難云云安樂以此呪心是四時宗萬象主故雨暘時若如莊生所云其神凝使民不疵癘而年穀熟也然亦須舉國敬信方獲靈通譬持呪者多久方靈暫時豈能速効若也呪雖徧有而束之高閣曾無敬禮或更寘於猥褻之地塵穢不收而責其無驗者亦惑之甚也亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎻不著其身晝夜安眠常無惡夢阿難是娑婆界有八萬四千災變惡星二十八大惡星即二十八宿也而為上首復有八大惡星以為其主八星即五行及羅計孛也作種種形出現世間能生眾生種種災異有此呪地悉皆消滅十二由旬成結界地諸惡災祥永不能入此顯轉凶為吉也亦復能鎮云云永不能入以變怪災障等皆是同分妄業所感呪力叶乎百順故惡變悉滅於天災祥不入其境也此方世主出一善言而熒惑退舍況無上佛頂呪心乎是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安穩更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及眾中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語此結勸當持也夫呪力之大如此是故如來宣示此呪凡以於未來世保護初學修行人如得護身之符使之安安穩穩入三摩地而更無一切魔害鬼害及冤業舊債之惱害焉然則汝及眾中有學及末世行人若依我壇場不犯四過一壇不差二戒不缺三師不穢四無疑悔者我知其現身即證所謂不歷僧祇獲法身矣若謂是善男子如是修行而於父母所生現在之身不得明心見性豁然心通者則十方如來便是說謊欺人為大妄語矣而如來豈有妄語者哉說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誠心保護如是修菩提者修菩提以持呪修耳根圓通為上後倣此此金剛乃現具執金剛身不同後之菩薩也爾時梵王并天帝釋四大天王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願此上兩天統尊眾也復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿此上八部統尊眾也復有無量日月天子風師雲師雨師雷師并電伯等年歲巡官即四值功曹之類諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏此上照臨主宰眾也復有無量山神海神一切土地水陸空行萬物精祇并風神王以舜若多主空神也其形如風無色界天無業果色皆無形類也仗佛威光暫現耳於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事此上地祇天神眾也此明外眾護持也以此呪是毗盧心印故凡所有處百靈守護又如大將兵符符到令行自然遵守也爾時八萬四千那由他恒河沙俱胝金剛藏王菩薩證究竟堅固之理故稱金剛秘跡護持故稱藏慈威尊勝折攝並行故稱王菩薩是其常儀降魔則現持杵忿怒之相也在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒眾常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者彼指諸小鬼神既能發心好禪彼亦自護行人故不驅除而許令親近此外則不許矣世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恒令此人所作如願此明內聖護持也首楞嚴王亦名金剛三昧故金剛藏王常加冥護故知末世修行縱有金剛斷惑之智若無金剛藏王冥加護助亦不能成也此中修行有正有助若利根人即從耳根一門正修足矣若根器稍劣必須入壇持呪為助行方得成就故持戒道場持呪皆為助行也此一大科其於經題四實法中正屬修證了義說三摩提令依玅心一門深入已竟初科中修道分竟此下舊判為證道分乃答阿難玅禪那之請也葢解行雙行須知位次若不識知位次恐行人虗擬聖階便同佛境而不知有淺深次第故前之耳根圓通如得門而入此如升堂入室以盡其奧耳阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正薰修身心快然獲大饒益世尊如是修證佛三摩地此當直接至何漸次二句未到涅槃云何名為乾慧之地四十四心乾慧信前一位也信住行向及加行名四十四心也至何漸次得修行自漸次者即最初乾慧之前三漸次也此二句當在三摩地之下詣何方所名入地中云何名為等覺菩薩作是語已五體投地大眾一心佇佛慈音瞪瞢瞻仰此請修證位次也阿難即從座起頂禮佛足而白佛言我輩愚鈍愚則難明鈍則難斷況耽強記好為多聞而於微細煩惱住地深惑未求出離蒙佛慈誨選根及加行二門正助分明進修無惑故得身心快然獲大饒益世尊如是修證三摩地者其始也用何漸次發足修行當涅槃尚遙云何名為乾慧之地四十四心詣何方所名入十地之中云何名為等覺菩薩窮極因位望世尊一一為我言之作是語已五體投地云云瞻仰焉阿難至此雖已得知還家道路從脚跟下起然不知到家有幾許程途故問自始至終幾何階級此如遠行人問途經也若遠行人不得途經不知里數則中途告倦止息化城認為寶所故必得其途經明其里數則不滯中途直造如來大涅槃矣阿難但問修證地位而下文如來先明覺性次辨迷妄後示漸次者葢玅性圓明本無修證因有迷妄而滅妄還真始有修證地位耳爾時世尊讚阿難言善哉善哉汝等乃能普為大眾及諸末世一切眾生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝說阿難大眾合掌刳心默然受教此許說也爾時世尊讚阿難言哉善善哉汝等乃能普為現在大眾及未來末世一切眾生修三摩提求大乘者起於凡夫終於涅槃請我預先揭示正修行路使之從始至終直超寶所更無委曲此甚盛心也汝今諦聽吾當為汝說矣於是阿難大眾合掌虗心默然受教焉佛言阿難當知玅性圓明離諸名相本來無有世界眾生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號阿難汝今欲修真三摩地直詣如來大涅槃者先當識此眾生世界二顛倒因顛倒不生斯則如來真三摩地此先標二種顛倒也佛既許說乃言阿難當知此玅真如性統眾德而大備之謂圓爍羣昏而獨照之謂明既圓且明純是無上知覺名言未彰義相未涉故離諸名相彼世界眾生不過名相中實法玅性既離名絕相故本來無有世界眾生由最初一念不覺妄動遂有生相無明因生相而復起住異滅相惟其有生有滅所以稱之為妄若滅此生滅之妄即名為真此實果也約名真二字是稱如來無上菩提約滅妄二字是稱大涅槃菩提轉煩惱而成涅槃轉生死而是故曰二轉依號此果名也若論真如玅性不惟無世界眾生亦且無菩提涅槃秪以此心不守自性隨迷悟之緣成聖凡之事如金隨工匠緣成時轉作指鐶指鐶隨爐火緣壞時即復為金成壞展轉但是一金更無差別如來藏心亦復如是但隨染緣時迷作阿賴耶隨淨緣時悟成如來藏展轉唯是一心畢竟無別是故若識無始即法性為無明若知今日即無明為法性所以二種轉依果當在二種顛倒因中求也阿難汝今欲修耳門圓通真三摩地從果前諸位直詣如來大涅槃者先當識此眾生世界二種顛倒之因以此二種顛倒不生處即是如來真三摩地前云狂心自歇歇即菩提正謂此也故知凡聖二途皆由生滅迷悟而立真如門中實無是事矣阿難云何名為眾生顛倒眾生二字當是二種兩字之訛阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸眾生此總標無明薰真如成其染用為二種顛倒因也阿難云何名為二種顛倒阿難由性明心本覺真體不守自性通真通妄而性明圓故由其不守自性故因妄明而發妄性即業識也因妄性而生妄見即見分也於是從畢竟無相之真成究竟有相之妄即相分也總緣本覺體上一念妄動而有無明因無明而轉成業識因業識而有見分因見分而有根身器界所謂無同異中熾然成異矣然此三細皆從無中突然而起故此能有之無明與彼所有之眾生世界本無有因為彼所生之因亦非有住為彼所住之處如空中華如睡時夢詰之無根覓之無本即本此無住之無明遂爾建立世界眾生二種顛倒故知眾生世界總由無明薰變而有由無明與見思互起故有眾生顛倒由無明與根塵交涉故有世界顛倒耳性明圓圓字乃流動之意即隨緣也迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明薰已成業同業相感因有感業相滅相生由是故有眾生顛倒若依本文云何名為眾生顛倒由是故有眾生顛倒一呼一應中間雖有建立世界句乃帶說也此別明眾生顛倒由見思而起也夫約隨緣故謂之性明圓約不變故謂之本圓明妄業不能虧曰本圓妄惑不能蔽曰本明眾生所以稱顛倒者良以迷此本圓明體一念妄動遂轉此圓明之體而成虗妄此虗妄性元從最初生相無明生起非實有體亦非實有所依之處可見真不變而妄本空矣妄既本空則妄無可離真既不變則真無可復今欲將此無明復歸元真即此欲真一念便屬妄想已非真真如性以其於無可離者而欲強離於無可復者而欲強復故也且也既知其非真如性矣而尚求復不已則是從迷積迷何由得見本來面目但見滿目塵勞宛成虗妄之非相耳由是復起見思二惑非生也而非因計因非住也而非果計果非心也而墮於邪智非法也而落於邪境邪因邪果邪智邪境互相引發故展轉發生由此見思二惑發生力勝薰成業相業同則聚聚久不無順逆二事互相感動其心如以順事相感動者則成恩愛不捨之業種以逆事相感動者則成冤恨不捨之業種以冤恨聚者則相滅以恩愛聚者則相生由是二惑二業之故則有業繫苦相遷流不住輪轉不息而眾生顛倒所由來矣洞山云學得佛邊佛猶是錯用心此即欲真已非真真如性非真求復宛成非相之意迷本圓明四句指凡夫顛倒也將欲復真以下指外道顛倒也凡夫從非有成有外道從非真復真凡外不同顛倒則一阿難云何名為世界顛倒是有無明所有眾生分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化眾生成十二類是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世界聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生溼生化生有色無色有想無想若非有色若非無色若非有想若非無想此別釋世界顛倒由根塵而起也世界本來清淨何有顛倒悉由眾生顛倒織妄相成成十二類故世界亦成顛倒耳此則世界顛倒基乎眾生故大經云眾生無法器世界成雜染此之謂也阿難云何名為世界顛倒是能有之無明與所有之眾生因有分段根身建立有情界限此界之名所由立也本無有因為彼所生之因亦無有處為彼所住之處皆由念念遷流遂成三世此世之名所由立也世有三世界有四方以三涉四以四涉三和合相涉宛轉皆成十二故變化眾生亦應其數而成十二類焉是故世界皆因眾生一念妄動而內根外塵無前無後一時具足且以六塵言之凡物一動必有聲有聲處必有色有色處必有氣有氣處必可齅而觸有觸處便有其味有味處即知其為何物知即意根也法即法塵也塵既如此根亦宜然由此見聞覺知六亂妄想成造業之性故於是眼取色耳取聲鼻取香舌取味身取觸意取法六根六塵十二區分相織而成輪轉故一根一塵現造一業而餘根餘塵亦皆冥伏所以舉一根而六根具在舉一塵而六塵齊彰是故世間聲香味觸等塵與眼耳鼻舌等根窮十二變而為一周旋往復能造根塵既具十二故所造眾生乘此根塵旋復輪轉顛倒之相亦具十二類而有世界焉十二維何卵生胎生溼生化生有色無色有想無想非有色非無色非有想非無想是已胎卵二種與有色有想非無色非無想迷見分居多而生者也溼化二種與無色無想非有色非有想迷相分居多而生者也又眾生顛倒是眾生之別業見所獨故世界顛倒是眾生之共業相所共故若破我執證人空斷分段生死而證有餘涅槃則眾生顛倒始息矣若破法執證法空斷變易生死而證無餘涅槃則世界顛倒始空矣故曰顛倒不生斯則如來真三摩地也此論世界顛倒惟因此界立因此世成確指世界其餘直至卷末雖多世界字眼而十二類生皆極論眾生不可混作世界隨文總會不必強為分別也阿難由因世界虗妄輪迴動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍此云凝滑即胎中第一位也流轉國土魚鳥龜蛇其類充塞此下別列類生而此明卵生因果也阿難何謂卵生依殻而生曰卵卵惟想生虗妄即想也由因世界虗妄輪迴迷不動之真體而忽然妄動於是俛仰天地忽上忽下忽起忽滅僨驕而不可制非顛倒乎本此動顛倒故以氣而交和合氣成八萬四千飛沉亂想以應八萬四千煩惱感變此能造之因也如是故有卵羯邏藍位生生死死流轉於國土之中為魚為鳥為龜為蛇其類充塞此所造之果也至若魚化為鳥蛇化為龜忽然忘游泳之態而得飛鳴之體倐然忘屈曲之狀而得蹣跚之質乃至鶴鶴相唳鶃鶃相視其類不可勝窮而孰非顛倒之所致哉由因世界雜染輪迴欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒲曇此云疱即胎中第二位也流轉國土人畜龍仙其類充塞此明胎生因果也何謂胎生含藏而出曰胎胎因情有雜染即情也由因世界迷此性淨明體而忽墮情塵渾濁真性雜染輪迴情生於愛名欲顛倒胎以精交名和合滋成情有偏正偏則橫正則竪名八萬四千橫竪亂想此能造之因也如是故有胎遏蒲曇位流轉國土為人為畜為龍為仙其類充塞人仙竪也龍畜橫也此所造之果也總一顛倒而已由因世界執著輪迴趣顛倒故和合煖成八萬四千翻覆亂想如是故有溼相蔽尸此云軟肉溼生初相也既不入胎故無前二位矣流轉國土含蠢蠕動其類充塞此明溼生因果也何謂溼生假潤而生曰溼溼以合感執著即合也由因世界不知無住真心如摩尼珠隨色現色本無定形而逐境奔風趨時附勢執著輪迴趣顛倒故於是和合煖成如人情盡向熱閙處趨去所趣無定如翻手作雲覆手作雨名為八萬四千翻覆亂想如是故有溼相蔽尸位為含蠢為蠕動如醯鷄蠛之類其類充塞唯其平生不配道義事事皆餒無丈夫氣故感此蠢然無知之報也由因世界變易輪迴假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南羯南此云硬肉以蛻即成體無軟相也自下皆稱羯南者葢第五鉢羅奢佉曰成形則各隨相貌非通稱也流轉國土轉蛻飛行其類充塞此明化生因果也何謂化生無而忽有曰化化以離應變易即離也由因世界倐敬倐怠忽喜忽怒朝三暮四變易輪迴不知真主人公隨緣不變不變隨緣而反面是背非口憇心苦假顛倒故如此假人觸處變其所守厭故喜新好丹非素和合觸成八萬四千新故亂想如是故有化相羯南流轉國土脫故趣新為轉蛻飛行如化為蛤轉飛為沉𧏙螂化蟬蠶化為蝶轉行為飛不同形而相禪其類充塞唯其生平毫無操守觸處生變故感此果也問經云地獄及諸天一一皆化生此專指轉蛻之類何也答化生染處名和合觸成天染處地獄聞腥皆轉托業化非意生玅化故可於轉蛻飛行中攝也由因世界留礙輪迴障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞此明有色因果也何謂有色由因世界不知自性具有大智慧光周徧法界本無留礙而反事水火日月以求明因明立所遂成障礙不得圓通非顛倒乎棄自己無盡之光明而反認昭昭靈靈者以為極則事於是和合著成八萬四千精糴亂想所謂弄精魂者是也以如是之因故有色相羯南流轉國土在天為日月星辰吉者為休凶者為咎以至一切精明神物微及爝光蚌光其類充塞無非障顛倒所受之報而已色界諸天皆坐於此以諸天皆有隨身光明故又涅槃經云八十神皆因留礙想元成此精耀故雖至精至神亦未離乎乘彼輪轉顛倒相也由因世界銷散輪迴惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沉其類充塞此明無色因果也何謂無色由因世界厭有著空滅身歸無名銷散輪迴迷有漏天作無為解為惑顛倒厭有歸無則依晦昧空故和合暗成八萬四千陰隱亂想所謂昏昏默默杳杳冥冥是也以如是之因故有無色羯南流轉國土為空虗散漫即無色界天為銷磨沈沒即主空神其類充塞無非惑顛倒所受之果而已問有想無色不成業體憑何亦稱羯南答雖無業體不妨業繫有生故亦稱羯南取義而稱也由因世界罔象輪迴影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞此明有想因果也何謂有想由因世界邪慕靈通逐影憶想依稀似是彷彿不真名罔象輪迴執影而遺真為影顛倒旦夕撮心懸在一處故和合憶成八萬四千潛結亂想如云道之為物恍恍忽忽皆見其影而未真見本來面目又云綿綿若存用之不勤惟用之愈久故愈結而不散是也以如是之因故有想相羯南流轉國土為鬼神精靈無有實色但有想相皆因錯亂修習得其影而不得其真故雖具五通未得漏盡其類充塞無非影顛倒所受之果而已由因世界愚鈍輪迴癡顛倒故和合頑成八萬四千枯槁亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞此明無想因果也何謂無想由因世界不知自性本來圓活在眼能見在耳能聞如日中寶石色無定形似水上葫蘆不可按捺而勉強抑伏如壓石草如夾冰魚謂之魂不散的死屍豈非愚鈍輪迴而成癡顛倒者乎以此癡顛倒故和合頑成八萬四千枯槁亂想所謂隳肢體黜聰明而成寒灰槁木絕無煖氣是也以如是之因故有無想羯南流轉國土由其不了諦理固守愚癡癡鈍之極其精神化為土木金石如華表生精黃頭化石之類其類充塞無非癡顛倒所受之果而已以上有色無色有想無想皆是修行而不得其真者故派成四類蓮師曰枯槁則無想矣又曰亂想者何也葢枯槁如草乍枯根本未絕時至復生故土木金石以頑定力而成頑物故遇緣觸情生依舊流轉也由因世界相待輪迴偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以鰕為目其類充塞此明非有色因果也何謂非有色由因世界不知自性不與諸塵作對萬法為侶卓然立於物先而反恃他人以為己力待物成用為相待輪迴迷失天真綿著浮偽為偽顛倒沾染勢力資藉聲名為和合染成八萬四千因依亂想如狐假虎威客行主令之類是也以如是之因故所感之果本非有色而待物成色以非有色相成色羯南流轉國土如水母以水沫為體以鰕為目乃至一切依草附木諸鬼神等以及身中八萬四千戶蟲其類充塞而偽顛倒之趣苦矣此下四生妄之甚者溫陵所謂迷情愈妄化理轉乖也由因世界相引輪迴性顛倒故和合呪成八萬四千呼召亂想如是故有非無色相無色羯南流轉國土呪詛厭生其類充塞此明非無色因果也何謂非無色由因世界不知自性具有恒沙稱性功德不能引之發生反以邪語邪業熏習引誘而易其性以是相引輪迴性顛倒故和合呪成八萬四千呼召亂想若今之書符捻訣呼神召鬼之類是也以如是之因故所感之果本非無色相而又成無色羯南以呼召則有故非無色不召則無故無色如是流輪國土為呪詛厭生若樟柳木人以呪力故說吉報凶之類其類充塞此由因中呼召鬼神故果上為人呼召也而性顛性之趣苦矣世間別有一種邪神邪鬼聽人驅役若夫正神非至誠至德則不能感豈妄人所能呼召哉以上二種皆合之變也由因世界合妄輪迴罔顛倒故和合易成八萬四千迴互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞此明非有想因果也何謂非有想由因世界不知真君是最親之物而反背之乃以非己親而強以為親非己子而強以為子非己物而強以為物實離而強合謂之妄合輪迴二妄相合性情罔昧謂之罔顛倒於是和合異成八萬四千迴互亂想謂迴他人之所有而互為己有也以如是之因故所感之果非有想相成想羯南葢他人之物本無心與我故曰非有想而我強而有之乃成我想故曰成想如彼蒲盧本為桑蟲非有蜂想而卒成蜂想異質相成其類充塞良以因中好為誣罔取他物納為己有故果中亦被他物取為己有也而罔顛倒之趣不更苦乎由因世界怨害輪迴殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞此明非無想因果也何謂非無想由因世界不知一切眾生同為一體皆是先世父母親戚眷屬由昏昧故互相食噉作諸怨對謂之怨害輪迴冤殺相尋為殺顛倒於是和各怪成八萬四千食父母想謂父母愛子無所不至欲報之恩昊天罔極今反忘至恩至愛而害之食之此誠不忍願聞是天下極怪異事也以如是之因故所感之果非無想相無想羯南葢推論此生原為懷冤圖報而來故曰非無想而事出意想之外故又曰無想如是流轉國土如土梟附土塊為兒破鏡以毒樹果為子其子長成父母皆遭其食其類充塞良以因中蒙人至恩至愛而反負恩仇害故被冤對來酧雖子而實冤也而殺顛倒之趣不更苦乎按史記孝武本紀祠黃帝用一梟破鏡孟康云梟鳥名食母破鏡獸名食父黃帝欲絕其類故百祀皆用之破鏡如貙而虎眼今云鳥者恐譯人之誤也以上二種是離之變也鍾云怨害非止尋常之怨也葢施恩負恩恨入骨髓殺顛倒者向來施恩因緣至此全成殺機矣怪謂怪異之境如毒樹果之類也冤恨既深故觸著怪境托為生緣遂起父母可食之想而不覺身入塊果中矣本有食父母想故曰非無想相又託生在塊果中故曰無想嗟乎此何等事而有是想此何等想而有八萬四千之多窮其起處只是怨害為因而已怨毒之於人甚矣哉吾輩慎勿令人怨亦慎勿怨人也
