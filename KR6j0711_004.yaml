body:
  text: 巴縣居士非眼劉道開纂述成都沙門離指方示鑒訂此下審除細惑說後二如來藏因阿難偈云希更審除微細惑故向下所談乃生妄之深源成礙之幽本也後二藏者謂不空如來藏與空不空如來藏也爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷衍如來第一義諦世尊常推說法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所說法音尚紓疑悔世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始又如來說地水火風本性圓融周遍法界湛然常住世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界而我不知是義攸往惟願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨此滿慈因聞四科七大皆是如來藏性故執性難相以興二問也滿慈位登無學已斷見思已破我執已證人空然無明未破法執猶存不達全相是性不知萬法生起之源未明全性是相不知七大遍周之故故乘機發問然必待滿慈者蓋阿難以多聞居首滿慈以說法居先皆以義虎稱雄故也大威德者有折服之勇曰威有攝受之慈曰德上契至理下契劣機故曰善為敷衍談一諦而三諦具足且諦諦文文皆越小乘見解故號第一義諦也爾時富樓那彌多羅尼子在大衆中即從云云恭敬而白佛言大威德世尊如四科七大藏性遍周此皆如來自證法門極難措口而如來曲狥人情頭頭顯露善為衆生敷衍第一義諦然此第一義諦理極玄微絶難搆副即世尊推我說法人中最為第一今聞如來微妙法音喻如聾人逾百步外而聆蚊蚋抑且本所不見又誰能聞其聲乎則甚矣法音之微妙也所以佛雖宣明此法令我除惑然我今猶未詳斯義畢竟不能入於無疑無惑之地世尊且阿難輩雖得開悟然而根中積生無始虗習宛然盡在習漏既存則我法二執中俱生細惑依然未破且不獨阿難即我等會中已證無學已登無漏者諸漏雖盡今聞法音尚紓疑悔舊修已悔新聞尚疑故疑悔交集未決定矣我等猶然況未得無漏者乎是故我有二疑願因如來決之一者萬法生續疑世尊如佛所談世間一切根塵陰處界等皆如來藏清淨本然者既曰清淨即不得更容穢染既曰本然即不得更有造作請問清淨本然最初何故忽生山河大地及根身業果諸有為相耶抑清淨本然縱使忽生亦應忽滅未後緣何次第遷流終而復始相續不斷耶二者五大圓融疑又如來說地水火風等圓融周遍湛然常住者世尊若地性周遍應純是地土能尅水云何又容有水若水性周遍應純是水水能尅火火應不生云何又說水火二性俱遍虗空而不相凌滅耶世尊又如地性則障礙矣空性則虗通矣礙則不通通則不礙云何二者俱稱周遍耶地水難容水火難容地空難容而如來皆稱圓融周遍其何以說也雖如來自有實義而我不知是義所歸惟願如來宣流大慈說出生續之由圓融之故庶使迷雲頓破慧日洞明方到究竟無疑惑地矣作是語已及諸大衆五體投地欽渴如來無上慈誨焉鍾疏云問清淨本然云何忽生山河大地經文以為妄想所生不知山河大地未生之前妄想者何人莫將宗門套頭語答答云此忽生之義略兼見分說意謂清淨本然人人有清淨心宜人人得清淨眼猶如晴空了無所有云何滿目都是山河大地諸有為相所見惟根身器界如是則空華圓影何時而盡別業同分何時而除故緊接云次第遷流終而復始細玩問意四句一氣不斷遷流終始即下相續之義滿慈所問不重在始生而在相續故下文佛語世界相續業果相續乃正答遷流終始之問而忽生處特帶言之耳世人泥忽生二字為始生之生不將前後文合看為相續之生是以不能措口如僧問溈山山河大地從何而生答云從妄想生僧云請和尚與某甲想出一錠金來看正此類也爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處汝今諦聽當為汝說富樓那等欽佛法音默然承聽此許說也勝義中真勝義性者法相宗說勝義有四一蘊處界為世間勝義四諦為道理勝義二空真如為證得勝義一真法界為勝義勝義據佛後文答萬法生續則起於性本二覺答五大圓融則歸於一心三藏宛然皆一真法界故屬最後勝義也漏盡無學中根也定性聲聞下根也未得二空回向上乘者上根也二空者人空法空得人空者知衆生無性得法空者知諸法無性也一乘佛乘也寂滅場地即大寂滅海也阿練若此云離喧諍亦云間靜處也爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢云如來今日普為此會宣勝義中真勝義性令汝會中自定性聲聞之下根以及未得二空回向上乘之上根如是等衆皆獲一乘非羊鹿餘乘也寂滅場地非四諦之滅也真阿練若本心間靜非境靜也正修行處成佛正因非旁蹊曲徑也蓋定性聲聞無性闡提不得成佛如蕉芽敗種今則咸歸一乘究竟涅槃悉當作佛方盡大乘至極之談矣汝今諦聽當為汝說於是富樓那等欽佛法音默然承聽焉此下說不空藏以示生續之由也對上空藏彼約心真如門會妄歸真以顯藏心不變之體此約心生滅門從真起妄以顯藏心隨緣之用然用應有二一隨染緣起六凡用二隨淨緣起四聖用今為開迷成悟故且單取染用為言而全用更在下空不空藏中也佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣說性覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣說斯義佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性此下答忽生山河大地之問也尊者置箇問端如向荊𣗥林中探出膠盆子相似使人動轉不得世尊是一切智人知尊者抱守因緣未忘法執即將舊所說法作箇探竿影草而詰之曰富樓那如汝所言清淨云云大地善哉問也憶我向來在法會中所說性覺妙明本覺明妙汝常不聞之乎妙即寂也明即照也妙明則即寂而照明妙則即照而寂寂照互融無明萬法之先一段真理本然如此滿慈被世尊一釣便上答云我常聞佛宣說斯義不知鼻孔已在世尊手裏故復雙開兩關以審之曰汝既聞此性覺妙明本覺明妙如何意會為是性本自明單稱為覺即含明意耶為是覺本不明須用加明於覺而雙稱明覺耶蓋單稱為覺不假妄明是為真覺雙稱明覺而務假妄明是為妄覺雙舉致問欲令滿慈自決取舍乃尊者熟處難忘依舊渾身落在因緣知見坑中不覺認明墮所故曰若此不用明之而即稱為覺則虗名為覺而實暗然無所明矣此蓋詞中反排無所明之真覺而意中深取有所明之妄覺也豈知才立所明便落生滅因緣知見即非清淨本然之覺性矣故世尊告之曰推汝之意將謂若無所明則無明覺殆惟恐其無明覺而必加明於覺也而不知一加所明則覺明二義皆雙失矣良以體外加明非體本有有生有滅時有時無由是約起心有所明時明則非覺以加明於覺非覺體之本有故也約忘心無所明時覺則非明以從來未悟覺體之本明故也此猶所謂有念無念同歸迷悶之意也既非覺非明二義俱失全墮無明汝豈以無明為汝之覺湛明性哉而無明又非覺湛明性蓋無明即是不覺惟濁惟暗而安有湛明之義是汝始雖惟恐失乎明覺而終則至於全失真性全墮無明矣覺上加明如人瞪目欲自見眼本不期於空華其奈眼非可見而徒以帶出空華耳此方在明明德全墮斯義鍾云性覺妙明本覺明妙言性中之覺妙而明者以此覺乃本然之覺其明自妙耳本字即首卷元明元字乃不能有加之意所謂清淨本然也與性字相承而不相對夫明而至於妙矣又何假復明之乎舊解即寂而照曰妙明即照而寂曰明妙蓮師曰明可云照妙乃圓融不測之義不專屬寂謂妙明二字寂照之意自在則可謂寂照二字即是妙明則不可也真妄分界正在此一所字有所則是明非覺無所則是覺非明明覺兩字矯亂不得然真覺只是無所不是無明若並無本明又非覺湛明性矣性覺必明妄為明覺覺非所明因明立所所既妄立生汝妄能無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異此因無明而生三細也上既斥為全體無明由是承上而言汝於本具真覺翻成無明者元無他故正以本性之覺必具本有之明所謂性覺必明也汝乃無故妄加明於覺上所謂妄為明覺也由是遂成根本無明萬妄依之而託始故知明覺二字便是生世界衆生業果之根柢矣夫此性覺妙明清淨本然之體本不屬所以無在而無不在故亦不屬明以無明而無不明故故曰覺非所明今汝在清淨性覺中認此性覺以為必明即此必明一念遂將無方所之性覺轉成業識便落方所故曰因明立所既落方所復轉此大智慧光明而成能見見分故曰所既妄立生汝妄能既有見分復將無同無異真諦理境轉成相分遂有種種差別故曰無同異中熾然成異此熾然成異之異與彼因明立所之所異又異以立所之異是約一念此熾然之異所談甚廣也於是有因異而立同即同亦異有因同異而復立無同無異即無同無異亦異而世界虗空衆生恍惚未定之相皆影現於此與彼粗境中三法作胚胎矣無同無異屬衆生相良以虗空為同此倣佛有形貌差別不同虗空故曰無同器界為異此倣佛有運動靈覺不同器界故曰無異然必同異發明者以上異之與同相形而顯此衆生之境不同上之二境也問既即世界虗空衆生與下粗境何所差別答此尚在本識中結暗忽現雖現一切境界但具根身器界種子耳即如熾然訓火光盛貌雖表顯著然火光但明於夜亦表暗中顯著以此境界雖顯尚在本識中未大顯著故如火光明於暗夜之中也鍾云不知覺本自明而妄加一明於覺之上只此明字便生出許多事來此中能所先後說者紛紛不知妄為明覺已是妄能矣上既因能立所此復因所生能乃展轉相生之意非先有所後有能也無同異以下皆承生汝妄能來本性之覺無同異也能所既立則無同異中熾然成異矣異彼所異是因異又立同也同異互相是非復立無同無異矣此中同異及無同無異俱指賴耶識中種種妄明下文虗空世界衆生乃妄明所現之相舊注便以虗空世界衆生釋此處異同殊太早了如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱起為世界靜成虗空虗空為同世界為異彼無同異真有為法此因三細而生六粗確答云何忽生之問也上來如是境界從無而有則有無相傾因異立同則同異互顯既而復以一異一同之界相顯發非同非異之有情於是藏識海中境風亂動已如空華亂飛豈不甚擾亂哉如是擾亂相為緣對轉生勞慮謂於前現識所現相為不了心現執為外境創起量數分別染淨所謂分別事識起成智相為第一粗也勞之既久相續不斷轉生苦樂覺受自他相續法執轉粗即相續相為第二粗也因勞久而發起染著之相取著轉深計我我所等即著取相為第三粗也依於妄執分別假名言相此等皆是自相渾濁非由外物渾之濁之此即計名字相為第四粗也由是依於名字循名取著造種種業引起八萬四千塵勞煩惱即起業相為第五粗也於是業繫苦相為第六粗者以次而生由依性覺而動無明因無明而發心境緣心境而起塵勞等業力所使起成有相處則山河大地確然而成定相靜而無相處則空濶曠蕩顯然而見頑虗此虗空即前同相至此而始確定也此世界即前異相至此而始成就也汝問云何忽生山河大地實由如是而生也且彼細境中無同無異之相至是而顯然確定以成衆生業果真有為法矣汝問云何忽生諸有為相實由如是而生也鍾云自相渾濁即後文從始至終五疊渾濁也因世界衆生而有業果故曰由是引起塵勞煩惱蓋至此而晴空之中別見種種華相矣然而詰其根元總是妄明一念所生耳一念中紛起者為世界一念中晦昧者成虗空虗空為妄明中所現同相世界為妄明中所現異相衆生業果諸有為法即妄明中所現無同無異之相彼所謂無同無異者乃真有為法也豈待衆生業果熾然頓興之日而後謂之有為哉舊以衆生為無同無異文理難通今作妄想所現之相如影子一般則虗活說得去矣佛言業識妄見生於無明必從性覺妙明本覺明妙說來者二語即所謂真如見無明依真如而起非真如之外有無明也此種無明所謂生相無明八地菩薩得隨分覺者尚不能知故謂之微細惑唯佛能以究竟覺微密觀照乃能洞見而直指之此之謂見見謂覺眚也經自無明以至粗境多用能所上下連持者令知能所乃生萬有之端行人於真妄分明之後一念頓絶能所可以把定萬有坐還清淨本然所謂但離妄緣即如如佛矣昔有僧問琅琊覺和尚云清淨本然云何忽生山河大地覺厲聲云清淨本然云何忽生山河大地僧言下大悟故知一念才生萬法皆備則知一念無生萬行具足矣賀云諸家以起信三細六粗配此段經文致有紛紛異說不知此處前截配三細則可後截配六粗則不可蓋起信六粗就一人生死輪轉言之此處經文就山河大地諸法生起相續之因言之自不能強配也相待生勞勞字與前瞪以發勞兼目與勞二勞字相應可見虗空世界衆生業果全是目勞所現之相也覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風生風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界此下答云何次第遷流終而復始之問也此先明世界相續之因良由覺體之上已起妄明而妄明必發空漚頑空之體全是晦昧而晦昧與明乖角明昧相傾不覺心動當知世間諸風全是妄心動蕩所感故空輪之上而有風輪執持世界器界凝結皆由無明風力執持得不散失此風大顯然親依妄心而起矣又土與金皆是堅性俱屬地大而堅莫過于金故金是地大精實之體因空昧而心動故曰因空生搖如人為睡所偃而發迷悶覺明堅執而妄成有礙如偃中堅執求通而妄覺有物相壓由此即感一切堅礙之相當知世間金寶皆是明覺體上一分堅執所感如有凝心結想化為石者亦小驗也以故風輪之上而有金輪保持國土此地大亦顯然親依妄心而起矣堅執之妄覺立礙感金而寶成搖動之妄明動成風相而風出風金相摩一堅一動故有火光變生為熟化有成無雖無含持之輪用而有變化之功能而火大因之起矣以上三大雖相待轉生而俱帶妄覺妄明之心相此下不帶心相獨用金水二大而水生焉彼寶上之明即含津潤如珠光出水是也火有蒸之氣即能成水如盛熱時萬物多被蒸而出水也以寶明而又映以火光故有水輪含潤十方世界此十方界總是愛水包褁而水大所由起矣由妄見動故感風輪由執心堅故感金輪由研摩燥故感火輪由愛心深故感水輪故知四大種子不外發潤二種無明也別經言世界安立土輪下依金輪而同為地大金輪下依水輪水輪依風輪風輪依虗空而虗空無所依今約由心生起序未全同又顯究竟仍說虗空依無明而無明依本覺以見萬法始於真妄和合之心而離心悉無自體也火騰水降交發立堅溼為巨海乾為洲灘以是義故彼大海中火光常起彼洲灘中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種以是因緣世界相續此因能成四大又生所成四居也蓋器界元為衆生所居今於此四方顯衆生住處故曰四居彼四大雖均成變化功用而水火土三大於四居中功迹尤顯彼火性炎上主於騰也水性潤下主於降也水火既濟則交發而成器界如陶器者功惟賴於水火也既交發立堅由是溼為巨海即甘水海鹽水海而水族衆生之居成焉乾為洲灘即四部洲而陸處衆生之界成焉海亦由立堅而成者以注水之巨坎全是堅體也以是水火共生之義故彼大海本就溼之處不應有火以不忘母之氣分故火光常起洲灘本就燥之處不應有水以不忘父之氣分故江河常注蓋水之望火為我尅之妻故火為二居之母火之望水為尅我之夫故水為二居之父今大海克肖於父而不忘母之氣分故海中火起洲灘克肖於母而不忘父之氣分故洲有江河也又水能尅火若水性不降而就火則勢必滅火豈能生物今則降水之性而就火水夫劣於火妻故結成高山而山居衆生之界成焉是故山石擊則成𦦨者是受火之氣分也融則成水者是受水之氣分也土能尅水若土性不降而就水則勢必滅水豈能生物今則降土之性而就水土劣於水故抽為草木而林居衆生之界成焉是故林藪遇燒成土者是受土之氣分也因絞成水者是受水之氣分也由無明種子交妄發生初由妄心而生起大種次由展轉而備生四大後由諸大而成就四居以是遞相為種之因緣所以世界相續成住壞空終而復始相續不斷凡成一番便是如此展轉生起所以自忽生之後永無清淨之期矣此中義理雖似外論中五行相生之意而實不盡同若一一附合有二不便一者五行反明經義反晦二者令外教之人將謂不出己意良以外教正惟執乎五行能成世界而實不了其真源縱高推太極混沌等而終不識其為吾心之妄覺全體之無明今與分明指示正以異彼教意而舊解却將覺明釋之為水以濫彼天一生水之計仍出無極太極之下何以令彼袪除舊見而生新悟哉夫外教多歸化機於陰陽而吾宗直指化本於心性且又示天地之元出於吾心之無明此誠大異外說而極醒誤執也弘教者不能挽外宗而令其明內旨反推內教而濫外宗失計之甚也至於內教所用名言多用四大而不名五行後之合變轉生但與五行略相似耳故今解於前之四法全準孤山四大為正而前三大顯然依於心起於後之四法別立名言略取溫陵父母氣分之說以助明而已空谷禪師謂周濂溪之學出於壽涯蓋指太極圖也彼壽涯胡為者而立此妄計豈非內教之罪人耶或空谷亦傳聞之說固不足信耶鍾云巨海洲灘高山林藪合成器界由四大變起而四大乃覺心之變現所謂萬法唯心也復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等胎卵溼化隨其所應卵唯想生胎因情有溼以合感化以離應情想合離更相變易所有受業逐其飛沉以是因緣衆生相續明理不踰理猶體也踰猶超越也覺明之體隔礙而不能超越也此明衆生相續之因也蓋法性身本來周遍實無根身即此根身推其本原亦是明妄所成此明妄者實非他物亦由妙明覺心最初突起一念轉為覺明而成所妄所妄既立於是湛圓妙明之體分成六處在眼名見在耳名聞乃至鼻舌身意各生局礙不能超越不復周遍圓通以是因緣故聽不出聲見不超色餘四亦然但見色香味觸影略聲法六妄成就染六根而成塵由是見聞覺知六種分開攬六塵而成根所謂元以一精明分成六和合是也夫根塵成就則形兆潛彰然尚未趣生必當中陰之位中陰即中有也處於死有生有之間故曰中有經言中陰六根猛利勝於生身瑜伽云中有中便如當生本有身形狀如人中有似人畜中有似畜餘趣亦爾身如五六歲孩子大形量雖少能作諸業於父母邊起顛倒想也由中陰而趣生也若因父母己三者業同則相纏著而生即胎卵類也或不因父母但由己業合亦成形離亦成化即溼化類也蠢蠕皆溼生天獄皆化生當胎卵二中有身欲投胎時其無緣處大地如墨惟於父母有緣處見有一點明色發現此中有身既見明色即趨其處其想遂得成就若是男中有以父為異見父是所憎境以母為同想母是所愛境女子反此涅槃明十二因緣無明有二一潤業無明謂過去煩惱也二潤生無明即託胎時於父母起愛憎也此中有既見可愛之境即注愛於父母赤白二渧以為種此赤白二渧即納此想心而成胎此雖因父母交遘發生實由己業相同故吸引而入胎若磁石之吸鐵以是父母己三為因緣故遂入胎中成五陰身故有羯羅藍遏蒲曇等相俱舍云胎中有五位一七名羯羅藍此云凝滑二七名遏蒲曇此云皰三七名閉尸此云軟肉四七名健男此云堅肉五七名鉢羅奢佉此云形位今舉其二故曰等也若溼化二生中有由先業力不簡近遠染著稱情當染著處便即受生矣夫胎卵溼化各以定業相感故隨其感而應之以四生之定報如亂思不定者想也而卵則惟想生矣鍾愛不捨者情也而胎則因情有矣親附不變者合也而溼則以合感矣捨此趨彼者離也而化則以離應矣以此四心感召而四生各類應之此其有定者也若夫情想合離更相變易或情變為想或想變為情或合易為離或離易為合故其受報或飛變為沉若之化蛤或沉變為飛若魚之化龍奇奇怪怪亦復不定以是因緣經涉長時互成轉換衆生相續無有了期矣賀云注以色香味觸四句為中陰身殊可笑不知世尊談衆生相續只就當下發明謂即今瞥起一念便是永劫生死根本耳非從當初說起如此方盤古生於太荒之言也富樓那想愛同結愛不能離則諸世間父母子孫相續不斷是等則以欲貪為本貪愛同滋貪不能止則諸世間卵化溼胎隨力強弱遞相吞食是等則以殺貪為本以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛唯殺盜淫三為根本以是因緣業果相續此明業果相續之因也富樓那一切衆生過去在世時想念恩愛如膠似漆固結而不能解故受生時則流愛為種納想為胎而父母子孫生生不斷此等皆以淫欲而正性命故曰欲貪為本欲貪通乎四生今止約胎生言之又胎生復通人畜今止就人倫辨之以其易見故也由有貪愛必有身命由有身命必賴滋養彼貪我豢養我愛彼血肉所以貪不能止則諸世間四生之類弱肉強食遞相吞噉是等則以殺貪為本殺業盛行故以人食羊羊死又轉而為人人死又轉而為羊由一生以至十生死死生生展轉報復互來相噉有此惡業故世世俱生一處相值以償其債直至窮未來際無有止息是等則以盜貪為本凡不與而取及陰取皆盜以人食羊不與取也羊死為人互來相噉陰取也故曰盜貪也約殺貪言之則汝負我命汝還我命我負汝命我還汝命約盜貪言之則我負汝債我還汝債汝負我債汝還我債命債不了故生死相結經百千劫常在生死而不能出離約欲貪言之汝愛我心我愛汝心我憐汝色汝憐我色以是愛憐因緣生生會聚經百千劫常在纏縛而不能解脫如七月七日長生殿語是也惟殺盜淫三種貪為根本以是因緣業果相續故知三界流轉唯一貪愛若斷貪愛便出三界矣問世教論殺惟以忿爭殺人為重論盜惟以劫竊財命為重而食肉不與焉似得重輕之宜今經何獨論其所輕而反遺其所重乎答此有二義一者斷輕況重義蓋此方世教急於止亂且圖養民故惟斷現亂而不禁食肉今經欲絶生死須斷生緣故極至食肉皆併斷焉若悟輕者尚為生死之緣則重者不言可知非反遺於重也二者絶本止末義蓋凡一切殺盜究其深本多起於食肉如八萬釋種遭琉璃之殺但知近緣罵詈而不知遠因起於食魚之冤故此方不長太平緣太平時恣意食噉三五百年人之享福者福終起畜之酬報者報盡為人皆帶殺冤遂成亂世乃至殺人無量故佛斷食肉乃聖智深遠拔本塞源之言經云世上欲免刀兵劫須是衆生不食肉外教君子未能信達者切勿輕非毀矣富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始此總束以結答忽生終始之問也富樓那如是世界衆生業果三種顛狂迷倒相續不斷雖各不同推其所自皆由性覺妙明本體最初不覺突起一念故轉成業識名為覺明因有覺明次又轉為明了知性而成見分因有了知次又帶出境相而成相分無明三細皆備即緣此境相而起我法二執渾然涵彼六粗總之皆妄見也汝問三種云何忽生皆是覺明乃至妄見所忽生耳夫山河大地及衆生業果諸有為相所以次第遷流者非別有法但惟因此顛倒相續之虗妄故終而復始汝問三種云何終而復始因此故耳可見忽生相續渾一妄法了無實體之可得矣而種種幻化皆生如來圓覺妙心豈不然哉答第一問已竟下富樓那復從答生疑設難而佛以四喻曉之始圓第一問義也富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生此滿慈執因性以難果性也富樓那言若此衆生現具在纏妙覺之體本無不妙無諸染法覺無不明無諸障礙與如來心不增不減在佛非增在生非減平等無二乃從清淨本然體中無狀忽生山河大地諸有為相者則如來今日得了妙空明覺復其無物之本體還其圓照之本明亦同衆生本妙覺明未生山河等法之前矣如來復還之真覺元無異於衆生未妄之真覺然衆生既從真而起妄如來獨不當從真而起妄乎敢問如來妙空明覺中山河大地之世界有為之衆生習漏之業果何時又當無狀忽生也斯問也是執衆生因性之有始而疑如來果德之有終矣鍾疏云如來既得空覺有為何時復生此問似太淺按起信論人我見中五種有謂所得涅槃終盡還作衆生此云空覺後復生諸有與彼正相似蓋當時小乘外道自有此一種執滿慈乘此請佛一破除之所謂除惑之盡也佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟而出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷以有迷覺覺迷迷滅覺不生迷此喻無明本空也萬法生於無明無明元無自體故未論所生之萬法先取迷方之心喻之佛告富樓那譬如迷人於一聚落本南也而惑以為北夫迷在此方則悟在他方不知此一迷也為復因此方之迷而有乎為復因他方之悟而出乎富樓那言如是迷人亦不因迷又不因悟何以故迷不自為生迷之根云何因迷悟迷相反安得相生云何因悟佛又言彼之迷人正在迷時倐有悟人指示令悟四方朗然富樓那於意云何此人從先迷久迷既悟之後於此聚落更生迷不答言不也世尊悟則不復迷矣佛遂正告之云富樓那十方如來悟後不迷亦復如是良以此無明之迷既不以自體為本亦不以覺性為本無所從來徹底元空亦如迷方之迷更無所因也且自昔在迷時即無迷可得由彼忽生一念似乎迷其清淨覺體然而非是真迷若使真迷則迷已有根安得復覺以迷本無根故曰似有正如惑南為北方實不轉今既覺得是迷迷即便滅滅則豈復更生哉亦如迷方者但覺以迷之南本無有北則北相頓滅不應復起於南也可見真性覺中本無無明而萬法從生之本尚且元空矣亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡如何更名如是狂人為愚為慧佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地此喻萬法現無也夫無明且空而況所生之萬法乎以喻明之譬如目翳之人見空中華元非實有翳病若除華於空滅亦非實無忽有愚人於華滅空處更待華生汝觀是人為愚乎為慧乎富樓那言空本無華妄見其有生有滅以非實滅故見華滅空已是顛倒何況敕使更出斯實謂之狂癡而愚字不足以盡之云何更名此等狂人為愚為慧耶佛言此待華更生之人誠如汝解決愚非慧汝既知晴空待華者為至愚云何乃於如來妙明體中而待生山河等法彼執佛滅萬法已是顛倒妄情況冀佛起萬法與彼愚人何異哉是則妄不復生斷然無疑矣又如金礦雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是且不獨妄不復生也而真亦不復變矣又如蘊金之礦當金在礦時二物混和礦雜精金若出礦之後其金一純更不成雜則求礦於金者愚也又如木遇燒而成灰既已成灰不重為木則求木於灰者又愚也然則諸佛如來可知矣彼諸佛如來樹下所成無上智德破無明盡五住翻轉一切煩惱完復本有如如智體所謂菩提也因窮果滿圓淨斷德遷流浪息二死永忘翻轉一切輪回完復本來如如理性所謂涅槃也菩提智光類於精金明淨既成菩提不復重生煩惱亦猶精金不復重為礦也涅槃寂滅類於木灰既入涅槃不復重淪生死亦猶木灰不復重為木也故曰亦復如是是則妄本無生而非成佛始滅真本無變而胡望佛更生故知衆生分中尚自無生無變何況成佛者反有生而有變哉汝問萬法生續之由我為汝說生續之由竟說不空如來藏已竟此下說空不空如來藏以示圓融之故也夫空藏中破相顯性相既不有說誰無礙不空藏中從性起相相既宛然何得無礙是以前二藏中略開圓融之端而未竟無礙之說豈免滿慈之疑茲欲極彰無礙之由以銷執相之問須談空不空藏也蓋空即不空則性全即相而性固無礙不空即空則相全即性而相亦何所礙哉富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相陵滅又徵虗空及諸大地俱遍法界不合相容富樓那譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不見光耀當知是明非日非空不異空日此答次問五大何得圓融之疑也滿慈依小乘法執舊見堅謂諸大本來相礙若如來藏空可說無礙今云備具諸大即當相礙豈有無礙之理斯則豈惟不達已發之相為無礙兼亦尚疑未發之性為有礙矣而如來釋疑非但只釋未發之性為無礙而兼亦詳釋已發之相尚無礙相尚無礙而況未發之性何得有礙乎故此科說性無礙其詞最少釋相無礙其文最多也佛言富樓那又汝問言地水火風圓融周遍而疑水火二性何故不相陵滅又徵空大地大既俱遍者則不合相容我今為汝以喻明之富樓那如來藏性本非七大而不拒彼七大發生譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空所謂體非羣相者空空蕩蕩元無一物然而日照則明矣雲屯則暗矣風搖則動矣霽澄則清矣煙霧之氣凝聚則濁矣土合風雨積而蔽空則成霾矣水澄湛不動則與虗空交映矣所謂不拒發揮者如此七相雖不配合七大而亦略應其數也於汝意下云何如是種種同時各處諸有為相為因彼日等諸緣所生乎為復空中自有乎若謂因彼所生者富樓那姑舉日之一相以明之而餘六可知也且當日照時既是日明則當普天共成一日之體不應更見圓日云何空中更見圓日如盤盂者在乎既見圓日則自日之外云何不是空體之明而顧獨謂明屬於日乎若謂不是日明是空明者空常存明常在空應自照云何當中夜雲霧之時又無光耀當知是明亦非日亦非空不即空日也非異空非異日不離空日也既不即又不離則知清淨本然循業發現矣問虗空譬性明等七相譬七大日等七緣譬於何法答七大循業而發則日等譬七大各所循之業也問總標中惟空與相空喻藏性相喻七大矣徵釋中只宜明其非空及不異空足矣何更加以七緣而言非日及不異日乎答若不加以日等有二不備一者顯妄不備蓋必二者皆非二者不異方顯宛轉虗妄無可指陳也若惟單就空言是猶有可指陳處也二者顯妙不備苟若但言非空而不言非日則但顯性無礙而不兼顯相無礙也若但言不異空而不言不異日則但顯不違性而不兼顯不壞相也此下據經文觀相元妄至不相容者在前真妙覺明至無可憑據在後詞義不貫明是錯簡今依講文正之真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據此節本在後今移而前此以法合喻也彼元真之妙覺明心不滯一相不拒諸相亦復如是若汝循發空之業而以空明大則如大千空劫小則如鑿井出土而空即現矣若地水火風各各發明如執鏡求火執珠求水之類則亦各各現如求火火出求水水出是也若地水火風同時發明如吹火者口中現風薪中現火之類則亦互呈齊現如風隨火壯火隨風烈是也真妙覺明循業發現如此此與虗空體非羣相而不拒七相之發揮者何以異乎夫相之各現不必論矣云何俱現今又以喻合喻富樓那如一水中現於日影兩入同觀此水中之日此兩人東西各行則各有一日隨二人去本一影也乃一隨而東一隨而西此之二影誰為定實準定也的實也然則一處而現水火二大亦誰為定實耶既先無準的不應難言是一而云何各行既雙而云何現一矣假使境有定實猶可容辨難今既無定無實而顧於無定實之境宛轉辨難則難愈多而愈人於虗妄如同觀是一知二是虗各行既二驗一是妄則一之與二孰可憑據哉然則諸大俱現亦是宛轉虗妄無可憑據而已此與空日生明不即不離有何以異乎水喻如來藏性影喻七大之相兩人各行喻循俱明之業東西二影喻俱現之相鍾云諸注以此處日影同於二卷中月影之妄又泥下文宛轉虗妄之語反以俱現之妙作虗妄看此以辭害義以喻纍法之過也不知二卷顯如來藏體故以真月喻真而以月影為妄此顯如來藏隨緣不變不變隨緣故借水中日影形容描寫俱現之妙但觀一如來藏隨七大俱現如一日影隨東隨西其妙自見若必難言日影是一云何各行各日既雙云可現一則宛轉虗妄而無可憑據矣觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者此一節本在前今移而後此牒上虗妄以答前問辭也但汝細觀七大之相若果是實或可指陳正如水中日影本來虗妄無可指陳若乃妄謂有可指陳如執空華實有已為迷妄若更詰其相陵滅者是猶復邀空華而期其更結空果真可謂迷中之迷妄中之妄云何詰其相陵滅乎由此虗空廓然逈無諸相而觀七大之性元亦純真先非水火水火尚無說誰不相容乎知水火則知空地矣而汝問大地虗空不合相容者亦獨何哉夫觀相元妄則全相是性不空即空而相無礙矣觀性元真則全性是相空即不空而性無礙矣汝問五大圓融之故我為汝說圓融之故竟問性相既俱無礙既不相凌滅而相容矣奈何據今熾然凌滅宛然不容其故何也答下云汝以色空相傾相奪則傾奪二字即其故也是知凌滅不空病根在於衆生無始妄習傾奪非彼妄相真有是也其猶月運岸移惑本在於雲駛舟行之妄見非彼月岸真有是也又如夢見水火執為實有便見凌滅才知是夢便可橫身直過尚無燒溺豈有凌滅是知今之熾然宛然實由堅執之久而忘執之功未至耳詳滿慈之疑謂既稱圓融周遍便該得凌滅不容若是不滅相容恐非圓融周遍佛以不滅相容正是圓融周遍然並不與之辨如何相容如何不滅也但只追究七大之所從來總是如來藏性循業發現性全是真相全是妄既是虗妄如空華日影將誰相滅將誰相容然則並不當問其相滅不相滅而何必辨其不相凌滅乎並不當問其相容不相容而何必辨某為相容乎此謂溯本窮源搜出來歷不待辨難而疑團打破矣說空不空如來藏已竟此下圓彰三藏以勸修也由前次第三藏急於破迷成悟故俱就衆生迷境顯示未暇普收聖凡染淨二緣十界一如無二以畢彰藏心全體大用今既粗細二惑次第破盡妙明披露道眼近圓理宜罄竭諸佛之靈府而徹底顯示故此統會畢彰用顯圓融三藏也滿慈於此應有伏疑由前極談衆生現住迷境當體性相二俱無礙若爾即應不揀聖凡同見無礙今何我等動成有礙而如來獨得無礙耶於是如來應念指示其由所以復有後文之圓示也舊注既不辨訛誤又不推此來意致令此處經文前無結歸而後無發起復何脉絡之可通哉富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相此密銷我等何得動成有礙之伏疑也當機者既疑衆生何以有礙佛因指出成礙之由而言富樓那汝等所以一切有礙者豈有他故哉良由汝等業識不空相見未破循色空之業互相傾奪於如來藏如凡外背空而趨有是以色而傾奪於空也權小背有而趨空是以空而傾奪於色也相傾相奪而如來藏即循汝業而現空現色蓋真如隨緣與妄心相應故見色空周遍法界是故於此色空法界中開眼時但見物象森羅風動空靜而動靜交礙日明雲暗而明暗互防如是乃至地空不容水火陵滅塵勞滿前全成穢土不知相本虗而無可憑據只為衆生內為無明所蔽業力所使迷而且悶如下界與三塗有念為迷上界興二乘無念為悶所謂有念無念同歸迷悶也惟其迷悶不自了知背清淨覺和合妄塵故發塵勞而有世間相全性成相所以動成有礙者由此自迷自背之故耳豈性相之過哉我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性此密銷如來獨得無礙之伏疑也當機者既疑如來何以獨得無礙佛因自陳無礙之由而言我所以得一切無礙者豈有他術哉但惟用彼六根中圓湛不生滅性以融彼遍成色空生滅之如來藏而如來藏迷時縱成色空生滅而妄本常空相非實有今由以妙明常住之性融之而生滅妄相了不可得惟一妙淨本覺湛明之性圓融照了遍周法界所謂以如如智契如如理而住持大光明藏也夫衆生背覺而真如尚隨染緣與妄理相應成世間相況順性妙修安有不隨發妙用者乎是故從體起用於此理法界中無礙緣起約理事無礙法界言之理不可分故理惟一也事無紀極故事無量也理無分限理故大也事有分限事故小也一為無量無量為一小中現大大中現小而理事無礙矣約事事無礙法界言之如一塵一毛一身一界皆一也多塵多毛多身多界皆無量也微塵毛端皆小也無邊剎無邊身皆大也一為無量無量為一小中現大大中現小而事事無礙矣取相以實之如不動道場遍十方界非一為無量乎身含十方無盡虗空非無量為一乎於一毛端現寶王剎正中現依坐微塵裏轉大法輪依中現正非小中現大乎雖寶王剎猶然毛端也雖大法輪猶然微塵也非大中現小乎此皆如理智中現如量境良由諸佛翻背覺合塵者而滅塵合覺故翻發塵勞世間相者而發真如妙覺明性全相成性所以獨得無礙者由此不迷不背之故耳豈性相之殊哉此下圓彰藏性不惟以一心而圓具三藏且於每一藏中即圓具十法界如非則十界俱非即則十界俱即融則十界俱融也以其非一切即一切而又融拂一切酷以三諦三觀心粗浮而不沉玩者輒立諦觀不知詳佛深旨但是直指衆生現具本來之心便是如此圓融妙極衆生迷時諸佛證後常只如此了無增減而已又復當知亦不離前根中所指圓妙明心但於十顯一破之後方以指明四科七大復進常遍今乃至此方極圓融而無以復加矣始終惟顯心性何曾與說觀門苟此處觀門已立便當依此修行觀音圓通何用哉鍾云此處文義聯絡難斷言雖滅塵合覺一多小大相攝相入起大神用而如來藏中實纖塵不立非一切也雖非一切又萬法悉備即一切也又互泯互存不可思議也何疑諸大周遍法界而不相凌奪哉而如來藏本妙圓心重一妙字妙即寂也非心攝根識二大非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界乃至非意識界此處無五陰者以五根六塵攝色陰以意根六識攝後四陰至於入處開之即是非明無明此頗似心經語惟最初多一明字意謂無明無體體是本明故兼帶言之明即真心似不當非然對無明而立明乃是有待之法今此圓心絶待故亦非之也明無明盡不帶盡字是流轉因緣各支下俱加一盡字是還滅因緣及至非老非死非老死盡乃至者中略二曰行三曰識四曰名色五曰六入六曰觸七曰受八曰愛九曰取十曰有十一曰生也非苦非集非滅非道聲聞所修四諦法也非智非得小乘所證智理也非檀那非尸羅持戒非毗梨耶精進非羼提忍辱非禪那靜慮初心則靜即止慮即觀行成則靜即定慮即慧也非般剌若智慧此六度為能趨之行也非波羅密多到彼岸此所趨之理也如是乃至非怛闥阿竭如來非阿羅訶應供三耶三菩正遍知非大涅槃圓寂四德之總體非常非樂非我非淨涅槃之別相以是俱非世出世故世結六凡出世結四聖此先明離萬法以顯空如來藏也夫妙性雖隨染靜二緣起成二相而如來藏本妙圓心本來虗寂無有一物不定屬於一法故非七大非六根非六塵非十八界此非世間法也非緣覺法非聲聞法非菩薩法此非出世間法也非如來三號非涅槃四德此非出世間上上法也蓋惟獨約心體故凡聖俱非而直指人心所以不存聖凡之見乃至心佛俱非矣即如來藏元明心妙對上本妙重一明字復係之以心妙者見用但體含非滯有之用即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界六凡法即明無明明無明盡如是乃至即老即死即老死盡緣覺法即苦即集即滅即道即智即得聲聞法即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅密多菩薩法如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨如來法以是俱即世出世故此明即萬法以顯不空如來藏也以十界諸法若離此心無片事可得故惟據藏心之體便即十界之體信手拈來無有不是乃至心佛俱即也即如來藏妙明心元離即離非是即非即非即二字當是非二字此雙遮雙照以顯空不空如來藏也夫既萬法俱非矣又萬法俱即矣即如來藏又妙又明本來元具不假修成之心元其圓神不滯之體固不定屬於即亦不定屬於非而離即離非而隨宜自在之用全非而即全即而非而是即是非至此則圓融極至而顯心之妙無以復加矣原夫佛酬阿難妙定之請捨置權小所修示以諸佛本定然斯定所以迥異者以是全彰自性本妙圓定釋者不可多用修意以仍濫於常途也況此奢摩他中純談本定曲顯性真而說修之意絶少從初三卷直指藏心本定之體顯次第空藏也而大衆各各自知心遍十方常住不滅斯則頓意成矣而圓意猶未彰也復次滿慈頓興二難為後二藏之發起於是答萬法云何生續則略彰藏心隨染緣之用顯次第不空藏也斯則體用略備圓意已露而猶未具彰也復答五大不合相容且示性相二無礙理顯次第空不空藏也斯則且彰無礙釋彼有礙之疑而已至於即性之相無量不思議業用即相之性混融不思議妙體未極顯也更因當機之伏疑而與之備談染緣淨緣四義四相則一切圓用方以盡彰又與開二合二雙拂雙融而三一妙體方以極顯然用須證而後發故略帶修成體則本來現成故仍彰不變縱因修顯亦非修生是則後之圓融三藏收前次第三藏總以極顯自心本具之圓定而非有觀門可立也如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足此責滿慈不勤求而徒事口舌所以策其進也夫如來藏妙明心元如此如何世間欲有色有無色有衆生及出世間二乘各以本智為能知各據證境為所知即以此所知心境比類推度謂如來無上菩提亦同於此豈知無上菩提微妙第一本不可思也又用世間語言如陵滅不容因緣和合之類而參雜於佛知見豈知佛知見即是圓融三藏本不可議也不可思議而輒以妄心妄言思議之豈不遠哉夫妙性在人以妙體而含妙用猶須以妙智發之譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與衆生亦復如是此寶覺真心實有離垢光明財用三義人人具足各各圓滿亦如琴瑟等皆有妙音也而有發有不發者在有妙指與無妙指耳如我得之於心則應之於手故一按指而光明煥發照天照地皆成妙用豈非有妙指而能發妙音耶海印即佛心常住三昧也汝則暫一舉心塵勞滿眼物象森羅不發妙用豈非無妙指而不發妙音耶所以不發妙用者無他有無上覺道即佛智果所謂發妙用之妙智佛初以之合如來藏者也由汝不肯勤求無上覺道而愛念小乘取其功省而利近得少為足但以六通十八變等化城僞寶為足不復知真寶所在故不發耳若肯勤求即與如來把手共行決不相賺汝可不勉哉宗鏡云樂蘊奇音按指則宮商應節人懷覺性智巧則巧用冥符得失在人精粗由己所以善逝按指發海印之光含識舉心現塵勞之相鍾疏云前文滅塵合覺故發真如妙覺明及一為無量等所謂如我按指海印發光也二發字正相應前云背覺合塵故發塵勞有世間相所謂汝暫舉心塵勞先起也前文是法此處是喻非兩層意至此則知法華所言佛之知見但有其名未竟其實此經方明言佛知見是三藏圓融寂滅一心也富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切衆生何因有妄自蔽妙明受此淪溺此滿慈窮索妄因而擬進修也富樓那言如佛所說寶覺真心各各圓滿則我與如來寶覺圓融真妙淨心同一圓滿應無二相矣而我昔遭無始妄想自蔽妙淨圓明之寶覺生此生死相續久在輪回今雖得聖乘猶未究竟見思雖盡無明尚存其不知妄因生起也固宜若乃世尊五住盡而二死亡諸妄一切圓滅獨妙真常稱為大覺其知妄因必矣敢問如來一切衆生何因而有妄起顧乃自蔽妙明受此淪溺也前問清淨本然云何忽生世尊答以因無明起今問此無明者復因何起所謂直窮到底也佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多祠授謂從神乞得也忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故此下借事發明妄本無因也佛告富樓那據汝推本無二是信已本真稱佛圓常又信佛永證乃至萬法生續之疑性相難容之惑皆已破矣然汝雖除疑而餘惑未盡尚不達此無明無因是以強索之也即今目前偶有一事我即借此與汝發明汝豈不聞此室羅城中演若達多忽於晨朝照鏡愛鏡中之眉目可見而瞋己頭之面目不見以為此不見者即同魑魅遂無狀狂走於意云何已非魑魅而自以為魑魅此人之狂是從何因而起不應無故狂走也滿慈被世尊一問當下分明答云此人但是心發顛狂而走更無他故無故則無因矣佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人說夢中事心縱精明欲何因緣取夢中物況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性如是因何為在當云因為何在此以法合喻也滿慈於事上却解於理上却迷故佛就其明處以導之言此覺又妙又明又圓一覺而具三義乃是本來自圓本來自明本來自妙非假修證而未嘗有妄既已稱之為妄便是突然而起云何有因若有所因即名為真云何名妄可見於妄而索因者不達妄理者也且無明與妄想皆是最初細惑自其最初癡相謂之無明自其迷中動相謂之妄想却後凡迷真處便是無明凡執似處便是妄想互相引發凡有幾重展轉相因從迷積迷以至微塵紀劫終不得其因之始相雖佛八音四辨亦不能逆推而說其本始之因良以妄體本空無可說也如初一人忽然妄說遞遞相承從妄說妄及推其因遞遞皆虗如是迷因正因迷惑不達無因所以常自成有若識得迷無生因自見諸妄悉皆本空而無所依不但只達妄空亦達最初即未曾生而劫後將何所滅是則汝謂世尊諸妄一切圓滅者亦妄也我今雖得菩提但能說此妄本無因豈能拈出無因之妄以示人乎所以得菩提者正如寤人說夢中事心縱精明別無方法拈取夢中之物以示人也且夢中物影影響響亦似有因似可拈取尚不能取況復無因之妄想本無所有乃索其生起之因欲取而斷之烏可得哉此妄無因正如達多狂性相似不是因人教他狂亦不是頭上本來有狂元是自己迷頭認影自怖而狂走忽然此狂一歇則知此頭非從外得縱使未曾歇狂眉毛元在眼上鼻孔依舊下垂曾不動著一絲毫亦何遺失之有富樓那汝之妄性即如達多之狂無異其因豈有定在乃向如來索之耶汝但不隨分別世間業果衆生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得此告以歇狂之法也汝究妄因將欲得其本因而苦修以斷之也今既悟其無因本空何必乃爾汝但不去隨順世間業果衆生三種分別現行相續心三緣斷故粗惑粗境已盡則三細中流注細念所以為粗惑境之深因者自然不生良以粗念除而功熟細念亦隨盡也粗細俱妄則根本無明豈能獨存則汝之心中演若達多狂性自泯然而歇息矣此狂一歇當下即是菩提所謂知幻即離離幻即覺也至此則知勝淨明心勝者超過一切之意權小亦稱淨明而非勝淨明也清淨本然周遍法界元是己物不從人得何藉糊皮帶骨劬勞辛苦動經劫數以為修證哉再以喻明譬如有人於自衣中繫如意珠而不自覺知乃窮露他方乞食馳走雖然貧窮而珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠元是衣裏之物非從外得然則歇即菩提不從人得無勞修證亦若是而已矣此不獨與滿慈發明云何有妄即阿難見相發心惠我三昧等疑俱釋然矣問此之頓歇與耳根圓通同耶異耶答歇意同而就位有異也若博地凡夫名字位中聞斯法門悟徹真有妄空從耳門入流忘所即是不隨世間分別三緣頓斷也自此由忘而不生由不生而盡由盡而空由空而滅一路休歇自淺之深直至寂滅現前即是菩提勝淨明心現前矣此則全同也若滿慈七信位後根結已盡何用翻前又從耳門而入但從覺所覺空頓歇法執分別俱生至寂滅現前則勝淨明心亦現前矣蓋前位人法二執齊歇此位但歇法執故云就位有異耳鍾云三緣斷故三因不生者三緣如明昧相待等是世界緣同業相纏等是衆生緣欲殺盜貪是業果緣而妄為明覺則三種總因也此下阿難第三番疑因緣也最初第一於顯見超情科中疑見性不由因緣第二於圓彰七大科前疑萬法不由因緣今此第三乃疑證果成道何亦不屬因緣有果無因誠大可疑意蓋聞佛久排因緣而語中又帶因緣既說因緣又言何藉修證故起斯問是則前疑性相今疑因果矣即時阿難在大衆中頂禮佛足起立白佛世尊現說殺盜淫業略牒業果而意該世界衆生業字應是等字之誤三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏今說菩提不從因緣則王舍城拘舍梨等所說自然成第一義惟垂大悲開發迷悶此躡佛語而執因緣也即時阿難云云白佛意謂如來既已擯棄因緣矣語中又說緣斷而因不生狂歇而菩提現斯則說因說緣皎然明白似不可廢云何乃欲頓棄之耶且此因緣是我等入道之門發悟之地於我等輩實有利益又不獨我等年少有學蒙其利益即先輩耆宿如大目犍連等亦皆由此而得悟入今言不藉因緣則外道所說八萬劫後自然成道猶如縷丸極處停止者翻成第一義諦耶縱使如來不墮因緣寧不墮自然哉此又我等迷悶而不解者更望發其覆而決其疑也富樓那問意已圓復讓阿難起問仍還當機也佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是此但說喻若約法中須云無明因緣滅除菩提自然而出阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走此下約頭雙拂此先拂自然法中謂本性若屬自然衆生即當常自見性不復有迷淪者今何故復有迷而背馳者乎可見菩提不屬於自然也若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣此拂因緣法中如云若菩提性先自然有而後假無明因緣背馳不見遂謂此性全屬因緣即當真失其性方信因緣不妄今何不由因緣而失真乎夫性本不失無端迷背似失而已然正當迷背似失之時而本性實無變易及見性破迷之後此性何假因緣哉狂本自然本有狂怖未狂之際狂何所潛此下約狂雙拂此先拂自然不狂自然頭本無妄何為狂走此拂因緣不狂自然應是狂不自然即反說因緣耳若悟本頭此躡上約頭雙拂而悟頭之非自然非因緣也識知狂走此躡上約狂雙拂而知狂之非自然非因緣也因緣自然俱為戲論是故我言三緣斷故即菩提心菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離離合俱非此句方名無戲論法菩提涅槃尚在遙遠非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恆河沙只益戲論此雙遣因緣自然也佛告阿難汝所謂因緣自然者今且就前狂喻以推之即如演若達多狂性因緣滅除則不狂性自然而出故汝所執因緣自然以為世出世間妙理盡在於是更無餘蘊所以執吝不肯吐却殊不知未盡然也若謂頭本自然則應本自常然無一時一處而不自然不得驚為魑魅而發狂今者忽驚無頭而狂走者諒必有因決非自然不知何因而怖頭狂走此則頭非自然明矣若謂頭本自然因照鏡故忽驚無頭而狂走者何不因照鏡故而并失其頭耶且正當狂怖妄出時而頭不曾失曾無變易則此頭決不藉因緣明矣大約謂此頭若是自然當無狂怖此頭若是因緣當須真夫今由有怖故非自然又由無失故非因緣也若謂狂本出於自然即當本來常常有此狂怖不知未狂之先此狂藏於何地而不起耶若謂狂不出於自然而出於因緣者則頭本無狂妄胡為而忽然狂走也故知不但頭不屬因緣自然即狂亦不屬因緣自然既知頭之與狂不屬因緣自然則知妙覺之與無明皆不屬因緣自然矣汝惟一向自迷家寶向外馳求執緣執自固所不免若使悟得本頭非緣非自識知狂走亦非緣非自則知因緣自然皆是夢中䆿語俱成戲論非有實義是故我說三緣斷故即菩提心者但使三種分別戲論之緣斷除即真菩提心矣良以法執未除者於三種相續不忘分別正是戲論前云不隨分別正以止絶戲論耳戲論止而無明無依菩提離障不真何待哉然雖即菩提而不可更作生菩提想何以故若菩提心生則生滅心滅此則仍是生滅之心非真菩提心也不但此為生滅之心縱使滅生俱盡無功用道亦不可更生自然相何以故若自然心生則生滅心滅此亦全是生滅之心非真無功用道也何謂自然猶是生滅良以計無生滅為自然者正如世間諸相因雜和成一體者名和合性對此和合而遂將非和合者稱本然性本然即自然也和合即因緣也即此本然是對待法非真本然故亦是戲論所謂毫釐繫念三途業因瞥爾情生萬劫繫縛直至本然非本然和合非和合和合本然二俱遠離離與不離二俱雙非至此方是正句方是活句方是無戲論法蓋遣之又遣以至無遣方契真無功用道真菩提心也說到此處復恐尊者以解為證故又當頭一點云雖然得到這箇田地菩提涅槃尚遙遠在正謂得句之時才是發心正好修行趨向菩提豈似汝等但以多聞記持歷劫辛勤以為修證縱經塵劫亦終不能實證也所以然者由不肯捨戲論法故耳抑且不但記持我所說法如瓶受水不遺一滴徒為戲論即使更能憶持十方如來十二部經其中清淨妙理又如河沙之多亦只是增添戲論與本分事了無交涉所謂從門入者不是家珍以文字之學總是名言習氣障自悟門不能洞當人之性故也若能遠離戲論則歇即菩提尚不藉於劬勞亦何有於歷劫難成也盤山云向上一路千聖不傳學者勞形如猿捉影要須發大勇猛斷言語息思想忘能所絶影像一超直入不涉程途大事因緣方知端的賀云若悟本頭以下發明正義一悟字一知字是歇狂妙訣由悟得本頭非自然非因緣然後知得狂走非自然非因緣以悟本頭方見本來面目是真以知狂走才覺向外馳求是妄又悟本頭則知清淨本然識狂走則知循業發現言汝一向自迷家寶向外馳求執緣執自固所不免若使親見本來狂心頓歇則知因緣自然皆是夢中䆿語俱成戲論非實義也是故我說三緣斷故即菩提心者是歇狂悟本之法豈因緣自然之可擬哉汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞薰習不能免離摩登伽難何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念薰修無漏善故或得出纏或蒙授記如何自欺尚留觀聽觀聽當見聞二字此極言多聞之弊以勉其進修也汝雖談說因緣自然決定明了毫無差誤人間稱汝多聞以為第一用此多聞積劫舊習猶不能免離摩登伽淫術之難若果多聞可以脫苦免難何須待我神呪冥加之力方能使登伽淫火頓歇得證三果成精進林愛河乾枯而汝亦脫淫難乎信乎非呪之力汝斷不能解脫矣是故阿難汝雖歷劫憶持如來常不開演之祕密不可思議之妙嚴不如一日修無漏業捨權歸實遠離戲論行起解絶入無分別身心俱斷先以絶愛斷性亦無後以絶憎舉愛憎二苦與生俱生極難除者而遠離之其決機只在一日耳且也如摩登伽宿為淫女由神呪力便得銷其愛欲法中今名性比丘尼與耶輸陀羅同悟宿因知女身之報全由欲愛深重故宿命開通悔悟深切夫耶輸女身已為弱質登伽淫女更是劣機但以一念薰修皆獲大益或得出纏如摩登三果或蒙授記如耶輸成佛即皆高證而汝以堂堂丈夫為人天中衆所知識反自迷自昧自縛自纏留戀見聞不能割捨現見薰修有益而不修明知戲論無功而耽著徒守多聞淹於下位不亦可愧之甚哉此等苦切語是責之也進之也進之也當知阿難此番辨論最有關要良以前既排盡因緣後又將談修證若一往有修有證則違前自言若一向非因非緣則廢後修證此誠聖言宛似互違而不可不辨也今明真本無處猶夫頭本無失而何有實修實證固非一向墮於因緣也又明妄之現迷猶夫狂之現起而豈終無修無證亦非一向墮於自然也由是則知斯經無修無證固不礙於有修證而有修有證仍不礙於無修證也前後之文無復矛盾其旨亦甚微妙也哉自滿慈發問至此復為一周名無生無礙周良以阿難於三卷末承佛破妄顯真之示但初悟所執之妄初見所遺之真故方謝其銷我倒想隨請其更除細惑至四卷之初滿慈代舉生續圓融之二問而佛答初問則深窮萬法始於無明而本空無生答次問則圓彰性相是佛菩提知見而融徹無礙與夫三番轉難則審除細惑無餘而無生無礙之旨愈明矣又復當知前周初明二執分別純屬悟境此周搜抉二執俱生兼啓修意良以細惑要因修所斷故又若結歸性定則前周中談空如來藏以直指自心本具妙定之體極顯其常住周遍此一周中談後二如來藏乃至圓融三藏以詳發自心本具妙定之用極顯其無礙圓融此即十方如來得成菩提妙圓真心不假修習如如本定三名中即妙奢摩他而徹悟此者即微密觀照也又此心此定一切衆生乃至權小悉不測知所以錯亂修習終無實果故於經題四實法中正屬如來密因也說奢摩他令悟妙心本具圓定已竟初科中見道分竟此下令依妙心一門深入答阿難妙三摩提之請也舊注科為修道理雖不差但天台判圓住同於別地方謂真修而住前未全許為修應知此科論修尚在修之初門論證不無證之初位以圓通功就方信滿而入住也又此經所以異於權小者惟在用根而不用識故前顯真始於根性今談修證惟選本根證入圓通也阿難及諸大衆聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沉冥出於苦海世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入惟願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇佛慈旨此敘大衆領悟得益更請修門也阿難及諸大衆聞佛談萬法生續以至頓棄因緣五番示誨故五重深惑皆除而心悟實相實相者即前真勝義性寂滅場地及無戲論法也身意輕安得未曾有方到究竟無疑惑地更不復疑因緣自然矣前者悲淚雖多感悟猶淺於是重復悲淚云云而白佛言我等惑妄重封權宗固閉賴無上大悲清淨寶王清淨智也利樂無盡故稱寶王善於開豁我心能以如是推妄發真種種微細因緣善巧方便提撕獎勸引諸陷溺障蔽之人而出於憎愛之苦海恩何如也世尊我今雖承如是法音全分開示之力得知如來藏妙覺明心無所不遍無所不包比之向日已覺改頭換面慶幸已甚以為知此一事千了百當不復更有所事矣而如來復責多聞無功不如一日修無漏業然此藏性十方無壁四面無門無由得入我今日如旅泊之人流落已久忽蒙天王賜與華屋雖獲大宅要須因門而入不得其門屋亦不可得居也惟願如來不捨大悲示我在會諸蒙暗者咸使捐棄小乘有餘涅槃而畢獲如來無餘涅槃本發心路良以小乘止斷四住見思尚餘五住猶如化城今欲進趨五住究盡之寶所故非導師不能指出舊由之路也然此在會有學者多世尊既不許用意識觀察降伏今令有學者從何方便攝伏疇昔攀緣無始來我法二執分別然後得大總持入佛知見如得門而入居華屋乎作是語已五體投地在會一心佇佛慈旨睦州云汝等諸人還得箇入頭處也未若未得箇入頭處須覓箇入頭處若得箇入頭處已後不得辜負老僧故曰得其門也等諸佛於一朝若不得其門不見室家之好所以悟藏心之後而重請入門也鍾云實相無相如來藏體周遍十方本性清淨絶名離相者是也失性如旅泊見性如華屋見性不修如獲屋不入故請如來本發心路入佛知見也玩本發心本字即首卷所謂真心無諸委曲相也無餘涅槃圓果也本發心路圓因也既已見性又求入佛知見者見方開示修乃悟入要因門入正啓後文一門深入也爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法衆生發菩提心開無上乘妙修行路宣示阿難及諸大衆汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義此先略標二義也佛慈雖示普為而二乘猶為當機爾時世尊哀愍會中緣覺聲聞回小向大於菩提心已發矣而未自在不得其門而入者又為當來佛滅度後末法衆生兼凡外權小能發菩提心者為此等衆開無上佛乘與妙修行路俾由此路而直至佛乘焉於是先示阿難及諸大衆汝等一向中路疲倦戀止化城今既決定發菩提心定要進趨寶所於佛如來妙三摩提所由以趨寶所之路者不復更生疲倦矣然當何以用其功哉應當先明從本覺而發始覺最初起修之正念有二決定不可易之義焉佛於見道分中則曰妙奢摩他微密觀照今談修道首曰妙三摩提是則自判分別不容穿鑿久矣乃舊解以奢摩他三盡入見道一分而判此下為最初方便豈佛旨反不足遵與云何初心二義決定此徵起二義也一決定以因同果澄濁頓入涅槃義以因同果四字便是第一決定之宗澄濁等便是此宗之趣也蓋言所以必欲因果相同者以因果不同則不能澄濁取涅槃也此一義文短而義長義長者蓋直至如來斷果究竟極證也又此雖因果雙舉而意在略明果證之遠非比小教化城之果僅齊圓之七信亦非比始教腮之果僅止圓之二行也由彼皆以生滅識心為本修因而因果不同故不能遠趨佛之常果是故先須說此第一決定也二決定從根解結脫纏頓入圓通義從根解結便是第二決定之宗脫纏等便是此宗之趣蓋言所以必欲從根解結者以不從根則不能脫纏而頓入圓通也此一義義短而文長義短者以所說圓通似惟始入住位較前涅槃義則短也文長者以一經要義下手工夫全在此科故不但本科較前為長次下釋二疑示倫次選本根皆所以足此科之義問圓通如何始入住位答圓頓法門功夫惟在住前住後則一超直入矣又此科對前科前是顯果遠而究竟此是顯因巧而證速也以經於六根尚選圓根文云圓根與不圓根日劫相倍何況較之從識從塵而入者則豈止於日劫之倍哉故知此之法門最巧而至速矣鍾云決定義謂決定而不可易者初義令審因地發心為進修基而指五濁為生死根本即虗空滅生者也令其擇之旋之而依圓湛不生滅性以成功次義令審煩惱根本使知所降服取如來位而指六根媒賊劫家繼以世界相涉之義備顯六根數量優劣令知所擇也既得無生滅性為因地心又審煩惱根本選擇圓根一門深入則六根俱降服而可圓成果地覺矣阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故則汝身中堅相為地潤溼為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投于淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是此發明第一決定以因同果澄濁頓入涅槃也阿難所謂第一義者凡一切功德皆在初心若離初發念則不成無上道汝等若欲捐捨小乘修菩薩一乘圓頓而入佛知見者應當審觀因地發心與果地覺位為同為異阿難若於因地仍用舊時名言所薰業種所起生滅識心為本修之因而欲求佛乘不生不滅真常之果如敲冰索火掘地覓天無有是處蓋生滅心有作無常者也不生滅心無作不壞者也以是因果須同之義故汝且遍觀諸器世間常無常品凡可作之法畢竟無常皆從變滅如夢幻泡影是也借曰不滅阿難汝又詳觀世間可作有為之法誰為不壞者雖有善壞然終不聞爛壞虗空何以故空非可作既無可作亦無可壞故然則欲求不生滅果須取無作不壞之因不應復用生滅心矣所以必取無生滅為因心者果何故耶良以衆生心海現為五濁昏擾無時清明今欲澄之以取涅槃妙德非湛圓不生滅性以為因心必不能也夫此湛圓妙覺明心本無昏濁何由而有昏濁則汝身中堅相為地如骨肉之類潤溼為水涕唾之類暖觸為火煩熱之類動搖為風呼吸之類由此四大所纏遂分汝湛圓本體裂為六根在眼為視在耳為聽在鼻舌身為覺在意為察所謂本一精明成六和合於本無分隔中自成分隔而從始入終共計有五重渾濁矣然何以謂之濁也阿難譬如清水清潔者其本然也若彼塵土灰沙之倫質則留礙而有形塊此二體者本來一定性不相干忽有人焉取彼土塵投此淨水則留礙者失其留礙清潔者亡其清潔而容貌汩然昏擾不定故名之為濁也吾謂汝濁五重亦復如是清淨覺心本與四大六根了無交涉由彼最初一念忽起遂分能所而清淨覺心渾濁不見與水之因土塵而濁者何以異哉阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成名衆生濁汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁此別明五濁相也阿難何謂五疊渾濁第一重者依於色陰即汝舉頭見空時四無邊畔不知誰為見而誰為空空與見混作一團而無所分別前云縱令虗空亦有名字是空本有清淨之體也今與見相混則空為擾擾之空而亡其空之體矣前云見空之時見非是空是見本有明了之覺也今與空相混則見為蒙蒙之見而亡其見之覺矣頑空妄見綿綿密密如經緯密織而妄相以成此第一重名為劫濁以見該四性聞覺知空該四大而山河等有成住壞空之劫也第二重者依於受陰湛圓中本無內四大之身相汝投胎時吸取父精母血而成四大之身於是見聞覺知元一精明本無留礙由汝四大壅塞不能通融無留礙者成留礙矣地水火風元是一物本無知覺被此精明領以為境令生覺受無知覺者有覺知矣一旋一壅如一經一緯密織而不可分故四大本無情之物由因妄織雖針鋒草刺咸有痛覺是以衆生堅起我見為諸見之王六十二見咸統於此此第二重名為見濁第三重者依於想陰又汝心中憶過去境識現在塵誦未來境如是虗習皆是意識用事此意識性發生妄覺此意識相容現六塵覺離六塵則覺無自相塵離妄覺則塵無自性二法更互相依亦如經緯密織緣塵盈念無時而不勞擾是第三重名煩惱濁煩擾也惱勞也第四重者依於行陰湛圓中本無生死但汝朝夕念念遷流生滅不停生從順習凡夫無不貪生故知見猶言形質也每欲留於世間死從變流而凡夫無自由分故業運猶云業識也每常遷於國土三界四生無不入也一流一遷亦如一經一緯密織而不可分遂有無邊生死由因此故流轉七趣變幻一切衆生之相是第四重名衆生濁第五重者依於識陰偏指第八不取前六汝等見聞六根元是一體而無異性祗因色聲等衆塵隔越故根為塵裂而無狀異生然本一精明事同一家故性中相知如眼亦知聞耳亦知見之類既成六用各開門戶故用中相背如眼不能聞耳不能見之類性中相知似同而非異用中相背又異而非同或同或異二不可定故俱失其準一同一異亦如經緯密織以此六根結滯而命託其中體用俱不自在是第五重名為命濁所以依於識陰者以根中無分別之見聞正是第八見分也此五濁者自一念晦昧為空之後便不得澄清欲復湛圓之體當亟求澄濁之方矣阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇生死根本依不生滅圓湛性成以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地修證如澄濁水貯於靜器靜深不動沙土自沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德見聞覺知衆生現具六根中性即本覺也常樂我淨如來無餘涅槃即究竟覺也此教以澄濁趨果之方也阿難凡夫本覺湛圓雖與佛同以有衆生濁則遷流生死故失真常以有煩惱濁則法塵勞擾故失真樂以有劫濁則空界無情故失真我以有見濁命濁則根身不淨故失真淨今欲即以具五濁之四性而遠契如來四德以頓證極果者其道安在彼生死根本者即六處識心也凡外權小悉取之而錯亂修習皆為因不同果今決定擇去而不用焉不生滅圓湛性成者即根中所具吾前十番顯示二見剖瑩近具六根遠周萬法者凡外權小迷昧之而日用不知今決取而依之既依此湛性即用此湛性以旋其虗妄生滅之五濁旋字極妙澄水者攬之使旋則塵自落矣而伏還元覺之體由是得圓明覺無生滅性為因地心則因同於果矣此是十信滿心自此歷初住以去至等覺為果地之修妙覺為果地之證然後圓成果地修證則果同於因矣再合前喻如澄濁水者貯於靜器靜深不動則沙土自沉而清水現前沙土即五重渾濁也靜器即根中性也清水即湛圓本體也到此田地名為初伏客塵煩惱方斷界內見思矣然前之沙土初沉泥猶未去喻若無明之伏而未斷也若去泥純水方可名為永斷根本無明而界外見思悉斷矣二種無明既盡則明相精純毫無纖翳任一切變現根身器界乃至示居生死互融六根隨意縱橫則無煩惱悉成妙用皆與如來常樂我淨涅槃妙德相為昭合亦如泥盡水純任攪不復渾也夫以涅槃遠果惟取契於因地發心如此汝等可不於審觀加之意哉問審因心而必因見聞覺知者何也答由此四纏分汝湛圓妙覺明心為視聽覺察故見聞覺知全是妙覺明心是則既由見聞覺知而成濁必由見聞覺知而澄濁所謂既從地倒還從地起也大智度論云譬如清淨池水狂象入中令其渾濁若明珠入水即清淨不得言水外無象無珠心亦如是煩惱入心能令心濁諸慈悲等善法入心能令心淨然垢淨不定真妄從緣若昧之則念念輪回遺失真性若照之則心心寂滅圓證涅槃是以楔出楔將粗接粗若不執妄尚不說空幻影潛消智光息𦦨矣第一決定以因同果澄濁頓入涅槃竟第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無相形無結解故則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界世界即世間也生纏縛故於器世間不能超越此發明第二決定從根解結脫纏頓入圓通也所謂第二義者佛慈利生雖急而施教須待發心汝等必欲發菩提心於菩薩一乘生大勇猛直欲圓滿六度萬行而決定棄捐權小舊修以生滅心為因諸有為相者其下手功夫安在彼生死是苦果根本即六識也煩惱是苦因根本即六根也煩惱既即六根是六識為生死根本而六根復為六識根本汝等應當審詳此煩惱根本從無始來現陰所發之業中陰所潤之生即求父母時憎愛等無明正是煩惱然誰為作之而誰為受之則根本可推矣蓋根即八識八識引起六識全是煩惱而為苦因六識招引生死而為苦果粗論似惟六識作之而細推實是八識自作現觀似當六識受之而六壞惟是八識自受故曰自作自受也可見六根為煩惱根本矣阿難汝修菩提若不審觀煩惱根本者則內而虗妄之根如四大六根之肉身外而虗妄之塵如虗空無情之器界皆不能知其顛倒在於何處處尚不知云何降伏此虗妄顛倒而取如來極果之位乎然根身器界雖極廣大而的實結處至為簡要不繁決當知而後可解也阿難汝觀世間以繩作結雖諸股共成結體而的實所結之處惟在一股若不真見而知之則終不能解苟能見之即知解之矣以喻明之除是虗空不被隳裂元無相形無結可解其餘有相形者有結必解也則知除是根中無形性體無結可解若六精墮於勝浮二根根有相形有結必解也然則孰為真實結處之體乎則汝現前眼耳鼻舌及與身心心即意根也此六根者與六識之賊為媒根引識起顛倒分別遂將如來藏中諸大家寶悉皆劫為外之六塵如世間外賊必賴家內奸人勾引指教方能成劫也家寶既劫則圓通者去而留礙者存雖欲不結不可得矣夫有情根身所謂衆生世間也無情器界所謂器世間也此之二法盡一切法衆生於二遍成纏縛皆不自在總為結體然的實結處不在器界惟在根身由此無始衆生世間生纏縛故根既結矣於器世間豈能超越得無礙乎是則根若一解不惟於身自在而於器亦超越得大自在矣後文觀音三十二應即超越之相也是故迷者求出三界悟者但解六根也人但知六識為內賊劫家寶不知招引內賊劫家寶者實六根也故知起惑是六根造業是六根受報是六根劫家寶亦是六根此六根者實為生死結元故前云誰作誰受後云自劫是呼應處阿難云何名為衆生世界但約根身非干器界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三一切衆生織妄相成身中貿遷世界相涉而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方四數必明興世相涉三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德此德字活看只當用字能字之意有千二百此約衆生世界以顯六根數量也行人已知解結必從於根然根乃有六解惟從一不可不擇欲擇根者當須通達六根數量不知數量憑何選擇此科所以顯數量也阿難云何名為衆生世界世屬於時以遷流不住為義界屬於處以方位定在為義汝今當知四正四隅上下為界則是方位有十矣過去未來現在為世則是世數有三矣此世界乃身中之世界也夫一切衆生皆由諸妄交織而成此身故世興界即在身中貿易遷流彼此相涉未嘗停住人自不知耳然界雖十方而十方中唯取四方為正不取上下以上下皆是四方之上下無定位故不取四隅以四隅之中以兩方交接而得名無定方故四數既明興三世相涉或世涉方而成三四固十二也或方涉世而成四三亦十二也宛轉俱是十二於是遷流變易自一而成三疊而一十百千數以次增焉今且以方涉世明之第一約四方各論三世共成十二第二於東方三世變一為十遂成三十南西北方亦復如是四方各三十成一百二十第三於東方三十變十為百遂成三百三方亦爾四方各三百成一千二百以世涉方例亦如此所謂流變三疊此世界自然之定數也夫身中世界即此六根數既定於千二百然則始於眼終於意總括六根各各功德亦千二百而已矣所謂在聖不增在凡不減其統具數量有如是也問身中世界世無可議界似不通何以故界有定位身常轉移故答身外可見轉移身中豈覺轉移如世界非真不動當亦時時轉動雜華經明世界游行往來過百千萬世界而世界中人但見不動不移豈能覺哉當知身中亦有定位界外亦見轉移何用情計乎又此千二百數但是統論凡夫所具非即真性勝用即如下文耳舌意三圓滿千二亦比餘根稍圓而已豈遍周法界之謂哉故知稱真聖人六根功德數皆無量且此科之意但是欲令選根不得不明數量非是正修行處而修行正意惟在耳根圓通長水剋意深擇畫圖示人乃謂修行意惟在此是雖別有理據而不知遮晦本修正意智者不應惑之也鍾云三四相涉以三乘四以四乘三俱成十二是一疊也即此十二一各變十成一百二十是二疊也即此一百二十十各變百成一千二百是三疊也阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼惟八百功德如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻惟八百功德如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身惟八百功德如意默容十方三世一切世間出世間法惟聖與凡無不包容盡其涯際當知意根圓滿一千二百功德此揀別隨方數量也諸方互有優劣而娑婆三優三劣仍可獨推一根最優故須揀別也夫六根數量以世界相涉論固無優劣矣然既謂之根豈無全缺既有全缺豈無優劣阿難汝復於此六根之中克定其孰為優孰為劣焉如眼以觀見為用者也不見後故暗見前故明以前方之明合後方之暗及左右旁觀是為四方以功德論四方各二百四隅各一百今眼所見前及左右三方已成六百并前二隅二百共成八百惟後一方二百及後二隅二百不見就一千二百而三分之今得八百是三分之二也就四方而四分之今見三方是三分言功也不見一方是一分無德也當知眼唯八百功德而不成圓滿矣如耳以聽為用者也然其聽最周十方無遺動而有聲便知其若邇若遙靜而無聲更徹於無邊無際如十方擊鼓十處俱聞萬籟寂然萬境不礙當知耳根圓滿一千二百功德於諸根為最優也如鼻以嗅聞為用者也嗅則通出入息然有出有入而闕中交如調適之息出盡少停後乃方入當少停時所謂缺中交也息既有缺功豈能全故惟八百已矣長水曰出入中交共成三分一分四百闕于中交故惟八百而已如舌之為用不論嘗味而論宣揚盡諸世間智出世間智皆能揚之雖言有方分詞或局也而理無窮盡義遍通也是故世諦語言至粗淺者皆通至理當知舌根圓滿一千二百功德亦云優矣如祖師聞淫詞而悟道出世智也孔子聽孺歌而警心世間智也若是則愚者之言亦具二智如身以覺觸為用者也觸則有違有順然合時能覺離中不知離中不知是缺一分合時能覺有違有順是具二分以身根三分驗之而闕離中之一當知身惟八百功德不成圓滿也如意以受熏持種為用者也故能默容十方三世乃至世出世法若凡若聖無不包容盡其涯際是則意根圓滿一千二百功德亦云優矣六根功德數量有優有劣為汝所當克定者如此問通達一切法者則能包容盡際而未通達者無有此能何均稱圓滿答意根本具此能而愚者不能引發非意根之罪也譬如剛刃本能解斷而拙工不能磨礪非剛刃之罪也阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根領納塵境為受發作功能為用誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根但云悟圓者語略也蓋選根取離深圓而捨合淺缺今以六義推驗則隱然惟耳根全當其選良以眼雖同為離知而深圓不及舌雖同其圓滿而離深不及意雖同其深圓而純離不及也然則三義具全者惟耳根而已逆彼無始織妄業流得循圓通與不圓根日劫相倍我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨上顯六根功德有全缺已此令其揀選六根之中誰為圓根也阿難六根既為煩惱根本即是生死深源故順之則生死始逆之則輪回息汝今欲逆生死欲流欲即五塵又名五欲從淺至深返窮流根務令生死源竭以至不生滅性者別無下手工夫應當勘驗此等能受用之六根誰為合中知誰為離中知誰深而難測誰淺而易知誰為用具而圓通誰為用缺而不圓若能向此六受用根中自推自勘悟得何者是圓通根可用之以逆彼無始塵欲交結流生死者既得循此圓通若與不離不深不圓之根較功量德有如日劫相倍矣今我備顯六根中湛圓明性乃是衆生本具箇箇皆同非由修行造作而然其功德有全有缺數量如是但隨汝意樂詳擇其中有可入處朗然無疑之謂悟決定取用之謂擇悟須自悟擇須自擇不與說破何根也吾當發明漸次修行功夫令汝直往向前不生退墮然我心欲令汝自擇而不為汝擇者亦自有故良以十方如來隨方之機千差萬別任於十八界乃至七大一一修行門門可入皆得圓滿無上菩提曾無優劣供人揀擇所謂聖性無不通順逆皆方便也但汝下劣之根未得圓通自在智慧於六根門頭未免室礙故我宣揚令汝在六門中獨選一門深入若深入一門得一根無妄則一解一切解彼六知根一時清淨皆得解脫不勞餘力矣夫上來六義推驗耳根既已密示且由悟而修由修而證則解結功夫大槩已略周矣開頭一逆字是轉凡入聖之妙用如流逸奔色順也返流旋一逆也又如易之地天為泰天地為否地山為謙山地為剝皆逆義也故曰五行順行大地火坑五行顛倒大地法寶易逆數也要知修行無別巧妙只此逆字該括無餘按後觀音圓通入流忘所等即逆生死流也聞所聞盡等即返窮流根也寂滅現前即至無生滅也鍾云淺深二字注多不妥吾意合離揀鼻舌身三根圓不圓揀眼鼻身三根此是專揀意根當承欲流說來以心念紛為緒為欲流之深者覺觀出思惟為欲流之淺者深則難足淺則易乾也又云動若遐邇靜無邊際者隨彼之動似有遠邇在我之靜周聽無邊也阿難白佛言世尊云何逆流深入一門能令六根一時清淨此因解不明徹故躡前二意以請益也阿難白佛言世尊佛謂欲逆生死欲流至不生滅矣不知何者是生死欲流是我所當逆者又言六根功德既有優劣則根根不同云何一門深入而六根一時清淨料世尊必有說以處此矣此問不同後疑蓋疑為信之不及而辨定是非問為解之不徹而請益開示故佛下答但是足前示而更加詳明與之增解非與之斷疑也約明此之問意方了後之答文矣佛告阿難汝今已得須陀洹果已滅三界衆生世間見所斷惑見諦所斷之惑即八十八使亦名見流謂意根對法塵起分別見因此見惑流轉三界不能出離故斷此見惑即證初果入見道位也然猶未知根中積生無始虗習彼習要因修所斷得修道所斷之惑即九十一品思惑也又名欲流有流無明流欲流者謂五根貪愛五塵名為思惑由此思惑流轉欲界不能出離故名欲流有流者因果不忘名之為有謂色無色界思惑因此思惑流轉色無色界故名有流無明流者無所明了即三界思惑中癡由此無明流轉生死故名無明流斷此三流即證四果由二果至阿羅漢皆名修道故曰修所斷惑也三界衆生世間者以四住見思皆界內所斷非已出世間者所斷也以上明其我執未盡也何況此中生住異滅分劑頭數生住異滅者即菩薩所斷之惑天台目為界外見思是也又名同體無明總攝法執中分別俱生微細之惑所謂塵沙無明合為一住也按起信三細中之業相是生相三細之後二六粗之前三為住相六粗之三四為異相第五為滅相而第六不與焉分劑頭數者謂初住以上至於妙覺四十二品也粗分四十二品細分則應無量矣以上顯其法執全在也此先答其所當逆之流相也佛告阿難汝雖已從凡入聖證初果而預入聖流然只斷得見惑至於第八賴耶識中現行種子無始習氣必因修道所斷者謂之思惑汝猶未知在界內見思且然何況此賴耶中生住異滅同體無明所稱界外見思者數量極多豈汝二乘所測之境哉汝問如何是流即汝未斷之思惑及塵沙無明之別惑是乃欲流所在而汝所當逆而反窮者矣向後五卷中之三空六結皆由此立而證道分之所斷者亦此也今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生汝須陀洹雖得六銷猶未亡一如太虗空參合羣器由器形異名之異空除器觀空說空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是此下答一入六淨之義故先辨本無一六也佛言汝既不知一入六淨之故汝且審觀現前六根畢竟是一畢竟是六阿難若言是一則應耳可見而目可聞頭可履而足可語矣而今胡不然若言是六則身口與耳宜各不相關矣胡為問法之時既用耳聞口復問義身復欽承乎是故應知若不是一決當是六以用中相背故若不是六決當是一以性中相知故決非汝根元有一定之一又元有一定之六阿難當知是根既非有一定之一六而今現有一有六者皆由無始一念顛倒與外六塵固結一處交淪互替於本圓湛中一六義生博地凡夫執之為六淺解學者執之為一而曾不達圓而非一湛而非六之本真復何一六之可得哉今汝雖證初果不入六塵已得六銷決非執六但根中虗習尚未曾除執有涅槃猶未亡一此正所謂淺解學者執之為一也一既未亡則六根種子一一具在宜乎不知一入六淨之義矣且湛圓妙性之墮六根正如大虗空之參合羣器然由器形有方圓長短之不同因參合故而遂謂虗空有異設令除器觀空亦可說空為一矣殊不知其一其異自在器形彼太虗空豈為汝之言說而真成同與不同哉既不為汝成同不同何況更名此太虗空是一非一然則說空為異為一者真妄矣虗空既然則汝了知六受用根亦復如是因結根而說性為六銷根而說性為一此亦徒言說而圓湛豈為汝之言說真成一六之殊哉由此根性本無一六所以一解而六即銷也鍾云雖得六銷猶未亡一諸解紛然蓮師曰只消用本色語經云元依一精明分成六和合茲已銷六和合却守一精明也又言除器觀空寧欲除空耶蓋不病其空病執有一空耳執有一精明亦猶是也并一俱亡方證心體虗空耳同即一也不同即異也一異并遣復遣非一知虗空之同異是非了無所立則一亦并亡而圓湛不分矣由明暗等二種相形於妙圓中粘湛發見初成見精見精映色結色成根根元目為清淨四大成勝義根因名眼體如蒲桃朵眼根微塵在眼星上傍布而住如頗胝迦不相障覆浮根四塵四塵指色香味觸而影略聲法詳其文義猶曰於諸塵中云爾流逸奔色成浮塵根由動靜等二種相擊鼓動於妙圓中粘湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉耳根微塵在耳穴內旋環而住如卷樺皮浮根四塵流逸奔聲由通塞等二種相發引起於妙圓中黏湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪在鼻頗內背上面下如雙爪甲浮根四塵流逸奔香由恬變等恬即是淡無味之味也變即五味之總有味之味也二種相參雜和於妙圓中黏湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味由合離等二種相摩際交也於妙圓中黏湛發覺覺精映觸搏攬取也觸成根根元目為清淨四大因名身體如腰鼓顙腰鼓俗名杖鼓顙腔也細腰而以革鞔其兩頭杖似人身浮根四塵流逸奔觸由生滅等二種相續於妙圓中黏湛發知知精映法攬法成根根元目為清淨四大因名意思意之浮根即肉團心狀如蓮華開合中有一竅此由最初吸取父母精血時而意即附著於中以奔法所謂無明殼也然在身中人不可見故用思字以明有思量處即其所在也如幽室見處明者不能見暗中一物而處暗者能見明中諸象蓋意根處此杳冥昏默之地為前五根運籌布策故以此狀其知體也浮根四塵流逸奔法此明根結由塵也夫湛圓妙心本無黏著最初何故有見由於明暗二種色塵相形互顯於妙圓中黏却湛性如膠之黏物一般湛性被粘而引發妄見然猶未成根結也既而見精復映此明暗二色混作一團遂攬結色塵成勝義根此根即是最初清淨四大所成故曰根元目為清淨四大然微細難顯唯聖天眼方能見之凡夫莫覩非浮根所能比也因有勝義根為之本元方成眼體如蒲挑朵粗相顯著凡夫共見是為浮塵之根於諸塵中流逸奔色惟以色為所緣之境而循色流轉無有已時眼根結矣即是推之由動靜等二種相擊云云流逸奔聲耳根所由結也由通塞等二種相發云云流逸奔香鼻根所由結也由恬變等二種相參云云流逸奔味舌根所由結也由離合等二種相摩云云流逸奔觸身根所由結也由生滅等二種相續云云流逸奔法意根所由結也流如水之趨下逸如獸之出押奔如馬之馳坂其順而莫遏之勢如此欲得塵忘結盡非用逆法其何以制之哉賀云上文既曰非一非六然則何由而有六根之異故此出其根由見得妙圓性中本非有六但由黏妄發光遂至流逸耳黏結卷絞博俱是結之別名與前相織一意阿難如是六根由彼覺明有明明覺失彼精了粘妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄此牒上因塵有結是以離塵無體也阿難如是六根皆由性覺湛明之體一動而轉為能明之明覺遂失覺明精了之體由是粘明暗而發見粘動靜而發聽等凡六根精光皆是粘妄所發是以汝今見不出色若離暗離明則無見體聽不出聲若離動離靜則無聽質以至離通塞而無嗅性離恬變而無嘗性舍離合而無覺觸外生滅而無了知若是乎根之不能脫塵也然所謂無有見體者但無聚見於眼結滯為根之妄體非并其照用自在之常體而俱斷滅也餘五亦然奈何阿難誤認又有下文斷滅之疑哉孤山曰由彼覺明真明也有明明覺妄明也迷彼真明故云失彼精了成此妄明故云粘妄發光汝今以下泛論離十二塵元無六根結體非正教脫塵之功功在下科也汝但不循一大功夫惟在不循二字所謂簡則易能真圓頓上乘也動靜合離恬變通塞生滅明暗此以耳身舌鼻意眼為序者佛言隨便自在無他意也如是十二諸有為相有為屬生滅法隨拔一根脫粘內伏伏歸元真發本明耀耀性發明諸餘五粘應拔圓脫不由前塵所起知見知見舉意眼而該餘四也明不循根寄根明發由是六根互相為用此正教以脫塵功夫也夫六根之先原是互相為用的特以為塵所結故滯礙不通耳汝欲拔根先須忘塵如動靜以至明暗十二塵相皆是有為生滅之法汝但不循之而轉則塵不能粘我矣然亦不必六根盡拔也應當選一圓根為下手處念茲在茲并力於一而先拔之若使一根外脫而忘塵內伏而盡根根塵不相偶合則熟處漸生生處漸熟自然伏還元明本覺之真體從此更不粘妄發光而本有常光逈然獨露耀天耀地若是其耀性發明則諸餘五根粘結應時齊拔悉得圓脫矣至此則外不由塵心光遍照不假外緣而起知見等內不循根照用遍周不用勝浮二根但權假二根示為照明之相而實不全由也佛菩薩之視不俯仰不回轉蓋由不全用根故也由是根塵雙脫之故現前六根互相為用眼亦能聽耳亦能視鼻亦能嘗舌亦能嗅意亦能覺身亦能知有時一根能作諸根之功有時諸根仍作一根之用六用皆遍六門互通斯於衆生世界無復縛礙而內之根身既已得大自在矣不循猶不隨也此不字即是制奔色奔聲之羈靮也與前逆字反字旋字同意但不循但字妙甚所謂歇即菩提也順則由覺明說到粘妄發光逆則由脫粘說到覺明圓妙此自然之序也阿難汝豈不知今此會中阿那律陀無貧無目而見跋難陀賢喜龍無耳而聽殑伽神女非鼻聞香驕梵鉢提牛相異舌知味舜若多神主空神無所覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念此恐凡小久執六用必循於根驟聞明不循根疑而不信故引此以證之令其信及也阿難明不循根豈獨圓脫之後能然哉汝今觀此會中阿那律陀無目也而能見矣跋難陀龍無耳也而能聽矣殑伽神女非鼻也而聞香矣驕梵鉢提異舌也而知味矣以至舜若多神無身覺觸以無身故如來拔苦光中映令暫現旋成風質其體元無而覺觸自若也又如諸修滅盡定者六七二識分別俱生我執悉斷寂無心念如大迦葉者久滅意根而圓明了知不因心念而有如上六人或是凡夫業報或是小聖修得斯皆妄力尚不依根何況圓脫豈無互用情界哉合論曰如蛇以眼聽不必疑跋難陀龍也蛟無目而能行水母得蝦乃能行不必疑阿那律陀也螻蟻以身為鼻不必疑殑伽神女也蜂以腋為舌不必疑驕梵鉢提也如風無形物拒之則怒不必疑舜若多神也嗚乎衆生爭於口耳鼻舌數寸之間自以色香味觸為異可不哀哉阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷冰應念化成無上知覺此牒根身既超而器界亦超也阿難今汝諸根患不能圓拔耳若圓拔已寧獨六根互用而已哉吾見內瑩發光心光融鎔洞徹表裏如是浮塵畢竟虗法及器世間山河萬物染淨苦樂諸變化相如湯銷冰應念化成無上知覺翻苦作樂變穢為珍乃至大小互融一多不礙無所不可而無情滯相全成法性土矣是知六根未解非惟器界不得自在雖根身亦不得自在六根既解非惟根身得大自在雖器界亦得大自在矣故學者但當解根無勞出界也發光二字與上黏妄發光正相應彼所發者妄光也此所發者真光也阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙此恐凡小過慮圓妙未發先銷根塵萬一根塵既已雙失而圓妙又或不發豈不落空故此驗不藉緣令其進銷勿畏也阿難我謂明不循根寄根明發者豈無證哉即如見性本周法界而彼世人由顛倒故但聚見於眼謂離眼別無見矣假令世人正當聚見於眼時忽然急合其眼則暗相現前毫無所見設復有人當其前立則六相黯然不復知其頭之與足然此合眼之人以手循彼外人之體而撫摩之雖不假眼而頭足一辨了然無惑是則暗中所知與明中所見知覺是同了無有異故知緣塵之見尋常必因於明者若離明而暗則成無見若不藉明而見自發者是不明之明無見之見則諸暗相永不能昏此謂明所不能明暗所不能暗者誰謂見必藉明而有耶彼凡夫之眼尚不藉明而見何況根塵既銷真光獨露之人而猶謂覺明不成圓妙也哉汝但求銷根塵勿愁圓妙不發矣合前觀之則解根下手功夫略已發盡但未說出一門的指何根而已學者潛玩而有得焉則圓通修證思過半矣決定從根解結脫纏頓入圓通竟又通前二義論之前一義為略示因果全功令懸知究竟極果後一義為詳示初心方便令切曉下手工夫分門以定二決定義已竟阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應世尊如果位中菩提涅槃真如佛性菴摩羅識白淨識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽根惟略舉前二離於明暗動靜通塞塵乃略舉前六以該其餘畢竟無體猶如念心即六處識心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先說湛精圓常違越誠言終成戲論云何如來真實語者惟垂大慈開我蒙吝佛謂離塵無有結體阿難誤謂離塵全滅性體故謬起斯難也白佛言世尊如佛說言若於因地以生滅心為本修因而求佛乘不生不滅無有是處則是欲求常住者必因地覺心與果位名目相應同一常住然後可爾世尊如果位中斷五住而得之菩提斷二死而證之涅槃經煅煉而成之真如因磨礱而顯之佛性與夫離垢之白淨識出纏之空如來藏轉識之大圓鏡智此之七種名雖差別皆是如來自證法門清淨圓滿體性堅凝一得永得更無變遷喻如金剛王常住不壞者然則欲獲此果必用不壞之因明矣今又云離明離暗無有見體等若此見聽諸根離於明暗動靜通塞諸塵而畢竟無體者則與如來前破七處識心離塵無有乃至等於龜毛兔角者豈不相同乎夫既離塵無體則是畢竟斷滅之法佛既言生滅為因不可獲常住之果矣云何將此畢竟斷滅為因地心乃欲獲如來七常住果是何異邀空華而結空果耶世尊若離明暗見畢竟空是根性離塵無體也若無前塵念自性滅是識心離塵無體也我今進以識心推退以根性審循環反覆微細推求分明根識不異若離前塵決無我心及心處所矣夫真因方可剋果今既成斷滅又將何物立因而欲求如來無上知覺乎且此見性既已斷滅矣云何如來先說見性是湛是精是圓是常是則違越誠言亦成戲論今而後知如來自謂真實語者亦未敢信也我之蒙昧吝嗇若是惟望垂大慈悲開我蒙吝俾至於豁然無疑焉賀云阿難非誤認結體為性體也意謂結可亡六根不可棄如佛所說此見聽等離塵無體則六根與攀緣心俱是生滅之物俱當決定棄捐矣乃世尊又教我於六根中循圓通根深入一門是以生滅之因求不生滅之果得無因果名目不相應耶不知六根粘妄之光有生有滅而六根中見聞覺知之性原未嘗生滅也認六根為圓明覺固不可謂六根之外別有圓明覺無生滅性亦不可世尊擊鐘一段機緣乃就六根門頭未有粘妄之光惟一妙覺明體綿綿不絶炯炯常存者顯示無生滅之性耳故後卷云生死輪回安樂妙常同是六根又云無生滅性在六根中如金在礦中見道分恐阿難認礦為金故就見精中指出二種妄見修道分恐阿難離礦不見金故就六根中顯出一段聞性所謂旋妄伏元者只是銷礦成金而已佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因顛倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑此欲即事驗常以釋疑而先責其顛倒也佛告阿難汝惟好學多聞而不暇盡漏故汝心中只曉得顛倒為諸妄所因其實真正顛倒現當汝前反不能識亦如說藥人而實未見真藥設我更有開示恐汝所執甚真一時不伏故我姑設方便且將塵俗易了之事為汝發明汝必因此而除疑矣即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞否阿難大衆俱言我聞鐘歇無聲佛又問言汝今聞否阿難大衆俱言不聞時羅睺羅又擊一聲佛又問言汝今聞否阿難大衆又言俱聞佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絶則名無聞此擊鐘以驗常也即時如來命羅睺羅擊鐘一聲問阿難言汝今聞否阿難大衆俱言我聞若是了事人只銷羅睺一擊疑團粉碎何須再審世尊見其隨風倒柁故於鐘歇無聲而再詰之則又答以不聞又再擊而再審之則又答言俱聞此時阿難鼻孔已在世尊手裏遂雙開二難而以云何聞云何不聞拶之終欲令其在聞聲邊究箇落處也爭奈阿難錯轉一語而曰音響雙絶則名無聞豈知堂堂佛弟却與斷滅外道同流哉是則不識自己恆常之聞性却狥聲塵生滅之聞相豈非迷本聞而循聲流轉者乎先德云顏色規模恰似真人前拈弄越光新及乎入火重烹煉到底終歸是假銀尊者之謂與如來又敕羅睺擊鐘問阿難言汝今聲不阿難大衆俱言有聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大衆俱言有聲佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絶則名無聲此復令擊鐘再驗也文義同前但前聞屬根今聲屬塵根塵不同故須再驗耳佛語阿難及諸大衆汝今云何自語矯亂大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲惟聞與聲報答無定如是云何不名矯亂此直責矯亂也佛語阿難及諸大衆汝今何故自語矯亂耶阿難大衆一齊問佛我今何為矯亂不自覺也佛言我問汝聞汝則言聞又問汝聲汝則言聲惟聞與聲必有分矣而問聞答聞問聲答聲隨風倒柁言無定準非矯亂而何阿難聲銷無響汝說無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無此句只重有無二字不重知字猶云所知之有所知之無也自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者是故阿難聲於聞中自有生滅非為汝此為一句聞字連下句讀之聞聲生聲滅令汝聞性為有為無汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性此破申正意也聲有生滅聞乃常存是其正意審之不悟故與申明而破其誤執之深惑也釋迦父子既借鐘聲與阿難說法竟復與鐘聲添箇注腳故告之曰阿難鐘聲初歇之時只是無響非是無聞汝乃說無聞者若果實無聞則汝聞性隨聲已滅汝則同於無知枯木當鐘聲更擊汝應不聞乃我第三次審又云何知而言俱聞耶更擊仍聞則汝聞性不隨聲滅明矣是則所知之聲有聲無自是聲塵而或有或無豈彼聞性因聲有而成有因聲無而成無也若使聞性實隨聲滅而名之曰無則當我第二次審時汝復將何性知其為無聲乎是故阿難聲於聞中實有生滅聞於聲中實不隨生滅則為根為塵斷非混濫也明矣夫斷常縱使難定根塵宜當易分而汝現今尚且顛倒惑聲為聞於易分者而不能分何怪以根中之常性而惑為斷滅此固於難定者而益不能定也今既解此不應復執離塵無性矣如重睡人睡熟牀枕其家有人於彼睡時搗練舂米是人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響夢中怪鐘醒時說鼓互影略也阿難是人夢中豈憶靜搖搖即動也開閉通塞兼肉耳也其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅此引夢驗常也前阿難領佛離動離靜元無聽質之旨而起根性斷滅之疑今擊鐘之示有聲驗之於動無聲驗之於靜而實未及動靜雙離以驗之故此再引睡中雙離動靜時以驗也且聞性不滅更有一證如重睡之人熟眠於牀枕之間其家有人搗練舂米砧聲碓聲雜然交作其人夢中聞舂搗之聲識昏境倒或以為擊鼓或以為撞鐘又於夢中自怪其分明鐘也何故作木石響耶於時忽寤如是杵音矣乃告家人我正夢時聞此舂音將謂鼓響耳無論其舂杵是真鐘鼓是假總見其歷歷耳根處阿難是人正在夢中時舉身皆忘豈復有動靜二塵及開閉通塞之肉耳為其所記憶然而其形雖寐聞性不昏則此性離塵不滅又有明驗矣且非惟夢中不寐即死後亦不寐極而論之縱汝形銷命謝眼光落地時此性常存豈為汝形銷滅而亦與之俱滅乎此處阿難仍富更有一問問云既此根性動靜無關生死不礙如來何言離動離靜元無聽質乎佛應答云我言離塵無聽質者為無聚聞於耳結滯為根之聽質也此質若忘則遍周法界之聞性方以全彰豈令翻成斷滅乎如此方明出元無聽質之故顯其自是阿難謬解非佛自語相違也不然則佛前言離塵無質後言離塵有體終無以解自語相違之難矣吳興曰阿難通疑六根無體如來所以單顯聞性為常者為欲發耳根圓通之機也舂搗認作鼓鐘但取聞性不昧縱汝形銷四句更進一步謂非惟夢中不昧即死後亦不昧也以諸衆生從無始來循諸聲色逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺此結示迷常逐斷故有輪回棄斷守常即成正覺也夫聞性不隨生滅如此然則塵豈可逐而性豈可不守哉以諸衆生從無始來逐妄迷真循此色聲諸塵逐念流轉曾不開悟根中之性淨而不染妙而不縛常住而無生滅其起惑如此既不循根中所具常性而流逸奔塵造諸塵業由是六趣遷流生生流轉苦果無盡而惑業苦三具足無缺矣若能棄此生滅而不奔諸塵守於真常而旋根反照即所謂脫粘內伏也即得常光現前所謂伏歸元真發本明耀也根塵識心應時銷落所謂耀性發明諸餘五粘應拔圓脫也且不特此也根塵識心既已銷盡到銷落之後心中純想湛一之體即所想湛一之相更是一種最細難除之塵而即此不捨湛一之心亦是識情名為法愛更是一種貼體難刮之垢若能於此二俱遠離粗細塵垢淨盡無餘則汝法眼當下清明便是正法眼藏云何不成無上知覺乎蓋法眼清明雖方至於初住然因地真正則果無紓曲而從初發心必成正覺矣至此湛一亦忘又何六根之可結哉喻釋根性斷滅疑竟學人問高城和尚云和尚夜後無燈時如何師曰悟道之人常光現前有甚麼晝夜學人云何不見和尚光師曰擬將什麼眼見學人云世人現在同將眼見師彈指曰善哉一切衆生根塵相涉從無始來認賊為子至於今日常被枷鎖汝將眼見意識分別擬求佛道即是背却本心逐念流轉如此之人對面隔越
