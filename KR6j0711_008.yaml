body:
  text: 巴縣居士非眼劉道開纂述成都沙門離指方示鑒訂上約無明熏真如而成染用為十二類生之因已竟此下約真如熏無明而成淨用為五十五位菩提之因也阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想此結前起後也阿難如是十二衆生一一類中亦各各具十二顛倒一則現起餘則冥伏猶如揑目亂華發生究其所以皆是顛倒妙圓真淨明心而有由總括現互具當成一百四十四生如斯亂想畢竟虗妄非實而淨明真體固自若也翻染成淨而進階聖位復何難哉賀云迷時一類中各具十二顛倒故修時一一位中亦各具諸位功德此五十五位大宗旨不可忽過汝今修證佛三摩提於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露此明就染翻淨也前問至何漸次得修行目故云汝今修證佛三摩地耳門三昧者別無方便還於本顛倒因元所亂想中立三漸次方得虗妄除滅蓋翻染成淨必從染處下手所謂當處出生隨處滅盡也譬如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露淨器喻根中所具不生滅性本來元淨之體也除去毒蜜喻除助因刳正性也灰湯洗滌喻違現業也後貯甘露喻安立聖位也先德云影由形起響從聲來弄影勞形不識形為影本揚聲止響不知聲是響源除煩惱而趣涅槃喻去形而覓影離衆生而求佛果喻默聲而求響故知迷悟一途智愚非別是以修證佛三摩地必從本因元所亂想入也賀云淨器所謂幻化空身即法身正指六根也若不生滅地豈貯毒蜜亦豈可洗滌耶云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業此出漸次之名也云何名為三種漸次一者修習當專修耳根一門時便要除其助因二者真修當反聞功夫入手時便要刳其正性三者增進當反聞功夫長進時更要違其現業除此三種緣則甘露寂滅法顯矣昔青原初參六祖即問云當何所務即不落階級祖曰汝曾作甚麼曰聖諦亦不為祖曰落何階級曰聖諦亦不為何階級之有則知法無漸次漸次由人故如來觀機設教於無漸次中強立漸次無階梯處強立階梯若是上上根人知幻即離離幻即覺何漸次之有耶鍾云前説戒定慧為修行三決定義此一二漸次即戒也違現業即定也洗滌貯甘露即因定發慧也云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛説一切衆生皆依食住阿難一切衆生食甘故生食毒故死是故衆生求三摩提當斷世間五種辛菜是五種辛熟食發淫生噉增恚如是世界食辛之人縱能宣説十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次舐其唇吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為説法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難修菩提者永斷五辛是則名為第一增進修行漸次興渠根如蘿蔔出氣辛臭此方所無故不知也此別釋除助因也云何謂之助因阿難如是世界十二類生日用最切要者飲食若無飲食命不自全故依四食而住所謂人間分段而食鬼神歆觸而食禪天以思禪悅為食識天以識定續命為食是故佛説一切衆生皆依食住也食為命根之所係則甘毒不可不擇矣阿難一切衆生食甘則生食毒則死有非毒而實甚於毒者五辛是也是諸衆生求三昧者當斷五種辛菜蔥也蒜也韭也薤也興渠也皆所當斷也何以故是五辛者熟食則壯相火而發淫生啖則動肝氣而增恚生熟無一可者苟人而食辛縱能宣説十二部經口氣不淨十方天仙嫌其臭穢咸皆遠離諸餓鬼等聞臭而來因彼食次舐其唇吻是常與鬼住也天遠故福德日銷鬼近故長無利益且不惟天仙不聽經也并菩薩善神不來護定不惟招餓鬼舐物也且引魔王得其方便現佛身而為説法毀禁戒而讚三毒直至命終為魔眷屬受魔福盡又墮無間緣一臭惡之味引致阿鼻極苦有何難捨而不勇斷之哉阿難修菩提者既用初於聞中入流亡所之功又必永斷五辛是則名為第一增進修行漸次耳首標修菩提者而後言斷辛足見第一漸次必兼修習圓通若徒斷五辛何以遽謂之增進修行乎世人咸謂辛能避瘟常見天災流行勸人食辛以辟之由經觀之斯蓋招瘟之端而世人業力所使顛倒滋禍如此不可不知所警也云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無啖生氣阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險是則名為第二增進修行漸次此別釋刳正性也對助而言故曰正蓋淫殺若固有之物不待教而自能與身俱生與性俱有實生死之正性故當刳之也云何謂之正性阿難如是衆生反聞功夫入手而入三摩地矣又要最先嚴持清淨戒律蓋惟戒能生定也律制雖多而淫殺為諸惡上首所謂正性也持戒律者必永斷淫心不餐酒肉凡生鮮之物不經火者皆不敢食以無情生物尚不忍損又戒殺之至也如此方高柴不折方長茂叔不除庭草亦是此意阿難是修行人若不斷淫殺而能超出三界者無有是處以相生相殺未已故也且淫又為生殺之深源根心慣習最難頓捨修行人當觀淫欲猶如毒蛇而不敢狎焉如見怨賊而不敢近焉於是先持聲聞淫殺盜妄之四棄及尼加觸八覆隨之八棄執身不動而七支不犯後行菩薩清淨律儀於四重律從心止絶執心不起而一念不生若是其禁戒成就矣夫斷淫則不相生斷殺則不相殺無生殺業因自無生殺果報矣又加以偷劫不行無負債之業纍亦於世間不還宿債三業既除名清淨人是清淨人修三摩地其正行也持清淨戒其助行也正助雙圓將見父母所生之肉身不須天眼而觀見十方世界眼既睹佛耳又聞法親奉聖旨而非遙見遙聞得大神通遊十方界而往還無礙由是徹通宿命過去清淨明了得無艱險而未來不入惡趣焉夫觀見十方則眼根清淨聞法親奉則耳根清淨得通遊界則鼻舌身根清淨宿命無艱則意根清淨雖刳正性所得而孰非耳門妙修所發哉是則名為第二增進修行漸次耳賀云三業既除名清淨人修三摩地者因戒而修定也肉眼觀見十方世界者是天眼通即色陰盡相也覩佛二句是天耳通得大神通二句是神足通即受陰盡相也宿命清淨二句是宿命通乃想陰盡相也此皆因定而發慧也云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月為心快然妙圓平等獲大安穩一切如來密圓淨妙皆現其中是人即獲無生法忍從是漸修隨所發行安立聖位是則名為第三增進修行漸次鍾云諸經入地方證無生忍而此於信前已獲之者蓋諸經之所謂果乃此經之所謂因也因地與諸經異故經題曰如來密因耳此別釋違現業也云何謂之現業阿難如是清淨持戒之人其心已無貪淫內無貪淫故於外六塵不多流逸不許絶無而曰不多者以根中無始虗習尚未淨盡所對之塵猶在而現業猶未違也既不流逸於外則不隨前塵所起知見而旋歸元真外無所入而塵既不緣內無所出而根無所偶始得反欲流而全一精明於是六根對境不生分別如鏡照像而六用不行矣由根不接塵故十方國土皎然清淨譬如琉璃內懸明月何淨如之由塵不交限故身心快然妙圓平等如如不動獲大安穩何快如之於是一切如來深固幽遠之密交徹含攝之圓纖塵不立之淨一切變現之妙所稱果上四德者皆現是人心量之中是人不見有少法生不見有少法滅即獲無生法忍以此不生不滅為因地心然後漸漸圓成果地修證凡信以立基住以成德行以成己向以成物地以斷惑證真隨所發之行而安立聖位焉是則旋根忘塵正所以違其現業而名為第三增進修行漸次也乾慧前明列三漸次位乃經家硬派十信於其中以為圓通極位四果以上極果牽搭支離殊不可曉今特正之馮具區謂遍觀諸家之説不如熟讀經文良有以也阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣十方果乾有其慧名乾慧地欲習初乾未與如來法流水接此明乾慧地也阿難是善男子由前心無貪淫故至此而欲愛乾枯蓋前位但得身心俱斷此則斷性亦無故曰乾枯也由前六用不行故至此而根境不偶蓋前位但得六塵初泯此則心境絶待故曰不偶也由乾枯不偶則三界生緣逈不相及現前殘質果縛僅存不復續生子縛永絶矣由前身心快然等則心虗明矣至此則執其心之虗明純是一團智慧由前國土皎然等則通一慧性矣至此則慧性明圓鎣徹十方世界由前佛理全現則佛慧在我矣至此則成就慧身乾有其慧名乾慧地焉何以謂之乾慧也彼如來法流之水源泉混混時出不窮今現業初違欲愛最細習氣初得乾枯而根本無明全在未與如來法流之水相接無水以潤之故曰乾有其慧若一入初住分斷無明分證真理前與如來法流水接矣所謂乾慧者如此鍾云慧性圓明中已具金剛之體如極堅極利之舟載物濟物無所不可但流淺岸束不能如意自在發真如體相之用故曰乾有其慧然用雖有待而體已無虧入信以後水生舟動漸入漸活漸活漸廣漸廣漸深漸深漸忘漸忘漸近漸近漸到故有入流之舟有中流之舟有到岸之舟有倒駕之舟雖因果相應始終不離乾慧至圓滿菩提入莊嚴海則乾慧不足以名之矣此下十信位也孤山以為初住開出十心蓋為圓家住前不取證故不立位而以前三漸次總攝十信正脈從之似矣然經文於四加行前既曰是善男子盡是清淨四十一心於後總結又曰善能成就五十五位真菩提路若十信果在三漸次中如來不應明列其位備詳其數矣若謂圓家住前不取證即住後亦何嘗取證乎今準經文並準瓔珞經依舊開列十位特圓家信位雖與諸經十信名同而義實逈別耳即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住此明初信即信根也行人既有此乾慧心矣即以此心中於法流之中不受枝岐無諸委曲而一順流入焉向後與如來逆流相際從此始也既中中流入於是六根互用之圓情器雙超之妙開舒敷暢如華始開矣此之妙圓非同前位似妙似圓乃真妙真圓也乘此心開益加增進使真妙者益進於妙真圓者益進於圓是謂從真妙圓重發真妙如華正開矣由是妙信常住親見心佛衆生三無差別非同比量之信也但覺聖凡見息因果情忘凡我想法想及非法想俱時蕩盡而一切妄想滅盡無餘惟一圓通中道是純是真餘者皆雜皆妄確然信得及名信心住焉此位準解結當先得人空除第六第五結準圓通當動靜不生準四果當須陀洹果斷於我執分別即界內見惑也真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住此明二信即念根也行人至於信位前真信而非似信明了而由親見根根塵塵無不交徹而一切圓通由一切圓通故陰不能覆處不能局界不能隔三俱無礙因此遂能遠憶過去無數劫捨身與未來無數劫受身乃至業力所薰隨眠習氣如畢陵之慢身子之嗔等類微細習彰皆現在前是人皆能冥記毫無遺失惟念無遺故名念心住焉按別教二信圓通尚遠今斯位即云一切圓通故知齊於彼之二住也妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心此明三信即進根也行人既得信心住則妙圓者純是一真真久而精精極發化蓋由精故化至化益精也行人既得念心住而憶念無始習氣則無始習氣鎔盡無餘皆成智慧而通一精明由是本此真精真明而進趣於真淨之地精明即菩提體如如智也真淨即涅槃體如如理也以如如智契如如理不謂之精進心而何此位受陰盡而齊於小之二果也心精現前純以智慧名慧心住此明四信即慧根也前乾慧地曰執心虗明猶有執在至此心精現前則其執渾融成化矣又曰純是智慧猶帶是在至此純以智慧則日用在在皆慧並忘其是矣以用也謂識其寶而能用之也識其寶而能用不謂之慧心住而何前乾慧云純是智慧蓋斷惑之慧如夜向曉此云純以智慧蓋證真之慧如曉出日執持智明周遍寂湛寂妙常凝名定心住此明五信即定根也前位以見心朗徹故智慧純明而此智明若無定力以執持之則妄念起而偏局不遍正念失而間斷不常所謂無寂之照如風中燈也今焉執持智明則寂湛者周遍寂妙者常凝皆大定之相不謂之定心住而何此位想陰盡而欲界九品思惑已斷齊於小之三果也定光發明明性深入惟進無退名不退心此明六信即進力也上屬五根自此以下屬五力如果木結根既久有不可拔之力用也行人既得定心住已於是從定發慧而定光發明又不住於明而明性深入若磨鏡者愈磨愈明而明明不已有進無退蓋定慧偏枯多遭退失今定以發慧心不動而理畢現慧以入定鑑既徹而心常凝定慧互資交發無盡不謂之不退心而何前精進猶屬有心如馬著鞭此不退是無心如順風張帆心進安然保持不失十方如來氣分交接名護法心此明七信即定力也前雖不退而勤勇無間尚涉功夫至此雖精進而不見有勤勞之相故曰安然持心至於安然則優遊坦蕩永保無虞矣然所保持者何物即諸佛法身命脈也由我保持法身命脈而不失自然得與諸佛氣分相交相接通同吻合內護心法外護佛法而名護法心焉此位準解結當除第四結準圓通當聞所聞盡準四果當阿羅漢果斷於我執俱生即上二界各九品思惑也覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心此明八信即慧力也由前定力所持覺體曰覺明保持至此發為妙力即以己之妙力回他佛之慈光向自己心佛朗然安住猶如兩鏡對照影中含影重重相入傳耀無盡所謂心不離佛佛不離心也以其回他佛而向心佛故名回向心焉心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住此明九信即信力也以奉戒依於篤信故前位心光密回自心與佛光吻合即獲自性天真常凝不動之佛體與無上妙淨之大寂滅海常凝屬心妙淨屬境得佛此理心境一如從此安住無為毫髮不漏落於有為之境而得無遺失以不犯遺失之過故名戒心住焉此位準解結當空性圓明除第三結準圓通當覺所覺空為斷法執分別即界外見惑也常凝即常住真心常凝妙淨總是無為之相諸佛之戒心也一念有為遺失即是破戒住戒自在能遊十方所去如願名願心住此明十信即念力也前位住戒尚局不動之體至此漸發自在之用無求不達無適不可能遊十方國土而隨願往生名願心住焉此位準解結當成法解脫除第二結準圓通當空所空滅為斷法執俱生即界外思惑也十信位竟鍾云修行之初必枯絶愛欲使心性虗明然後能入妙圓真性真性明圓細習乃現因現遂化使純智無習又持之以定使寂湛發光深入明性護持不失斯則回佛慈光護佛淨戒而涉塵不染所去隨願十信之序也阿難是善男子以真方便發此十心即上十信心也心精發揮十用涉入圓成一心孤山因此一句遂判十信為此位開出然於五十五位等終説不去故難從矣名發心住此下明十住也住有二義一堅固常住意一生住佛家意據後文專重生住佛家也阿難是修圓通善男子以真方便發前十種信心中間不容一毫雜染其心精矣既精而心光顯現五根五力皆悉具足而一心即十心十心即一心涉入重重本無二體於是攝十用而圓成一心由此一心而結心始解萬行具足故名發心住焉此位準解結當解脫法已俱空不生除第一結準圓通當生滅既滅寂滅現前所謂菩薩從三摩地得無生忍者即入此發心住也行人入住之後別無功夫雖後位歷然如飛鳥上山但見山之層級分明而初不勞於登躡也賀云妙圓真心非一非十約用差別故有十相若十相不顯不名發心十相不融亦不名發心也心中發明如淨琉璃內現精金以前妙心履以成地名治地住由前發心住已心為能發明之智理為所發明之境智契於理如淨琉璃內現精金即以前十用所成初住之心為根基之地始堪踐履從此步步腳踏實地於一切時一切處練治心地自然生出一切善法增長大悲故名治地住焉前位如中陰攬先業而初成陰體此如中陰乘彼業力結為境界妄成依止處也雖云腳踏實地然圓家之言不足執也賀云觀治地二字則此位與十地相應矣十地不過圓滿此位耳心地涉知俱得明了遊履十方得無留礙名修行住由前治地住已心即智也即始覺也地即理也即本覺也心與地互相涉知同一覺體故俱得明了見之既明行之必到如此而遊履十方任運縱橫得無拘礙所謂百華林裏過片葉不沾身故名修行住焉此如中陰見遠如在目前所去疾速山壁不礙也行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住由修行住已依理起行行不越理本始同一正覺故曰行與佛同其行如此則為如來肩所擔荷則為如來衣之所覆受佛氣分前云氣分交接猶二也此云受佛氣分則合為一矣夫權智如父實智如母今任運相合如中陰身自求父母不通而通不入而入斯則秉佛遺體初託聖胎正如太子處胎貴壓羣臣名生貴住焉此當中陰與父母業同會合一處也既遊道胎親奉覺胤如胎已成人相不缺名方便具足住曰生貴住則既遊道胎矣攬佛權實二智而凝結聖胎如中陰攬父母赤白二渧而結凝滑等故曰親奉覺胤也斯則具足一切方便善巧度脫衆生克肖於佛無所之少如中陰六根成就人相不缺克肖父母是名方便具足住焉入胎而言遊者如永嘉云常獨行常獨步達者同遊涅槃路正此遊也容貌如佛心相亦同名正心住曰具足方便則容貌如佛矣不特外貌同佛而內心亦同是名正心住焉大經云此菩薩聞十種法心定不動所謂聞讚佛毀佛心定不動讚法毀法心定不動讚菩薩毀菩薩心定不動讚菩薩所行毀菩薩所行心定不動説衆生有量無量易度難度心定不動説法有量無量有成有壞若有若無心定不動唯其一無所動名正心住才有一毫心動則不得其正矣故寶積讚佛偈云毀譽不動如須彌於善不善等以慈賀云心相謂佛心不動之相也心定則不動正心即定心也身心合成日益增長名不退住心同貌合表裏如一則身心合成佛身佛心矣由是亭毒涵養漸漸增長名不退住焉前之不退心謂定慧不退此則性相不退也十身靈相一時具足名童真住外身內心一齊增長至此則菩提身願身化身力身莊嚴身威勢身意生身佛身法身智身一時具足具有如來智慧德相但具體而微其力未充名童真住焉形成出胎親為佛子名法王子住十身具足則形成矣至此赫奕熾盛則出胎矣堪紹如來家業具有如來寶藏之分所謂從佛口生從法化生親為佛子非法王子住而何故知凡稱法王子者皆九住以往也表以成人如國大王以國諸事分委太子彼剎利王世子長成陳列灌頂名灌頂住出胎為子則漸漸長成而表以成人堪行佛事矣既有成人之德可當大任故分之以政使之化導十方如國王以國事分委太子焉太子即世子也彼諸佛以智水灌菩薩頂即如剎利王陳列象寶金座取四大海水灌世子頂而紹隆佛法與承繼國統又何異焉是則名為灌頂一位而十住以圓矣第十法雲地名灌頂菩薩今此十住亦分得也若論圓教分真一位中具足諸位功德十住既爾下去皆然又此對權教已齊彼十地而彼之妙覺僅齊此二行彼妙覺位始云諸佛智光悉灌其頂今此位鄰近而加以圓人智強故即灌頂矣自發心至生貴名入聖胎自方便具足至童真名長養聖胎至王子住名出胎至此乃名灌頂王子也以上十信為積德之基十住為積德之漸至此位則道成德備若不度生行事是自了漢故廣行六度大作佛事而次之十行所謂恃源而往也再通上喻之十信前六心如人回心初造善業後四心如人加以念佛造往生淨業初住如以一生十種善淨之業圓成報終往生之中陰二三住如往生中陰無繫無縛四住如中陰求佛接引入蓮胎五住至八住如華中長養九住如華開見佛十住如親蒙授記也十住竟阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行此第一行施度也阿難是善男子出胎為子位灌頂住則既成佛子矣成佛子已則具足無量如來妙德浹洽於中故睟面盎背大喜遍身復廣行布施或財施或法施隨順十方願欲無求不與令一切衆生歡喜愛樂而無我想衆生想不見施者不見受者則近者慕其德遠者懷其惠名歡喜行不亦宜乎善能利益一切衆生名饒益行此第二行戒度也夫隨順歡喜則能利益衆生矣然內無德本何以利人此菩薩護持淨戒於色聲香味觸心無所著乃至不生一念欲想亦為衆生如是宣説令其咸住無上淨戒乃至自得度令他得度自快樂令他快樂是謂善能利益一切衆生名饒益行不亦宜乎鍾云戒有三種以饒益有情戒為勝九信獲佛戒心至此以佛戒為行矣自覺覺他得無違拒名無嗔恨行此第三行忍度也歡喜饒益則人皆親愛矣然能保無橫逆之妄人乎此菩薩常修忍法已能忍是自覺也教人能忍是覺他也於一切罵辱打辱皆歡喜忍受而無所違拒不但無所違拒亦無一毫嗔恨之心故名無嗔恨行焉鍾云此中六度不比常途有一人不受法樂便是慳施有一念不護衆生便是破戒有一念分別衆生便是嗔恨所以謂之圓也種類出生窮未來際三世平等十方通達名無盡行此第四行進度也自他並利順逆一如菩薩修此當日進無疆矣乃菩薩又修諸精進自第一精進乃至普遍精進共十種精進守此精進直至阿鼻種類盡出生而成佛窮盡未來劫數邊際終無一念退恨所以然者為知三世平等性故而行精進也為達十方知一切法界而行精進也夫種類出生即第一心盡未來際即常心三世平等即不顛倒心十方通達即廣大心四皆無盡故名無盡行焉賀云隨機應感現種類身窮未來際益物無量竪徹三世橫周十方此進度也首二句即衆生無邊誓願度次二句即法門無量誓願學一切合同種種法門得無差誤名離癡亂行此第五行禪度也夫布施持戒忍辱精進則定相將現矣此菩薩即以一念定心持一切法合同種種法門知諸三昧同一體性即有種種差別不能惑亂一一分明不爽毫髮夫定心不能持諸法門是為癡定於諸法門未免差誤仍是亂心今也得無差誤非離癡亂行而何梵語禪那此云靜慮今離癡是慮離亂是靜故屬禪度無疑矣則於同中顯現羣異一一異相各各見同名善現行此下皆智度也總一智度而開之為五例如六根本惑而開見為五也開此五種甚深般若所以融前五度中萬行皆令成智德矣今此一行乃理事無礙智也菩薩既一切合同種種法門使同中不能現異異中不能見同豈為融通智哉夫所謂同者即出世間平等法也所謂異者即世間差別法也今則同中現異於平等法中現差別法則理不礙事而真融於俗矣異相見同於差別法中現平等法則事不礙理而俗融於真矣真俗互融事理雙顯非善現行而何十住獲佛慧心至此以慧為行矣如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行此第七事事無礙智也菩薩不但同異互融擴而充之則大小相容一多無礙如是乃至十方虗空滿足微塵一一塵中現十方界所謂華藏世界所有塵一一塵中見法界是也界入塵而界不小是小不礙大塵含界而塵不大是大不礙小所謂極大同小不見邊表極小同大忘絶境界此由無著方能如是若有一毫執著安得大小互融耶故名曰無著行而智度居二矣鍾云著即留礙意無留礙則無著矣三住得無留礙是境不礙心此不相留礙是境不礙境種種現前咸第一波羅蜜多名尊重行此第八究竟彼岸智也同中現異異中現同小中現大大中現小則種種現前矣夫此種種變現全屬般若皆是法界無障礙智融之所以皆達彼岸莫非第一波羅蜜多六度中唯般若最為尊重故名曰尊重行而智度居三矣前五度若無般若皆墮事相惟招果報不達涅槃今五度萬行皆借智慧所以行行皆到彼岸誠不易得故華嚴名為難得行也先德云明明百草頭明明祖師意正所謂現前咸是第一波羅蜜多也鍾云此位攝上七行前屬世諦此屬第一義諦如是圓融能成十方諸佛軌則名善法行此第九説法度生智也如上圓融無礙德既同於如來行亦齊於諸佛是則一言一行皆合十方諸佛軌則從其建立究竟利他之教法隨諸衆生根性應時説法皆令歡喜故名曰善法行而智度居四矣此又攝上八行前自成此成就衆生行坐皆成軌則依稀天人師矣一一皆是清淨無漏一真無為性本然故名真實行此第十不違實相智也總前二種無礙自利利他諸行又通前五度合而言之一一皆是清淨無漏初非貪染於凡外欲有無明一一皆是一真無為并非劬勞於權小肯綮修證所以然者以從性起修不妨全修即性性乃本然不假權漸修成所以清淨不屬諸漏一真不墮有為也由無漏則非離妄修究竟成真因也故名真行由無為則非所作行畢竟有實果也故名實行至此則智度圓成而所説所行皆是真實矣通論智度所開五行前二是般若之體以二法界無障礙智乃甚深般若故也次二是般若之用謂波羅蜜乃趨果自利之用佛軌則乃説法利他之用故也末一攝前體用并前五度萬行總以銷歸自性會性歸元也此又攝前九行前方便此真實也從三漸次以來俱是無漏至此始得清淨耳十行竟此下回向十位也準華嚴經回向即是發願良以有行無願行必茫然有願無行願唯虗設故行願兼資方入如來大涅槃海矣此回向法不過三處謂回向衆生回向菩提回向實際也上十住十行出俗心多大悲行劣須濟以悲願處俗利生回真向俗回智向悲使真俗圓融智悲不二是名十回向亦名十願也阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅除度相回無為心向涅槃路名救護一切衆生離衆生相回向此第一離相回向與次位皆是回向衆生也阿難是已修十行善男子從初行以至第八現塵現界神通已極無少歉缺至第九行成佛軌則即成佛事已至第十行清淨無漏則純潔矣一真無為則精真矣十方備成則界內不為諸有留患界外不為滯空留患而雙超世出世間矣以此出而度生正當度生之時不見生之可度而滅除度相焉夫既度盡衆生不取度相則回有為行入無為心是回入真因也背生死途向涅槃路是趨向真果也菩薩如是回向之時度脫衆生常無休息不住法相是名救護一切衆生離衆生相也度生而存度相即著我人是添枷帶鎖非回向法如南嶽大師云三世諸佛一口吞盡何處更有衆生可度是真回向也此下四位與空如來藏相應壞其可壞遠離諸離名不壞回向此第二不壞回向亦回向衆生也由前滅除度相滅者壞也因其可壞而壞之故曰可壞由前離衆生相則於衆生之四相五蘊皆離故曰諸離今此菩薩壞其可壞并滅除度相亦不存遠離諸離並離衆生相亦不有既壞其可壞則有不壞者存依然度生事業也蓋上位雖度生而不著生相是謂我空此位雖不著相而不妨度生是謂法空此正悲智雙運自他二利之中道也有生可度不壞度生之悲故名不壞回向焉鍾云前文謂世間可作之法誰為不壞不聞爛壞虗空故曰不壞回向前位無衆生可度此位無佛道可求舊注指衆生説大牽強本覺湛然覺齊佛覺名等一切佛回向此下四位皆回向佛道而此位先明智同佛智也在我為本覺智在佛為究竟覺智此菩薩心佛顯現覺海澄亭與一切如來心精通同吻合法身平等無二圓滿諸佛如是回向我亦如是回向名等一切佛回向焉精真發明地如佛地名至一切處回向此第四至處回向境同佛境也由前本覺精真之體發揮妙用自己因地心中所含無邊境界全同諸佛果地所現無量剎土盡佛境界願此善根功德之力無所不至名至一切處回向焉賀云一月普現一切水故曰至一切處世界如來互相涉入得無罣礙名無盡功德藏回向此第五無盡回向躡前二位而成互融也由前所至之處即世界也所等之佛即如來也然曰自覺佛覺自地佛地猶分自他今則融一不分但言世界如來而自他渾具矣於是以世界涉如來則一毛孔中有無量寶剎莊嚴微妙以如來涉世界則一一微塵內有無量如來轉大法輪世界正涉如來時不礙如來即入世界如來正涉世界時不礙世界即入如來如是則佛身佛界各具無量莊嚴備表無盡功德菩薩住此回向得十種無盡藏所謂得見佛無盡藏見法無盡藏此皆以普賢大行願為根本華藏世界莊嚴所顯功德名無盡藏功德回向焉此下三位與不空如來藏相應於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向此第六平等回向亦回向佛道也菩薩既身土互融則同於佛地此無盡藏中各各出生無盡清淨因復依此清淨因而證清淨果所謂物物燈明智體頭頭普賢行門如金作器器器皆金善根平等名隨順平等善根回向焉大經云此菩薩或為帝王臨御大國威德廣被名震天下執持一蓋溥蔭萬方以四攝法攝諸衆生此則地中各各生清淨因依因發揮取涅槃道也鍾云地即二住治地之地但彼方耕治此則成良田矣生清淨因如良田中生出嘉禾也真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向此第七等觀回向文似回向衆生而實亦回向佛道也前位平等善根即真根也真根既成此根全修即性而此性攝盡衆生故十方衆生皆我本性然我根既成衆生齊成故性圓成就然菩薩雖見自他圓成不妨仍度苦惱衆生依舊廣行二施願一切衆生皆得成就大功德藏名隨順等觀一切衆生回向焉前位乃順自心與佛心平等此位順自心與生心平等合前則心佛衆生三無差別之理彰矣即一切法離一切相惟即與離二無所著名真如相回向此下三位皆回向真如也前之度生成佛攝盡萬法即一切法也離衆生相同本來佛離一切相也此菩薩惟即與離二俱無著不著即者超乎有也不著離者超乎空也雙超空有則中道矣惟真如以無著為相故名真如相回向焉足見入理轉深矣賀云前云遠離諸離者離之極也此則離亦不著矣七住云無著者不著於有為也此則無為亦不著矣此下三位與空不空如來藏相應真得所如十方無礙名無縛解脫回向此第九解脫回向也前位離即雙離名真如相若著真如相則又為真如相縛矣此菩薩併忘其如相名真得所如既真得所如則處處皆如更有何礙十方法界安往而不自在哉以元無有縛亦無有脫故名無縛解脫回向焉蓋前位是理無礙此位即理事事事二無礙也性德圓成法界量滅名法界無量回向此第十無量回向也由前無著獲性德之全體無礙獲性德之大用體用備具故性德圓成體無不遍用無不周是以一塵一毛皆等法界無復限量量滅即無量也蓋前雖如是猶在法界量裏尚未盡銷其限量今則根根塵塵周遍法界則限量情忘不墮諸數故名法界無量回向焉準以三德無著即般若無礙即解脫而無量即法身矣合十向而言之一悲不礙智也二智不壞悲也三本妙合覺也四因果同地也五依正互融也六性修雙即也七自他同根也八即離雙超也九真俗自在也十體用圓極也所以華嚴説位至此動地雨華諸天歌讚於乎盛矣十回向竟此下明四加行若據別教前三名資糧位資謂資具糧謂糧食謂所積既多所適必遠如適千里者必三月聚糧故假十住以成其內德十行以成其利他德十回向以成其自他互融之德萬德既備可入聖域然而猶有微礙於此故復立加行位自非世尊洞悉奧密孰能辨之故唯識論云現前立少物謂是唯識性以有所得故非真住唯識言少物者即微礙也此中則借別名圓名雖同而實不同以別教之初地僅與此之初住齊蓋圓教初住即斷一品無明從二住至十住各斷一品無明與別教十地齊次從初行斷一品無明與等覺齊次入二行與妙覺齊從三行以去別教之人尚不知其名字何況伏斷以別教但破十一品無明故也是知圓凡已超別聖況四種妙圓加行乎然唯識四種加行位各有能發定所發觀及所觀法今詳此經都無此意但以心佛二字對辨成四位而已故不同也問此經佛判六十聖位何同唯識復分凡聖耶答與奪同別二俱無礙若約圓初頓悟本佛故與其同是聖位若甄別淺深則信解之視真修不妨有凡聖之別但此圓凡已超別聖遠矣阿難是善男子盡是清淨四十一心次成四種妙圓加行此明加行為入地之勝進也阿難是修圓通善男子從乾慧一以至信住行向各十既盡是清淨四十一心矣然十信似修而實但滿其信心三賢似修而實但極其解心皆非真修也今信滿解極將入真修故次第而成四種妙圓加行焉不徒曰加行而必曰妙圓者以小乘通教皆有四加而非妙非圓故持標妙圓以顯非尋常加行焉前文云欲真已非真真如性三漸次是欲真之念初起從真妙圓重發真妙是欲真之念再起今四加行是欲真之念三起至初地而欲真之粗念斷至八地而欲真之細念亦斷至妙覺而欲真最細之念永斷矣華嚴以三賢為差別因地上為平等因通議依之謂四加行乃是遣差別因相極是即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地前云覺齊佛覺但是發願希求猶有覺在未能渾佛覺而為己心至是將趨聖果即用佛覺為己因心復加功行以求正證然佛見未忘欲渾而未能即渾故若出未出喻如鑽火欲然木而猶未然但有暖相而已故名暖地此位佛即是心也龍牙云學道如鑽火逢煙且莫休直待金星現歸家始到頭即此謂與又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地前云地如佛地亦是發願希求未能即己心而成佛所履至是始以己心成佛所履然己見未忘故若依而不可謂之依喻如人登高山身雖入於虗空而腳根點地尚有微礙未能挾日月而遊八表故名頂地此位心即是佛也心佛二同善得中道如忍事人非懷非出名為忍地總前二位即心即佛則心佛二同矣然曰用曰成猶存二相非中道也至此則全心是佛全佛是心而不偏於二邊為善得中道然謂之善得而尚非真得如忍事人既能容忍非如常人之懷恨然尚存忍受亦非如至人之頓忘其於所忍之事將忘未忘比於忍地菩薩將證未證故名忍地此位即心即佛也數量銷滅迷覺中道二無所目名世第一地前云善得中道雖心佛不分而有心有佛因果位別皆是數量至此則心佛兩融而數量始銷如迷中道者即是未覺位中之因心覺中道者即是大覺位中之果智數量既銷則下不見自心上不見佛智而迷覺中道二無所目蓋有迷有覺世人尚可指目不名超出今數量銷迷覺盡中道忘高出乎世人之上故名世第一地所謂只有天在上更無山與齊矣若進而登地方名出世超乎妙覺又名出世第一也此位非心非佛也南泉云莫認心認佛設認得是境古人喚作所知愚馬大師云不是心不是佛不是物皆謂此也唯識四加則空有二相未除此則心佛二相未盡故曰借別名圓也賀云世間如塵出世間如虗空有迷有覺粗塵也中道微塵也二無所目鄰虗塵也過此位便出世間如析鄰虗便是虗空矣此下明十地也地有二義一者成實蓋地以堅實為體故也二者發生蓋地以發生為因故也良以非住不能成德非積德不能自利非自利不能利他故衆德既成神通已就大願已滿之後復立四種妙圓加行以淘汰情量必使心佛兩忘纖毫不立中道不存然後登地謂蘊積前法至於成實一切佛法依此發生也據前文以果地覺為因地心則自發心住以至等覺皆屬因地究竟妙覺方為果地矣問既圓教初住以至等覺皆是分斷無明分證真理何故至此復用四種加行而後入地耶答若以頓悟言則因該果海果徹因源初發心時便成正覺何分階級若以修證言十地既稱真修顯地前皆是似修佛位既是真證顯十地亦是似證是則初心究竟理雖頓同而歷位淺深序而不亂圓融行布兩不相礙矣又按聖位本文二住即名治地而以前妙心履以成地又回向第四云精真發明地如佛地至四加行位位真地此皆因地也蓋地亦訓階良以十地方是真因而地前説地乃此真因之階地也今此十地應亦果地攝矣然佛地方是真果則此十地乃進證真果之階地也阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地阿難是善男子由前四種妙圓加行則心佛兩忘中道不立方得超出世間入佛真境於無上菩提三有衆生出世二乘以所知心不能測度者不惟通達而且善得通達之蓋實證親見而非同文字比知矣何謂通達即自心本覺與佛心妙覺圓融無二而覺通如來由一佛以至百千萬億恆河沙佛盡其境界皆此覺所通焉於是大喜遍身名歡喜地以念諸佛故歡喜念諸佛法故歡喜乃至入一切菩薩平等性故歡喜也異性入同同性亦滅名離垢地此明第二地也由前覺通如來則是斷九界異性十法界除了佛界自菩薩以下尚有九界也而入平等佛性名異性入同若但證此平等佛性而尚未能忘則佛境當情亦是清淨覺心中一點微垢故將此同性亦復滅除方得離垢清淨蓋異性是濁邊垢同性是淨邊垢故須雙離而後名為離垢地也良以四加中非心非佛數量銷滅方是異性入同此復將此同性亦滅進證離垢亦見增勝而成二地聖位矣按華嚴金光皆表離諸破戒之垢旨似頗異不必強同也鍾云唯識此地證最勝真如斷邪行障至此戒圓滿矣金剛心然後定圓滿妙覺位然後慧圓滿淨極明生名發光地此明第三地也前位方以離垢未至離離今復將離垢之離亦復遠離是為淨極淨至於極則真覺顯露是為明生譬如古鏡離垢之後更加拂拭則愈見光明自然之理也今生佛異同情垢細障既淨無餘則本有照用自顯泄而不容遏祕所謂淨極光通達也由此明生故名發光地焉此即內瑩發光也明極覺滿名𦦨慧地此明第四地也前位明生如火始然未至明滿今則如火熾然成大猛聚微細惑障皆所爍絶以稱性而覺故曰覺滿而名𦦨慧地焉不曰慧而曰𦦨慧者表如𦦨之慧有爍絶之勝用也此所謂明極即如來也鍾云前暖地譬如鑽火欲然其木至三地則火出此地則木然矣一切同異所不能至名難勝地此明第五地也夫地前智名異地上智名同若有異可及則凡情可勝有同可及則聖解可勝今由淨而明由明而滿則凡情聖解皆已爍絶一切異同遠離之久杳不相及故不能至至且不能孰能勝哉名難勝地賀云二地同異雙離止約衆生與佛菩薩三平等性此則總該一切法也約體如空有約相如垢淨約諦如真俗約道如中邊約位如權實約教如世間但是一切同異緣影悉皆爍絶逈不相干所謂生滅既滅也向後寂滅現前總從此始誰能勝之無為真如性淨明露名現前地此明第六地也夫自地前加功用行由賢希聖乃至入地銷異滅同明生覺滿由是逈超同異而有為功用最勝最極無能勝者至於極盡有為則無為真如性方顯現故以現前名地焉圓頓人發心即頓悟真如妙性然五住未破心垢未除其於真如尚屬比知豈即親證今由似修而歷真修極盡有為功用將至無功用行故於斯地無為真如方始顯現然而真如全體大用尚在第八九地此地方到無為始顯真如而已賀云此位正是寂滅現前盡真如際名遠行地此明第七地也前位真如方得顯現尚未全彰況能行盡此則盡其邊際尋常望之而不見其涯窮之而不測其量者今則遍界遍空無不呈露不但現前而已夫真如現前分證則局盡際乃遠逈超極造故以遠行名地焉蓋盡際之際乃無際之際理既無際行豈近乎前云五陰六入等皆如來藏妙真如性乃至七大一一周遍法界此真如本際也唯此菩薩能盡其量前地盡佛境界是通達之盡此盡真如際是具足之盡也一真如心名不動地此明第八地也前位既盡其際此位全得其體己心佛心二俱圓泯惟一真如本心即一真如法界根身器界一塵一毛皆是真如本體自違現業中所獲無生法忍至此方得親證所謂徹法底源無動無壞故名不動地焉動即變也如理精真一無變異也此與前位之分在有功用無功用異耳發真如用名善慧地此明第九地也前位已得真如全體此位乃發真如大用前位一塵一毛皆同真如周遍法界此則一一互攝互入即遍即包自乾慧以來至此方名善慧以初證得法界無障礙智也華嚴名此菩薩具四無礙智作大法師演説無量阿僧祇句義故名發真如用余謂説法固亦可以説為發用然亦是大用中一用耳大用不遺説法而説法豈盡大用耶問七行之塵界互現五向之依正互涉與斯何異答七行方有是行五向方有是願未至親證故不同也阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位此通結前位也諸之一字似通指上位然佛於四加前總結過四十一心顯彼是修位前諸方便心矣此之諸字但宜從四加以至九地也阿難是四加九地菩薩從此位以往之前自四加至六地修習畢功自七地至九地功德圓滿然總而目之自此地以前通名修習位焉自此而後則修意少而證意多矣慈陰妙雲覆涅槃海名法雲地此明第十地也夫慈心如陰妙智如雲是菩薩之因德也涅槃海是如來之果德也菩薩至此悲如陰而無不庇潤智如雲而無不充滿悲智雙圓切鄰佛果故直覆涅槃大海而名法雲地焉法即雙含悲智也雲則該攝夫陰也蓋前位非無智無悲至此而稱合涅槃無少歉闕斯為勝耳然不曰稱合佛德而曰稱合涅槃者恐其濫於等覺也十地竟按華嚴四八九十地位皆同斯經住位吳興據此遽抑華嚴為別豈斯經超越華嚴耶何十住同彼之十地也答華嚴重行布此經重圓融圓旨一攝一切則初住即應攝初行初向初地如是乃至十住即應攝十行十向十地若此則應十十各同何止住地四位之同耶賀云通前諸位第一漸次為淨穢關第三漸次為真妄關七信為生佛關初住為迷覺關十行初回向乃有為無為關入地為世出世關如來逆流如是菩薩順行而至覺際入交名為等覺此明等覺位也夫由乾慧以至十地皆菩薩所用以趨果海也若如來者已先證入妙覺果海無復進取但不捨衆生倒駕慈航逆流而出而此菩薩進取未竟方趣果海順流而入於是始覺與妙覺兩際之處分劑正齊故曰入交初之乾慧未與如來法流水接此之入交正與如來法流水接矣譬如入海採寶者前商已得諸寶逆流而出到於海門後商方以進取順流而入亦到海門二船恰齊但前商船頭向外而後商船頭向內耳以其覺際入交名為等覺謂始覺等於妙覺也至此則與佛無間真所謂空覺極圓空所空滅者與瓔珞經云等覺照寂妙覺寂照此二位所由分也愚按寂照即誠明也照寂即明誠也自誠明謂之性自明誠謂之教全同此意但設教有世出世之殊耳阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地此結顯得慧仍別開一位也諸家於此或但合入等覺若但取五十五位則合之為是若取單復十二及六十聖位則開之乃宜也阿難從前初乾慧心歷五十四位至等覺已是雖等覺位也仔細詳之乃始獲金剛心中初乾慧地而已前之乾慧已用金剛心斷異相無明已得一分光明顯露如初生月至此亦用金剛後心斷生相無明始得光明圓滿如望夜月然前之乾慧以未與如來法流水接此之乾慧以未與如來妙莊嚴海接故俱名乾慧也以易卦喻之初乾慧如復卦一陽初復也十住如臨卦十行如泰卦十回向如大壯卦十地如夬卦至等覺後之乾慧如乾卦至此則陰盡而陽體全矣通議云始終乾慧二地從古解者不一學者難憑但未觀佛法源頭耳以九界衆生因三種流召五住煩惱感二種生死五住者欲愛住地色愛住地無色愛住地見一切住地無明住地三種流者欲流有流無明流前四煩惱為欲流有流感分段生死此在初信已斷無明住地名無明流感變易生死至佛果乃斷以此證之則前乾慧地乃用金剛心先斷欲有二流出分段生死故曰欲愛乾枯根境不偶現前殘質不復續生如澄濁水沙土自沉清水現前名為初伏客塵煩惱其無明流從入信以來即志斷之但無明深厚故歷五十四位直至等覺後心生相無明才乾故曰是覺始獲金剛心中初乾慧地五住究盡二死永亡乃入妙覺出變易生死所謂去泥純水名為永斷根本無明此明文的證也然雖位有始終而觀無先後以行力深淺為次耳鍾云通議云初乾慧地所謂清水現前名為初伏客塵煩惱此乾慧地所謂去泥純水名為永斷根本無明甚得經旨舊注此處添出未與如來妙莊嚴海接公抗覺際入交之語矣如是重重單復十二方盡妙覺成無上道此明如來極果也如是等位一乾二信三住四行五向六暖七頂八忍九世十地十一等十二金重重相因其中乾暖頂忍世等金皆一名一位為單也信住行向地皆一名多位為復也單七位復五位總單復共十二位皆名為因皆以趣果至此則因圓果滿方收成功一剎那間證入妙覺而成無上正真之道矣所謂妙覺者其體不越三如來藏其用不越四義四相但圓頓初心雖與如來同一覺道而本始未一能所未忘未能盡妙乃至等覺亦但能齊而尚未能一今則十玄德相十玄業用一時具足而窮玄極妙不可思議矣謂之無上者等覺以前皆以前位為下後位為上則知因中諸位莫不有上斯位則證極而無復加上也又前世第一地是世間無上此則出世間無上也因該果海果徹因源斯為至極矣乎必曰單復十二者由前十二類生窮十二變為一旋復故修因證果亦有單復十二也鍾云乾慧之單次以信住行向之復後又次以四加行之單此單後又次以十地之復此復後又次以等覺之單乃至妙覺單復相間故曰重重是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入此總明諸位功夫也從上因地果地是種種地皆用金剛寶覺斷惑之利器觀察如幻十種深喻所謂觀一切業如幻一切法如𦦨一切身如水中月妙色如空妙音如響諸佛國土如乾城佛事如夢佛身如影報身如像法身如化不但有為法皆空即無為亦如夢幻故曰深喻也既觀此十種深喻即於奢摩他自性本定之中用諸如來毗婆舍那清淨修證奢摩他乃微密觀照也毗婆舍那即如幻三摩鉢提也此金剛寶覺即是二者更非他物用此觀察故能從性起修從修得證漸次深入而圓成妙禪那矣汝問得成菩提妙奢摩他三摩禪那其工夫次第大略如此賀云上文只是陳列位次若不開示下手工夫如數他寶身無半文故此段直指通修法門見得徹前徹後只用金剛如幻三昧觀察深入而已觀察根塵如幻便入乾慧觀察乾慧如幻便入十信乃至觀察等覺如幻便入妙覺故曰漸次深入也又云此段最是噄緊指示處下自凡夫上至等覺皆可通修故觀音自陳圓通首曰如幻金剛三昧文殊選擇圓通亦曰宣説金剛王如幻不思議佛母真三昧世尊於五十五位之後復將此段作一總結正如繡出鴛鴦復度金針真一片婆心也阿難如是皆以三增進故善能成就五十五位真菩提路作是觀者名為正觀若他觀者名為邪觀此歸重初心欲人下學而上達也阿難我言真因妙果歷歷如是汝得無薄三漸次為粗淺而不足循乎不知如是種種又皆本於三種增進修行漸次用此三增進故能善成由信以至等覺五十五位真正菩提之路不取兩乾慧者路而非真也不取妙覺者家而非路矣然則增進漸次之功蓋可少乎哉吾願汝之作是觀也蓋作是觀者名為正觀而直趣菩提矣若他觀者名為邪觀而去菩提遠矣是知圓教之外三乘所修皆屬邪觀豈必叛道而後謂之邪哉賀云五十五位始乾慧終十地也近交光法師作正脈尚沿孤山之訛將三漸次強配十信而以十信為初住開出無論擅更佛語可笑之甚且如此則謂真菩提路止四十五而已安得五十五位耶此一大科其於經題四實法中正屬諸菩薩萬行説妙禪那令知歷位圓證已竟初科中證道分竟爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持佛告文殊師利是經名大佛頂悉怛多般怛羅無上寶印十方如來清淨海眼亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持此説經名也正宗未終而遽結經名者由初示密因次開修證而卒乎極果則經之正範畢矣向後經文雖尚屬正宗特助道而已故不妨於此處結經也初以阿難當機者欲進多聞人於大定也終以文殊請名者表總持全經非根本大智不可也爾時文殊師利法王子云云白佛言敢問如來當何以名是經乎既得其名而我及衆生云何奉持而不失乎佛告文殊師利言汝問經名是經名為大佛頂以無相可見故諸佛所證最上頂法故曰大白傘蓋覆被一切衆生故曰無上寶印森羅及萬相一法之所印故曰十方如來清淨海眼圓照法界不遺一物故此約理智立名也亦名救護親因親即阿難因即登伽以無畏光明祕密神呪能脫諸難令彼得菩提因心而入遍知果海故此依功用立名也亦名如來密因修證了義是諸佛所修所證正因正果無不圓滿故此約人法立名也亦名大方廣妙蓮華王以體相用三清淨本然周遍法界因果交徹無不自在故即此一名華嚴法華二題合見矣又十方佛母陀羅尼呪出生一切諸佛總持一切諸法故此約顯密立名也亦名灌頂章句此經從灌頂部中流出故諸菩薩萬行首楞嚴以修此定於一心中具足萬行究竟堅固故此約教行立名也當知此經顯密理智教行人法功用無不包容以具有如是種種功德故有種種名目誠無上甚深微妙法百千萬劫難遭遇者汝當謹守奉持而勿之有斁矣説是語已即時阿難及諸大衆得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位按經從初歷談但言奢摩他及三摩提而未言禪那直至此處始一稱之而下連修進聖位足顯談聖位處是説禪那耳增上妙理心慮虗凝斷除三界修心六品微細煩惱此敘當機獲益也世尊説是語已即時阿難及諸大衆得蒙如來開示祕密心印莫非無外之心清淨之體普覆之用是大白傘三字可以收盡全經故曰般怛羅義兼聞此經五種名目皆詮理直指之了義而非不了義是則如來真切為人之指舉密稱顯見皆無餘蘊矣於是頓悟禪那修進聖位一階一級漸漸增上極於妙覺而止此時心虗慮凝全經朗徹毫無疑惑而於小乘分三界九地地各九品以修心者已斷除欲界前六品微細煩惱而得證二果焉若斷欲界後三品即證三果斷上二界各九品即證四果乃阿難備聞全經但進二果者亦見多聞之劣不如進修無漏之勝也三界九地者欲界共一地色界四禪分四地無色界四空分四地地各九品共九九八十一品思惑也初科中結經分竟第一大科無始菩提涅槃根本竟此下明第二大科無始生死根本也自初卷至此雖真妄互明其正意皆是發明無始菩提涅槃元清淨體不生滅性為本修因而證不生不滅之果此下則廣明生滅為因而感生滅之果也由初卷云一切衆生從無始來種種顛倒業果自然如惡叉聚故有別明諸趣一科又云諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王又魔眷屬故有詳辨魔境一科此皆因地不真果招紓曲是初修心人最緊極要故詳明之令人披沙揀金不誤認瓴甋為璠璵也此後諸文仍是正宗即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沉惑令我今日身心快然得大饒益世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是衆生妄習生起此問七趣生起之因也正文止有六趣以等字該仙故曰七趣也時阿難即從座起頂禮佛足合掌恭敬而白佛言大威德世尊能折能攝教誨不倦善能開此衆生五十五位所斷微細沉惑我雖不能頓斷一超直入然聞此慈音令我快然亦得斷除六品思惑而得大饒益焉然我猶有請者世尊若此妙明真淨妙心本來周遍圓滿至一切處則一切無情有情咸與如來同一清淨寶覺乃至大地草木之無情蠕動含靈之有情其本如性具之理應即是如來修成之實體矣既佛體真實真不雜妄云何復有地獄餓鬼畜生修羅人天及仙異類雜形各各差別耶世尊夫此種種各道復從何出為即清淨體中本來自有耶抑亦衆生無始妄想習氣之所發起耶此問亦類清淨本然云何忽生山河大地之義也世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄説一切法空生身陷入阿鼻地獄此諸地獄為有定處為復自然彼彼發業各各私受惟垂大慈開發童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯此詳問地獄也七趣雖皆障礙而地獄尤極苦處更當謹戒是以復詳問之也世尊如寶蓮香比丘尼持戒行淫既犯淫戒謂淫非殺盜比又復謗戒才發是語即受身火燒然之現報墮無間獄之生報又如琉璃大王善星比丘兩人一則挾宿嫌而誅釋種一則撥因果而説法空以業力強勝俱生身陷入阿鼻獄中犯淫犯殺犯妄語各墮地獄如此此諸地獄為復本來自有定處而別業同報乎為復自然因彼彼造業故各各私受而別業別報乎惟願垂大慈悲開發我幼童蒙昧之人令諸持戒衆生修人天二乘者聞決定不爽之義咸歡喜頂戴而謹潔無犯也佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝説阿難一切衆生實本真淨因彼妄見即惑也有妄習生即業也因此分開內分外分此總明內外二分為七趣之因也佛告阿難汝今所問極愜我懷快哉此一問也蓋犯淫無報法空無果皆顯然邪見即琉璃為嗔心所蔽不復知有惡報亦隱有邪見主宰於中令因此問今諸衆生懼報持戒不墮邪見問豈不快也汝今諦聽我當為汝説矣阿難一切衆生實是本來真淨無諸妄染由迷此真淨心遂起妄見因有妄見復生妄習由惑業為因遂分內外二分內分者情也由情動於中從軀殼起念也外分者想也由想緣於外從勝境起念也雖情想不同勝劣有異總之皆屬一虗妄耳阿難內分即是衆生分內因諸愛染發起妄情愛有總別二意總謂諸情皆屬於愛愛即情也別如世説喜怒與樂愛惡欲為七情愛居其一而已七情中怒與惡似哀愛反而實由人之損我所愛方怒方惡則亦愛之本而已情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤曾聞有人忽拾大銀一錠舉身流汗是也心著行淫男女二根自然流液阿難諸愛雖別流結是同潤溼不升自然從墜此名內分此別釋內分也阿難何謂內分內分者分內也以情愛是衆生分內所有故曰內也由最初對境起著為愛染因諸愛染耽戀不捨為妄情情積不休慣習深厚潛滋漬浸能生愛水遂無往無不流矣舉事驗之是故衆生憶珍羞而水出想前人而淚盈貪財寶而體潤著行淫而流液皆愛染之所致也阿難所愛之物雖各各不同然皆令固結不解則愛心無異以情愛屬水故流下而凝結潤溼不升自然下墜而為三塗之因所以立名內分也阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清漸離業纍故輕清也心持呪印顧盻雄毅高舉無畏之狀也心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命視如鴻毛無復重纍故亦屬於超脫也阿難諸想雖別輕舉是同飛動不沉自然超越此名外分此別釋外分也阿難何謂外分外分者分外也以勝氣非衆生分內所有故曰外也初聞聖境發心希望如渴之仰水想極神馳意常超越如天外真人之想想久觀成益增而為勝氣遂無往而不達矣舉事驗之是故衆生持禁戒而舉身輕清持呪印而顧盻雄毅欲生天而夢想飛舉存佛國而聖境冥現事知識而自輕身命皆勝氣之所召也阿難所想之境雖各各不同然皆令輕舉不沉則勝氣無異以勝氣屬火故輕舉而上升超越不墜而為上界之因所以立名外分也阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現此二句當在後死逆生順二習相交此二句當在前上明情想為七趣因此下明情想所招果也阿難一切世間衆生從無始來生死相續莫不貪生是生則順其習也莫不惡死是死則變其所順之流所謂遊魂為變也當其臨命終時尚未捨其暖觸現陰之末中後二陰之初此時死之逆與生之順二習相為交際蓋生交於死矣於斯時也一生所作善惡之業俱時頓現隨其情想輕重而感變焉一説死逆生順二習相交者言作惡人生順而死必逆作善人生逆而死必順如作惡人生時愛女色之樂任情縱意及其死也縱有金車玉女現前皆拂其意若作善人生時逆女色之樂及其死也則金童玉女以迎之皆順其意故善惡二習逆順相交也故知心作天堂心作地獄矣純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下此明想多情少者生逆而死順也試以情想輕重之分言之彼純想者心注於飛其死也必生天上卜居於天而非暫遊於天也蓋三界諸天皆想心所感其間有兼修六度有福有慧或心想佛國而有淨願者則生天時自然心開見十方佛一切淨土皆得隨願往生焉如想念西方而生西方之類是也是又愈於生天矣次則情少想多者則輕舉而非遠竪不越四天橫不出輪圍也等而分之一情九想即為飛仙二情八想為大力鬼王三情七想為飛行夜叉四情六想為地行羅剎是等皆遊於四天所往無礙然暫到而已不同生者得常居住也其中若有發善願存善心誓願護持我法或護戒而隨持戒人或護呪而隨持呪者或護禪定而保綏無生法忍是等則親住如來座下如八部之類是也是又愈於遊四天矣飛仙如此土許旌陽之類大力鬼王而護持禁戒如此土關壯候之類夫往生淨土諸佛所讚而此以屬之純想尚未離乎七趣者何也蓋此經所重惟在耳根圓通而餘皆簡斥故不取往生也情想均等不飛不墜生於人間想明斯聰情幽斯鈍若乃五情五想是情想均等者斯則上不在天而不飛下不在地而不墜參於天地而生人間矣由其五想也想屬於明故半聰焉由其五情也情屬於幽故半鈍焉然則上智下愚最初皆是情想均等聰鈍皆具由彼想明益進則聰者愈聰遂成上智若情幽日進則鈍者愈鈍遂成下愚故知人所具者皆半明半暗若暗者習明則反暗為明明者習暗則反明為暗此聰鈍智愚之所由分也可破此方性善諸説之紛紛矣情多想少流入橫生重為毛羣輕為羽族七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄説法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄循造惡業雖則自招衆同分中兼有元地此明情多想少者生順而死逆也自人道而下又有情多想少者如六情四想則流入橫生重而在下者為毛羣輕而在上者為羽族皆橫生也七情三想則沉下水輪生於火際受氣猛火而生為餓鬼身常為火燒或得水飲亦化為火故水能害己無食無飲經百千劫方能脫焉若八情二想生有間獄九情一想生無間獄是二種地獄雖分輕重皆下透火輪入風火二交之地苦不可言矣然猶未極也若純情無想則墜入阿鼻大無間獄矣然劫壞猶有出期也若沉心中兼謗大乘教法如此方傅奕之類或毀佛禁戒如寶蓮香比丘尼之類或誑妄説法如善星比丘之類乃至無功而虗貪信施無德而濫膺恭敬以及五逆十重不通懺悔之罪則此方雖壞更入十方阿鼻永無出期可不畏哉汝問此諸地獄為有定處為各私受乎夫循其所造惡業雖是自作自招若論別造同受則衆同分中本有元地即所謂定處也故知七趣皆以情想為因若不著於情則三塗空不著於想則天堂空情想俱空雖在人間宛然淨土是則七趣有元地而淨土亦有元地也故曰此心能壞一切能成一切心作天心作人心作鬼神畜生地獄皆心所為若了心外無法即無一法當情一切皆是解脫矣所以阿鼻依正常處極聖之自心而諸佛法身不離下凡之一念也賀云當知衆生業力實各變一地獄但共在一處有似同境耳此下詳示升墜因果也上科示情想為升墜之因自勝向劣清濁雖殊要之皆為繫縛三界之羇鎖非解脫世間之法故總屬於惑此科所言因果自劣向勝應即是業與苦也諸天雖樂而亦壞行二苦所攝故不出三途也阿難此等皆是彼諸衆生自業所感造十習因受六交報此結上略説以起下詳明而先明地獄趣也言此等者以二劣相接語勢就便故躡之以起也阿難如我所言此等地獄非由天造非出地設亦非人與乃是彼諸衆生自造之業所感召而生自作自受而分毫不爽耳何謂自業衆生所造有十習之因焉一淫二貪三慢四嗔五詐六誑七冤八見九枉十訟是也何謂所感衆生所受有六交之報焉眼耳鼻舌身意各交五根是也按十習因若以十惡收之淫正身三之一也瞋冤即殺也詐誑即盜也誑又攝妄言綺語兩舌之三也枉訟又攝兩舌惡口之二也貪瞋即意三之二見則癡分所攝也是則身三口四意三無不周備矣六交報者六根交起惡報如眼造業餘五為助至受報時亦遍及也云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相磨觸暖相現前二習相然故有鐵牀銅柱諸事是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑此詳明十因而先明淫習因果也惡業起於情惑而淫為情惑之最故前後皆首明之也總徵云我謂衆生造十習因受六交報云何謂之十因乎阿難第一淫習試即日用所習之因以明之夫淫習交接染心會合發於相摩貪求觸樂研磨不休自耗其精則有大猛火光於中發動蓋水竭火然自然之理於其生也尚有消渴內熱等疾而死可知矣設喻以驗之如人以手自相摩觸則暖相現前則摩之發火可知也試言死後所感之報夫發於相摩業習也研磨不休種習也業習所以薰種種習所以辦果由此二習交熾故死後有鐵牀銅柱種種焚燒之事則知昔之錦衾角枕即今日鐵牀之基昔之相交摟抱即今日銅柱之媒因果相符不爽毫髮果若道念同乎情念則淫心化為智火如烏芻瑟摩者何鐵牀銅柱之有哉淫習之感果如此是故十方如來名色名目此行淫之事同名欲火言不染則已染則必至焦頭爛額也菩薩見此淫欲如避火坑言不墮則已墮則必至喪身失命也毒哉火也是如來之所訶菩薩之所避人當敬畏佛戒而勉學菩薩世世生生勿自投於火坑矣鍾云二習溫陵以能所釋之極是蓋上云交接云相摩此云相然皆能所之境也二者貪習交計發於相吸吸攬不止如是故有積寒堅冰於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒冰等事是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海此詳明貪習因果也二者貪習交相算計如握牙籌鑽李核簡髮而櫛數米而炊之類發於相吸攬取為己有貪吸屬水吸攬不已結水成冰如是故有積寒堅冰凍冽之境於生前已具此理矣取喻明之如人以口吸縮風氣則有冷觸生焉亦自然之理也由此二習相陵業習起貪主於侵取種習起苦竟以奪欲故死後有吒吒波波羅羅忍寒之聲青赤白蓮寒冰之色如是等事若使努力向前打開自己寶藏則取之無盡用之不竭何用交計哉貪習之感果如此是故十方如來色目多求同名貪水謂多求之人愈得愈為不足必溺死而後已也菩薩見貪如避瘴海海已可避何況更有瘴癘之氣不尤可驚避乎貪利如此而餘貪可知矣三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺此詳明慢習因果也三者慢習交相欺陵發於有所倚恃如倚財倚勢及倚文學才藝之類既有所恃故陵人傲物不肯相下殊不知是法平等無有高下一慢生而趾高氣揚心亦蕩矣於是若後波之陵前波而馳流不息故其生前已感騰逸奔波積波為水之境所謂平地波濤也如人以舌根絞其上齶則口水津津流出亦同此好上人者感水報之理耳由此二習相鼓如風之鼓物上騰不已故死後有血河灰河熱沙毒海融銅灌吞之事皆水類也慢習之感果如此是故十方如來色目我慢名飲癡水西土有水飲之則癡若此方之貪泉也菩薩見自心之慢如避巨溺溺者以水兼泥易陷難拔之處巨溺益可畏矣合論云滔天之浸出於涓滴岑樓之木發於毫末其始於甚微而終於不可禦故聖人於所習多慎之習氣之難除雖親奉世尊如阿難者尚有淫習於説法會常諦視女人如畢陵迦婆蹉有慢習呼恆河神女為小婢是皆果位聖人其折伏淫慢尚有餘習況衆生乎故所習不可不慎也四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵梱劍樹劍輪斧針鎗鋸如人銜冤殺氣飛動二習相擊故有宮割斬斫銼刺槌擊諸事是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮此詳明瞋習因果也四者瞋習交衝彼此抵突發於互相忤逆結而不息積久轉盛夫心屬火氣屬金以心火而鑄氣金火愈盛而金愈剛如是故有刀山鐵梱即棍也劍樹劍輪斧鉞鎗鋸如修羅之雨皆成刀鎗亦感招之理也即喻驗之如人銜冤欲伸則殺氣飛動望氣者能見其相矣以此二習相擊故死後有宮去勢割劓鼻斬斷首斫斷臂銼其骨刺其肉槌擊其身體如是諸事若能隨順衆生即是隨順覺性瞋火一除氣金不鑄安所容其忍哉瞋習之感果如此是故十方如來色目瞋恚名利刀劍謂觸之即死犯之即傷也菩薩見瞋如避誅戮誅戮也而可不避乎五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二習相延故有杻械枷鎖鞭杖撾棒諸事是故十方一切如來色目姦偽同名讒賊菩薩見詐如畏豺狼此詳明詐習因果也詐即小隨之諂為罔他故矯設異儀險曲為性也五者詐習交為誘哄發於相調相弄以諂言勾引引起不住惟識機巧而誘人入其綣繢若繩縛木禁索絞校錮使不得脫故生前已感繩木絞校即喻驗之行諂詐者必浸漬之久令人不知不覺入其彀中正如水浸田草木滋蔓也以此二習相引故死後則有杻械枷鎖鞭杖檛棒等事若使日用間直心直口則如來果海可以直進安有如是之纏縛哉詐習之感果如此是故十方如來色目此姦詐巧偽同名讒賊謂以讒言傷正喻之如賊也菩薩見自心之詐如畏豺狼蓋豺狼能卜事出必有獲狙詐誘人百發百中亦猶是也夫豺狼也而可不畏乎六者誑習交欺發於相罔誣罔不止飛心造姦如是故有塵土屎尿穢汙不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺此詳明誑習因果也上習主於浸引欺習主於眩惑此詐誑之分也六者誑習交相欺瞞發於相罔誣虗為實誣有為無欺其不知不見而謾之誣罔不止至於飛運其心造姦設智神出鬼沒令人迷惑墮其計中由彼志在謾人故感塵土不淨以遮沒之令彼亦不見此相召之理也取喻明之如風鼓塵而塵隨風則對面各無所見誑之召塵亦猶是耳由此二習相加因以誑語陷人故感沒溺以誑語撮弄人故感騰擲以誑語或天或淵故感或飛或墜或漂或淪諸事此死後之報也誑習之感果如此是故十方如來色目自心欺誑同名劫殺以遭之必傷命也菩薩見誑如踐蛇虺以遭之必解腕也豈知不誑不妄不自欺皆是成佛之正因哉七者冤習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲甕盛如請公入甕之類囊撲者以囊貯人而撲殺之如史記秦始皇囊撲兩弟是也如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目冤家名違害鬼菩薩見冤如飲鴆酒此詳明冤習因果也七者怨習交相嫌憎發於銜恨包藏禍心一味暗毒故有飛石投礰匣貯車檻甕盛囊撲皆暗藏冤害所感也取喻明之如陰毒人非能感之心乎懷抱畜惡非所感之相乎由此二習相吞銜恨之人唯欲囓其肉而啖之故死後有投擲擒捉擊射拋撮諸事冤習之感果如此豈知不念舊惡銜恩而不銜怨者是出世之正因哉是故十方如來色目冤家名違害鬼違背正理暗中害人鬼之最惡者也菩薩見自心之冤如飲鴆酒鴆酒而可飲乎則冤之不可挾也明矣八者見習交明如薩迦耶見戒禁取邪悟諸業見習有五一薩迦耶此云身見謂執身有我種種計著二邊見於一切法執斷執常三邪見邪悟錯解撥無因果四見取非果計果如以無想為涅槃之類五戒禁取非因計因如持牛狗戒為生天因之類此五種總名惡見也發於違拒出生相反不特與正違反亦自互相違反不特違他亦復違自如自語相違自教相違等也如是故有王使主吏證執文籍如行路人來往相見二習相交故有勘問權詐考訊推鞠察訪披究照明善惡童子手執文簿辭辨諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄偏執如臨毒壑此詳明見習因果也八者見習交明於諸諦理妄生分別如薩迦耶以至見取戒禁取邪悟諸業是皆順邪反正發於違拒彼亦一是非此亦一是非出生相反由彼不肯從人就正故感王使主吏證執文籍以正其是非此亦生前所感之境也即喻驗之譬如行路之人來往相見所謂狹路相逢何處逃避乎以此二習相交邪正對待邪邪對待紛繞不已故死後有勘問權詐考訊推鞠察訪披究及業鏡臺前令其照明善惡童子手執文簿不容辭辨諸事豈知離四句絶百非是如來之正見哉見習之感果如此是故十方如來色目五種惡見同名見坑謂墮此見永不能出也菩薩見此虗妄偏執如臨毒壑以是毒最深能陷法身也行人當疾滅之可矣九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺捶按蹙漉衡度諸事是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷此詳明枉習因果也九者枉習相加情本無罪而加之以罪理本不曲而強謂之曲是以氣𦦨降壓人也此皆發於誣謗以本無之事強誣其人而謗其為有純用逼壓故感合山合石碾磑耕磨皆逼壓之境也取喻驗之如讒賊人逼枉良善如此方之羅鉗吉網何所不至乎由此二習相排業習排人種習排己推排擠挫心無悲愍故死後亦感推排之報有強押之而遏捺強按之而捶擊攢其手足壓之而漉其血以迫窄孔中衡度其身如拔絲之狀如是諸事枉習之感果如此是故十方如來色目誣謗同名讒虎讒能傷人故曰虎也菩薩見自心之枉如遭霹𮦷雷能擊人故名霹𮦷也豈知如得其情尚欲哀矜勿喜況無罪而枉逼哉十者訟習交喧發於藏覆如是故有鑑見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海此詳明訟習因果也九者訟習交喧發於攻人陰私藏覆己惡惟其藏覆故偏招鑑見照燭照出其私正感應之妙也取喻明之鑑見照燭如人立於日中不能藏影彼攻人之惡者人亦攻其惡不猶是與由此二習相陳業習中暴白人事種習中暴白己事既不能隱惡揚善而一味吹毛求疵故死後有冤家惡友業鏡臺前火珠光裏披露宿業無所容覆等事彼生前尚有肺肝之見死後寧無鑑珠之照哉訟習之感果如此是故十方如來色目覆藏陰私同名陰賊以暗賊人還以自賊也菩薩觀自心之覆如戴高山而履巨海戴愈重而溺愈深也所謂十習因者蓋如此此十雖因果並彰而所重在因故曰十因也諸文首三句即業習所為之實事是招果之因也第三句不休不止等積薰成種也如是下乃命終之初種習所發之境是引果之緣也如人下取喻以驗其妄理相應耳二習下方言果中所受實事故皆結以諸事良以業習具因種習發緣衆生平日既恣造業因命終復領著境緣由是因緣具足豈不成辦地獄種種苦事所以文中至此皆承上而言二習相然相陵等以顯由因緣而後事辦耳故知下品往生者雖具苦因而火車相現急急念佛是但不領種習所發之境緣遂壞苦事不成獄果此所謂有因無緣即不生也但彼憑仗佛力非己智分則夫悟心之人不但地獄一切繫縛平日固當努力突絶其因更記臨終勿領其緣則陰境現前不隨他去方於生死少分得其自在若也道力未充未能作主則念佛往生更仗他力萬無一失矣生死要關故此詳敘智者宜究心焉云何六報阿難一切衆生六識造業所招惡報從六根出此下詳明六交報也前十二類生中言一因中具足衆因此言一果中具足諸果前明一根返源六根解脫此明一根造業六根受報也云何謂之六報哉阿難一切衆生六識造業蓋業並由心也所招惡報從六根出蓋報多約色也然不必六根齊造而後六根齊受也舉一根而六報兼之矣賀云用中相背故諸識各異性中相知故受報元通云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘煙入無間獄發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火此無本根燒見當是闕文燒聽能為鑊湯洋銅燒息能為黑煙紫焰燒味能為焦丸鐵麋燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界此舉眼根交報也總徵云云何惡報從六根出哉一者見報眼識與意俱識造業招引眼根而受惡果如因貪美色而造罪者是也見覺屬火此見業交則臨終時先見猛火滿十方界亡者神識或飛或墜乘此火煙入無間獄所謂極善極惡皆無中陰是以直入也此亦引果之緣也既入獄已最初發明二相一者明見由人間明目張膽造諸惡業了無畏心故在此中遍見惡物如鐵蛇銅狗劍樹刀山牛頭阿旁之類令此罪人生無量畏焉畏見於境也二者暗見由在人間暗地瞞人作諸惡業恬不介意故在此中黑戚戚地寂無所見令此罪人生無量恐焉恐藏於心也且如是眼見之火燒耳之聽但聞鑊湯爐炭之聲也燒鼻之息但聞黑煙紫焰之氣也燒舌之味所嘗者皆焦丸鐵麋也燒身之觸所觸者皆熱灰爐炭也燒心之知所思者俱成星火迸灑煽鼓空界也眼之一根交報五根如是蓋緣造業之時雖眼識為主而諸識必互助之如貪美色者雖由眼識所取而耳取淫聲身著淫觸等何所不全而今互報固其宜矣譬如世之罪人分正佐耳若能返見旋元則火不能燒又安有流逸奔色之報哉二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄聞聽屬水故觀聽旋復則水不能溺依之造業則能感波濤也發明二相一者開聽聽種種閙精神瞀亂二者閉聽寂無所聞幽魄沉沒文變開閉二聽意仍動靜二塵也如是聞波注聞則能為責為詰以因中責人則明恕己則昏故受報時亦聞責罪詰情之事也注見則能為雷為吼為惡毒氣聞波屬陰見火為陽陰陽相薄故成雷也注息則能為雨為霧灑諸毒蟲周滿身體水隨氣變也注味則能為膿為血種種雜穢水隨味變也注觸則能為畜為鬼為糞為尿水隨形變也注意則能為電為雹摧碎心魄意出於心水火交感也一切物理莫不因五行隨陰陽以變化故此隨根轉變之事皆不出此也嶽師引易經離為目為火坎為耳為水亦此意也此詳明耳根交報也若能反聞自性則大浸稽天而不溺矣又安有流逸奔聲之報哉三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近亡者神識從地湧出入無間獄鼻息屬氣具出入息吸則從上而入呼則從下而出故臨終時覺得識神從地涌上也發明二相一者通聞被諸惡氣薰極心擾二者塞聞氣掩不通悶絶於地二塵顯然如是嗅氣衝息則能為質為履質礙也履通也嗅業所依不離通塞故為質為履也衝見前能為火能炬見火因息衝而愈熾也衝聽則能為沒為溺為洋為沸聽水因氣衝而愈盛也衝味則能為餒為爽魚敗曰餒羮敗曰爽此由味隨氣變也衝觸則能為綻為爛為大肉山有百千眼無量咂食體隨氣變也衝思則能為灰為瘴為飛沙礰擊碎身體氣依土感此詳明鼻根交報也若能反息循元安有流逸奔香之報哉四者味報準眼耳鼻云見聞嗅此應云嘗報言味報者從所嘗為名也招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透挂網倒懸其頭入無間獄舌根屬兌兌為金因中為此舌根用諸羅網網諸禽獸以滋口腹又燒野以取禽獸故臨終有鐵網猛焰之相也發明二相一者吸氣結成寒冰凍冽身肉二者吐氣飛為猛火焦爛骨髓不取嘗苦嘗淡而取吸氣吐氣亦自在變用而已吸氣必寒吐氣必熱故發明二種苦相焉如是嘗味歷嘗則能為承為忍因中為此味故食噉生命令彼忍痛受苦故歷嘗亦承忍痛苦也歷見則能為然金石為此味而用火炮炙今味金歷見火為流金石不可食矣歷聽則能為利兵刃為此味故以刀剖割今味金歷聽水金得水而磨礪為利兵刃而反自害矣歷息則能為大鐵籠彌覆國土為此味故籠取禽獸今味金歷息息主吹張故為大鐵籠彌覆國土也歷觸則能為弓為箭為弩為射為此味故用弓弩以觸禽獸今味金歷觸為弓弩以自射矣歷思則能為飛熱鐵從空而下為此味故懸想飛禽從空而下故味金歷思則熱鐵從空而下也此詳明舌根交報也若能旋味循元又安有流逸奔味之報哉五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼獅子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄身根所對是觸因中有男女身分之樂觸故臨終有大山來合之苦觸獨此見相偏惡偏多者以淫者染合貪觸積罪如山敗化傷倫起殺起盜無所不至所謂諸惡淫為首也發明二相一者合觸合山逼體骨肉血潰二者離觸刀劒觸身心肝屠裂離合皆身家之觸故合者感合而離者感離也如是合觸歷觸則能為道趣獄之路為觀獄主門闕兩觀也為廳為案廳案皆治罪之處身觸所依也歷見則能為燒為爇見覺屬火也歷聽則能為撞為擊為剚插刃於肉為射皆不堪聞之聲也歷息則能為括為袋括袋所以收氣也為考為縛不容轉動較為氣悶也歷嘗則能為耕為鉗為斬為截嘗主味諸味皆出於耕鉗斬截也歷思則能為墜為飛為煎為炙為此身而攀緣或升或降或熱惱故歷思則為墜飛煎炙不可意之觸也此詳明身根交報也若能反身自修又安有流逸奔觸之報哉六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄思屬土心屬火而飄蕩乃無明風所自出故臨終時先見惡風吹土之相則神識乘之而墮此與御風而行者異矣發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍此當生滅二塵今改為迷覺而又皆反言於迷而説不覺於覺而説不迷耳如是邪思結思則能為方為所心無方所莫知其鄉今邪思一結則有方向處所矣結見則能為鑑為證因中掩不善而著其善故邪思結見而為鑑為證使無所隱其惡也結聽則能為大合石為冰為霜為土為霧火結聽水故使流者結為大石熱者化為冰霜明者化為土霧所必然也結息則能為大火車火船火檻息氣乘亂思所變也結嘗則能為大呌喚為悔為泣心火燒舌根則能為大叫喚等以痛苦難忍號天叩地無及矣結觸則能為大為小為一日中萬生萬死為偃為仰邪思所觸翻覆無定故結觸亦不可定也此詳明意根交報也若能反思自照又安有流逸奔法之報哉阿難是名地獄十因六果皆是衆生迷妄所造此結前妄業皆是迷真實心而循業發現非實有也故世尊又呼尊者而告之云阿難如前所云是名地獄十因六果皆是衆生迷妄所造如夢如幻更無外境地獄如是餘趣皆然若果識得自心則大地無寸土況地獄乎若諸衆生惡業圓造入阿鼻獄受無量苦經無量劫六根各造及彼所作兼境兼根是人則入八無間獄身口意三作殺盜淫是人則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄見見一根單犯一業是人則入一百八地獄由是衆生別作別造於世界中入同分地妄想發生非本來有此明因殊果別也上科但明地獄因以習成果以交報已知大分因果俱是如此然地獄數有多少苦有重輕各各差別未審何等因入何等獄故又分析之若諸衆生於此六根十因具足於一切時無不同造此則極重入阿鼻大地獄經無量劫而受苦為極長矣其次六根各造十因但前後異時及彼所作或兼一根一境各造或兼二根二境各造乃至三四等此罪次重於前入八無間獄而受苦差短矣若身口意三根唯造殺盜淫三因餘不兼涉其罪稍輕於前入十八地獄而受苦稍短矣又若三業不兼或為一殺一淫或為一淫一盜具二缺一此又次輕於前是人則入三十六地獄而受苦又短矣若能見所見只是一根單犯一業各缺於二或身殺身盜身淫或口殺口盜口淫或意殺意盜意淫此又次輕於前是人則入一百八獄而受苦極短矣夫惡業不同有此五等由是衆生別作別造造作是別於世界中入同分地地獄是同汝前疑為有定處為各私受入同分地同非私受矣是等皆屬衆生妄想無端發生非是本來一真上所有汝前疑為本自有為生妄習妄想發生則非本有矣嗚呼地獄之苦比之人間牢獄何啻萬億倍乃恬不知畏而甘心造業自墮其中何愚癡之甚也或謂虗談三世報應妄説六道輪回者不亦可憐愍哉賀云曰同分地可見境界歷然曰非本有可見當體空不知同分即墮斷見不知本無即墮常見發明地獄竟此下明地獄罪畢而入鬼趣也鬼與諸趣並列為七世俗不知乃合中陰及地獄一槩悉謂之鬼今與揀明有二不同一者與中陰不同蓋人之初死罪福皆劣者未即受生倐然有身名曰中陰此無而忽有之化生也其狀裸形三尺六根皆利去來迅疾無所隔礙他觀如影而已七日死而復生長壽者不過七七短者二三七即受生矣俗謂鬼魂非鬼也二者與地獄不同若謂地獄中即皆是鬼何故分為二趣且論明地獄純是化生而鬼具胎卵溼化間有父母兄弟等眷屬但其勝者稱神劣者名鬼神即福德之鬼也論分鬼為九品惟上二品謂之多財即諸名神上中以下皆即不堪若從上趣墮者多在上上今從地獄出必參中下應非上上也問此並論七趣應取鬼之全分何得只取從獄出者答佛急欲人之厭苦故從地獄順序而談一期之論也如論畜偏取從鬼論人偏取從畜而全分則以意中該之餘趣不然不應為例復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形細玩文勢非字貫下三句謂除了此三重罪永不出獄若諸餘雜業罪畢皆受鬼形也舊説似未得旨復次阿難地獄之上不有所謂鬼趣乎鬼非他即受罪既畢之衆生也是諸衆生惟破壞律儀與犯菩薩戒及毀佛涅槃者犯謗交恣戒乘雙絶其罪量重此方地獄既壞復入他方地獄永無出期若非此三重罪謂之諸餘雜業如十因之類則入獄受罪原有畢時只俟劫火洞然地獄業空即受鬼形而為鬼矣是知地獄受苦者尚非鬼身乃衆生業識身隨識變現直待此業識身盡方受鬼身而入鬼趣也試取鬼趣而詳列之地獄既以十習為因今出為鬼亦應不離前習以為種性環師謂其不必局配是違背佛旨也若於本因此四字貫下貪物為罪是人罪畢遇物成形名為怪鬼此貪之餘習也若餘本因能感地獄者貪物為罪乎輕身愛物而貪畜珍異吝著不捨是人罪畢附奇物而成形如金銀劍鏡等為精為怪故曰怪鬼也貪色為罪是人罪畢遇風成形名為魃鬼此淫之餘習也原因貪美色而造業驕陽用事傷害和氣故餘習為風魃鬼能令亢旱也貪惑為罪是人罪畢遇畜成形名為魅鬼此誑之餘習也誑者改形變幻迷惑於人故為鬼附於妖獸怪禽如倀鬼附虎及雞鼠成精等是也貪恨為罪是人罪畢遇蠱成形名蠱毒鬼此瞋之餘習也南方有妖術養蠱害人皆此鬼主之也貪憶為罪是人罪畢遇衰成形名為厲鬼此冤之餘習也冤者追想宿憾不忘伺衰求報故為疫厲之鬼散瘟行瘧等是也貪傲為罪是人罪畢遇氣成形名為餓鬼此慢之餘習也傲者虗驕恃氣故乘飢虗之氣為餓鬼也貪罔為罪是人罪畢遇幽為形名為魘鬼此枉之餘習也罔即誣枉逼壓良善故為魘鬼猶在暗裏壓人也貪明為罪是人罪畢遇精為形名魍魎鬼此見之餘習也私作聰明而無正慧執邪見尊邪思所謂貪明也由彼見地不真杳冥恍忽故其餘習附精靈而成魍魎鬼其形似有如無也貪成為罪是人罪畢遇明為形名役使鬼此詐之餘習也諂詐誘人圖成己私故曰貪成此因中專以詐術牽制驅使於人故為鬼亦被人呪術役使不得自在也貪黨為罪是人罪畢遇人為形名傳送鬼此訟之餘習也訟者結黨朋證故曰貪黨以因中傳遞人隱暗之事而訐露之故為鬼亦附人發泄傳説吉凶環師所謂附巫祝而傳吉凶者是也阿難是人皆以純情墜落按前文獨阿鼻為純情此外八情二想生有間九情一想生無間今言皆純情者舉重以該輕也業火燒乾上出為鬼情屬水業火燒乾情水則地獄因窮果盡故生鬼趣也皆是自妄想業之所招引若悟菩提則妙圓明本無所有此等皆是妄業所招悟菩提者如從夢醒何法可得妙則不受業縛圓則不容他物明則了無幽暗諸趣皆空何況鬼趣故曰本無有也了即業障本來空未了應須償宿債此之謂與諸鬼趣竟按餓鬼備數七趣今獨取出獄鬼者一期之論復次阿難鬼業既盡則情與想二俱成空方於世間與元負人冤對相值身為畜生酬其宿債此明諸鬼趣盡而入畜生趣也畜生亦有上趣貶墜及修帶瞋殺者如龍王迦樓羅王等今亦順序而談惟取從鬼來者餘以意該之耳復次阿難鬼趣之上不有所謂畜生趣乎畜生非他即酬還宿債之諸鬼也蓋鬼業既盡則阿鼻之純情與無間之九情一想有間之八情二想餓鬼之七情三想皆被業火燒乾但留六情四想為潤生而生毛羣羽族之中與元負他債之人冤對相值而為畜生以酬其宿債焉試取畜生而詳列之物怪之鬼物銷報盡生於世間多為梟類如物怪之鬼所著之物銷壞彼鬼隨亦壽終生於世間多為梟類生食父母及其養雛亦遭雛之食啖蓋怪鬼原由貪習而貪習重者多相傾奪互為坑殺故為雛所噉以酬斯債也風魃之鬼風銷報盡生於世間多為咎徵如鼯鼠呼人商羊舞水之類旱魃為災而變畜仍以兆災固其餘習也一切異類畜魅之鬼畜死報盡生於世間多為狐類一切異類如十二時中子鼠丑牛等魅鬼原於誑惑之習而轉為妖惑之狐宜也蟲蠱之鬼蠱滅報盡生於世間多為毒類蛇蝎蜂蠆等也衰厲之鬼衰窮報盡生於世間多為蛔類原由冤習作疫厲入人身中為病今乃囚閉人身中與之消食同其安危習使然也受氣之鬼氣銷報盡生於世間多為食類豬羊等皆食類也慢習驕吝負欠必多作鬼受飢為畜充食償負欠耳綿幽之鬼幽銷報盡生於世間多為服類綿著也幽暗也枉魘之習暗中魘著於人故為蠶蟲供人衣服為牛馬充人服乘酬其逼壓於人之債也和精之鬼和銷報盡生於世間多為應類明見之習作鬼和諸精靈故為應類能知節序如塞鴻社燕是也明靈之鬼明滅報盡生於世間多為休徵役使之鬼於明呪呈靈驗故曰明靈呪以持力發靈力盡無驗鬼亦報終而生為休徵之畜如嘉鳳祥麟是也問此鬼何幸為此吉善美慶之畜耶答此鬼由業力故雖被呪所使而或遇三寶呪力資薰銷其惡習罪苦故得參預禎祥善類也問如來總標酬債此等蕭散之物酬何債耶答或被網羅售賣籠繫以為玩好或如西狩獲麟而折其足或遞相吞噉何者非酬債耶一切諸類依人之鬼人亡報盡生於世間多為循類附巫之鬼亦自多種所附巫死鬼亦報終為循類者如貓犬等馴擾可畜也阿難是等皆以業火乾枯酬其宿債旁為畜生旁者橫行也此等亦皆自虗妄業之所招引言亦皆者準上文而言也若悟菩提則此妄緣本無所有結妄接無準上可知如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結三塗已畢將入善趣故此總申結之意欲塞斷三塗之路也總而言之三塗惡業地獄為先如汝所問墮獄之人如是惡業皆是自己發明非天造地設亦非人與元是自作自受故知實無一法外來皆是妄想凝結所成如水之成冰耳彼韓歐等謂佛自私造恐嚇於人何曾夢見斯旨耶由是應悟不但三塗現今目前所對世間山河大地苦事樂事皆是妄想凝結住此悟境則萬法本空豈待造作但須時中不昧而已賀云若是從他所授便可向閻老子討分上矣説到自作自受真教人無逃避處畜生趣竟此下明人趣也此趣來處除聖人示現諸趣皆通以此趣為進修通途諸趣皆願為之求轉身之速也故諸佛但於人中成佛裴公圓覺序勉勸詳矣來處既多今此亦由順序而談故偏取從畜來者餘并意中該之也復次阿難從是畜生酬償先債若彼酬者指酬債之畜生也分越所酬所償過於本債也此等衆生還復為人反徵其剩索還所過之數也如彼有力此彼字指債主言力謂保持人身之力也兼有福德則於人中不捨人身酬還彼力此彼字指畜生言若無福者還為畜生債主反為畜生也償彼餘值酬還彼畜生餘剩之債也阿難當知若用錢物以過用錢物為剩如馱腳售錢之類或役其力以過用其力為剩償足自停言無難也如於中間指當初酬債既了時殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息負債易償負命難償也除奢摩他法也返妄契真之正定也及佛出世不可停寢復次阿難三塗業盡則人趣矣人之為趣來路非一今且論其從畜中來者夫鬼之為畜以六情四想為潤生酬償宿債債畢即當兩無交涉若使酬償越分則此等衆生復以情想均等為潤生復生人中而反徵其越分之餘債矣如彼受償之債主或有善力兼有福德而處富貴則即就人中酬還其剩過之力或遭竊取成遭劫奪皆酬也若善業不勝福德不兼無所償地則人轉為畜以償餘值所不免矣然欠債易償也欠命難償也阿難當知若所徵之剩為過用其錢物乎過用其力乎則或以人償或變畜償償足自停耳若不但過用錢力而又於中殺其身食其肉則生生世世相殺相誅遞相食噉如汲井輪互為高下無有了期除是自己得道及諸佛出世方可停寢否則終不能釋此怨對也口腹傷生其害如此可不痛戒乎此一科頗似前趣餘文再四研之當是警起人趣之文也良以獄後諸趣皆以復次為發端今談畜畢而以復次起之至下別無復次之語意可知也且夫地獄苦盡鬼趣習終而畜又債畢今起為人將何以為潤生之由乎此文中徵剩索命正諸畜所以潤生而為人也則斯段經文為轉畜為人之端明矣言警起者佛意欲人警悟於諸畜生仁心而不可過其力止殺而不可殘其命也汝今應知彼梟倫者酬足復形生人道中參合頑類試取由畜而人者列言之汝今應知貪物為怪為梟彼梟倫者酬債既足復得人形生人道中帶畜生之餘習而參雜混合於人多為頑類心不則德義之經為頑不仁不義至惡至愚不可化為一毫之善者也彼咎徵者酬足復形生人道中參合異類咎徵本於妖淫餘習復為妖異如小兒頂上口眼一切身根反常皆是也彼狐倫者酬足復形生人道中參合庸類昔為狐媚雖復人形惟是曲情飾貌搖尾乞憐以諂世求容不能卓然自立所謂因人成事碌碌庸人也彼毒倫者酬足復形生人道中參合狠類蜂目豺聲剛愎殘忍害物無慈者也彼蛔倫者酬足復形生人道中參合微類蛔以衰氣附物餘習亦復微賤雖親附人人不齒録也彼食倫者酬足復形生人道中參合柔類由傲物而為人切齒轉為食類雖復人形無丈夫氣委靡不振之徒也彼服倫者酬足復形生人道中參合勞類由宿生負重致遠僕僕不休今亦被人驅役作牛馬走動劬不息也彼應倫者酬足復形生人道中參於文類由宿昔亦有聰明知見但不得其真故為文類只是小有才情通文解義風雲月露而已非經天緯地之文也彼休徵者酬足復形生人道中參合明類由乘明呪之力故具世智辨聰非輝天鑒地之明也彼循倫者酬足復形生人道中參於達類由宿昔久久依人故今亦諳練世故解曉人情非能通達一切也阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者此總結可憐以警人也阿難是諸衆生等往昔在人道中作三塗業受三塗報由獄而鬼由鬼而畜皆要宿債畢酬少有不滿不得為人此皆從無始來無明障心煩惱障意業計顛倒不忘債命為徵債而相生為索命而相殺皆非好緣聚會遇如來方與解釋修正法方得解脫不逢此二則生殺無休人身不久又入三塗蓋得之甚難失之甚易即幸得之亦凶多吉少苦多樂少然則塵勞何日離而輪轉何日止哉興言及此諸佛愴心是故名為可憐愍也人趣竟此下明諸仙趣也説文云仙者遷也老而不死遷入山也前三塗業皆以十習為因初得人身猶帶十種餘習今此仙趣則與十習無干矣夫仙道起於衆生厭懼無常想身常住妄設多途無非志於長生不死不知此身乃真心中顛倒錯認與依草附木者一等無異今因怖死而又妄修長生是錯之又錯展轉支離迷不知返可勝惜哉阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙阿難人趣之上復有一等從人道進修但不依如來正教以不生不滅元清淨體為本修因而妄執五蘊身有性可修有命可接可令長生久住世間是為別修妄念其種雖多而存想固形是其總訣曰存想便是用諸妄想非銷落諸念者可比曰固形便是妄認色身非究竟堅固之比也妄修既成則遊於山林人迹不到之地如所稱名山洞府福地清都中如是之類共計有十種仙焉鍾云比天為劣比人為優仙趣是也世俗不察即以仙為天矣阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙十種維何阿難彼諸衆生別修妄念者或有堅固服餌如秋石紅鉛之類炮煉和合為丸作餅服食不休至於食道圓成百體康健壽年延永而未得輕舉名地行仙若西域之阿私陀此方之彭籛是也豈知甘露漿禪悅食金牛飯雲門餅一飽可以忘百飢哉竪固草木而不休息藥道圓成名飛行仙又有堅固草木如紫芝黃精菖蒲松柏之類久服身輕行步如飛乃至升高越壑無不迅捷名飛行仙若毛公毛女是也豈知阿伽陀藥觸之則根結解消隨往無礙服之則萬苦盡除壽命無量也哉舊以飛行為飛舉非是以空行在後也堅固金石而不休息化道圓成名遊行仙又有堅固金石如鍊五金八石養砂接汞九轉大還之類變丹砂而為黃金化凡身而為仙骨名化道圓成色身輕妙瞬息萬里周行不怠名遊行仙若呂洞賓何仙姑是也豈知打開自己寶藏證此不壞之身遊戲神通淨佛國土無處不在豈待化道成而遊行哉堅固動止而不休息氣精圓成名空行仙又有堅固動止如撫摩搬弄運氣調身動靜以時起居必慎之類久而不息氣精圓成所謂煉精還氣煉氣還神煉神還虗於是羽化飛升虗空遊行名空行仙如旌陽拔宅列子御風是也殊不知不依氣息不依形色不依地水火風者是真空行也堅固津液而不休息潤德圓成名天行仙又有堅固津液如吐故納新鼓天池咽玉液之類久而不休能令水升火降而結內丹精既完固形亦光潤肌膚若雪顏貌如童超空行而至天上名天行仙若姑射神人是也殊不知自己性水真空周遍法界貫徹十方其津液涎沫皆與香水海一脈流通不待固津而後成也堅固精色而不休息吸粹圓成名通行此後行字去聲仙又有堅固精色如朝閉目以向東方而採日精飲之夜採月華乃至服五星餐雲霞等吸之既久粹氣潛通渣滓日去清虗日來故能貫金石蹈水火略無妨礙名通行仙若五通仙及莊伯微是也殊不知自己光明照天照地六根門頭隨處貫徹不待吸粹而後通也堅固呪禁而不休息術法圓成名道行仙又有堅固呪禁如呪棗書符以愈疾病禁毒驅魅以利羣生之類持呪既久凝神不動亦得成道以其有濟世道心名道行仙若于吉張道陵是也豈知悉怛多般怛囉是轉凡成聖之呪心不以此為道非正道也堅固思念而不休息思憶圓成名照行仙又有堅固思念如繫心臍下透尾閭升夾脊乃至達泥丸衝頂出神之類久而不息思憶圓成彼亦謂之回光反照名照行仙若張紫陽魏伯陽是也豈知不思善不思惡圓明清淨之體圓照法界哉堅固交媾而不休息感應圓成名精行仙又有堅固交媾如嬰兒姹女配合陰陽取坎填離以結仙胎之類久而不息兩相感應便能産藥而成丹蓋人身有一點真精即先天太乙之元精老子所謂其中有精廣成所謂無搖爾精一得此精立時成道名精行仙世傳呂洞賓亦好採戰是也殊不知識精元明清淨之體一受成形同行同止不曾相離乃棄而不顧而別求太乙之元精以交媾非妄想而何至於用女子為鼎器而採助淫穢內教固闢為魔論而仙道亦鄙為下品此為投人之欲狂迷若多惑之正人君子不為也然道教末流順人之欲故人易從內教本來奪人之欲故人難奉今夫財色長壽人之大欲也道者以鉛汞鼎器投其財色之欲又以精氣內丹順其戀生之心誰不樂從至於內教檀度梵行逆其財色之心又令觀身如毒蛇棄身如涕唾苟不達其深孰從而信之嗚呼何怪縉紳富貴之士談燒煉者比比而持齋念佛者百無一二哉堅固變化而不休息覺悟圓成名絶行仙又有堅固變化悟通化理能大幻化久而不息覺悟圓成移山倒水妙絶一世名絶行仙如劉根左慈是也此中覺悟如莊子觀化談子達化之悟非正覺中真悟也昔老成子學幻於尹文先生先生告之曰有生之氣有形之狀盡幻也造化之所始陰陽之所終者謂之生死窮數達變因形移易者謂之幻化知幻化之不異生死始可學幻矣吾與汝皆幻也何須學哉老成子歸用尹文之言深思三月遂能存亡自在翻校四時冬起雷夏造冰飛者走走者飛終身不著其術故世莫傳焉此雖知幻化為絶行而不知幻化之所自出者絶對待為絶行也阿難是等皆於人中煉心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣阿難如是十種仙等修門各別操行總同皆於人中自煉其心但不達本心真常生死二非捨正覺而不修却在匡郭裏別求長生之理其壽亦至千萬歲豈知此長僅足勝短此生終以待滅雖修短不同豈真不死耶其所休止之處不雜人居亦非天上乃在深山或大海島中特人迹所不到耳而世俗仙天不分謂居天上者謬矣要而論之斯亦在輪回妄想流轉之中以其不修楞嚴正定故也若遇聖師幡然改轍亦可進入妙三摩地若固守不捨仙報一盡依然改頭換面還來散入諸趣之中則何益矣夫萬修不能一得得之不出輪回何如念佛求生西方一生即得金身浩劫不受流轉而無緣不信者痛哉痛哉問修仙者妄謂釋教修性不修命萬劫陰靈難入聖然乎否與答彼所説性命二俱非真蓋指身中神魂為性身中氣結命根為命故説單修性者但得陰魂鬼仙無長生身形兼修命者方得輕妙長生之身而誇形神俱妙也豈知佛所説性是人人本有真如性海乃無量天地無量萬物之本體證此性者豈惟但能現無量妙身兼能現無量天地萬物其所現者豈惟但能令住百千萬歲雖塵沙浩劫亦可令住且欲收即收一塵不立欲現即現萬法全彰得大自在得大受用方是真如佛性請閲前文顯性處自然悟彼無知而妄謗矣諸仙趣竟此下諸天趣也與仙趣逈然不同世人仙天不分而學仙者濫附於天且謂諸天皆彼祖仙今略辨之仙以人身而戀長生最怕捨身受身諸天皆捨前身而受天身豈其類哉又仙處海山如蓬萊崑崙皆非天上四王忉利尚無卜居況上界乎況色界乎是知天趣最為界內尊勝之流逈非仙與鬼神之類也阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄𨧿生明命終之後鄰於日月如是一類名四天王天此明欲界第一天也阿難仙趣之上不有所謂諸天乎諸天非他皆從人道修來者也諸世間人以不求出世間修本常理但希世間有盡樂果不依不生滅心為本修因而以十善為本修因此人雖持不淫戒而但無邪淫尚有正淫未能捨諸妻妾恩愛而非己之色不外流逸不但身不敢犯而心亦不萌一念以欲念有節意多收斂皎潔不污心地光明更兼十善精研命終之後捨肉身而受天身所居報土在須彌腰鄰日月宮名四王天以山腰四面有持國增長廣目多聞各據一面各護一洲故名四天王天也天者顛也首出庶物之義天有三謂欲界色界無色界也欲界天自須彌腰頂以至空居共有飲食淫欲睡眠具足三欲故號欲天其男女嫁娶妻妾亦如人間但諸天人皆無骨肉亦無大小便利不淨報得五通形無障礙是知天趣為界內極尊也六欲天福固總由十善而致今惟約欲以分者以此六總名欲天而淫為上首故約淫之重輕以分下上次第至於十善乃三界總因不待言也不求常住四字亦三界總因句局於此而義通於後也人道之流而為地獄三塗者淫習為首也人道之升而為上界諸天者伏淫習為首也人道之又升而成聖成賢者斷淫習為首也淫習之為害不翅如怨賊毒蛇戒之哉戒之哉問諸天轉生何反勝於長生答長生如補浣舊衣終無殊勝轉生如脫斃垢而換珍御勝劣天淵特愚人狃於戀身鄙習顛倒謂長生為勝耳於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天此明欲界第二天也又有一等人不但邪淫不流即自己妻房亦不多流逸而淫愛微薄不淫則淨居時多矣然間有淫念起時不得淨之全味比之前人已超一倍命終之後亦升一倍超日月明處居須彌山頂以非空居故猶稱人間如是一類名三十三天而為帝釋所統也此與前天通名地居猶未離地故然此二天形交成淫與人無別但風氣一泄欲漏便除非若人間有不淨流溢也逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天此明欲界第三天也又有一等人不逢欲境則淫念不起即逢欲境惟暫交一過更無追戀此於淨居已得全味漸向定境故動少靜多倍勝於前命終之後空居朗住日月之光上照不及是諸人等其身其殿自有光明互相照耀但以蓮華開合而為晝夜如是一類名須𦦨摩天此云時分天也此天唯摟抱成淫不交媾矣一切時靜有應觸來未能違戾命終之後上升精微單指彌勒內院以勝該劣而外天但令人意得之也不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天此明欲界第四天也又有等人一切時靜動靜之間全無淫念已勝動少靜多又一倍矣但有極得意之境必可應之觸自來強逼未能無心不應猶順從之此等命終之後上升總報天鄰於彌勒內院其妙境精而非粗微而難見不接下界諸人天境乃至劫壞災不能及者如是一類名兜率陀天此云知足天也按此天有內院外院總五十重每一重有五百億天宮內則四十有九外則一也彌勒菩薩大摩尼殿居其中焉二院之外又有業報一天乃有漏業果所成是為總報天修十善業者得生彼處以有漏故三災可壞是雖俱同一天然以總報望外院尚如仙凡之隔況內院乎今此所生乃在外院之外而統言精微疑譯者過於省文分析欠詳耳不然此天何幸以小欲劣功而遽獲超三禪之勝報哉我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天此欲界第五天也前之應觸尚有應心此人即有應觸橫陳於前亦無應心任現前淫境逼拶了無滋味如嚼蠟然此又勝前一倍故命終時生越化地謂能超越下天自化樂具也如是一類名樂變化天此天以笑為淫欲樂其自所變化也橫陳如司馬相如好色賦曰華容自獻玉體橫陳古詩云回眸百萬橫自陳皆此義也無世間心同世間事於行事交了然超越命終之後遍能超出化無化境如是一類名他化自在天此欲界第六天也又有心希上界不樂世間但隨世間權同妻室至於交時不但無味而且神遊外境了不干涉此又勝前一倍故命終後遍能超出第五化境與下四天無化境如是一類名他化自在天此天以相視為淫欲誰欲樂境不勞自化皆由他化而自在受用也阿難如是六天形雖出動心迹尚交自此以還名為欲界此總結六天也阿難世人為欲所鼓若瀑流逸火醉象狂猿騰躍馳突莫能控制此六欲諸天心漸節制而向於靜如初天且止外動二天內動亦減三天遇境方動四天境迫不違五天交中無味六天形合心超皆能出動然形雖出動心迹尚交前四天尚兼心交以有味故後二天但是迹交以無味故自此天以還統名欲界以三欲事同男女相具也夫淫欲乃墜縛根本六欲以輕而漸升四禪以絶而高舉是則不捨欲心上界猶不可希況望出三界修三摩地耶此所以阿難必緣是而起教也天台云十善外前三天各兼功行後三天各兼禪定不但只輕淫欲求生天者不可不知也
