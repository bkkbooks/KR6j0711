body:
  text: 巴縣居士非眼劉道開編緝成都沙門離指方示鑒定爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地此廣陳耳根圓通以當此方之機欲人專修於此也二十四聖次第陳畢爾時觀世音菩薩乃從座起頂禮佛足而白佛言世尊憶念我昔恆河沙數劫前有佛出世名觀世音源遠流長名號與逗機之教相應也我時於彼佛前乃發菩提心一者善心即煩惱無盡誓願斷法門無量誓願學也二者悲心即衆生無邊誓願度也三者直心即佛道無上誓願成也既發大心須秉聖教彼觀世音佛教我三慧一從耳根中聞性非同多聞之聞聞經解義全用耳識及耳家俱意識也一從百不思之正思非同遍行思及思善思惡之邪思也一從無所造作之正修非同一切善行及種種功行之邪修也從此三慧便得和身入此大陀羅尼門更不落於岐經迂路矣彼修行者不秉聖教惟恣己意或信邪師豈免勞而無功哉問初卷已斥思惟是妄何故此中復用思耶答前之所以斥者以阿難一向認此思惟為真不肯放捨是認賊作子故須斥破欲其識賊而求真子也今之用此思者是知其為賊而借賊以殺賊轉禍為功也且二十四聖所修門雖不同要其用心觀察皆用此思若無此思無下手處故二十四聖下手功夫皆在觀音一門顯發譬如油蠟作燈燭不用火點終不明也若謂不假思惟直下離心意識參究則此一門似是單為上上根説其或根器稍鈍不免借思而入若下根人既得聞思又必盡力於修方能得入是則聞思修為淺深同説法彰彰明矣但不可用亂思邪思若用亂思邪思終不能入故曰知根雜亂思湛了終無見又曰阿難縱強記不免落邪思也此下自初於聞中起至寂滅現前止乃詳陳次第解結修證為入圓之正行而一經之至要蓋上之發心是願而此為依願之行其願不虗也上之秉受是教而此為依教之修其教不負也初於聞中入流亡所我既發是心而秉是教矣然起修下手之功何如夫所謂從聞思修之聞性本惟藏識心海一體而具六用在眼為見在耳為聞乃至在意為知今取第二故曰聞中我初於此聞中一念不生回光返照專注以聞自性是為入流蓋順聞奔聲外注謂之出流反聞照性內注故謂之入流也亡者脫也所者聲塵也既惟內旋聞性便於諸聲塵一切不緣是為亡所蓋根結全由於塵故塵亡而結乃可盡也此所兼動靜二塵而此則先脫動塵也聞中二字揀非肉耳之中又非耳識之中乃平吞萬相盡空法界之中亦即一乘寂滅場地真阿練若正修行處也若於經中未即了然可於靜坐中體認的當行人當五更起坐夜氣清明其籟初動之時一念不生覺此聞性廓然而圓朗然而照山壁不隔海暗不昏大小遠近音聲鑑徹無遺乃至微風動樹足履鳴階亦所不昧假如東方數里之外洪鐘發響固歷歷分明西方同時數里之外羣鼓喧聲亦琅琅不昧如是乃至南陌悲號北里笑語車輪馬足一一俱現圓聞之中如影現大圓鏡中毫髮無隱至於寂然無聲時則聞靜愈無邊際到此始知妙性本具不是修成但是平日以亂心緣慮遮障孤負不自覺耳入流者旋轉聞聲之聞以反聞自性也亡所之所即是動靜二塵動謂有聲靜謂無聲今初先亡動塵然有二種一者屈曲聲謂有意味者如言語屈曲之類是也二者徑直聲謂無意味者如風水鳥獸鐘鼓等聲是也此屈曲聲復有二種一者世俗屈曲二者道理屈曲世俗復有二種一者無力二者有力無力有謂評品古今文章事物他方昔日不干己事但恣散亂無增長煩惱之力故云無力也有力謂説諸欲境令心起貪説諸不平令心發怒背面毀譽當面稱譏一切利害之言令人不覺嗔喜陡發忘失正念此皆世俗屈曲也道理屈曲者如説內外邪正道理乃至法門宗説玄妙意趣令人不覺隨言生解擬議思量亦是尋聲流轉最障本聞所以宗門於佛祖言教如生冤家也行人首先於此諸屈曲聲一切不緣惟以內向聞性湛然朗然安住不動則粗顯分別永息不起矣至於水流風動鐘鳴鼓響等一切徑直之聲更是難亡須是入流功夫細心專切久自亡盡也問反聞功成豈一切諸聲如醉睡中皆昧然不覺耶答非也諸聲任有行人但惟圓照聞性不漏落流注於聲而已更以喻明譬如有人眩水不能自渡賴人牽之而過彼人教其仰面視天不得一息視水若一息忘教視水隨即漂溺此亦如是反聞自性猶如視天不復循聲如不視水更無流轉之患猶無溺水之患也是知聲不可除而但當反聞嘗切亦如水不可除而但當仰天專切也問諸聲不實既如夢幻銷落之後畢竟一無所聞則道成者皆如聾人耶答不然此非真滅但以銷落聚聞之根暫沉枯寂不久心聞洞開遍滿虗空所謂發本明耀必將上聞有頂下聞無間乃至最近蟲行蟻鬪素所不能聞者皆當聞之何況餘聲如聾之疑鄙劣甚矣問此之入流亡所但於靜坐時習之耶亦於涉事時習之耶答若但取於靜坐何用詳辨屈曲等聲正須動靜一如方成大定耳問靜坐易忘今即不問假如有人涉事訪一故人於路用功但惟反聞自性而餘聲悉不取著正當聞性湛然忽於中途隔牆聞彼故人言語此聲不循則廢其訪問之事若循之豈不成流轉耶答此聲許尋不成流轉偈云衆生迷本聞尋聲故流轉若於尋聲時不迷本聞此但尋聲豈能流轉也問請分流轉與不流轉之相答汝正反聞自性時有當尋之聲現前一味尋之而聞性全成迷昧者此即流轉若當尋聲時而聞性分明依然不昧此但暫尋即還亦謂之得用即休何得同謂之流轉耶以此為例凡涉諸事皆當準此思之大抵初心靜習時得力為多靜定若成漸能涉事不昧若初學靜定未成而遽希涉事不昧者良難也問涉事不昧既曰良難則初學反聞恐難理事兩全答世諦之人寧廢理以圖全事修行之人寧廢事以圖全理今初心修進誰要你依舊精研世事務求兩全耶當知反聞入手之人雖處世間惟求省事省言日用家常騰騰任運得靜且靜萬不得已一事一言用了即休且正當用時分毫不昧即言差事差不顧不悔惟圖反聞無間心便怡然問祖師何言這邊那邊都不缺用答此是大亡已久絶後再蘇死中復活方能各臻其妙非謂初心便能如是也問此節舊解多補天台三止觀今何不用答三觀初心不離六識思惟而入今經首廢六識不用將何入三觀耶斯經圓融妙理全是藏心本具詳在奢摩他中發揮而行人未修之時先成圓解及至修時行起解絶但一反聞極為簡便不勞廣立止觀宗門所謂單刀直入是也所入既寂動靜二相了然不生上方離動結此則動靜二結兼除也蓋動除靜現自然之理加功雙遣自然之勢夫既入流亡所矣然初雖亡所而所豈易亡初雖入流而流豈易入雖云努力一念不生未免動靜間發心心收攝非寂靜也至此亡所而所無不亡入流而流無不入羣動俱寂收攝情亡亡所入流二俱成靜由是而知前之亡所且惟亡動今之既寂乃是動結已除靜結方顯也既寂之後加功進力反聞功夫展轉深切以至寂靜亦亡則動靜二塵逈然雙脫矣問亡動即是亡聲而聲塵與聞性如黑白相違易於分辨故亡之則易至於靜塵與聞性相順聞性至靜而靜塵亦靜俱無邊際俱無分別亡之恐不易也答但患聞性未能了見分明若了然自見安有混淆之理良以聞性是心靜塵是境心則靈知不昧境則冥頑無知境自境心自心如爾為爾我為我有何難分譬如世俗凡夫一入深山無入之處皆能了別山中寂靜其實於己聞性絲毫不覺及至閙市其靜全失以前靜境全是山靜離山不復有靜所謂靜塵也若能一味反聞則性靜恆在居山居市其靜不易則真聞性也是則聞性本與靜塵無干及聞專切者亡之甚易何難之有哉大抵亡動之後別無伎倆只是功夫純熟自然增進至此則位當圓之初信而於二乘則齊初果也如是漸增聞所聞盡上全以亡塵此方以脫根也因前圖作亡塵方便故立能所二聞令其聞根而亡塵如是漸增加功進行塵相既盡外無所對則根亦不存能聞之聞機與所聞之聞性二俱除滅故曰聞所聞盡是則初解三結先得人空矣問既全以根性增明而方以雙亡動靜令復將根性亦亡豈不全成斷滅耶答但以盡根那云滅性問根與性為二耶答根如冰性如水冰水本無別體故非二然冰結而隔水融而通故非一矣今言根盡但如冰融豈如水涸問前言二塵亡後惟覺聞性極為寂靜湛無邊際今盡內根復作何相以別於此答前作方便脫彼二塵故暫執聞性為內二塵為外背外向內宛然內根恆在故聞曰中流曰入皆內相也及至二塵蕩忘已無外相既不對外內相漸消以至泯然豁然無復內外即根盡之相也若約三空考之到此即得人空蓋前此以根對塵塵為他相根為我相排他立我背他向我我相宛然至是根塵俱泯能所兩亡無復自他惟一法性故曰人空定位當至七信齊於別之七住小乘四果阿羅漢位也又當知此是菩薩高證圓之七信但約斷見思證人空謂齊小之四果非真實同羅漢也如世之進士初品暫同吏員極品豈真名位與之全同乎盡聞不住覺所覺空此脫覺觀也盡聞之後根塵逈脫湛一無邊之境現前是為所覺而照此境之智則為能覺盡聞若住則智境恆對能所仍存終為勝進之障惟加功進行透過斯境不鈍滯於此則能覺之智與所覺之境二俱空寂泯然無復對待矣此望後為斷法執微細流注分別也空覺極圓空所空滅此脫重空也覺所覺空之空是謂空覺即重空之智也此重空之智初起未圓則能空所空二俱宛在今空覺極圓則非惟所空智境息滅而重空之智亦復隨滅如以木鑽木火出則二木俱盡矣此望前為斷法執俱生定位當圓之十信齊于別之十住準三空則次解二結成法解脫矣生滅既滅寂滅現前此後解一結俱空不生也夫動靜根覺空滅六結要之皆生滅心也初解動滅靜生次解塵滅根生三解根滅覺生四解覺滅空生五解空滅滅生到此若住最後滅相則當為滅相所覆恆處俱空應是一種頂墮細障故百尺竿頭更須進步然此不復更勞著力滅除但無住著之心以俟一剎那頃本理現前則此之滅相即逈脫矣所謂寂者非對動之寂從無始來本自不動之寂也所謂滅者非對生之滅從無始來本無生之滅也此是本覺理體如來藏性真如實際清淨本然周遍法界亦名大寂滅海亦名大光明藏實乃真心全體而萬用皆具於中此理現前則山河大地應念化成無上知覺根隔合開六根互相為用而下之一切勝用皆從此發矣約其所至之位應在初住離分斷一分無明分證一分真理而一斷一切斷一證一切證四十四地功德隱然具足其與別教初地位雖言齊而歷別之與圓融實天地懸隔矣次第解結修證境此下詳演所獲殊勝也上是圓通因行此乃圓通果用問因行為修道之要理宜詳演而文何甚略果用待功成自顯似應且略而文何甚詳答此經如來與菩薩相同如來自四卷後半至五卷前半合有一卷經文詳脫解根修習圓通至為委悉而所以説果用者祗云山河大地應念化為無上知覺又云由是六根互相為用辭甚略也今菩薩説行若詳則應重如來所示説用若略則無補如來關文二俱非妙故應因行略而果用廣廣略皆適其宜矣忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力吳興作悲字二者下合十方六道衆生與諸衆生同一悲仰六道衆生亦應有本妙覺心四字不重標耳下三十二應申同慈力也十四無畏申同悲仰也因行既足果用以生正當頓斷無明頓證真理時一剎那頃忽然超越世間而不為界內有縛超越出世間而不為界外空縛但見寂照含空十方圓明即得二種殊勝功德一者上合十方諸佛本妙覺心與佛同體又與如來同一慈力與佛同用蓋本妙覺心人人本具故才證即上合也二者下合十方六道衆生與之同其悲仰蓋菩薩所證即是衆生同稟故證此理者即能與衆生同憂患曲成而不遺也所謂二種殊勝者如此悲謂哀求拔苦仰謂希聖與樂同一悲仰即易經與民同患之意前由因明立所遂起三種相續此由入流亡所遂獲二種殊勝立所是迷根亡所是悟本立所是約最初一念迷根為最細亡所是約最初下手工夫為最粗以迷時從細至粗悟時從粗入細迷悟轉換之機不出立亡二字然此所字尤為難除自初卷心目所在為發端其後展轉所破者只一所字曰立所曰亡所曰聞所曰覺所曰空所以出一所即入一所所之一字真貼體難刮之垢實微細我法二執之根也直至圓滿菩提歸無所得而所相方盡矣世尊由我供養觀音如來蒙彼如來授我如幻初假二聞故如幻聞薰此聞字指聞性本覺之體言薰者所謂本覺內薰也聞修此聞字即旋倒聞機之聞始覺之智言修者以此反聞進修圓通也金剛三昧終成一性故如金剛與佛如來同慈力故令我身成三十二應入諸國土此標承授受出三昧名以彰妙應也世尊由我往劫供養觀音如來蒙彼如來授我以如幻聞薰聞修金剛三昧得佛之體與佛如來同慈力故同佛之用體用兼具令我身成三十二應隨機赴感入諸國土而無剎不現焉三十二應者現十法界身圓應羣機也開之有三十二合之惟四聖六凡攝盡羣類菩薩隨機赴感如月印千江然衆生希應者須竭妙感若無妙感固不可妄議慈應之不周也鍾云聲塵本空聞性常住於常住中一切聲塵及於萬法悉皆如幻以此如幻法門始於聞中薰習終於聞中修證無作而作作實無作隨緣應用本體如如此三昧者名如幻聞薰聞修金剛三昧乃三十二應之本也賀云楞伽有三種意生身一三昧樂意生身此當八地二覺法自性性意生身此當九地至等覺三種類俱生無行作意生身此由等覺入妙覺位聖種類身一時俱現觀音三十二應正當種類俱生無行作意生身也世尊若諸菩薩入三摩地進修無漏勝解現圓勝解者因行已極所起證悟之智也現圓者智證將徹未徹將圓未圓也圓字作滿字釋之若入相似三摩地進修中道無漏則分真勝解現圓乃至若修金剛無漏則究竟勝解現圓也我現佛身而為説法令其解脫問菩薩何能現佛身耶答如鏡已明形對像現臣家之鏡王苟臨之豈無王像問等覺菩薩豈假初住現身説法耶答天魔現為佛像毱多尚乃致禮況初住菩薩妙理所現等覺雖尊孰敢不仰若諸有學三果以前賢位聖位俱屬有學寂靜妙明樂獨善寂求自然慧勝妙現圓我於彼前現獨覺身出無佛世觀物變易自覺無生故名獨覺而為説法令其解脫若諸有學斷十二緣緣斷勝性觀緣悟道知迷勝性由十二緣於是斷之緣斷而勝性現矣勝妙現圓勝妙即勝性也我於彼前現緣覺身而為説法令其解脫若諸有學得四諦空見道一十六心斷四諦下惑證生空理修道入滅初果後進斷三界八十一品俱生品品皆證一分擇滅無為勝性現圓我於彼前現聲聞身而為説法令其解脫應求四聖乘竟若諸衆生欲心明悟深達淫淫欲為苦之本不犯欲塵不獨人間粗斃之色即他化之樂亦不樂欲身清淨我於彼前現梵王身而為説法梵王色界天主説法者如金光明云大梵天王説出欲論是也令其解脫令其離欲塵而生梵世也是雖捨求皆具而更重希求即同下成就也若諸衆生欲為天主統領諸天我於彼前現帝釋身而為説法令其成就金光明云釋提桓因種種善論是也若諸衆生欲身自在遊行十方六欲四洲之十方也我於彼前現自在天身此云他化自在梵語婆舍跋提假他所作以成己樂即魔王為欲界頂天主也而為説法令其成就若諸衆生欲身自在飛行虗空能至他界我於彼前現大自在天身即色頂摩醯首羅天三目八臂騎白牛執白拂者是也而為説法令其成就統論諸天皆舉一以該其餘梵王似局初禪而實該四禪帝釋似局二欲而實該六欲二自在別舉魔天以二魔不在正天之屬故更舉之但闕四空以此論現身而四空不樂身相故不為現也若諸衆生愛統鬼神八部之屬救護國土摧魔護生我於彼前現天大將軍身四王各有八將而韋陀為上首是也而為説法令其成就若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就四王似應科入天主今文列於將後想譯者之誤世界即須彌各面一切國土也若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身那吒之類而為説法令其成就應求諸天竟若諸衆生樂為人王自金輪至粟散皆人王也粟散小邦之王如粟之多也我於彼前現人王身而為説法令其成就問世之平人有妄志帝王者矣亦現帝王身與之説遂心之法耶答此必有德懷仁不忍世亂發願世世為有道之主以理邦國菩薩為其現所欣之身與説生貴之因及帝王德業以薰隔生之種而已豈教以篡奪之術哉後放此若諸衆生愛主族姓世間推讓為人所推讓也我於彼前現長者身具十德為長者姓貴位高大富威猛智深年耆行淨禮備上嘆下歸故為族姓之主也而為説法令其成就若諸衆生愛談名言清淨自居博聞強識以道自娛如此方王通邵雍之類我於彼前現居士身而為説法令其成就若諸衆生愛治國土三台輔相剖斷邑州牧縣長我於彼前現宰官身而為説法令其成就以上三科似此方儒教所攝若諸衆生愛諸數術攝衛自居如此方郭璞華陀之類醫卜雜伎所攝我於彼前現婆羅門身婆羅門此云淨行四姓之一也而為説法令其成就若有男子好學出家持諸戒律自十戒以至進具二百五十戒也我於彼前現比丘身而為説法令其成就若有女人好學出家持諸禁戒自五戒進具至五百戒也我於彼前現比丘尼身而為説法令其成就若有男子樂持五戒我於彼前現優婆塞身此云近侍男而為説法令其成就若有女子五戒自居我於彼前現優婆夷身此云近侍女即堪任近侍比丘尼也而為説法令其成就若有女人內政立身女正位乎內故曰內政貴而能勤富而能儉故曰立身以修家國閨門為萬化之原故關於家國治亂我於彼前現女主身天子之后及國夫人邦君之妻命婦妻因夫榮大家如曹世叔之妻班昭之類而為説法令其成就若有衆生不壞男根一生不犯女色者我於彼前現童男身而為説法令其成就若有處女愛樂處身終不出嫁不求侵暴縱有強暴亦不從也我於彼前現童女身而為説法今其成就應求人趣竟此皆菩薩調而應偶而會竿木隨身逢場作戲所謂同事攝也若有諸天樂出天倫此下八部闕迦樓羅乃譯文略之也今但七部此七趣者雖皆具神通福德威權然均名惡趣各有苦惱故多欲脫去為人以希進修也我現天身而為説法令其成就上樂入故令其成就此樂出故亦令成就也若有諸龍樂出龍倫我現龍身而為説法令其成就如龍樹化五百龍衆俱受具戒之類若有藥義此云輕捷即夜叉也有三種一在地二在虗空三在天也樂度本倫我於彼前現藥叉身菩薩亦現身者以菩薩面夜叉心不隔一線故而為説法令其成就若乾闥婆此云香陰帝釋樂神也樂脫其倫我於彼前現乾闥婆身而為説法令其成就若阿修羅此云無端正以女美而男醜也樂脫其倫我於彼前現阿修羅身菩薩亦現身者以瞋化瞋也而為説法令其成就若緊那羅形似人而頭有角天帝絲竹樂神也樂脫其倫我於彼前現緊那羅身而為説法令其成就若摩呼羅伽大蟒腹行者樂脫其倫我於彼前現摩呼羅伽身而為説法令其成就如迦毗尊者為蟒受三皈聽訖現老人素服而去足顯菩薩龍蛇混雜無定名亦無定相也應現八部身竟若諸衆人樂人修人此現在人中而求捨身之後復得人身世世進修者我現人身而為説法令其成就若諸非人有形休咎精明等無形空散銷沉等有想鬼神精靈等無想精神化為土木金石等樂度其倫我於彼前皆現其身而為説法令其成就問無想既屬土木金石矣為説何法而得度耶答菩薩應化神妙莫測別有方便説亦非以口説而聽亦不以耳聽也按三十二應無越十界于十界中獨無菩薩并地獄身者或曰觀音已是菩薩何須更現地獄苦重不可度也是名妙淨三十二應入國土身皆以三昧聞薰聞修無作妙力自在成就此結名也上來如是應現即不無染汙即不得是名妙淨三十二應入國土身所以然者皆以三昧聞薰聞修若朝曦散彩明鏡現形不勞精力不費心思緣對自現初無作為故曰無作妙力逐浪隨波泛應曲當故曰自在成就無所往而不可現矣釋成上與諸佛同一慈力竟三十二應比普門品微有不同然本體是同不妨互有闕存耳依正法華具現菩薩界身準釋論亦化地獄也世尊我復以此聞薰聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德此標承三昧名字及悲仰為無畏之本也無畏約衆生言蓋遭難者正在怖畏之中而蒙救得脫即無畏也功德約菩薩言救生脫怖實菩薩最妙功德也世尊我今以上同慈力獲三十二應矣又復以此聞薰聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故證得衆生同體大悲故衆生悲苦仰樂我即苦與樂若有遭苦難處怖畏而一稱我名即蒙救脫不生怖畏令諸衆生於我身心獲十四種無畏功德如此方所謂一人有慶兆民賴之也一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫一苦惱難八難之中此一為總下七為別也二者知見旋復令諸衆生設入大火火不能燒三者觀聽旋復令諸衆生大水所漂水不能溺四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害五者薰聞成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無動搖六者聞薰精明明遍法界則諸幽暗性不能全能令衆生藥叉夜叉見前羅剎可畏鳩槃茶鬼厭魅及毗舍遮噉精氣鬼富樓那熱病鬼等雖近其傍目不能視如土地不見洞山鬼使不見主事僧是也七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫此令衆生得八難無畏也何謂十四一者由我不隨聲塵所起知見惟旋倒聞機反照自性是不自觀音以觀觀者我既與衆生同體當我如是觀時即攝衆生以同觀故能令十方苦楚其身惱亂其心之衆生一心稱名即各各隨其音聲而得解脫是雖我觀其音聲也即謂以衆生觀衆生可也以衆生一我也是則苦惱總難無畏矣二者見為火因故見業父則見猛火當旋聞聲脫時見亦旋而與色脫是謂知見旋復不復召火故能令一心稱名者設入大火火不能燒火燒難無畏矣三者聽為水因故聽業交則見大水今以觀為聽而聞根旋復不復召水故能令一心稱名者設為水漂水不能溺水溺難無畏矣四者殺害是鬼因今返聞時內滅妄想外除殺業心無殺害便不召鬼故令稱名衆生入鬼國而鬼不能害則鬼害難無畏矣五者當反聞時全以本覺真聞內薰妄聞而成就真聞性故令六根銷復皆同耳根所謂一根反源六根解脫也既六根同於聲聽聲聽無形即是全身泯於無形無形豈復有受刃處故能使稱名衆生臨當被殺彼人之刀段段自壞即使揮其兵戈亦如割水吹光於我不受刀兵之本性纖毫無動所謂將頭臨白刃一似斬春風也而刀兵難又何畏乎六者聞薰功極內瑩發光光遍法界則諸鬼神陰隱幽暗之物以向暗背明為性者豈能堪此光耀而自全乎故能令稱名衆生自藥叉以至富單那等雖近其傍目不能視菩薩攝身光所掩如梟鳥夜視晝盲羅剎向日不見也而鬼見難又何畏乎七者當反聞時音性圓銷塵泯矣觀聽返入根滅矣根塵兩銷則內無所繫外無所縛離諸塵妄以此妙力加被衆生能令枷鎖不能羈繫而枷鎖難惡足畏焉八者當反聞時滅音而解脫聲塵圓聞而證極根性塵滅則無復外敵性圓則咸歸內融故一切處遍生慈力以此慈力加被衆生能令磣心毒人化為慈悲眷屬無復惡心相向故雖經險路而賊不能劫而盜賊難又何畏焉衆生所得八難無畏蓋如此問菩薩見聞旋復與衆生何預而令彼稱名者即脫水火何耶答昔蔡順之母囓指而順心痛豈非母子同體而相通乎凡夫尚能如此況證同體大悲者而疑其不能如是耶心無殺害雖鬼國可入可見鬼所得而乘者皆好殺人也世人有為鬼所著而遍信師巫邪説多殺牲以祈禳者其能免於害乎賀云不自觀音者不存一毫我見即上文聞所聞盡覺所覺空等也以觀觀者以圓通之觀觀之即上文如幻金剛三昧下文圓融清淨寶覺也九者薰聞離塵色所不劫能令一切多淫衆生遠離貪欲十者純音無塵音但詮於耳家所對之境未詮諸過塵則詮於染蔽二過故純音無塵謂音雖不壞而已離染蔽之過即心境一如也或音字是聞字之誤根境圓融無對所對能令一切忿恨衆生離諸瞋恚十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦此云無善心永離癡暗此令衆生得三毒無畏也九者反聞離塵逈脫於色故能隨色現色而色不能劫如水現影如鏡現像影像安能劫水鏡哉以此無貪妙力加被衆生能令多淫衆生遠離貪欲而貪毒無畏矣十者純一圓音了無染蔽塵相根塵融為一法既無能對之根亦無所對之塵夫瞋生於敵對無對所對則瞋恚無由而起以此無瞋妙力加被衆生能令一切忿恨衆生離諸瞋恚而瞋毒無畏矣十一者銷昏翳之妄塵旋精明之妙覺故外而法界內而身心如淨琉璃朗徹無凝以此無癡妙力加被衆生能令一切具足見惑之昏具足思惑之鈍具足無明之性障及諸阿顛迦癡之最重者皆永離癡暗而癡毒無畏矣十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女此令衆生得二求無畏也夫求男女者有何所畏畏其終不得也菩薩遂其所求即脫其不得之畏矣十一者融形復聞渾身成一圓融清淨寶覺若身相不融則此身非彼彼身非此安得不起而遍如月印千江乎由身相既融故能不動道場遍一切處供養如來各各佛邊為法王子紹繼法王有男之道又福慧兩足有男子德故能令無子衆生於我求男者即誕生福德智慧之男而求男者無畏其不得矣十三者反聞功極六根圓通眼如耳耳如鼻皆可互用而明照無二含育十方如來妙寶王剎由明照無二故立大圓鏡以顯無像不現由含十方界故立空如來藏以明無物不容唯含故能承順法門惟明照故能受領無失承順即坤儀也受領即女德也故能令無子衆生於我求女者即誕生端正福德柔順為衆人愛敬有相之女而求女者無畏其不得矣十四者此三千大千世界百億日月現住世間諸法王子有六十二億恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二億恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通此令衆生得稱名無畏也持名者何所畏而説無畏蓋持名者或恐其功德不勝而懷尤豫或遇持名多者而懼其不及皆畏相也今持菩薩名者逈脫此二畏故亦曰無畏矣十四者此三千大千世界總有百億日月今現住此世界中諸法王子共有六十二億恆河沙數之多其隨自實行修法垂範教化衆生隨他權行順彼衆生方便智慧各各不同有能盡持此名號者功德當無尚矣然由我所得圓通本根只在耳根一門發妙能令一身應無量身一心應無量心微妙含容周遍法界自在無礙具足萬聖法門則知六十二億恆沙菩薩所證皆不離我法界海慧耳故持我觀音一名與彼共持諸法王子名號者此二人較量功德等無有異世尊我一名號與彼衆多名號多寡不齊何以令持者功德正等無異哉由我修習耳根一門得真圓通故諸聖雖多僅能敵我一人也蓋此方衆生耳根利故愛道者多所以觀音化勝餘根鈍故愛道者少所以諸聖化劣是則行位雖齊對機有異而持名功德坐此正等矣衆生稱名無畏又如此菩薩顯然自任惟我得真圓通可見餘聖所得非真文殊之揀不過重明此語而已是名十四施無畏力福備衆生此結名也如上種種是名十四施無畏力非但脫其怖畏兼復全其福德而我之福皆備於衆生矣釋成下與衆生同其悲仰竟世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德此陳四不思議也前雖顯明上同下合皆是隨機猶有限量猶可心思言議此更充其圓極之量則不容擬議矣然上皆標從三昧尚約因心此則直承圓通修證無上道故已涉果地當是等覺境界也世尊我又獲是心佛衆生三無差別之圓通修證無上道故圓修圓證又能善獲四不思議無作妙德至妙故不可思至神故不可議任運自在非有為作意所成故曰無作妙德也一者由我初獲妙妙聞心反聞之聞即始覺自性之性即本覺始本合一二俱成妙故曰妙妙聞性也心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆多妙容能説無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅此云堅固不壞首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一切八臂千臂萬臂八萬四千母陀羅此云印臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在此明一身現多不思議也夫二十四聖所證圓通一一皆妙而我所證耳根圓通是一切圓通根本為妙中妙一者由我初獲此妙妙聞心惟一心精脫盡根相故令見聞覺知不各局於本根而不能分隔復還一真法界之體成一圓融清淨寶覺交徹互用無障無礙為一為多無所不可故我能於一身之中現衆多妙容於衆多妙容説無邊祕密神呪是誠不思議矣何謂妙容如首為六用之總臂表提接之悲目表照了之智皆妙容也但衆生渾身手眼迷而不知俱成業用自我得之如春入律如月行空信手拈來俱成妙用以首言之自現一首以至八萬四千爍迦羅首以臂言之自現二臂以至八萬四千母陀羅臂以目言之自現二目以至八萬四千清淨寶目既應塵勞之數亦應對治塵勞具足八萬四千陀羅尼門其中或施慈以攝善人之心即歡喜相也或彰威以折邪魔之膽即忿怒相也或定以杜散動之門即澄斂相也或慧以破無明之窟即開照相也首臂目皆具四種差別故能泛應塵勞曲施誘迪隨感而應無不如心救護衆生得大自在焉形能如此呪可例知亦應具此四種矣若論妙容初住即應能現或數之多寡不等耳經謂帝釋亦能現千首眼而揆其本位正當圓之三住意可類推鍾云衆生迷此覺性六根現八萬塵勞菩薩悟此覺性全體彰八萬德用如不信菩薩德用但觀自己六根塵勞妄想念念紛飛還有涯量否二者由我聞聞即聞性思思即入忘功夫脫出六塵即動靜二相了然不生如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者此明各身各形不思議也二者由我用聞思之功脫出六塵如聲度重垣無所滯礙故我妙能現一一形對各機而現各身誦一一呪於各身而説各呪其一一身一一呪皆以無畏施諸衆生而脫其怖故令十方微塵國土衆生悉皆稱我為施無畏者名遍塵剎皆救苦之功特勝也問此與十四無畏何別答十四無畏但令衆生稱名自脫未論現形説呪豈混同哉三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍此明過化不思議也三者由我修習耳根一門本妙圓通已得清淨本根於六塵境毫無戀著悉能捨施以捨感捨故所遊世界皆過化存神亦令衆生捨其身所珍寶悉以施我求我哀愍受之而為施作佛事焉夫衆生慳心最為難破捨心最為難發今所過即感其破慳樂捨是誠不思議威神所使然矣四者我得佛心證於究竟能以珍寶種種供養十方如來旁及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃此明供養不思議也四者我既初獲如來藏心登於究竟已入妙莊嚴海佛法寶藏既開具無量福慧手中能出無量珍寶能以此種種珍寶所謂衣鬘香燈擬妙高而同四海者供養十方如來旁及法界六道衆生皆以等心至心悉同供養如國城妻子謂之外財長壽身命謂之內財能令衆生求妻得妻求子得子乃至求長壽得長壽是以財施也三昧涅槃屬於法施求三昧得三昧如一果二果以至三賢十聖等如是乃至求大涅槃得大涅槃雖如來至尊極果尚與成就是以法施也蓋我觀衆生具有如來智慧德相故生佛同供財法二施如此而供養真不思議矣四不思議中前三尚是等覺第四自稱佛心究竟倣佛妙覺極證矣問初住圓通何濫深位答圓人一地具四十二地功德無遺初住既爾位位皆然不足疑也佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩提成就菩提斯為第一世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界此結圓通也佛問圓通我從耳根一門深入反聞功成六根應拔寂滅現前圓照三昧故得上同諸佛下化衆生隨緣施設無不自在溯其最初之因惟是入流亡所為起手功夫以是得三摩提成就菩提圓成果地修證所謂圓通斯為第一世尊彼佛觀音如來歎我善得圓通法門於大會中授記我為觀世音號是初住始證之時已見師資道合矣由我觀聽十方圓明如聲度垣如月印水故隨感隨應而觀音之名遍滿十方世界是既證之後又見感應道交矣名實相孚聲稱周遍我獲圓通豈偶然哉按觀音三昧經及大悲經並云此菩薩過去久已成佛號正法明如來又悲華經説往昔寶藏如來授不瞬太子記名觀世音然則悲華與今經皆覆本垂迹之名耳今得圓通即太子後身也大衆各説已竟爾時世尊於師子座從其五體同放寶光表全身吐露也遠灌十方微塵如來以自果徹他果也及法王子諸菩薩頂以自因徹他因也然惟灌頂者表此圓通之理最為殊勝無上之法也彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網表圓通現前一切聲是佛聲一切色是佛色也是諸大衆得未曾有言相互顯喜極而徹悟也一切普獲金剛三昧顯首楞嚴王即是金剛寶覺平等法界也即時天雨百寶蓮華青黃赤白間錯紛揉華分品色所以表行也十方虗空成七寶色寶具光明所以表智也此娑婆界大地山河俱時不現表萬象俱融也唯見十方微塵國土合成一界表一性究竟也梵唄咏歌自然敷奏表圓通法樂無乎不在也四卷富樓那所問清淨本然云何忽生山河大地正欲覩此境界而令始現前矣此佛現瑞應也蓋衆聖各述圓通則華屋諸門悉啓故佛復現瑞以應之是諸聖以言顯而如來以相顯總欲衆生承言玩相而發悟也於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各説最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就此敕文殊選擇圓通也獨命文殊者以其為寂場之大智諸會之法眼也於是如來既現瑞已即告文殊師利法王子言汝今觀此二十五無學諸大菩薩及阿羅漢各人所修所證均稱方便真實然彼等修行實無優劣及前後差別蓋千徑九逵王城不二遲速巧拙至處均齊耳我今欲令阿難開發大悟不知此二十五行中誰可對阿難之機者且不但當現在一人之機兼我滅後此界衆生欲入菩薩乘之真因求無上道之極果必從何方便門乃對其機得易成就耶蓋當機常修但取一門故不可不揀爾文殊具擇法眼其為我仔細披剝拈出妙門以嘉惠後學可也文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神説偈對佛起座頂禮尊師命也承佛威神求加被也是雖果後大人而順儀彰軌如此可以警我慢之流矣覺海性澄圓圓澄覺元妙元明照生所所立照性亡此發源開選也偈曰欲求返妄歸真當明從真起妄且諸妄何由而起哉原夫吾人之性以知覺為體故取於覺以深廣為量故取於海此覺海性湛寂而澄無諸起滅洞鑑而圓無諸偏蔽既圓且澄總名覺性而此覺性本來自妙不假作為亦無方所良由於彼元明性上妄生照用遂立方所所既妄立而照用之本性遂亡如雲起必障於日此即依本覺而成業識也覺海指體言標體大也澄圓指相言標相大也元妙指用言標用大也此三大為諸妄所依迷妄有虗空依空立世界想澄成國土知覺乃衆生此明萬法生起也既迷性覺而成業識遂迷性空而成頑空故曰迷妄有虗空也由是空晦暗中結暗為色復立無情有情二種世界故曰依空立世界也以取一分浮虗亂想凝結而無知者以成器界故曰想澄成國土以取一分浮虗妄想凝結而有知者以成根身故曰知覺乃衆生此即依無明業識生起相見二分也空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有此明萬法還滅也夫此迷妄之空大而無外本非微劣而以大覺較之更大無量此空生於大覺之中如海中一漚遂成至微劣矣空尚如此況有漏微塵國土悉以虗空建立者其眇小當何如耶然則此漚若滅則包界外之虗空尚歸本無況從虗空所生欲有色有無色有而能獨存耶本由至虗故可速滅所謂一人發真歸元十方虗空悉皆銷殞也問方彰生起何以遽談還滅答還滅即是歸元今選根深入正謀歸元之路故備彰生起之虗還滅之易以發其端耳鍾云覺海性澄圓二句即二卷中性覺妙明本覺明妙也圓明照生所二句即因明立所所既妄立生汝妄能是也迷妄有虗空至皆依空所生八句即引起塵勞起為世界靜成虗空是也漚滅空本無二句即三緣斷故三因不生狂性自歇歇即菩提是也一部楞嚴橫竪發明頭頭湊著如鏡交光亟須著眼歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同倫此正明根之當選也夫萬法可以還滅已識歸元之路若得歸元理惟是一覺性固無有二但欲入此無二覺性則方便固有多門如京畿是一入路多岐也若是聖人全證此性則法法圓融事事無礙故或憎或愛或苦或樂無非皆是入理之門不得揀擇若初發心人欲入三昧而得圓根與不圓根日劫相倍則定有遲速之不同如順此方之機為順逆此方之機為逆順則速而逆則遲也豈可不選擇哉譬則趨京之路迂直千差豈皆捷徑亦不可不擇路而趨矣色想結成塵精了不能徹如何不明徹於是獲圓通音聲雜語言但伊名句味一非含一切云何獲圓通香以合中知離則元無有不恆其所覺云何獲圓通味性非本然要以味時有其覺不恆一云何獲圓通觸以所觸明無所不明觸合離性非定云何獲圓通法稱為內塵憑塵必有所能所非遍涉云何獲圓通此揀六塵非圓通也前云彼等修行實無優劣但對此方之機有遲有速故文殊向無優劣處強分優劣無差別處強分差別於是將二十四聖掂斤播兩一一品題皆不當此方圓通之本末後獨選耳根一門為最勝焉彼沙陀雖觀色性空而悟入矣但此色性元憑妄想結為障蔽之塵若以心精了之終不透徹豈有不明不徹昏昏擾擾之物初心依之而欲證圓通耶陳如雖聞法音而悟入矣但音聲者徑直聲也語言者屈曲聲也陳如從四諦入偏取屈曲是音聲雜語言矣既落語言惟以取彼名句之味一字直目詮自性為名二字帶表詮差別為句味即所含義味也且此理圓言偏初心豈達一言遍該一切義理云何依之而欲證圓通耶香嚴雖嗅香塵而悟入矣然香塵必待煙合於鼻方以知香離則無復香相是香非常住不能令覺常恆覺不恆則香亦非恆豈能於香而得圓通哉藥王雖因味塵而悟入矣但此味性亦非常然之體要以味合時始有不能令此味性合離恆一既不恆一豈能於味而得圓通哉跋陀雖因觸塵而悟入矣但觸無自相雙依能所內依身根為能觸外依色塵為所觸中間方顯觸相若無所則不顯觸是此觸相或合或離性非有定欲依之以取圓通難矣迦葉雖因法塵而悟入矣但法塵非外五塵之實質乃五塵影子惟意中獨緣屬獨影境故曰內塵起意緣時但專一境捨一緣一必有方所能所皆局豈能遍涉欲依之以取圓通難矣鍾云揀非揀聖乃揀法也亦非揀法乃揀機也凡曰云何獲圓通者就阿難及大衆之機言耳若諸聖固已各依彼法畢獲圓通佛已許其無優劣矣道開曰非謂聖不獲圓通也謂學人如諸聖而修則難獲圓通以不當此方之機故見性雖洞然明前不明後四維虧一半四維四隅也意兼四方具千二功德四方八百四隅四百今但缺後方及兩隅共四百是缺三分之一耳而言虧一半者語之忽也云何獲圓通鼻息出入通現前無交氣支離匪涉入云何獲圓通舌非入無端吳興曰應是舌入非無端耳因味生覺了味亡了無有云何獲圓通身與所觸同所觸二字直指前之觸塵而言各非圓覺觀圓字雙貴覺觀二字圓覺者獨立之全體也圓觀者絶待之全智也涯量猶言邊際不冥會冥暗也會知也云何獲圓通知根雜亂思湛了終無見想念不可脫云何獲圓通舌有説法嘗味二種之用論説法則無礙辨才所謂人無端也猶與圓通相近若止論嘗味一節境合方覺境滅即亡非能入無端也何謂圓通乎此揀五根非圓通也律陀因見性而悟入然見性雖是洞然明白但能見前三方二隅向後一方二隅即不能見云何依此不圓之根而欲證圓通耶槃特因鼻根悟入但鼻根出則取香入則聞香而缺中間交氣既缺中交則支離間斷不相涉入云何依此支離之物而欲證圓通耶鉢提因舌根而悟入然舌不因味而即能覺了乃為無端今者不然不過因味生覺味亡覺亡云何依此而欲證圓通耶畢陵因身根而悟入然前之觸塵我已揀其不圓今此身根全與彼觸塵相同合中之知根塵相待而顯皆非圓覺圓觀所以身邊際與觸邊際不能於遠離之時暗中有知合有離無云何依此而欲證圓通耶須菩提因意根而悟入然此意知根雜於意識亂思諸識中唯意識最亂最為剛強難於制伏彼湛了者即脫盡意識湛然了知之性也知根既雜亂思則湛了終無所見如非想天人入非想定研窮求其湛了猶不可得報盡還墜是也是則久修之人尚不能脫想念云何初心乃欲依此而證圓通耶蓋圓通本是無分別定之勝果今想念不脫安能得此果哉見與鼻揀去不圓之根也舌與身揀去合知而淺之根也意知揀去非純離之根也問根能旋反轉之即性何亦揀之答根雖總皆近性勝彼塵識然六中圓缺不齊前文云圓根與不圓根日劫相倍今正揀去合者淺者與不圓者意令唯取耳根而已識見雜三和識見應云見識即眼識也論云二和生識謂根境和合識生其中今言三和者能依自體并所依根塵故曰三也詰本稱非相自體先無定云何獲圓通心聞洞十方生於大因力初心不能入云何獲圓通鼻想本權機鼻想者於鼻端作觀白之想也只今攝心住住成心所住云何獲圓通説法弄音文開悟先成者名句非無漏云何獲圓通持犯但束身束於身識非謂身根非身無所束元非遍一切云何獲圓通神通本宿因何關法分別法分別三字即意識別名蓋意識是法塵上分別性故也念緣非離物云何獲圓通此揀六識非圓通也舍利弗因眼識而悟入雖此見識外對無情之色塵內依無分別之眼根能依之一所依之二三者雜和而生若詰其本則無定相體既無定云何依此而欲證圓通乎普賢因耳識而悟入雖此心聞洞徹十方然皆由修普賢行大因威力致耳識洞聞沙界非耳識自妙能順初心成此妙果既非初心小機所能得入云何於此而欲證圓通乎孫陀羅因鼻識而悟入然此鼻端白想本為對治而權假設想非鼻識本有也只為攝住散亂而已住則偏局一處何由而圓蓋真心無住有住則妄矣云何依此而欲證圓通耶富樓那因舌識而悟入然説法者雖由舌識調弄語言文字亦是滿慈曠劫以來宿因成熟具辨才力故得開悟非關一時舌識所能況名句是不相應行元屬有為非無漏法云何於此而欲證圓通耶波離因身識而悟入然此持戒但能檢束身識除身識外更無所束若圓通之境當遍融身界萬法今束此不能束彼則所遺尚多云何依此而欲證圓通耶目連因意識而悟入然意識是法塵分別之性神通是曠劫宿因之力了無關涉縱由意識亦是念念攀緣不能離物既非離塵普遍之法亦難獲圓通矣此經首即斥破六處識心為生死根本不可依之錯亂修習而諸聖自陳仍備此六門者見聖性無不通也文殊復揀去者仍順此經遮止誤用也若初心用此以求圓通則不成無上菩提乃至別成聲聞魔外者極多如六聖得正圓通者極少所以須揀去也若以地性觀堅礙非通達有為非聖性云何獲圓通若以水性觀想念非真實如如非覺觀如如者即圓通真實之體乃離念不動之法凡起心分別覺觀皆不相應反顯旋聞不屬覺觀明矣而強安三觀者豈未見於此耶云何獲圓通若以火性觀厭有非真離非初心方便云何獲圓通若以風性觀動寂非無對對非無上覺云何獲圓通問反聞法門亦從動靜而入何殊於此答彼乃漸脫動靜二塵以取無動靜之聞性為初心方便此即取有動寂之風性為入門所以大不同也若以空性觀昏鈍先非覺無覺異菩提世有尊太虗空為本性者當悟此矣云何獲圓通若以識性觀觀識非常住存心乃虗妄云何獲圓通諸行是無常念性元生滅因果今殊感云何獲圓通長水云念佛法門此方最要雖云生滅要因念想專注在懷兼佛願力直生淨土往彼國已進行彌速今顯圓根觀音為上抑揚之道故須揀也此揀七大非圓通也持地因地大而悟入然此地性是堅固質礙之物不能四通八達抑且平填要物多屬有為功行遇佛平心方得聖性而初心全涉有為云何依此有為而欲證圓通耶月光因水大而悟入且此水觀正由繫想所成未離想念非真實性蓋如如之理非覺觀之法可得相應云何依此分別覺觀而欲證圓通耶烏芻因火大而悟入且彼遍觀火性亦是厭而求離非身心俱斷斷性亦無真實本離之法況衆生初心不皆多欲亦有少欲無欲者既非初心一定之方便云何於此而欲證圓通耶琉璃光因風大而悟入且彼遍觀四大身心皆是風力所轉風則有動有寂是對待法既有對待便屬循環生滅無常之法非無上覺體云何於此而欲證圓通耶虗空藏因空大而悟入且此空性是晦昧所成昏鈍冥頑非有知覺若菩提覺性以明靈為相正與昏鈍相反以昏鈍因取明靈果如鑽冰取火云何於此而欲證圓通乎彌勒因識大而悟入惟修識觀而所觀之識念念生滅非常住性縱研窮之極有存住之心然但是識陰境界猶如湛流望若恬靜而實不住總屬虗妄云何於此而欲證圓通乎大勢至以六根念佛而悟入然凡有運動遷流皆屬行陰皆墮無常今勢至雖曰都攝六根而主於淨念相繼既曰淨念終成有念既曰相繼難免生滅若以此為因往生見佛則因果相應無有不可若以此為因而求現證不生滅之圓通則因果不類決難得也而云何依此妄冀圓通亦可獲與合而觀之諸門所以當揀者一者不對方宜二者不便初心三者別有資藉四者非常修學可見對方宜便初心不勞藉資通常可修惟有耳根一門矣七大之中前五同塵第六同識第七同根比前但加廣大之相而揀意則同也我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入此下獨選耳根為圓通而此顯其正對方宜翻前不對方宜也蓋聖人設教隨方不同或有佛土以佛光明而作佛事或有佛土以佛菩提樹而作佛事乃至或以園林臺觀或以虗空或以寂無説示如香積佛國無文字説但以衆香令諸天人得入律行之類我今白世尊佛出此娑婆世界而此方衆生耳根偏利能由聞性偏達無量差別理事故佛對此一方機宜而以音聲施作佛事所以逗彼聞根之利是則合音與聞乃為此方真清淨教體矣教體既在音聞而欲入正定者豈可捨教體而別取哉故應惟從耳根聞性而入也良以聲教但為弄引聞性實為妙心故領悟雖是雙托音聞而修定但宜單取聞性也是則從説選根以來直至此處惟此一句方以決定分明指出耳根為圓通本根至妙之法門矣離苦得解脫良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住此讚能證自利利他之德也夫教體獨取聞性如此求其善得圓通妙門而獨超諸門者其惟觀世音乎彼分段變易二種生死苦人所難離也而能離之離繫自在二種解脫樂人所難得也而能得之離苦能樂良哉觀世音也其能以聞性自利如此又於恆沙數劫中遍入微塵佛國時為極長而處為極廣矣得大自在力三十二應隨緣説法也無畏施衆生十四無畏尋聲救苦也以其説法不滯故為妙音而尋聲救苦又為觀音以其音性無著故為梵音而應不失時又為潮音具此四音故恩沾於凡而救世拔苦悉得安寧而世間蒙益矣恩沾於聖而使獲究竟常住之果而出世間蒙益矣其能以聞性利他又如此詳夫菩薩忘音塵而修聞性及至稱名歎德乃獨取音而不取聞何也正表圓人不壞法相而初心亡塵但圖解根而已圓通之後一切妙用全在於音也豈如灰斷之果永壞無用也耶我今啓如來如觀音所説譬如人靜居十方俱擊鼓十處一時聞此則圓真實目非觀障外口鼻亦復然身以合方知此二句疑倒應云身以合方知口鼻亦復然也心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實此句結意應在後科之末方成總結今隨文便寄結於此耳縱令在夢想不為不思無覺觀出思惟身心不能及此顯耳根元自真實決定速至圓通不勞借資別因正翻前別有資藉之緣也然耳門之所以獨妙者何哉我今啓告如來如觀音所説耳根有三種真實一者譬如人當靜居之時十方一齊擊鼓則十處一時俱聞初不分何處有聞何處無聞何處先聞何處後聞也此見耳根聞性人人本來自圓故遍滿十方絲毫不昧如此是則圓為真實之圓矣二者目雖能觀而不觀障外如隔窗紙不見外事隔皮膚不見臟腑是也身以觸合方知有觸口鼻之於味香亦然略離尺寸了無覺知意根雖通而常纏意識心念紛飛絶無端緒是五根俱無現具靈通矣若耳根者隔垣皆聽非若眼根隔紙膚而不見也遐邇俱聞非若三根離尺寸而不知也無思常靜非若意根之常思而亂動也此五根之所不能齊而不謂之通真實乎三者音聲之性有動有靜常於聞性湛然體中循環代謝動則歷然現有靜則寂然現無世人顛倒乃於寂然無聲時惑為無聞據理而論但是聲無非實聞性無也然則聞性既不隨聲無而滅亦豈隨聲有而生生滅雙離湛然常住而不謂之常真實乎且也即使在夢想中正當獨頭意識用事之時似乎聞性暫斷然猶聞舂搗聲惑為鼓響則知此之聞性斷不為了無所思而遂成烏有是則聞性本體之覺與聞性照用之觀寤寐恆一不假思惟前謂月光如如非覺觀者正為彼是思惟覺觀故也此出思惟之覺觀却是真如如體而外四根之身內意根之心所不能及益足以見其常真實矣此三種真實皆是凡夫現具不特證而後有若就此更修是順風行船因風吹火何難之有哉今此娑婆國聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄此明耳根最便初心以翻前不便初心也且今此堪忍國中耳根明利必須語言方得明了故佛對此方便利之根廣宣一切經論然經所詮論無非發明圓湛妙性而圓湛妙性不離能聞之根性應當借聲論而反聞自性若因指見月可也奈何狂慧學者不達如來本意反迷自己本有聞性一味循聲逐響但隨語句流轉何異執指當月哉抑且不獨衆生循聲流轉即汝阿難縱能強記十方如來十二部經清淨妙理如恆河沙尚不免落於邪思逐邪境而被物牽去不能自由豈非隨彼聲塵不知旋流而被淪溺者耶若知循聲順流而不免淪溺則知反聞旋流必獲真實常住無妄之性矣可見旋流一法其與此方根機藥病相投一切初心有何不可用哉阿難汝諦聽我承佛威力宣説金剛王如幻不思議佛母真三昧汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞此專囑當機必依此門而修也阿難汝可諦聽我今日選根非敢自專自用故為低昂皆是承佛威力故此所説者即前金剛王寶覺如幻三摩提十方薄伽梵一路涅槃門也且汝記持佛法不為不多然唯樂多聞不修無漏勝業故欲漏深重種習未盡所畜愈多殊不得力而竟成墮淫之過誤矣先德云祖師言句如破草鞋寧可赤腳不著最好夫畜聞成過亦何貴此聞哉況本聞之聞即是妙性無勞外求却乃日用不知反將本聞去受持諸佛之佛法譬如以金碗乞食不如碗自可富於食然則何不識取本聞而旋倒聞根以聞聞性乎良以如來設教無非欲人自悟本性今乃棄本性而務馳言教豈如來設教之意哉蓋多聞則心放而難收反聞則神凝而易入故令其一反聞而即得無妄矣賀云自聞聞只是反照本性非真注於耳根也聞此聞字正指所結之根非自然生因聲有名字旋聞與聲脫能脫欲誰名一根既返源六根成解脫見聞指根言如幻翳三界指塵言若空華聞復翳根除塵銷覺圓清淨極光通達寂照含虗空却來觀世間猶如夢中事摩登伽在夢誰能留汝形上方舉妙門之勝名述不修之大錯以警其當修反聞而已而尚未言如何修如何證也故又曰若夫修證則何如哉彼根之結也在耳曰聞矣是聞也非是無故而生此結相正因聲塵相擊而聽精映聲卷聲成根從無始來遂有此耳根之名聚聞結滯無復解脫既因攬聲而結須待脫聲而解故首須旋倒聞根反聞自性以求與聲脫若所脫之塵既銷并能脫之根亦盡惟一妙性豈復有耳根之名乎喻如水本因寒而結冰故冰須脫寒而成水矣然非但解一根而餘根尚結也根相雖六性體惟一本以一性而頓結六根所謂一結一切結故但解一根而餘根隨脫所謂一解一切解喻如片錦六華華雖各別而底線相連故拆一華而餘華皆壞矣此約橫喻故六根同一成壞不同巾之竪喻也是則一根返源豈不至簡耶六根齊脫豈不至要耶夫至六根解脫則衆生世界已自不能纏縛矣而器世界又豈不能超越耶蓋器界全依根身而立故見聞猶如幻翳三界一似空華從翳起華有則俱有無則俱無今既一返六解而聞等已復於無即如翳根已除自然塵界隨銷亦若空華滅盡而本覺之體圓滿清淨所謂逈脫根塵靈光獨耀矣夫根身解而器界即銷其亦至易而甚速矣乎極而言之根塵銷到至淨之地即是明相精純之時此常寂光通達法界即虗空無邊而寂照光明周遍含𮖐不翅如大海之含一漚況依虗空所立之器界根身耶既已到此境界却來反觀世間種種諸事真如夢裏以在迷時未能證此如幻境界認以為實覺而後知為夢也然則汝之所以被邪術所制無自由分者正由妄認緣塵影事為心不知根中圓湛妙心寂照含空無可拘制也汝若早識根中妙心而解根超界乃至寂照含空得大解脫則登伽在汝覺海夢中如漚如塵又安能以夢事而留滯汝形哉如之何其不勉也前文見非是見指本體到極真處故見之名不存此指工夫到極真處故聞之名亦不立也如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來此以喻合法明一返六脫之義也何以見一根返源而情器雙超哉譬如世間巧幻師幻作種種諸男女形諸根畢具宛然生動要以幻師手中所提線索動故幻人口眼亦動若線索不動則口眼亦不動是則動惟機抽寂惟機息至息機歸寂并所依幻處亦泯於無而諸幻成無性矣知此則知六根矣彼六根之在人亦復如是只因真如不守自性與無明和合所成識精明元為六精之總體即是第八阿賴耶識亦即陀那微細識強名之曰一精明即如幻師之一機也六根元依此一精明而分攬六塵各成根相於是在眼名見在耳名聞等以根塵和合而成故名六和合即如幻作之諸男女也所以雖見六用殊惟一精明轉亦如雖見諸根動要以一機抽也若反聞旋根而一處成休復則應拔圓脫而六用皆不成亦如息機歸寂然矣以至器世間六塵所成垢染世界皆應念而銷頓成圓明淨妙是則山河大地應念化成無上知覺也而非即喻中所謂諸幻成無性耶至此則情器雙超而塵無不盡也若有餘而未盡者尚居學位未得畢功若無明已盡而本明證極即是如來所證圓成極果無上菩提矣夫法門既妙而修證又巧乃至成佛無難何不選此一根為初心入門之要路耶餘塵者斷無明未盡謂之有餘極而言之雖等覺亦爾故諸學指等覺以前諸有學菩薩也問前文稱菩薩一例無學今何又言有學答前位離佛遠顯超二乘故稱無學今鄰近如來對佛究竟無學故等覺亦是有學如鄰至尊不取稱尊也大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音此復廣舉所證以發其欣慕之心普勸進修也夫反聞之功效驗之速如此今會中大衆及汝阿難便當旋汝顛倒聞機不循外而循內若果能反汝聞如來祕密法門之聞而聞自己本有之聞性得此性為因地心立可成無上覺道蓋圓通之門雖有多種若真實圓通可當此方之機治多聞之病者唯此一門以此一門是微塵佛到菩提家一條大路入涅槃海一重大門所以過去諸如來由此而入現在諸菩薩亦由此而入是則已有許多榜樣在前故未來學人必當依此法門而入也抑且不唯諸佛菩薩從此門入即我亦從此門而證豈特觀世音為然哉夫自不修而唯勸人修人或不從身先入而率人同入人誰不與文殊之意至深切矣開曰推廣此門即孔老二氏亦從此入故仲尼云六十而耳順莊子云我所謂聞者非謂其聞彼也自聞而已矣故知反聞二字實此方對症之良藥三教之所共用但所證有淺深不同耳誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事捨塵勞非是常修學淺深同説法此報復尊敕也誠然如佛所命詢我諸方便如二十五行誰當其根以救諸末劫如我滅度後此界衆生求出世間人如入菩薩乘成就涅槃心如求無上道所問四種求其全順佛旨者唯觀音耳根一門最為第一耳自餘二十四聖所入方便皆是佛之威神加被偶觸一事而捨塵勞非是通長可修亦非上中下根淺深同説之法如那律之失明畢陵之觸刺人不皆然豈尋常一槩可入乎如普賢之大因滿慈之宿辨善吉之解空鶖子之淨見皆屬深心豈初機可入乎沙陀之貪淫周利之闕誦但局淺心豈大心之所入乎既各有所局則定有所偏安得通常可修淺深俱入如觀音耳門者哉頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者真實心如是此進求加被也夫此耳根一門即是前所説三如來藏即前所説無漏業即前所説如幻不思議佛母真三昧我今頂禮願諸佛以神力加被未來進修者皆從此門單刀直入更無一毫疑惑若將此法門為最初方便則易成就故堪以此法教阿難亦可以此法度末劫沉淪也然但用此一門而不用餘門者以依此一門進修可超二十四聖之圓通真實心要如是而已此經文殊凡四見皆有深旨初敕文殊將呪往護者非大智人不堪持此呪心故次問色空是非二義者非大智人不能為人排難解紛故三敕揀選圓通者非大智人不具正眼非正眼不能選根必鵝王而後能擇水中之乳故四請問經名者以一會之法始終皆歸於本智故如來教示一門深入科已竟二決定義至此方竟於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得還歸明了其家所歸道路普會大衆天龍八部人天衆也有學二乘小乘有學及諸一切新發心菩薩大乘初心其數凡有十恆河沙皆得本心此與三卷末獲本妙心同一心相但彼悟得此證得也遠塵離垢此即想相為塵識情為垢二俱遠離也覺所覺空則塵遠空所滅則垢離矣獲法眼淨初地見道也若依圓教即十住初心也性比丘尼聞説偈已成阿羅漢即圓之七信也無量衆生皆發無等等阿耨多羅三藐三菩提心此敘大衆開悟證入也文殊既説偈已於是阿難及諸大衆身心了然蓋向之身心皎然者但知身心結解之次第尚未知何門得入今已確知從耳門入更無疑惑故身心皆了然也此由二十五聖并文殊委悉説盡故曰得大開示其觀佛菩提及大涅槃之究竟極果也猶如久為窮子逃逝他鄉即欲歸家路頭不識今日指出一條還家道路雖未即得還家從此直往向前決不復遭枝岐矣於是普會大衆自天龍八部以至初心菩薩人凡三等其數則有十恆河沙之多皆得本心真無不證也遠塵離垢惑無不斷也獲法眼淨證無不圓也而大衆獲益矣其摩登伽女今已出家名性比丘尼者聞説偈已即時成阿羅漢圓證七信而最劣獲益矣夫十恆河沙尚為有量也乃至無量衆生凡在法會者皆發無等等阿耨多羅三藐三菩提心初入十信而不可名狀之衆皆獲益矣問阿難所證初果應齊圓之初信今聞經之衆昔未證而尚成新證何阿難先已證者反不列斯位耶答論斷見惑則舊證非新何須列此若兼論發菩提心則阿難既示證小亦云緣生三心未顯故亦未列斯位中也鍾云前曰路曰門至此則曰家者謂了悟耳根是到菩提家之路入菩提家之門也此下為最初近下之根特加戒律道場持呪之三事故大科云加行也至於因戒所生之定慧仍是亡塵盡根妙定及彼定所得三空慧耳觀經文但性詳戒而略於定慧可見也問前門何不用此答中根煩惱輕微無自起淫等四念且彼於亡塵時防護有力世俗曲屈已不容入安有自起四念至於阿難初果已能不入色聲等六塵但加反聞尚不多費忘塵之力亦安有自起淫等之念耶故知斯門特為塵勞素重不待聲引而頻舉自發淫等四念者加四戒以為反聞之前方便加道場持呪以為正反聞時之助行也舊解全不知此豈自此以後別為一法門哉尋常一往便指耳門為最初方便今詳此科則耳門尚為初心方便道場等方為最初心方便也阿難整衣服於大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來説如是言自未得度先度人者菩薩發心自覺己圓能覺他者如來應世我雖未度願度末劫一切衆生世尊此諸衆生去佛漸遠邪師説法如恆河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈此請安立道場為末世攝心之軌則也大衆既得開悟已阿難乃於衆中整頓衣服出座面佛合掌頂禮於斯時也先悟不生滅心即是大佛頂首楞嚴王心圓明矣又悟得耳根是入不生滅之門路迹圓明矣悲曠劫之沉迷欣今日之頓悟故悲欣交集自疾既除復愍他疾欲益未來衆生故於是稽首白佛言大悲世尊我今已悟成佛法門決定從耳根一門深入從是門中修行直捷穩當再無疑惑然我昔常聞如來有是言矣曰自未度而先度人者菩薩之發心也自覺圓而能覺他者如來之應世也我雖未自度願學菩薩願度末劫一切衆生但我遇佛説法已知修行之路從聞中入只恐末世衆生去佛漸遠而邪思説法歧路復多既邪正混淆令進修者心無適從欲攝其心入三摩提云何令彼安立入道之場地使邪説魔事不得擾亂傾動於菩提心方得無退屈乎問菩薩未得度先度人佛自覺而後覺他涯量次序何如鍾曰在菩薩云發心可見猶費深心是等覺以前事所謂以果為因也在佛曰應世業已不勞餘力是妙覺以後事所謂以因為果也經語自有分曉爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沉淪汝今諦聽當為汝説阿難大衆唯然奉教佛告阿難汝常聞我毗奈耶中律藏也宣説修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學此先標三無漏學而戒尤為本蓋前文忘塵脫根等皆是發揮定慧未曾説戒故此特明之也爾時世尊於大衆中稱讚阿難云善哉善哉如汝以度生之心請問安立道場救護沉淪者汝今諦聽吾為汝説矣阿難大衆唯然奉教佛乃告之曰汝不常聞我律藏中宣説修行三決定義乎何謂三義戒居其一所謂戒者不止束身凡微細心念即訶禁之以至一念不生乃目之為戒也緣攝心動少漸向於定如止風而波漸息是因戒生定也緣心靜極本明漸顯兼照萬法如波亭水湛自體發光照涵絲髮是因定發慧也三種具足毫無滲漏名三無漏學非但不漏落於三有兼不漏落空有二邊是為真無漏而非小乘比也然戒實為定慧之前矛戒根不淨則定慧無由而生譬如造宅先固其基若無基址徒架虗空必不成就故於三決定義中而首戒而戒之中又有四決定清淨明誨焉賀云此經始終以戒為本蓋世尊懸知末法之中邪師熾盛非律駁儀疑誤衆生故於此經首以阿難示墮發端至是阿難已得開悟特為未來衆生代請安立道場世尊苦口叮嚀首揭戒為決定明誨一則曰我滅度後多諸魔民再則曰我滅度後云云又重重結以不如此説即波旬説如老人遺囑又沉痛又斬截使人墮淚又使人心寒讀至此處不知痛加拈提真辜負迦老一片婆心矣阿難云何攝心我名為戒若諸世界六道衆生其心不淫則不隨其生死相續汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生墮愛見坑失菩提路汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨是故阿難若不斷淫修禪定者如蒸砂石欲其成飯經百千劫秪名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證必使淫機身心俱斷斷性亦無於佛菩提斯可希冀如我此説名為佛説不如此説即波旬説此先説淫戒也諸經戒殺居首謂設化以慈悲為先此經淫戒居首為真修以離欲為本蓋欲氣粗濁染汙妙明欲習狂迷易失正受續生死喪真常莫甚於此故須首戒也阿難云何攝心我名為戒律中所犯罪分輕重而淫殺盜妄最為重矣且以淫戒言之若諸世界六道衆生其心不淫非但於身不犯亦不生一念思想之心夫衆生皆因淫欲而正性命故纏縛生死若欲愛乾枯則殘質不續矣且汝修耳根圓通之三昧本圖出見思二惑之塵勞若淫心不除則見思決不能斷塵勞決不可出縱使多智辨慧通達禪定現前發妙境界如不斷淫於禪定時不捨淫念或有思惟則欲境隨現所念既在欲境而欲境莫勝於魔如水就溼必落魔道隨福厚薄分上中下品不魔王則魔民不魔民則魔女如陰魔中行空禪者却留塵勞廣化寶媛是也此蓋定慧心靈觸境流注方有斯墮若無定慧徒有淫習則直墮地獄耳安有魔宮之報乎彼等諸魔亦有徒衆初不自以為魔也增上慢成非果計果各各自謂成無上極果之道其惑人可勝言哉故我滅度後末法之中多此魔民即先世帶淫修禪之輩來為教師神通智慧密教行淫以為佛事𮞏相傳授令諸衆生墮落愛見坑中欲出見思反落愛見一陷邪徑永失菩提正路如頭藍弗得非想定才觸女手遂生愛心便失神通是也汝欲度生從今以去教世間人修三摩地必令其先斷心淫是名如來先佛世尊第一決定清淨明誨而非無師之傳授矣是故阿難若謂不斷淫而可修禪定者譬如蒸砂欲其成飯縱經百千劫秪名熱砂不名為飯何以故飯以米為本此非飯本沙石所成故汝以淫身求佛妙果何異蒸砂作飯乎縱得妙悟皆是淫根根本成淫輪轉三途必不能出何異砂之徒現熱相乎然則如來涅槃極果何路可以修證哉必使淫欲發動之機身與心而俱斷蓋身之淫機由心使作心之淫機由念馳放一念不生方得身心俱斷也然斷性若存終與欲對欲之緣影未忘亦非竭絶故必斷性亦無如病藥俱除方為無病人而於佛菩提斯可希冀矣是則修如來涅槃之正路也倘末世説法如我所説即是如來正説若不如此説而別言行淫不礙者便是魔波旬説矣如來波旬所爭一間可不辨哉鍾云機者淫心所自發斷性不無則欲之圓影猶在觸機即發矣阿難又諸世界六道衆生其心不殺則不隨共生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸溼加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度之後食衆生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沉生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大呌求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食若諸衆生不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界此譯人語倒也當云不遊三界酬還宿債何以故服其身分皆為彼緣如人食其地中百穀足不離地必使身心於諸衆生若身身分身心二塗不服不食我説是人真解脫者如我此説名為佛説不如此説即波旬説此明殺戒也此中所斷之殺非但人畜下至蠅虱蛇蝎等皆勿殺也亦非但親殺雖食肉服身亦所不許又非但只繫身口雖心念亦止絶矣阿難又諸世界六道衆生其心不殺則不隨其生死相續以負命索債為生死緣不殺故不續也汝修三昧本意欲出塵勞若殺心不除則塵不可出縱有多智禪定現前如不斷殺必定落於神道蓋鬼神雖分勝劣而均是惡趣故從人而入者謂之墮落也若是上品禪人當為大力鬼如人間尊奉稱帝稱天者若是中品則為飛行夜叉諸鬼帥等如川嶽社令之類若是下品當為地行羅剎如依止海濵之類彼諸鬼神亦有徒衆認己是而不知其非各各自謂成無上道故我滅度後末法之中此輩熾盛行於世間倡言食肉不礙成佛而吾教衰矣然我於藏通律中亦聽比丘得食不見不聞不疑及自死鳥殘五種淨肉者豈無故哉蓋此肉皆我神力化生如海魚肉山皆是大悲權化非真有命根也又因汝婆羅門所居地多蒸溼加以沙石諸菜不生若無肉食誰資身命故我以大悲神力化而為肉使汝暫得其味而食非真肉也可見凡佛許食肉者皆佛用權變漸引慈化耳若我滅度之後即實奪命之肉奈何食此奪命之肉而尚名為佛子哉汝等當知是食肉人縱禪定中偶得心開受用境界現前亦似三摩地而非真三摩地以食肉障深現行皆大羅剎報終必沉苦海斷斷非佛弟子也良以為佛弟子求出三界如是之人相殺相吞命債不了解脫無期何由而出三界乎然則汝教世人修三摩地必要次斷殺生是為如來先佛世尊第二決定清淨明誨耳是故阿難若謂不斷殺業而可修禪定者譬如有人塞耳高聲求人不聞此等名為欲隱彌露蓋修禪避罪反乃行殺塞耳避人反乃高聲故謂之欲隱彌露也且也清淨比丘及諸菩薩於路邊生草不故塌不故拔仁慈之至猶及草木云何大悲乃取衆生血肉以充食耶不但血肉不可食也即絲綿絹帛蠶之所出靴履裘毳乳酪醍醐獸之所出雖非其身之血肉然亦是彼身之一分若諸比丘不服東方之絲綿絹帛及我西土之靴履裘毳等如是比丘於世真能解脫更不再遊三界以酬還宿債矣何也以服其身之一分皆為彼緣如劫初之人身有飛光足若躡雲由食地肥啖香稻故遂致其體堅重而足不離地也是則身分猶不可服而況血肉乎哉然則修三摩地者必使我身我心於諸衆生若血肉之身及裘毳等之身分身不服食心不貪求我説是人真解脫者矣既無惡業自無冤對不脫何為後世如我此説名為佛説不如此説即波旬説人其可棄佛説而從魔説哉阿難又復世界六道衆生其心不偷則不隨其生死相續汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等羣邪亦有徒衆各各自謂成無上道我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我説是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與衆生共不將如來不了義説回為己解以誤初學佛印是人得真三昧如我所説名為佛説不如此説即波旬説裨助也販賣也裨助偷心販賣佛法也此明盜戒也此之偷盜非只竊人之物但言行詐異詃惑恐動乃至一念希取利養者皆是也阿難又復世界六道衆生其心不偷利欲貪得一念不起則不隨其生死相續汝修三昧本出塵勞若偷心不除塵不可出厭塵方可以出塵貪世豈能以越世哉縱有多智禪定現前如不斷偷委曲取利其心回邪必落邪道上品精靈如山精水怪具諸神通似仙非仙似神非神者中品妖魅現妖通而魅人者下品邪人諸魅所著言行妖異惑亂於人者彼等羣邪亦有徒衆邪入肺腑不知其過各各自謂成無上道我滅度後末法之中多此妖邪潛匿姦欺詐稱得道知識復以妖言恐人令彼改心易志敬如神明於是盡命傾財以奉之故所過之處其家耗散妖邪熾盛之害如此若吾教則與之相反矣我教比丘隨其所到持鉢乞食正欲令其捨貪心而成覺道也循方而乞則不自熟食矣所以然者以此殘生若寄為旅為泊於三界客舍之中聊示此一度往還自此以往更不復來矣豈令其戀戀人間作地獄滓耶云何妖邪賊人竊我衣服假我僧儀以如來為取利之媒廣行販賣造三塗業而皆言此是佛法是非法説法也反謗出家比丘秉具戒者為小乘道是法説非法也以是為非以非為是由是疑誤無量衆生墮無間獄孰非妖邪之為害哉且人之至寶惜者莫如此身我教比丘發心修大定者先於如來像前作捨身微因或身燈或指節或香炷令彼酬償宿生負債辭世間而脫諸漏能行此行雖未能即登大菩提路是人決定能信大菩提法矣若不行此行縱得菩提還來人間酬償宿債如我曾於毗蘭邑王馬廄食馬麥三月是也夫身猶可捨何況身外之物而又何偷盜之不可斷哉然則汝教世人修三摩地必令其後斷偷盜是名如來先佛世尊第三決定清淨明誨耳是故阿難若不斷偷而修禪定者譬如水灌漏巵塵劫難滿所以律制比丘衣鉢之外分寸不畜止貪也乞食餘分施餓衆生止吝也合掌禮衆不慢也捶詈同讚無我相也身心俱捨無繫戀也身肉骨血與衆生共無遺餘也比丘之行如此皆為成就無偷之心又豈肯曲取以自奉耶至若聽畜百一所需但禁餘二或許不入大會避辱不受及布施不及身分等皆是不了義中如薩婆多論所説若能但依了義教不將如來不了義説曲為已解并誤後學者佛印是人得真三昧矣如我所説者名佛説也不如此説者波旬説也可不辨與阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦即一闡提消滅佛種如人以刀斷多羅木貝多羅樹以刀斷則不復活佛説是人永殞善根無復知見沉三苦海不成三昧我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事四攝之一稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言末學惟除命終陰有遺付云何是人惑亂衆生成大妄語汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨是故阿難若不斷其大妄語者如刻人糞為栴檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招迂曲求佛菩提如噬臍人欲誰成就若諸比丘心如直弦一切真實入三摩地永無魔事我印是人成就菩提無上知覺如我所説名為佛説不如此説即波旬説此明不妄語戒也阿難如是世界六道衆生雖則身心無殺盜淫三戒具足三行已圓若言行不顧大妄語者即三昧不成成愛見魔失如來種何謂大妄語所謂道未得而言得果未證而言證將無作有惟求世間尊勝第一常在人前説我已得三果以至羅漢辟支地前諸位菩薩令人求彼體懺而貪其陳設供養若是者即一闡提消滅佛種如刀斷木不復再活佛記是人永絶善根無復知見沉淪三塗不成三昧矣夫我滅度後敕諸菩薩羅漢應物現形生彼末法之中作種種相度諸輪轉衆生或現順相而為沙門居士人王宰官及童男女或現逆相乃至淫女寡婦姦偷屠販或淨或染與彼衆生和光同塵為同事攝稱揚佛乘誘彼入道尚不許自稱是真菩薩是真羅漢泄漏密機於初學人前唯除命終時略露消息遺言付法令人生信耳蓋住則不泄泄則不住此一定軌則也云何邪人既泄仍住明是惑亂衆生要求恭敬利養而成此妄語慎莫信之可也然則汝教世人修三摩地次後却要斷除諸大妄語是為如來先佛世尊第四決定清淨明誨耳是故阿難若不斷妄語修禪定者聽其言則是考其行則非如刻糞求香無有是處所以我教比丘一行一止皆要直心直言不容一念虗假云何妄稱得上人法是何異一介之人妄號帝王自取喪身失命而已且一國小王尚不容妄竊尊號況巍巍堂堂為出世之極尊而欲竊其名位耶以如是因求如是果因既不真果亦迂曲如人噬臍決不可及必欲成就菩提當令心如弦直直心直言一切真實以入三昧自然不成愛見魔而成無上知覺矣經云學道從不妄語始此之謂也如我此説名為佛説不如此説即波旬説汝當辨之噬臍者以妄語求正覺猶以自口噬自臍莫能及也
