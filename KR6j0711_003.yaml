body:
  text: 巴郡了菴居士劉道開纂述成都昭覺沙門方示鑒訂復次阿難云何六入本如來藏妙真如性此下顯如來藏不離六根也不言根而言入者以通能入所入故如眼根流逸奔色等為能入眼以虗受色等為所入也觀下吸字正與入字相應以六根各能吸入所對之塵故也開合原無此科要即內六處耳此先徵起云復次阿難云何六入本如來藏妙真如性阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相此明眼入本如來藏也阿難我前云譬如淨目瞪以發勞別見狂華是以狂華為勞相矣然不但狂華是勞相也即此目睛與所瞪之勞又同是菩提心上所發之勞相也如子固是父之所生而兼父與子又同是祖之所生也鍾云前喻以瞪為勞相目為淨相此并淨目亦為勞相兼目與勞即影見俱眚四字見與見緣也又云同是菩提瞪發勞相便是識精元明注脚菩提即精也元明也瞪字勞字即識也別業同分二種妄見皆生其中葢菩提即真如瞪字乃真如中所生無明勞即業識發見居中二句等即轉現二相言下便有勞歇即是菩提縱未歇勞菩提不忘二意因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體有此眼根因于明暗二種妄塵中粘湛發見見精映色即吸此塵相而名為見性只是根攬塵而得名可見但有其名而已夫離明見暗而見不隨明滅離暗見明而見不隨暗滅似為有體今若明暗雙離畢竟見性作何形狀當知但是託塵妄現而實無其體也問前說緣心離塵無體以顯見性有體此又言見性離塵畢竟無體者何故答前以阿難認定緣心不肯放捨故就根中指性令識真心今因已領真性尚執六根別有體相未融一性故復言見性無體雖說見性乃根中局執之自性非同前離眼廓周之見性也是前顯性而此破相所以異矣更深究之此之破相亦欲其離相即妙真如性耳則顯性之旨依舊同矣豈如緣心真破其一定無體哉鍾云以見性對緣心則緣心為妄以如來藏對見性則見性亦帶妄妄無自體總歸于真畢竟二字乃了義之謂如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入是故當知眼入虗妄本非因緣非自然性如是阿難據世情妄計皆謂此見乃從根出否則從塵生從空生耳當知是見非從明暗來非于根出不於空生何以故若謂此見從明來者則當暗之時已隨明滅應不見暗從暗亦然而何以見暗見明是則不從塵生矣若謂此見從根生者單根能生見性則何以雙離明暗而如是見精本無自性是則不從根生矣若謂此見從空出者空離根塵則根塵俱成可見進即觀塵退可觀根又空自能見何關汝根之入是則不從空生矣是故當知此一眼入也無有實體故虗無所從來故妄然所以無實自體者以其體即真如所以不從三處者以其出自藏性本即是非因緣非自然之妙性乍現眼入而已所謂眼入本如來藏者如此阿那律以葡萄朵換天眼從此悟入也四科七大總是指示阿難在日用見色聞聲穿衣喫飯處討尋頭腦祖師家教人看話頭便是此意但祖師不肯輕易興人說破令其自猜自疑自對自覓畢竟此見從何處起久久捱拶到工夫純熟向冷地裡驀然親見便得千了百當決不輕易道出眼入虗妄四字故香嚴云我不重先師佛法只重先師不與我道破如來慈悲太煞急推赤心寘人腹中故開口便為人說破此如來禪祖師禪之所以異也鍾云約世情根出乃為正計餘二防轉計也阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性自非虗空又空自聞何關汝入是故當知耳入虗妄本非因緣非自然性此明耳入本如來藏也阿難眼家以瞪目而見空華耳家以塞耳而聞頭響同一勞也兼耳與勞同是菩提瞪發勞相葢目勞止見空華菩提發勞則見聞齅嘗覺知齊發矣有此耳根因於動而有聲靜而無聲二種妄塵中發聞吸塵名聽聞性而此聞性若離此動靜二塵畢竟無體如是阿難當知是聞非動靜來非根出非空生也何以故若謂此聞從靜境生則動境現時此聞即隨靜滅應非聞動而聞萬竅怒號者為誰若謂此聞從動境生則靜境現時此聞即隨動滅應無覺靜而知此寂然無聲者是誰若從根生不假動靜亦復無聞若從空出空既能聞應名為耳不名虗空又空自聞何關耳入是故當知耳入虗妄本即是非因緣非自然之妙性而已所謂耳入本如來藏者如此觀音大士以新卷葉換圓通根從此悟入也此惟有聞成性即非虗空與歸當見根之文小異餘並準上瞪乃眼之妄相而耳鼻舌身意五皆借用之阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相因於通塞二種妄塵發聞居中吸此塵象名齅聞性此聞離彼通塞二塵畢竟無體當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當迴齅汝鼻空自有聞何關汝入是故當知鼻入虗妄本非因緣非自然性此明鼻入本如來藏也阿難譬如有人急縮其鼻縮久成勞則鼻中聞有冷觸因觸分別通塞虗實二相以例諸香臭氣兼鼻與勞同是菩提瞪發勞相有此鼻根因于通塞二種妄塵發聞居中吸此塵象名齅聞性而此聞性若離彼通塞二塵畢竟無體當知是聞非從通與塞來非于根出亦非空生何以故若從通來應不知塞如因塞有通應無聞云何又聞香臭若從根生不假通塞亦無聞性若從空出聞既在空亦應迴齅汝鼻如歸當見根也又空自有聞何關鼻入三處無從是故當知鼻入虗妄本即是非因緣非自然之妙性而已所謂鼻入本如來藏者如此此槃特迦以雙垂爪換撩天鼻孔處也誌公云終日添香換水不知身是道場果能向聞香聞臭處打失鼻孔便與三世諸佛同一鼻孔出氣蘇子由云畜鼻徑參真面目掉頭不受別鉗鎚所以世人急畜而成勞特迦調息而成道冷因畜有不畜本無鼻入之妄類如是矣虗實亦通塞之義故惟以通塞致辨香臭又通時所齅阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是甞苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入是故當知舌入虗妄本非因緣非自然性此明舌入本如來藏也阿難譬如有人以舌自舔其吻舔之不已令此舌勞或病無病甜苦味生若論舌根惟有淡性兼舌與勞同是菩提瞪發勞相以此舌根因于甜苦與淡二種妄塵中發知吸塵名知味性此知味性若離彼甜苦及淡二塵畢竟無體阿難當知此嘗甜與淡之知非甜若來非因淡有又非根出亦非空生何以故若甜苦來應滅于淡若從淡出應亡于甜云何又知甜苦二相若從舌生不假甜淡苦塵亦無知性若於空出但以虗空自當知味不必用口然後乃知又虗空自知何關汝入離塵無體無所從來是故當知舌入虗妄本即是非因緣非自然之妙性而已所謂舌入本如來藏者如此此憍梵鉢提在嚼飯處所證法門也且道將甚麼喫茶喫飯若向此中尋得舌頭落處便知徧覆大千世界廣長舌相元不曾離却䑛吻邊嚼飯處鍾云甜苦動味也淡靜味也三味約動靜二塵阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸兼身與勞同是菩提瞪發勞相因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入是故當知身入虗妄本非因緣非自然性此明身入本如來藏也觸是身家所對之塵二手俱是身根但舉二手之冷熱而身入一切妄覺皆類于此阿難譬如有人以一冷手觸於熱手冷多則熱者從冷熱勝則冷者成熱此冷熱二觸合時知合離時知離以此合覺顯于離知或以熱涉冷而使冷成熱或以冷涉熱而使熱成冷涉勢若成皆因勞觸而已兼身與勞同是菩提瞪發勞相本此身根因于離合二種妄塵發覺居中吸此塵象名知觸性而此知觸覺觸之體若離彼離合及離合中有違有順之二塵畢竟無體如是阿難當知此覺觸之覺非離合來非違順有不於根出又非空生何以故若謂此覺合時來者當其離時此覺已滅云何覺離乃至違順二相違時順滅順時違滅亦復如是若謂此覺從根出者必無離合違順四相欲覔身知亦無自性若謂此覺從空出者空自知覺何關汝入離塵無體無所從來是故當知身入虗妄本即是非因緣非自然之妙性而已所謂身入本如來藏者如此此畢陵婆蹉在忍痛處所證法門也違順者如熱見重裘冷得絺綌是違夏得涼風寒得煖火是順雖開四相終惟二塵也觸有合觸有離觸然無合不能顯離必因兩相涉時覺其為合然後兩不相涉時知其為離故曰以此合覺之觸顯于離知合離二覺皆因涉顯然涉勢因何而成只因兩手相摩之勞相而已阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體此明意入本如來藏也阿難意根勞相難言之矣譬如有人身心勞倦則睡而眠睡之既熟便醒而寤寤而覽塵斯憶眠而失憶為忘忘而又憶憶而又忘如是顛倒首尾循環剎那之頃為生為住為異為滅如初憶為生正憶為住始忘為異忘盡為滅滅已又生生已又滅生滅不停此皆是無始習氣吸此習氣中歸意根四相遷流前然不離舉此四相而意入一切妄知皆類于此故稱意知根兼意與勞同是菩提瞪發勞相然生住異滅相雖有四總名法塵實惟生滅二塵而已根能攬塵因于生滅二種妄塵集知居中五根言發此言集者發謂現行集謂種子以前五根現行皆從此中種子發生也于是吸撮內之浮塵如流逸奔色流逸奔聲等然五根但能緣自分現量境不能一一互緣故見不到聞聞不到齅齅不到嘗嘗不到覺此意知根皆能緣能知有時見逆流于聞有時聞逆流于見如是五根往往流于不及之地是則名為昭昭靈靈覺知之性然此覺知之性本非真知若離彼寤而生寐而滅之二塵畢竟無有實體法名內塵即退去諸法影像也亦名落謝塵如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入是故當知意入虗妄本因非緣非自然性非惟無體亦復無所從來如是阿難當知此覺知根非寤寐來非生滅有不於根出亦非空生何以故若謂此覺知性從寤來者當寐之時已隨寤滅而今昏昏熟睡又現許多夢境者為誰若從寐來亦復如是若謂此覺知性從生時有滅時即隨生已滅其受滅者是誰若從滅有生時則同滅已無其知生者又誰是則不從塵來矣若謂惟根自出而無關寤寐殊不知人身中肉心狀如蓮華開則明而合則昏寤則開而寐則合故此寤寐二相常隨身開合無時暫離若汝覺知之根離此二塵此覺知者將同空華畢竟無性而世間之人非寤則寐曾有離于寤寐者哉是則不從根出矣若謂此覺知性從空而生空自有意自是空知何關汝入耶是則非從空生矣無體無從是故當知意入虗妄本即是非因緣非自然之妙真如性隨緣乍現而已所謂意入本如來藏者如此此大迦葉從意知根入寶明空海所證法門也意即心之別名也五根攬塵惟此意根八識轉覺惟此意根三界唯心惟此意根萬法唯識惟此意根當知此意知根不獨為天地根為萬物根為無明根為諸識根為生死根抑且為涅槃根為菩提根轉凡成聖正在乎此若打破此關喚作正徧知喚作始覺本覺圓覺妙覺無上覺一切覺究竟覺此是開佛知見一大關鍵處此章極善形容意根處在生住異滅四字而形容殆盡尤在寤寐二境想人生世間除了熟寐時那一刻不是意識流行處那一刻不是生住異滅變換處即在熟睡之中七顛八倒幻成夢境亦是獨頭意識用事生住異滅亦未嘗停所以斷送諸人汩沒生死然迷者以為有體悟者知其無體非無體也即以如來藏性為體也會入之意深哉入處界三科破法有三種差別一者約緣破不局本法廣破外緣也如滅火不徑撲火但抽去其薪火自滅矣以火無自體也二者更互破言二法相依而立即須更互破之如蛟水相依兩皆為患除之者驅蛟絕水之本泄水破蛟之居也三者從要破此有兩種一者二法從要破如兩木相倚而立但推倒一邊二皆倒矣二者三法從要破如筋膠角三合為弓而膠為其要但除去其膠則筋角皆不成弓矣此之六入全是約緣破塵即其緣也下十二處兼更互及二法從要破眼色耳聲四處更互破也餘八處二法從要破也後十八界全是三法從要破也然文雖從要而意實並破非同六入正意在根也學者詳之六入竟復次阿難云何十二處本如來藏妙真如性此開色合心為愚色不愚心者說也色本是一開為五根六塵成十一處故曰開色心若對上五陰則合受想行識之四對下十八界則合六識及意根之七總收為意之一處故曰合心處方所也又定在也此十二處元一圓融清淨寶覺由眾塵隔越無狀異生各分疆界如六國然不得混成一統故令阿難處處攻擊若破一處則十一處不待招降而自服矣故其攻擊處皆不施巧計不設雲梯但借現前挺杖直驅之耳初卷七處破心是破心無處所此十二處是破處無處所也先徵起云復次阿難云何十二處本如來藏妙真如性乎阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性此明見色二處本如來歲也法相宗以見相二分喻如蝸牛兩角出則成雙縮則為一以彼皆從自證分變現故故世尊舉現前見色處詰之曰且汝尋常但說一切法仗因托緣而生即今開眼見祇陀林及諸泉池於意云何還是因祇陀林生汝眼中之見而見此祇陀林乎抑亦因汝眼中之見生祇陀林而汝得見之乎此二句便是金剛圈栗棘蓬即三世諸佛分疏不下矣若謂是汝眼根生此祇陀林而汝得見者則汝眼根見空之時不見祇林而祇林便應銷滅銷則顯發諸相一切都無夫空色相際而顯色相既無更有何物顯其空質耶謂眼生空相亦復如是若謂此祇陀林生汝眼見而令汝見祇陀林者則汝眼觀空時非是觀色既無能生之色自無所生之見見既銷亡而見空見色更是何物謂空生眼見亦復如是是故當知見與色空俱無內外定在之處所色不生眼眼自寂滅眼不生色色自寂滅而執色興見實有二處者皆是虗妄葢見色一體本來但是一非因緣非自然之妙性而已此優波尼沙陀悟入處也始曰俱無處所次曰二處虗妄顯是平破不同上之正破六入塵惟帶言而已鍾云眼不生色色無處所也色不生眼見無處所也虗妄者無體也無處則無體無體而以真如為體故曰本非因緣非自然之妙真性也餘五倣此阿難汝更聽此祗陀園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城別無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性此明耳聲二處本如來藏也阿難汝更聽此祇陀園中食辦則擊鼓矣眾集則撞鐘矣鐘鼓音聲前後相續矣于意云何此等為是聲音來汝耳邊而聞之乎汝耳往于聲處而聞之乎抑為無來往而聞之乎阿難若謂聲來耳邊者一聲不能徧至多耳猶一身不能竝往二處如我乞食于室羅筏城則祇陀林中無有我矣此聲既來阿難耳處豈能又至多人耳處則目連迦葉應不俱聞何況其中千二百五十之眾乃此眾人一聞鐘聲同來食處一眾俱聞應不是聲來耳邊矣若謂耳往聲邊者一耳不能徧往多聲亦猶一人不能並至兩處如我歸于祇陀林中則室羅城無有我矣且爾當聞鼓聲時其耳既往擊皷之處安能又至他聲音處則鐘聲齊出應不俱聞以鐘處無耳也何況其中象馬牛羊種種音響乃一齊俱聞應不是耳往聲邊矣計往來者皆非只得轉計無來無往若謂無來往者耳根聲塵各住本位兩不相到則應聲發而耳不復聞乃又非無聞應不是無來往矣二計俱非如此是果何故而然哉亦由相妄性真而已自相妄言當知聽與音聲各皆周徧俱無一定處所即聽與聲二處自體亦不可得權小妄局了無實義處既虗妄是則尚無二處說誰來往及不來往乎自性真言當知聽與音聲非畢竟無法但惟一非因緣非自然之妙性而已此憍陳如悟入處也蓮師曰假如鐘鼓樓介城中央南風作則北城聞之而南不聞北風作則南城聞之而北不聞風送聲而人得聞何嘗不是聲來耳邊但眾生粘湛發聽失本妙圓局而礙之束而小之是以風順則聞風逆則否為境轉而不得自在耳之過也非聲之故也又如隔垣聽音響遐邇俱可聞既垣不礙音何為城內一人面城而語城外一人附城而聽乃杳然無聞乎此亦耳之過也非垣與城之故也是以耳通者徹聽或聽一世界乃至恒沙世界而無盡也坡仙云若言聲在琴絃上放在匣中胡不鳴若言聲在指頭上何不于君指上聽從此悟出阿難汝又齅此爐中栴檀此香若復然於一銖室羅筏城四十里內同時聞氣于意云何此香為復生旃檀木生於汝鼻為生於空阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非旃檀云何鼻中有旃檀氣稱汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恒香應常在何藉罏中爇此枯木若生於木則此香貭因爇成烟若鼻得聞合蒙烟氣其烟騰空未及遙遠四十里內云何已聞是故當知香鼻與聞俱無處所即齅與香二處虗妄本非因緣非自然性此明鼻香二處本如來藏也終日聞香不知香之來處只為不曾詳究從何而出故曰阿難汝又齅此罏中旃檀但然一銖舉室羅城四十里內俱聞香氣於意云何此香為復生於栴檀木乎生于汝鼻乎為生于空乎阿難若謂此香生於汝鼻者既稱鼻生即當從鼻而出然鼻非旃檀肉體不是香體云何發香之用而鼻中有旃檀氣且所稱聞香者謂香從鼻入也若曰鼻中出香出不可以言聞而說聞又不合義是則非生於鼻矣若謂此香生於空者空常在而香亦常存何藉罏中爇而後有是則非生於空矣若謂此香生於旃檀木者則此香貭因爇成烟而鼻得聞若鼻得聞合當蒙其烟氣然其烟雖然騰空未及遙遠四十里之遠云何已聞是則非生於木矣詳究香塵尚無生處而齅性又豈有處哉是故當知香與鼻聞俱無處所即齅與香二處體性了不可得本即是非因緣非自然之妙性而已此香嚴得五分法身香處也此單徵香塵了無生處所謂二法從要破也舊註疑其有違法相合中之知不知此是法性了義正破法相豈反以彼而難此據法性根塵各皆周徧一體無分而離知合知皆為戲論但尋常之香鼻必蒙烟方顯合知為不了義惟此異香不待蒙烟不待合知是為了義故佛取之有深意也香鼻與聞當是香與鼻聞之誤言鼻言聞似兼浮塵勝義二根然以根對塵仍為二處非有三法也阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中阿難若復此味生於汝舌在汝口中祗有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作醎味既醎汝舌亦醎汝面則此界人同於海魚既常受醎了不知淡若不識淡亦不覺醎必無所知云何名味是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性此明舌味二處本如來藏也人莫不飲食也鮮能知味也故令其向鉢盂邊討箇滋味出處故曰阿難汝常二時於眾中持鉢乞食其間或遇酥酪醍醐名為上味於意云何此味為復生於空中乎生於舌中乎為生於食中乎阿難若謂此味生於汝舌則汝一舌應知一味如既成酥味遇黑石蜜應不推移然若不變移而獨知一味則又不名知味若變移而知別味則舌非多體云何多味而惟一舌之知是則此味不生舌中明矣若謂此味生於食中食非有識云何自知為甜為苦縱使食能自知此食即同他人無預於汝何故稱汝名知味者是則此味不生於食明矣若謂此味生於空中汝噉虗空作何滋味若作鹹味徧空皆鹹既鹹汝舌亦應鹹汝之面則此界人受其鹹味皆同海魚既常受鹹必不知淡若不識淡亦不可謂覺鹹既一無所知又不可名知味之人是則不生於空明矣既不在此三處是則味性無處而嘗性又豈有處是故當知味與舌嘗俱無處所即嘗與味二俱虗妄相妄性真本即是非因緣非自然之妙性而已要知此味不離當處若果識得地頭不勞咀嚼百味具足此是藥王得一味禪處也阿難汝嘗晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性此明身觸二處本如來藏也世尊尋常戒勅弟子一日三摩其頭口自誦云守口攝意身莫犯如是行者得度世故弟子一遵其法而摩頭也故曰阿難汝依我法每於晨朝以手自摩其頭矣即此摩頭處亦不知蹉過多少且汝正當以手摩頭時則手知有頭頭知有手是誰為能觸而生此知為手觸頭即手為能觸而生此知乎為頭觸手即頭為能觸而生此知乎若以手為能觸而生此知者則觸知在手頭則成無知之物云何知手之觸我頭而成觸乎若以頭為能觸而生此知者則觸知在頭手則成無用之物云何知頭之觸我手而名觸乎若頭與手各有一知則汝阿難應有二身若頭與手只有一知則手與頭應成一體若一體者不應成觸若二體者此觸當何所屬為屬能觸為屬所觸若觸屬能則在手在頭皆成能觸而無所觸既無所觸豈虗空與汝成所觸乎若觸屬所則在手在頭皆成所觸而無能觸既無能觸豈虗空與汝成能觸乎夫約二觸則一知二知了不可定約一觸則一體二體無所適從是故當知所覺之觸與能覺之身俱無處所即身與觸二俱虗妄二相既虗一性自實本即是非因緣非自然之妙性而已此是䟦陀婆羅在澡浴邊模着脚根處也當知觸塵與諸塵不同諸塵皆與根對今此手頭皆是身根無外觸塵假摩以成觸相而根塵互不可分雖非假設亦有取例之意同例諸觸皆類此之虗妄自顯其無二處而惟一性矣賀云頭手二體一能一所觸若在能誰為所觸觸若在所誰為能觸有能無所觸又不成豈虗空與汝成所耶有所無能觸亦不成豈虗空與汝成能耶阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所阿難若即心者法則非塵非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷煖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性此明意法二處本如來藏也阿難汝常時意中憧憧擾擾所緣或善或惡或非善非惡而名無記此之三性皆是前五根所取現行落卸現成影子各有軌則而為意家所緣之境名曰法塵此法為復即意根之心所生乎為當離心別有方所乎阿難若此法塵即是心者此法則非是塵不是意家所緣之境云何得成意根所緣之處乎若此法塵離心而別有處所者則法塵自性是有知乎是無知乎若以為知則應名心不名法塵既與汝根識別異而非塵者則另是一心豈不同他人心量乎若謂不同他心即汝心者則應不相對待無有二相今何心境相對宛然與汝為二乎若以為非知者當即是外塵即當有所表示然此塵既非色聲香味與離合冷煖之觸及虗空等相離此諸塵當在何處今於色空之間都無表示不應人間更有空外而為法塵所容之處縱居空外又非外塵則非心之所能緣依心所緣方立法處既非心所緣則法處從誰立乎合知與非知而計離者非合離與即而計離即者皆非是法終無處矣法無處而意豈有處是故當知法則與心俱無處所則意與法二俱虗妄本即是非因緣非自然之妙性而已此空生悟入處也故知六根無對皆是無諍法門諸境含虗盡冥不二之道即今眾生境界真是不可思議何用遠求諸聖作用而自鄙劣哉賀云前云法則非塵非心所緣者近而不可緣也後云不應人間更有空外心非所緣者遠而不能緣也非心所緣一體而不能緣也如眼不能見眼心非所緣無體而無可緣也如眼不見兔角十二處竟復次阿難云何十八界本如來藏妙真如性此開色開心為心色俱愚者說也界者種族義界限義今取界相不相紊亂為義以對塵者根當根者塵中間了別者為識各有界限故三六合成一十八界然界雖三六體即是一故先徵起云復次阿難云何十八界本如來藏妙真如性界攝百法頌曰根塵各五界十色隨自名八王歸七心八十二皆法葢意根界即第七識而七八相依故第八亦意根所收也法塵尋常但屬色法或曰法塵無相而有影故半心半色即應十分半色七分半心也阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相變遷汝識不遷界從何立從變則變界相自無不變則恒既從色生應不識知虗空所在若兼二種眼色共生合則中離離則兩合體性雜亂云何成界是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性色界者色識界也略一識字餘五例此此明眼色識三本如來藏也阿難我從前種種開導復恐汝不得明了今復就汝所已明者更為汝說即汝尋常解得眼根色塵內外相對於其中間生於眼識內外中間故成三界矣但不知此識為從眼生名為眼所生識即以眼為界限乎為從色生名為色所生識即以色為界限乎阿難若謂此識從眼根生即以眼根為界限者識以了塵既無色空二塵無可分別縱生汝識將何所用以無塵不用識也且根塵相對表示內外然後識界立於中間今無塵單根而汝見根本不可見又非青黃赤白之色相但為一體無復內外以表示將以何為中聞而立於識界乎以單根不立界也是則界義不成於自生矣若謂此識從色塵生即以色塵為界限者則當空相現前時此識已隨色滅不合識空云何識知是虗空性若謂諸色遷變時汝識又識其色相遷變則是汝識不隨色遷滅矣色滅而汝識不遷是識獨存無復對待更與何法分限而立其界乎非但不遷無以立界縱從其遷變則應已歸變滅而並其界相皆無矣界相自無亦不可說以色為界非但變滅不能識空縱使不變即成恒性恒常與色一體與空無干誰識空者今既識空定非以色為界是則界義不成於他生矣若謂此識兼斯二種眼根色塵合而共生者此根與塵若合一處其間自無空隙容識而中界之識即應離而在旁何成中界又此根塵若離在兩處則所生之識亦當分在兩處而與之各合半合根半合塵亦不得為中界兩合則離中離則亂體性雜亂云何成界是則界義不成於共生矣如是推求而此眼識不自生不他生不共生如汝所解眼色為緣生眼識界所生眼識既不成界能生眼色何後成緣良以中界既無內外叵得所謂為緣生識不過順世權立都無實義相妄如此然則眼根色塵及色識界三畢竟從何處來本即是非因緣非自然之妙性而已豈有三相可得哉此舍利弗悟入處也三惟徵詰於識準前弓喻所謂三法從要破也又如三家比憐而住撒其中家左右界墻則三家界限俱不成矣賀云經文破法有相對破有相承破此段相承而破所謂挨身棍也初言若云色有應不識空則緊承識字云若言能識便不成界何以故以色遷識存孤立無侶故又緊承不遷云若言從變亦不成界何以故以識歸變滅故又緊承變字云若言不變應同前難何以故以識性恒故鍾云變與不變皆應不立界而交錯成文前以從變為不識空而後以不從變為不識空前以不變為不立界而後以從變為不立界文極巧矣阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木不應聲聞雜成中界界無中位則內外相復從何成是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性此明耳聲識三本如來藏也阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界乎抑因聲所生以聲為界乎阿難若謂此識因耳所生者則是但從勝義根生而有聲之動無聲之靜之二相俱不現前既無前境根自無知若實無知更有何識葢無境則無聞無聞則無識也若取肉耳能聞謂浮塵根亦能生識者既無動靜二相而聞無所成矣以勝義根尚不能生識云何將此無知之耳形雜色塵觸塵同一無情所攝者強名為識界而欲生識耶既勝義不可浮塵不可決知耳識非因耳生畢竟從誰立界乎若謂此識生於聲者識因聲有不假聞根豈知無聞則聲且不有從何生識縱許識從聲生亦許因聞根而有聲相識既與聲為一則聞聲之時亦應聞識若不聞識則聲與識二應非生識之界若果聞識則識亦同聲全無知覺識既無知已被耳聞知聞識者又是何物若謂更無有知知聞識者則汝便應同於草木矣既單根不出獨塵不生不應根塵交雜以成中界葢既曰交雜即不成中矣夫必有中位方分內外今無中界何分內外界乎如是推求而此耳識不自生不他生不共生是故當知耳聲為緣生耳識界三處都無相全是妄則耳與聲及聲識界三性全是真本即是非因緣非自然之妙性而已此是普賢悟入處也阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取齅知動搖之性若取肉形肉貭乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界若取齅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及栴檀木二物不來汝自齅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立此明鼻香識三本如來藏也阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生而以鼻為界乎抑因香所生而以香為界乎阿難若謂此識因鼻所生以鼻為界者則汝心中以何為鼻為取肉形雙爪之相浮塵根者為鼻乎為取齅知動搖之性勝義根者為鼻乎若取肉形肉貭乃身身知即觸鼻轉為身知轉為觸是失其鼻之實矣且名身即非鼻名觸即是塵是失其鼻之名矣名實皆非則鼻尚無名從何立界是則不因浮塵根生明矣若取齅知之性又汝心中以何為知若以鼻頭之肉為知即同前之身知即觸矣若以鼻孔之空為知空若有知則鼻頭之肉應無知覺且鼻孔之空既有知性則一切處空皆應是汝鼻上之肉既無知性則汝徧身之肉皆應非知空既是汝則虗空無在汝阿難亦應無在身既無知則縱身有在而亦應不覺其在於何處矣夫勝義之知既不依肉又不依空然則依香為體乎若以香為齅知性者既轉將自知成他香知彼自有知何干於汝且香臭二氣元不從鼻生故非齅知性也若謂香臭二氣生于汝鼻者則彼二種流氣反不生于伊蘭及栴檀木矣當栴檀伊蘭二物不來時汝自齅其鼻為香為臭若汝鼻本臭必不兼聞於香汝鼻本香必不兼聞於臭若雙聞香臭須當雙具二鼻有二鼻則有二體對我問道有二阿難誰為汝之真體乎若執鼻惟是一所生香臭亦當渾合而無二者則鼻既為香香復成臭互相傾奪以至二性俱無是則根知尚無自體識界從誰立乎展轉推求不因勝義根生又明矣浮塵勝義皆不能生識是則此識不因鼻生也更明矣此科非香知處不可濫下香生之文此因破鼻生識界而遂追究取何為鼻既破浮塵復究勝義之知依何為體由是破肉與空而遂及於香是但破香具鼻根之知非同下之破香生識也細心者辨之若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非香不知非識香非知有香界不成識不知香因界則非從香建立既無中間不成內外彼諸聞性畢竟虗妄是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性若謂此識因香所生以香為界者則是識因香有矣如見因眼有既不能返觀乎眼識因香有又豈能返知乎香若曰能知即非香生若曰不知即不名識然若不知香豈但非識而已哉將必并香識二界俱不成立矣何以故葢香非知有是香不由識而顯據此即應香界不成以香必假知而顯離知豈得自成乎識不知香是識不緣香而發據此即應識界不立以識必托香而立無香豈得自立乎因界即指識界言以界具因義故也亡識壞界其過無窮是則此識不因香生也又明矣夫中間識界既以叵得而內外根塵亦復不成內外不成則能共生者無實中界不立則所共生者非真嗅聞之識性豈不畢竟虗妄哉是故當知鼻香為緣生鼻識界三處都無相全是妄則鼻與香及香識界三性全是真本唯一非因緣非自然之妙性而已此孫陀羅難陀悟入處也此下諸界不同前界但惟破識無生今雖亦約於識却乃並破根塵了不可得後方結言無可立界平破之旨於此益明下皆放此鍾云按兩鼻一鼻承香臭來香臭二氣承以香為知來以香為知與以肉為知以空為知承若取齅知以何為知來若取齅知與為取肉形承若因鼻生以何為鼻來因鼻所生以鼻為界與因香所生以香為界承鼻香為緣生鼻識來一本雙枝枝復數枝愈演愈繁紏錯難理宜細玩之阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味不自生云何立界若因味生識自為味同於舌根應不自嘗云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界不應虗空生汝心舌字誤識舌味和合即於是中元無自性云何界生是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性此明舌味識三本如來藏也阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界乎抑因味所生以味為界乎阿難若謂此識因舌生者則是不假外之味塵而舌之體上自能分別成味則諸世間甜而甘蔗酸而烏梅苦而黃連鹹而石鹽辣而細辛薑桂反為無味矣以味自在舌也味既在舌汝自嘗舌為甜耶苦耶姑舉一味若舌性苦者則汝舌已成苦味又誰來嘗舌既不能自嘗其舌云何覺知舌之成苦味耶若謂舌性非苦則此舌尚不能自生其味云何立界以生識乎是則此識不生於舌明矣若謂此識因味生者則是不假內之舌根而識自為味矣識即是味味不嘗味同於舌不嘗舌云何知其是味非味耶又一切之味原非一物所生能生之味既從多物則所生之識亦應多體如母多子亦應多矣是以味之多壞識之一也若曰識體是一體從味生所生之識非多則能生之味應一然則鹹淡甘辛和合不同變異各出者應同一味而無分別如子一母亦應一矣是以識之一壞味之多也且識之得名正以其能分別耳分別既無則不名識矣識尚無名云何復與味舌分為三界乎是則此識不生于味明矣不因舌生不因味生除舌與味不應虗空生汝舌識然則計無因生者亦非矣若謂舌味和合者根塵既已合一無兩開各自之性豈有中間空隙以容識界之生乎然則計共生者亦非矣非自生非他生非共生非無因生畢竟從何處來是故當知舌味為緣生舌識界三處都無相全是妄則舌與味及舌識界三性全是真本唯一非因緣非自然之妙性而已此富樓那悟入處也阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界阿難若因身生必無合離二覺觀緣身何所識若因觸生必無汝身誰有非身知合離者此明身觸識三本如來藏也阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界乎因觸所生以觸為界乎阿難若謂此識因身生者彼合覺之觸顯於離知有此離合二緣乃有覺觀之身識必無合離二者以為覺觀之緣此身又何所識乎是則單根不立而非從自生矣若謂此識因觸生者凡言觸者是物來觸身而身知其為冷煖澁滑也然必先有吾身而後知此冷煖澁滑之相為合為離若但從觸生而必無汝身又誰有非身而知合知離者是則獨境不生而非從他生矣阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性阿難若謂徒物則不能自觸而生知必與身合方知有觸是身與觸合而後共生此識乎然既曰身知有觸則此知性固歷然而顯矣汝又審此知性為知身乎知觸乎若言知身則此知即是觸知何以故觸者身之對也此之知性必與觸一而後可對知於身也若言知觸則此知即是身知何以故身者觸之對也此之知性必與身一而後可對知於觸也此但屬於一邊何以為共生乎且此知也既單屬觸便不得兼屬於身即觸非身也既單屬身便不得兼屬於觸即身非觸也竟不得兼於一邊何以為共生乎然則此知在身在觸元無定所若離觸而合身則此知為身自體性矣若離身而合觸則此知為虗空等相矣即此觸知在內在外皆無定在內外不成中云何立能生之根塵不成所生之識亦不成也中不復立內外性空所生之識不成能生之根塵亦不成也三皆無位界無從立何有共生之理不自生不他生不共生是故當知身觸為緣生身識界三處都無相全是妄則身與觸及身識界三性全是真本唯一非因緣非自然之妙性而已此優波離悟入處也阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立此明意法識三本如來藏也阿難又汝所明意法為緣生於意識此識為復因意根所生而以意為界乎抑因法塵所生而以法為界乎阿難若謂此識因意生者於汝意中必有所思之法塵而後顯意根之相塵存則意存也若無前所思之法塵意根亦無所生矣塵亡則意亡也抑且離此法塵之緣并意根亦無形相可辨縱使意能發識亦將何所用乎又汝識心之意識與諸思量之意根兼以了別為自性而分能生之根所生之識畢竟根識是同是別若謂識同於意則識即是意云何乃名意為能生識為所生若謂識異於意而不同即當墮於無情而應無所識既無所識不得名為從意所生若有所識則識與意同了別性云何是識云何是意唯同與異根識二性尚不能辨憑何而立生識之界乎是則此識不從自生也明矣若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性若謂此識因法生者世間諸法不離色聲香味觸之五塵現見五塵歷歷分明以對五根皆非意根所攝若謂汝識不從意生決定依於法塵而生汝且諦觀法塵之法作何形狀若離色空動靜通塞甜淡合離諸外塵而此生滅影子欲別有實體超前諸相而獨存不可得也所以言生則是色空諸法之影子生離彼諸相決不更有實生之體言滅則是色空諸法之影子滅離彼諸相決不更有實滅之體是則法塵生滅即是五塵生滅離五塵而別無法塵生滅可得且所因之法塵求其體相尚不可得況因法塵所生之識有何形相可見乎既法塵之相狀尚且不有而欲立界以生識惡可得哉是則此識不從他生也明矣不自生不他生畢竟從何處來是故當知意法為緣生意識界三處都無相全是妄則意與法及意識界三性全是真本即是非因緣非自然之妙真如性而已此目犍連悟入處也合而論之十八界中皆是意識建立根本立處尚空所生枝葉何有既無處所可得又無界限可憑事誑理虗情危勢劣惡見之根株盡拔妄識之巢穴齊傾獨朗真心周圓法界故宗鏡云若直下能了內心不疑外境心若了得外境皆空則觸目寓情無非妙性泥塗瓦礫盡是家珍矣此闕根塵合辨之科愚謂意法本自無相非同前五根塵有實性境況分破中又極明其虗無故無復共生之相可破非闕文也鍾云文中止將意法識三起辨而諸註必他引分心意識又于識中分一識七識八識殊覺支離矯亂又識心即識思量了別皆意從蓮師也與舊註異覽者勿疑舊說已上可當法界觀中明空即色觀四科中所指如來藏是指薪以告其有火也指井以告其有水也指鞲以告其有風也指芥孔以告其有空也至後七大所顯本如來藏是充薪火之量與大千世界之量等充井水之量與香水海等充鞲風之量與毗嵐風等充芥孔之量與無邊虗空等乃至充蜎飛蝡動之量皆與佛知佛見等無差別也十捌界竟阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬惟垂哀愍開示眾生中道了義無戲論法世尊前破妙覺不屬因緣阿難已領性體非因緣等而諸法因緣之執如故焉今聞陰入處界悉非因緣和合故又起斯疑葢前疑一性而此疑萬相也意謂妙覺性是寂滅法是第一義不屬因緣已聞命矣至於陰入處界是生滅法是第二義定屬因緣云何世尊例皆擯棄且世尊尋常談說皆以和合因緣為宗謂一切世間情與無情根身器界各具多種變化皆因地水火風四大和合而出現則應擯棄自然不應擯棄因緣云何如來因緣自然二俱排擯若昔日之不擯是則今日之擯非也若今日之擯是則昔日之不擯非也且昔日之不擯似墮有見今日之擯似墮無見既落一邊殊非中道似屬戲論而非了義我今不知此排擯旨趣畢竟為何等教法中所收屬惟垂哀愍開示我等眾生中道了義無戲論法焉夫萬法因緣有生正屬有門戲論權應初心之言而阿難反執之為了義今經剖相出性而斯妙性不滯於有為故非因緣不墮於無為故非自然正中道了義而阿難見其一切排擯反疑為偏空戲論此固常情迷惑顛倒溺有佈空之故習故佛於下文深責之爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍我當為汝分別開示亦令當來修大乘者通達實相阿難默然承佛聖旨此先痛責愚迷而後許說也爾時世尊告阿難言汝昔日愛樂小乘故我為說因緣和合諸小乘法不了義教今汝厭離聲聞緣覺諸小乘法殷勤啟請無上菩提故我今日為汝顯示最上第一義諦汝既不能領荷反將昔日所聞世間戲論妄想因緣自纏自繞而不肯捨者何耶且世間人皆稱汝為多聞第一矣及聞真諦不能信解正如有人熟記本草不識真藥及乎拈示不能分別反生疑惑如來說為真可憐愍者此也然此第一義諦離言說相離心緣相本不可分別不可開示今汝既以戱論妄想因緣纏繞故我亦以方便為汝分別開示然此番開示不獨令汝通達實相亦令將來求大乘者通達實相而共遊於如來藏海焉於是阿難默然無言承佛聖旨經自佛與阿難釋迷悶即責其不達實相今將明七大又復標許則知三大科所出藏性即是實相在六根尅體所具妙精明元在四科全相所即妙真如性在七大當體所本如來藏心以至清淨本然周徧法界方是一切法真實之相如是知者即為通達實相矣阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色若和合者同於變化始緣相成生滅相續生死死生生生死死如旋火輪未有休息阿難如水成氷氷還成水阿難惟問四大之相而佛雙約性相以答之葢以權教所談雖依性說相而性是密意不言即性阿難久習其教迷空循相故計和非和展轉不能忘今佛與之洗前舊見故性相雙舉而仍以性融相葢必相得性融始可以雙祛二計也諸大即相也諸大之性即如來藏心也佛言阿難如汝所言四大和合發明世間種種變化則是四大種性與四大實色雜和而成變化矣然此性體果和合耶非和合耶阿難若彼大性非和合者則不能與諸相雜和猶如虗空之不和諸色矣豈知性能隨緣而成相永異虗空之頑斷故非不和合也若彼大性為和合者則應與相同遷因始有終因終復始而始終相成從生至滅滅復繼生而生滅相續順次而生死死生間隔而生生死死如轉蛻業化則生而復生故曰生生中陰命終則死而復死故曰死死如旋火輪未有休息矣豈知相實不能變性不同火輪之不息故非是和合也問今何現成輪轉答月岸不移雲舟見動若果真動豈能悟之而頓息乎且性相本非二物但有隨緣不變二義而已吾為汝再申一喻阿難性雖一本能隨緣而成相既不如虗空之一於不和當知何等乎當如水結成氷葢水雖一體寒則結而成氷無所和合而現和合之相豈可謂之一定屬於非和合乎相雖萬殊能融而歸性既不如火輪之不息當如何等乎當如氷還成水葢水雖凝結成氷融之而依然是水但似和合而終無變遷豈可謂之一定屬於和合乎還字當玩若真和合則變矣如青黃和合即變為緣豈能還為青黃乎問阿難惟執和合佛何竝不和合兼破之答二計相待若不兼破則破和合之後必又以為非和合矣兼破者杜轉計也鍾云若諸四大之性不和四大之相則性居相外二不相雜猶如虗空不和諸色矣此即偏于自然墮於常見以知不變而不知隨緣故夫真如隨緣而成相豈同頑空哉必不然也若和合者則真如性隨相變遷始終生滅生死死生生生死死如旋火輪無有休息矣此則偏于因緣墮于斷見以知隨緣而不知不變故夫真如不變而守性豈同變化等相哉又不然也汝觀地性麤為大地細為微塵至隣虗塵析彼極微色邊際相七分所成更析隣虗即實空性阿難若此隣虗析成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一隣虗塵用幾虗空和合而有不應隣虗合成隣虗又隣虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合此明地大元非和合而有也且所謂非不和合而實非和合者請即地大以明之欲觀地大當觀地性汝且追究地之根元體性彼麤而大地細而微塵皆地性之所在也由麤而析展轉至隣虗塵此隣虗塵乃析彼極微色邊際相分為七分所成者可謂微之又微極之更極矣更析隣虗遂至於空矣色邊際相者乃色法之邊際過此將無色相也阿難若此隣虗可以析成虗空者當知虗空亦可出生色相而轉成隣虗如見空華滅于虗空遂計空中出華大抵不達萬相真原出于藏心者未有能出此計者也故西域凡小與此方無極太極之論皆不外此繆執耳汝今問言由和合故出生世間諸變化相正此虗空生隣虗之謂也然和合須有數量或二或三和合為一汝且觀此一隣虗塵用幾虗空和合而有耶若不合空豈是隣虗合成隣虗耶聞合他成自者矣未有合自成自者也是則若執諸相合須此隣虗亦是和合若此隣虗既是和合須是合空而成乃可謂之真和合矣且色之邊際隣於空既須合空而成色空之邊際隣於色亦須合色而成空若隣虗塵析入空者用幾色相合成虗空耶若曰色但合色不能合空而合色非空者則亦知空但合空不能合色而合空非色矣云何虗空出生色相耶且由隣虗入空而名之曰析色相有貭猶可折也若虗空云合空非有貭云何合耶知空之不可合則知隣虗非和合而成隣虗既非和合則地大元非和合而有和合之計豈實義耶按阿難惟據麤相如來究至細塵良以既執諸相和合須以至細之塵為元始也然細塵與空為隣必至合空之謬故惟明一空不可合則和合之計自可番轉而破盡矣汝元不知如來藏中性色真空性空真色清淨本然周徧法界此正立己宗以顯色空皆出如來藏也變地而稱色者葢地為諸色之本也夫色不出空空不合色畢竟地大從何而來究其源委本是如來藏中之物耳汝尋常但知析色為空合空成色而不知如來藏中性具之色即真體之空性具之空即真體之色空色互融渾涵未發清淨無染本然元具極於無外貫於無內而周徧法界其全體有如此者此如來藏與前所稱理一而義有差別中字可味今以喻明如大富長者藏中寶物無限每有宅舍必出藏寶廣列堂閣之間然但千萬分中之一分而已深藏而未發現者實無邊量故上四科如但指堂閣之寶說其皆是藏中之物今此七大如說此但藏中少分而彼未發現者一一充滿隨時隨處應用無窮也性色二句以性真二字無異故影互用之若不影互應有四句如云性色真空真空性色性空真色真色性空義方全也問此與般若所談色即空空即色同乎否耶曰實大不同葢般若等惟據目前所對已發現諸相而言今此不對目前諸相惟深談如來藏中未發之理故此色字非但揀於實色實顯異於事相俗諦中即空之色此空字非但揀於斷滅等空實顯異於事相真諦中即色之空也鍾云如來藏中性本自空不待析色成空也性本自色不待合空成色也隨眾生心應所知量循業發現全體既立妙用斯彰性海淵涵流出諸法但九界眾生心有染淨量有大小業有善惡故各隨其心各應其量各循其業而發起現行轉如來藏而為藏識轉法性身而為根身轉法性土而為器界是謂從性起相全相即性所以說地大即藏中之性也眾生攝盡九界有情心以根性言量以心知言根性有勝有劣心知有大有小若但以劣心小量致之則應之以麤少之色者固無不副其心而滿其量若能以勝心大量致之則應之以廣妙之色者亦無不副其心而滿其量也循業發現者一者世出世間一切淨妙之色若不循彼種種淨業雖欲發現不可得也二者三塗四惡一切苦穢之色若不戒彼種種染業雖欲不發現不可得也問悟人既須循業佛循業否答佛在因位循之果發之後但惟隨心尚無量之可應何有業之可循惟除示現無實業也世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義夫既曰循業發現業之起也似有由籍故世間淺智眾生執此生起之近由而遂惑為因緣性曾不達隨緣不變之體周徧法界何所藉於因緣業之成也似難改移故世間無智眾生執此難改之現量而遂惑為自然性曾不達不變隨緣之用隨心應量何得泥於自然因緣則計和合自然則計非和合然此皆是眾生意識分別計度推類廣之凡有言說盡如和合是非之類都無實義若從性起相全相即性之旨豈其然哉所謂如來藏現為地大者如此此持地菩薩所證法門也當知世尊說法初未甞離因緣自然但善用因緣自然耳又何曾擯棄哉又當知陰等四科皆先剖破相妄然後結顯性真今此七大乃悟自性淵海流出諸法故純標性真杳無虗妄字面誠法性宗之獨談非惟逈超般若而亦大異於前文也阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相違非和非合不應火光無從自有汝猶不知如來藏中性火真空性空真火清淨本然周徧法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義此明火大本出如來藏也阿難四大之中惟火性無我寓物成形如憑柴憑炭全託諸緣則無當體可捉也阿難汝觀城中未食之家欲炊爨時手執陽燧向日前求火阿難若謂此火名和合者必先有分開之相以為和合之本如我與汝一千二百五十比丘號為一眾是真和合然眾雖為一語其根本各各有身有生有氏族各字如鶖子出淨裔種木瓜林出大龜氏乃至阿難日種為姓苟無自出之本誰來和合乎阿難若此火性因和合有應同舍利弗等各有氏族所生矣彼手執鏡於日求火時此火為從鏡中而出以鏡為根本乎為從艾出為於日來以艾以日為本乎阿難若從日來既能燒艾來處林木皆應先焚而何以不焚則非日來矣若從鏡出未然于艾鏡應先鎔乃不惟不鎔紆汝手執尚無熱相云何融泮則非鏡出矣若生於艾艾應自生何藉日鏡光明相接而後生則非艾生矣不寧惟是即日鏡與艾三物亦各有所從來如鏡因手執日從天來艾本地生而火獨從何方遊歷於此既無從來其何以為和合之本乎且凡謂之和合者須同一處交雜而成今日在天上鏡在人手懸遠相隔安有如是之和合者開之既無從生之處合之又無和合之相豈應火光無所從來而自有乎可躍然會矣我已發明汝猶不知如來藏中性火真空性空真火清淨本然周徧法界如是隨心如是應量任世間人一處執鏡一處火生小莫破也徧法界執滿世間起大莫載也至於起徧世間而尚謂其有方所可限乎總是妙真如性循業發現而已世間無知惑為因緣自然皆是意識卜度凡有言說都無實義何足與言斯義哉此烏芻瑟摩所證法門也崔豹古今註云陽燧者以銅為之如鏡之狀照物則影倒向日則火出開合所分酷似不自生不他生不共生不無因生然文雖似而旨各別彼因人執萬法有生故詳破生相顯其無生而已此因昧法真源而妄謂出於和合故詳審從來令其悟真本元而後已故彼主於破而此重在審也阿難水性不定流息無恒如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人及天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義此明水大本出如來藏也阿難水性不定隨雨露之有無川源之盈竭而流息無恒如室羅城中迦毗羅仙青色斫迦羅仙鴛鴦及鉢頭摩赤蓮華訶薩多等諸大幻師欲求太陰之精用和幻藥妄計水從月出乃於望前白月之夜月正當午光皎如晝手執方諸陰燧水精珠也承月中水此水為復從珠中出乎為空中自有乎為從月來乎阿難若從月來者珠在遠方尚能令其出水其所經之林木皆應令其吐流矣如月當正南則自珠以南之林木皆其所經遊處或珠在平地則高阜以上之林木皆其所經遊處故皆應吐流也流則何待方諸所出若不流者明水非從月降矣若從珠出者則此珠中常應出水何待中宵承月而後水生乎若從空生者空無邊水亦無際從人至天皆同滔溺云何復有水陸空行之物愈不成義矣汝更諦觀月從天升珠因手持承珠之盤人所陳設三物皆有自來獨水從何方流注於此除空添盤者以空無從來不可取例也又復月之與珠相去甚遠不雜一處非和非合開合俱窮不應水精無所從來而忽然自有然則畢竟從何而有乎我已為汝說過兩番汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應知所量是故一處執珠一處水出徧法界執滿法界生生滿世間寧有方所仔細推尋皆是循業發現而已彼世間無知惑為因緣自然者皆從六識起徧計執於情即有於理即無徒有言說豈有實義哉此月光童子所證法門也阿難風性無體動靜不常汝常整衣入於大眾僧伽梨角動及傍人則有微風拂彼人面此風為復出袈裟角發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義此明風大本出如來藏也阿難風性無體動靜不常如搖箑則動不搖則靜之類汝常整衣入於大眾汝僧伽棃角僧伽棃大衣也忽然而動及彼傍人則有微風拂彼人面此風為復出袈裟角乎抑發於虗空乎生彼人面乎阿難若謂此風出袈裟角者則袈裟即風汝披袈裟乃披風耳風性搖動亦應其衣飛搖而離汝體且汝衣既風則我衣亦風我今說法會中垂衣汝看我衣風何所在不應衣中有藏風之地也是則不從衣生矣若謂此風生於虗空者常人執此更多如言虗則生風是也然既云空生即當自生何又假衣動為緣如汝衣不動便亦無拂乎且空以常住為體性風以生滅為體性以風從空則風亦應常以空從風則空亦應滅滅風可見也滅空何狀乎然則有生有滅即不名為虗空既名不生滅之虗空云何生滅之風反從之而出乎是則非從空出矣若謂此風生於被拂之面者從彼面生即當順拂于汝何得只待汝整衣之時而又倒拂於彼不拂於汝也是則非從面生矣汝更審諦而觀整衣在汝面屬彼人虗空不動風自誰方鼓動來此必執以為從空來者則風動空靜體性乖隔隔則非和非合決空不生此只就風與空性體乖隔而說與前二大專明非和合者稍異既空不生風不應風性無從自有我已三番開示汝猶宛然不知如來藏中云云實義汝可不求所謂實義哉此琉璃光所證法門也且如密室之中若云有風風何不動若云無風遇緣即起故知風大不動動屬諸緣又推諸緣各各不有緣緣之中俱無自性但是心動反推自心心亦不動以心無形起處不可得即知皆從真性起若真性不起方見真性徧十方界性合真空故曰性風真空性空真風也何謂性空合論云若地性是實則不可易法身菩薩能變大地為金地種頓失前豈真實水性若實則不可易天人見水謂是琉璃餓鬼見水是火魚見是室廬則豈是實火性是實則不可易樹伽提生於火中西國有布名曰火浣則豈是實風性是實則不可易列子御之而行則豈是實又地為堅性融則墮為濕性水為濕性寒則轉為堅性故龍勝云地水火風都無實法亦但有名字無智人謂地等為實聖人慧眼觀之但是虗誑譬如小兒見鏡中像歡喜欲取大人觀之但誑惑人眼故知無實地水火風所以盤山云三界無法何處求心四大本空佛依何住璇璣不動寂爾無言覿面相呈更無餘事可作此中總註脚也鍾云云何倒拂者謂風生彼面則自汝整衣衣中原自無風汝衣無風而彼面有風拂汝為順今彼面所生之風反拂彼面豈非倒拂乎阿難空性無形因色顯發如室羅城去河遙處諸剎利種王族及婆羅門淨行毗舍首陀商賈農夫兼頗羅墮栴陀羅等屠者新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無碍唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出此直指空大合前四大歸如來藏也阿難空性無形方圓大小初無一定但因實色顯發耳如室羅城中去河遠處諸剎利種以至栴陀羅等因立安居鑿井求水初出土一尺于中則有一尺虗空乃至出一丈土得一丈空虗空之淺深隨出土之多少多則深而少則淺深與淺皆空也此空為當因土所出乎因鑿所有乎抑無因自生乎阿難若此空無因自生者則未鑿土前何不無碍而大地逈無通達則是明因鑿有何成無因耶若此空因土出者須土先出而空後入如開池引水者可也然土出可見空入何相既無空入之相則計因土出而有空者妄矣既言空無出入則土未出時應即有空而空土一體元無異因無異則同同則出即同出乃當土出時空何不出耶益見因土出者非也若此空因鑿出者便應只是鑿空不曾鑿土則出亦出空而應非出土矣若因非鑿出故而轉計不因鑿出與鑿無干則鑿自出土應不見空今何隨鑿隨見虗空耶是則因鑿不因鑿都無是處也汝更審諦諦審諦觀極其詳審鑿從人手選地施功土因地移從地中移出皆不與空為緣而如是虗空因何所出耶無因非是實法故不取例若必執以為從鑿出者則鑿須鑿實空仍是虗虗實二法不相為用其用相背不成和合相生之義開合俱窮不應虗空無從自出若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入然則虗空畢竟何來世人皆知地水火風名為四大而不知空亦大也若此虗空之性圓而周徧本不動搖者當名何等當知與現前地水火風均名五大而此五大同一性真圓融皆是如來藏本無生滅者而已然指空為藏汝或不疑指四者皆藏恐汝心昏暗迷癡定執四大和合不肯捨其舊習不悟四大元如來藏如不悟者汝但例觀空大以審其有出有入乎為無出入乎若悟空大不動周圓非出非入非不出入者即悟四大非和非合非不和合矣而尚疑其不皆如來藏哉汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義且也愈說愈昏汝全不知如來藏中性具之覺即真虗空性具之空即真覺體清淨本然周徧法界隨心應量圓滿無方只為循業發現而有此相彼無知軰惑為因緣自然者皆是六識用事其言豈有實義哉此虗空藏菩薩所證法門也性覺真空二句比前變其文而復顛倒其句以前俱用本大與空相融此則本大即是空字若準前例合云性空真空文不可別今將前指性之空換為覺字則此中之空乃是虗空之空字若照前不顛倒合云性空真覺性覺真空今文上下交換義亦無碍耳阿難見覺無知因色空有如汝今者在祗陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此見為復與明暗相并大虗空為同一體為非一體或同非同或異非異阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異異字訓作離字從何立見明暗相背云何或同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異汝更細審漸細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無從自出此直指見大合前五大歸如來藏也見大即根大也總攝六根但舉眼根以為例耳然但取根中之性非取浮塵故雖言見等而不言眼等也此一節先約見之與塵為同異等以破和合之妄執也此中塵相二三開合不定如總言色空是合明暗以對空也只言明暗是開色攝空也兼言明暗空是開色以對空也只言見空是舉空攝色以對見也互為隱顯文字組織之妙也見覺者猶言見性也阿難見性離塵無別所知但因色空二相而有我今歷舉目前現塵如朝明夕暗晝之明暗也白月黑月夜之明暗也因此明暗等相而見得分析此見為復與明暗相并非明暗之太虗空為同一體乎為非一體乎為或同或異乎為非同非異乎阿難此見若與明暗虗空元一體者則明與暗互相凌奪暗時無明明時無暗若與一合必與一違合則見生違則見滅云何見明見暗故知明暗任殊而見體恒在顯其非是一體也若此見精與明暗等非一體者汝離明暗及與虗空此分析見元作何形相必求其相祗同龜毛兔角而已葢明暗虗空三者皆離則此見元無自體又從何立見乎由前言之宜或異矣由後言之宜或同矣然而明暗畢竟相背與見明見暗者異云何或同離明暗空三者元無自體云何或異若是則非同非異乎然見相本是一體欲分空分見本無邊畔可分云何非同見暗見明見性不遷塵殊見一顯然不同云何非異一同二異三或同或異四非同非異展轉推求皆不可得汝更細審不徒細而加以漸細不徒審而加以審詳諦觀已是切察而又審於諦審于觀必窮其原而後已則見明從太陽暗隨黑月推而至於通屬虗空壅歸大地皆有自來而如是見精因何所出乎若謂不從明暗定出於空者見則有覺空秪是頑覺之與頑體非和合知非出空開合俱窮不應見精無從自出然則畢竟從何而出哉見覺即見性也常居現量不起分別故曰無知然必因色空而顯所謂不變隨緣也若見聞知性圓周徧本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅阿難汝性沉淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅甞觸覺觸覺知妙德瑩然徧周法界圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義此會相歸性也若此見精與聞知等性圓周徧本不動搖者當知與不動之虗空猶動之地水火風均名六大性真圓融皆如來藏本無生滅者而已阿難由汝沉淪溺於權見無超拔之智不悟汝之見聞覺知覺兼鼻舌身言六根皆如來藏汝當觀此見聞覺知就自體為生為滅對外塵為同為異為非生滅為非同異若悟得見等非生滅同異亦非不生滅同異則知藏性圓常非和合亦非不和合矣汝曾不知如來藏中性中之見即覺上之明真覺之精即性明之見準上性色真空性空真色同例皆是以性融相之詞性見相即此如來藏中未發真體全見而覺非凡夫結根之見全覺而見非二乘冥寂之覺清淨本然周徧法界隨眾生心應所知量而妙用呈焉就一根而言此一見根即周法界而聽而齅而甞觸而覺觸而覺知總是妙性之德用瑩然不昧周徧圓滿寧有方所可執耶此無他循業發現而已或循淨業乃至更現無量根身或循染業乃至獨現狹劣根身無量根身如千手千眼之類狹劣根身如蜎飛蠕動之類此孰非隨心應量之大用而世間無知惑為因緣云云豈有實義哉此大勢至證圓通處也問此既惟取根中之性則前已開顯其全為性體今何勞復融之而為大乎答約此經別意則開悟證入皆依六根故前特開顯為性之全體約諸經通意則惟如來藏方為性之總相故今仍以六根融入如來藏也鍾云性見覺明覺精明見者言性中之見即本覺之明本覺之明即性明之見豈汝向以眼為見哉賀云因阿難認四大和合故上段責其不悟四大因阿難認見性為眼故此段責其不悟見大也阿難識性無源因於六種根塵妄出汝今徧觀此會聖眾用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗此識了知為生於見為生於相為生虗空為無所因突然而出阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別若無所因突然而出何不日中別識明月汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出此直指識大合前六大總歸如來藏也根塵但約六種而無七八者以八即前之根大而七亦即是意根故也性字猶言體相非謂真性也阿難識性無源倐起倐滅狀如野燒但因六種根塵假託而起今且約現前眼識因根塵而妄起者以例論之汝今徧觀此會聖眾用目循歷觀即根也聖眾即塵也循歷即識也其目周視但如鏡中無別分析萬象對照一念不生正是根相汝識於中此即眼識兼隨眼意識眼識名隨念分別但對性境初起一念不帶名言隨眼意識名計度分別亦對性境起第二念計執名字如標文殊等是也然此自眼家以例餘四皆然至于意家離前五識獨頭自緣獨影塵境亦在例中次第標指此是文殊以至此是舍利弗此識一一了知者為生于見乎為生于相乎為生于虗空乎為無所因突然而出乎阿難若汝識性生于見中者便應無明暗色空四種塵相而汝見自能生識矣然而去塵無根見性尚無從何發識是則單根不生矣若汝識性生于相中者便應不假見根不消見明不消見暗而相自生識矣然而除根無塵既不矚明暗亦不睹色空彼相尚無識從何發是則單境不生矣若謂此識是從空生非相非見者若非見則色空莫辨同上去根無塵若非相則根無從立同上除塵無根處此非相非見之間識體若空則同龜毛識體若有非同物象既無自體安能有用縱發汝識欲何分別是則離根塵而言識從空生尤不可也若謂此識為無所因突然而出者則目中無月忽起分別明月之識真突然矣而識豈若是是則言無因生者尤不可也汝更細詳微細詳審見託汝睛相推前境根塵歷然可狀成有不相成無色空宛然四者各不相混而如是識緣因何所出乎必單執從見出者則識有分別名動見無分別名澄識動見澄體非和合彼聞聽覺知皆澄屬也皆非和合則皆非識所從生展轉推窮不應識緣為無從而自出耶若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅阿難汝心粗浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有汝元不知如來藏中性識明和覺明真識妙覺湛然徧周法界含吐十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義若此識心本不從根塵諸緣所出者當知此了別之識與見聞覺知之根圓滿湛然非局方所兼彼虗空地水火風均名七大會相歸見會相見歸識而何相何見何識總是性真圓融皆如來藏本無生滅者而已阿難汝心麤浮惑於着相之淺談而乏于精切之深慧不悟見聞等六根所發了知之識本如來藏汝應觀察六處識心是同是異是空是有非同非異非空非有若是同不應用中相皆若是異不應性中相知若是空不應現有分別若是有不應了無朕跡俱非亦然是非雙泯自然一真獨湛矣且世人皆知識為識也覺為覺也汝亦同此我雖重重開示至今元舊不知如來藏中性真之識即妙明之知本覺之明即性真之識相融相即然則何必謂之識哉雖直稱妙覺可也此妙覺性體湛然常明徧周法界顯為大用含吐十方虗空彌綸無間寧有方所此無隨心應量者心即識心量即識量不復自隨如眼不見眼也而乍現為識者只為循業發現葢諸識各由種子方起種子須由宿業故須循業雖然發現不離真體此義不明世間無知惑為因緣自然都為認此識心起徧計執至有轉識成覺種種議論皆屬權談豈有實義哉此彌勒所證圓通門也鍾云萬法生成不離四大而依空建立因根有覺因識有知所以有七也無處不有曰大七大該陰入處界疊疊顯發前方談其一一皆是真性後乃談其一一皆周法界前顯法法當體真常後顯法法圓融周徧由淺入深也前云地水火風空本如來藏圓融周徧至六入十二處十八界但言其本如來藏而未及其圓融周徧也故此處拈出見識二大以補前義見根也地水火風空塵也識識也六入十二處十八界不出根塵識三故曰拈出見識以補前義也似複非複似略非略此亦文字錯綜磊落處解經者固不以文字為重然不知作文之法則于經義脉理未免觸處成礙也四科之文段段結云無有處所七大之文段段皆云寧有方所皆是心目所在一句根本發出許多枝葉以阿難頭頭認有方所故世尊法法破除向後世尊說出因明立所方知所立之處入流亡所方知除所之法所之一字真迷悟之大關也問此經首先正破識心七處曲搜畢竟無體乃至顯見文中又復旁兼而破未甞少假寬容何後于十八界即已許為如來藏心妙真如性至此愈稱其周徧法界含吐十虗即是性之全體是何前乃妄之至而後則真之極乎答前約初心悟修須從方便決擇真妄捨生死根本取涅槃妙心則識須破盡決定不用後約圓解普融無法不真無法不如乃至剎塵念劫無非一真法界何況識心不融法界乎舊說以上可當法界觀中空色無礙觀不知此上皆對阿難之妄執而一一會妄以歸真正惟攝事歸理融相入性而已尚未及於從性起相從理成事是則三藏之中正屬空如來藏而強以三觀三諦判之者欠研審也爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙是諸大眾各各自知心徧十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精徧圓含褁十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅禮佛合掌得未曾有於如來前說偈讚佛此敘悟也爾時阿難及諸大眾蒙佛如來微妙開示如破妄心有三一七破以密示無處二重徵以顯訶非心三縱奪以決其無體是所以破妄心者可謂極微細而盡精妙矣顯真心亦三一示見等而剋就根性以指其實體二示陰等廣融諸相以明其一體三示地等而極顯圓融以彰其全體是所以顯真心者亦極微細而盡精妙矣既蒙如此開示于是向之身心泰然者轉為蕩然得大自在得大受用不復繫罣隔礙矣且不獨阿難是諸大眾各各自知此心徧十方界其量無邊葢向來只是藉佛語而知不是自知今方自肯自信不隨人口吻轉矣向也見量極於初禪今則見十方空如觀掌中貝葉等物矣向也為物所轉或觀物非心或謂物為妄今則見一切世間諸所有物皆是菩提妙明元心矣向也昏擾擾相以為心性決定惑為色身之內今則已知心精徧圓含褁十方葢世人尋常皆謂空褁界界褁身身褁心重重拘縛曾無超越今心褁十方身包空外內外轉換大小變更真所謂妙能轉物而反觀父母所生肉身若空中一塵存亡莫定海中一漚起滅無從不復棄海認漚認漚為海矣向也不知真際所詣不知寂常心性不知身心顛倒所在不知見性是心不知陰入處界是如來藏不知七大徧周法界今則了然自知毫無疑惑矣向也世尊發明寶明妙性元所圓滿常住心地無奈徒獲此心而未敢認今則獲本妙心常住不滅不待認矣此正阿難㘞地一聲時懸崖撒手處所謂秤錘移到徹稍頭忽然拶落翻筋斗也於是禮佛合掌得未曾有而阿難即以所見所悟處於如來前說偈讚佛焉賀云破妄中并見精亦破是破到微妙處顯真中并萬象皆真是顯到微妙處故曰微妙開示也鍾云自知心徧句是大頭腦向下由大及小層層照破皆承知字來又以了然自知二句總結之初卷世尊首言不知常住真心可見知之一字眾妙之門當不知時只道虗空中有萬物萬物中有身身中有心是則至大無如虗空至小無如心矣今也眼目頓開忽見心量徧周法界始知空生大覺中不過手中一葉耳空且如此何況空中所有之物又何況父母所生之身此時徧觀萬物全一真心不復為物所轉矣此時唯有心精含包十方反觀肉身渺小虗妄不復惑心為在色身之內矣向來世尊責我不知常住真心今日到此方始了然自知如乞食窮兒頓獲寶珠安得不歡喜讚歎發願報恩耶兩自知字上下相應妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身首句讚佛也妙湛讚真諦般若德也總持讚俗諦解脫德也不動讚中諦法身德也尊者十號之一也首楞嚴王四字讚法也世希有三字雙嘆佛法皆難遭也顛倒想者謂我法二執分別也如執緣塵分別以為心相計五蘊四大以為身相迷心在色身之內認物為己迷己為物身心萬法謂各有體性四大悉疑因緣和合等皆是億劫之所惑者今併銷之矣僧祇者唯識謂地前歷一僧祇初地至八地歷一僧祇九地至佛地歷一僧祇然後獲究竟法身今不勞經歷三阿僧祇即獲法身者彼約漸修此約頓悟以漸修言之則從微至著自信住行向以至等覺方證極果以頓悟言之則一念不生前後際斷即名為佛尚不涉地位階差豈歷僧祇哉昔廣額屠兒至佛座下無明頓息乃置刀謂佛曰世尊我是千佛一數佛即印可夫以放下屠刀便預佛數今阿難法眼清明其言獲也宜矣願今得果成寶王還度如是恒沙眾將此深心奉塵剎是則名為報佛恩此悟後發願也當我未見法身時自謂唯佛一人獨得覺性一切眾生悉皆無分故我上不求佛道下不度眾生今日乃知佛與眾生平等無二故我願求佛果亦願度生世尊既以種種方便委曲詳示令我得見此平等法如此深恩實難酬報今我辨此二種深心上則承事塵劫諸佛下則度脫塵剎眾生是則堪報難報之深恩所謂真龍得水便脫興波作浪矣伏請世尊為證明五濁惡世誓先入如一眾生未成佛不終於此取泥洹此申明度生之願也我昔在法華會上畏此娑婆五濁惡世諸惡熾盛剛強難化故發願異國持經今見平等法身重興大願故于五濁惡世誓願先入度盡眾生方入滅度如一眾生未成佛我亦不取泥洹也地藏所謂眾生度盡方證菩提即此廣大心也大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場舜若多性可銷亡爍迦羅心無動轉然我願如此安能保其必遂哉葢我粗惑雖除根中積生無始虗習與諸無名分劑頭數猶未能盡故冀世尊大雄大力及大慈悲暗中加被審除細惑令我四住頓盡二死永亡早成正覺徧作道場方得了當耳至若我上求下化之誓其堅何如彼空性無體不可銷亡者也然而或可銷亡而我此金剛堅固之心終無退轉所謂虗空有盡我願無窮者也世尊其鑒之哉舜若多空也爍迦羅堅固也一蒙開示頓獲本心行布不礙圓融故雖未及斷惑不妨全獲法身後經理則頓悟乘悟并消是也更願得果登無上覺圓融不礙行布故雖全獲法身不妨更去細惑更歷諸果後經事須漸除因次第盡是也能破眾生惑之堅體曰大雄能拔眾生惑之深根曰大力能與眾生二嚴之樂曰大慈能拔眾生二死之苦曰大悲四住欲愛住地色愛住地無色愛住地見一切處住地也二死分段生死變易生死也從入正宗至此說法一周名破妄顯真周說空如來藏一大科竟
