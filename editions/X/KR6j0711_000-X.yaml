front:
  text: 序瞿曇氏以一大事因緣出現於世四十九年廣宣妙諦窺其義蘊幾於入海算沙而蓮華楞嚴尤為教乘至寶然蓮華為佛全身而楞嚴為佛之頂則以此經究竟堅固始乾慧以迄等覺莫不因頂薰修直踏毗盧頂上為大覺最尊勝之法葢作佛之津梁而蓮華之精要也開佛知見舍此蔑由所以自天台以來前賢接踵代有闡發雖繁簡不同而婆心則一大約以貫諸說之統宗攝羣倫而加被為不失瞿曇氏說經之旨焉迨別傳東來宗教互詆宣鑒大師一見龍潭燒却青龍疏鈔以為窮諸玄辯若一毛置於太虗竭世樞機似一滴投於大海於是纔涉言詮便成剩義而瞿曇氏密因修證了義菩薩萬行同圓非說可說之妙幾有故紙置之者矣嗟乎根有利鈍機有遲疾苟謂單提別傳便可盡廢義學則瞿曇氏纔離兜率便當以雙趺公案徑示飲光何為橫說竪說頻轉佛輪若是其不憚煩而從上先德又何以有日處虗空之喻乎甚矣弘經功德度越恒沙或緇或素不一其人大約親承莂記隨遇現身使慧炬常然佛幢不倒苟非乘夙願力詎能措一辭哉若乃以文人之精思快筆疏調御之奧談以世書之章句段落分貝多之脉絡喻諸決流源源歸海譬如理機絲絲入扣辯才無礙顯密全彰求之今日則非眼先生其人矣先生宿學巨儒隱居著述尤䆳五家宗旨遂輯楞嚴貫攝一書篇帙之成需之二十七年之久葢用志專勤欲以一人之精力抉萬類於迷津仁哉其即瞿曇氏之用心乎篇中以佛言語證佛智慧不即不離有倫有脊真乃無所不貫無所不攝葢先生於此經始得會解繼見合轍又因離公得讀正脉而終取材於竟陵之如說可謂集眾腋以成裘錯五采而施繪矣至於就簡刪繁直截貫串剖抉微奧開卷了然予小子讀而快之如覯優鉢羅華雖欲不歡喜讚歎不可得也遂因先生之命而為之序康熈己酉五月崑山年家子徐元文頓首拜撰序夫說法者無法可說解經者借解存經無法可說不妨橫說竪說也借解存經貴在一解眾解也自經流震旦而楞嚴後至解經者固多解楞嚴者尤多然或條分縷拆曲證旁稽而反乖於融通渾一或拘文敷衍數墨循行而遂流於支離浮蔓則又不如無解此達大師所以勸人專讀白文也自解楞嚴以來唯天如十家會解盛行於世迨一雨法師合轍出而生面別開至交光法師正脉出而奧義闡盡雲棲蓮老搭衣禮拜閣筆不註有以也其後鍾伯敬賀中男又約正脉之旨而著為如說頗出新意了庵居士乃滙諸家而以吾儒講章之法編之初名貫攝改名說通嗚呼備矣予得而卒業焉見其痛掃科揲之葛藤獨標直捷之妙義而精神全在承接過脉中使十卷如一卷一卷如一句一句如一字昔之開卷而欠伸欲睡者今則愈讀而津津有味若唯恐其速盡也所謂借解存經而一解眾解者不其然乎若夫居士以再來人弘三教緒澡身如霜枝雪幹淬品如潭月松風其深脩密煉在語言文字外者高徐二先生既言之予奚贅焉康熈辛亥秋八月賜進士出身雲南道御史奉差巡視兩浙鹺政關中通家世弟熊焯拜書序楞嚴貫攝者非眼先生津梁後學而作也此經之解多矣何復煩此曰經者西方聖人談道之書也然聖人之書原是聖人之言聖人之所言者誠與世人不同而其言之有倫有脊為呼為應一字一句定有銷歸幾段幾章自相鈎鎖則必與世人之言同而尤詳盡者也如是則後世之讀經者必盡曉聖人之言而後能得聖人之意尤必如面聆聖人之語而後能會聖人之言故文人之技去道遠矣而有時妙用其長震於鐘鼓而朗於日月當亦大覺所為破顏微咲者也然則古德時賢紛綸諸解豈猶有所未足歟曰其用不同也夫車舟岐於燕吳而裘葛分於寒燠非有優劣存焉而適宜則固逕庭矣諸師之解抉微剖密各有專長而或申其義或未體乎詞求其呼應分明脉絡通徹葢未易數數然矣先生此編顧盻生情宛轉會義葢有出於諸師之外而補其所不及通其所未了者夫脩多羅葢亦多矣而佛頂獨為尊勝不止破顯盡致堂室窮幽半滿邪正之歷歷分明良由房相運筆文字入妙遂今乾竺奧義白日中天則先生此編固調御所囑累而清河之功臣也夫文之載道也固矣而道未明亦有二端焉義學龍象非曰乏人而外典之博涉未深故下筆時有齟齬求其一一文從守順虗實咸宜即古德往往有遺議至於宗門直指自詫不落言詮恐一傍語言便成教相不屑為青龍疏鈔而飜留心李杜韓歐之業區區與文士爭長是可恠也苟謂筆墨在真如之外彼地水火風且已兼收者何故苟謂般若在語言之外此方真教體清淨在音聞調御於斯不話墮乎夫千里之流一曲偶閼則不貫一闋之奏抑揚不盡其致則曲不成而況聖人精微之語寧可鹵莽遇之而托於卓犖觀大意以免玩物喪志之譏乎彼諸君子之論夫固有為言之也葢古人間出之資與忘言之教固有斷章取意而有會者矣固有一字一句而磕著築著者矣固有郢書燕說而獲大益者矣不止是也即以本經言之固有知見立知句讀錯斷而證入者矣更以禪宗言之固有聞挽歌艶詩而桶底脫然者矣不止是也以他方世界言之固有以飲食香臺而作佛事者矣即棒喝猶為鈍置而況語言乎然以言乎一人之悟殊方之法則可而欲以投娑婆之機演大雄之法舉先聖人耳提面命之言一一令千百年之後之人順乎耳而浹乎心飽性海之玹波睹義天之朗曜當在此不在彼也明矣不卒業斯編不覺忻然合掌曰佛頂光明復爍四天下矣葢脩多羅之義震旦譯云契經上則契諸佛之理而下亦必契眾生之機故也經之為義曰貫曰攝貫穿所說至道攝持所化眾生故也先生此編彷儒者經書講章之例為之以必肖必透為則其理契先佛者既已擇取諸師之妙解而用之至於語言如生𠃔貫𠃔攝以俯契群機者向來得未曾有視紫柴講錄尤為盡善當與大圓張尚書金剛義趣廣演並有千秋無疑矣交光之後復筞奇勳是可喜也不每訝井絡之墟宗風不墜昭覺大師以比丘身現內江相國以宰官身現今先生又以淨名龐老鼎足其間皆可云優曇華迦陵音矣此編行世六宇同風人共知金色頭陀方在雞足山中護持佛衣俟面授補處菩薩豈知慶喜尊者亦方於獅子座上現在結集佛語不惜更下註脚慈悲末法眾生乎康丁未一陽月長至日宗人府丞前吏部左侍郎兼國史院學士東蒙高珩拜撰編輯始末余庚辰歲客京師始閱楞嚴會解閱凡再僅窺其大意而已丁亥避亂於梁山之金城塞又得會解讀之稍復通曉於時竊有願焉顧安得淹貫明白若儒家之講意者以廣引末學乎戊子冬隨集仙宗兄過達州之漢城寨忽得合轍一卷於斷殘經帙中取而誦之心開神躍曰此可為講意資糧矣而全本亦未見也己丑至嘉陵參離指和尚云有合轍全本庚寅乃求得而卒業焉則又躍然歎未曾有和尚謂余合轍固善不如正脉之尤善也余又求正脉讀之初苦其科揲煩碎屢閱屢及觀其簡識取根不用天台止觀種種卓見高出羣疏相傳蓮師初見此本望北焚香搭衣禮拜良有以也而余之講意可以編矣爰取正脉合轍二書研味參伍用經書講章之例融會而編之分章過脉聯絡照應必肖先佛口脗必透後學心胸而繁碎科分槩從芟去大約取正脉十之六合轍十之四而余間有管窺亦附十之一焉權輿於辛卯正月告竣於壬辰九月書成凡十卷敬質之離和尚和尚不以為謬而令存其草本以待緣而梓焉順治庚子余就養復入都門此本尚留嘉陵未之携也偶於報國寺集得如說一函閱之書成於鍾伯敬賀可上兩居士大約亦本正脉而參以新裁往往玅合佛旨至丁未春次男如淮來自嘉陵乃緘余草本至宛然故舊重逢喜可知也於是復加較定而以如說參之葢前後二十七年而大願始畢可以無憾矣至於剞劂流布予未敢必適同鄉高平令白君田生讀而善之首捐百金倡刻三卷而唐謝兩君和之吾兒又卒成之閱半載而十卷告完其序則天官少宰高念東先生椽筆先生今之張無盡也聖典託名敘以傳不尤幸乎爰記其始末如此俾後之覽者鑒弘經之不易而勿加輕褻云爾旹大清康熈七年戊申秋八月朔旦白衣戒弟子劉道開題於燕臺之鴻雪堂表懺疏意伏以佛法廣大雖上哲究其津涯經義淵微豈下愚可得而詮註聊因前人之緒論薄效編纂之寸長既勒成書理宜申告仰干獅座俯鑒螘忱言念弟子劉道開蠢蠢凡夫茫茫業識幸植善根於宿世獲觀玅典於今生憶讀楞嚴起於庚辰之歲及編直解乃在辛卯之年閱兩載而始成盡去揲科之𤨏碎滙羣言而拔粹務求脉理之貫通揀識取根不用天台止觀芟繁就簡例同儒氏講章開卷了然初學既便其易曉循行豁爾鈍士不苦其難知藏笥篋者有年待剞劂於緣會憑仗韋陀之願力默牖檀越之信心信官白良玉倡刻三卷於前信官謝述度助刻兩卷於後餘則弟子道開偕男信官如漢貢生如淮隨力措辦用襄厥成計工資參百餘金裝善本一函十卷殺青已峻稽顙告成爰卜本月朔日祗就玅喜庵延僧設供云云伏願弘慈灼鑒慧力護持倘不大謬於聖言尚求陰導其流布俾普天含識共遊一六之門率土孕靈同躋圓通之域弟子道開不勝翹誠悚慄之至謹意
