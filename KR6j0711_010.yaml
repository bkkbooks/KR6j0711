body:
  text: 巴縣居士非眼劉道開纂述成都沙門離指方示鑒訂阿難彼善男子修三摩地想陰盡者是人平常夢想消滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑑明來無所粘過無蹤迹虗受照應了罔無也陳習惟一精真生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基環師謂由緒為識陰而生基為行陰見二陰深淺之殊圓師謂各命為別相同生為總相定二陰細粗之別皆宜深玩之也猶如野馬田間遊氣春晴伏地可見狀如水而光如焰渴鹿認以為水而實非水即陽焰也熠熠清擾為浮根塵浮根四塵謂肉身也究竟樞穴門簨曰樞門臼曰穴皆動轉之要處此則名為行陰區宇若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超衆生濁觀其所由幽陰妄想以為其本此敘行陰始終之相也阿難彼善男子修三摩地從前十種若俱透過或終始不起愛求或魔來便能先覺如是久久想陰自有盡時凡人寐中有夢寤中有想夢乃寐中之想想乃寤中之夢皆獨頭意識所為想陰之體相也若想陰盡者是人平常夢想皆滅由寐無夢而寤無想故寤寐一如而性覺妙明虗靜不動正如晴明太虗纖雲盡淨逈無所有也且粗重塵影即是法塵全依想陰為體今想陰既盡塵無所依故無復粗重前塵影事而意識轉成妙觀察智矣於是觀諸世間大地山河直如鏡之照像像來無粘像過無迹但虗受照應而已夫浮想擾心誠宿積難除之習氣所謂陳習也今虗受照應則已了無陳習惟一覺明精真之體湛然獨存此皆想盡之相也彼三界衆生所以生滅無停者其根元皆是行陰所遷前三陰未破則此根元終不可見今前三盡除第四自現故生滅根元從此披露由見此根本故能盡見十二類生皆由此而生生滅滅也雖未曾知十二類生各各受命之由緒而十二類同生之基已見其肇若陽𦦨光明閃爍不定熠熠然幽清擾動為浮根四塵動轉遷謝之樞穴此熠熠清擾正行陰之相故名行陰區宇喻之於水想陰如大浪行陰如細浪識陰如無浪流水真覺性體如湛然不動之水故行陰為分段根元識陰為變易根元也是則惟一精真亦縱而許之豈真精真也哉行陰未盡之相如此若行人將此清擾熠熠之元性反入於元澄之體收細浪之行水歸無浪之識海而一澄元習永絶行陰之重習如波化為水更不再起此即行陰已盡之相亦是轉第七識為平等性智時也如是之人則能超衆生濁蓋生滅不停業識常遷名衆生濁此濁本乎行陰故行陰盡而超之也觀其所由幽隱妄想以為其本蓋行陰密移皆是幽隱細相非若前三瀑流之粗故知其本於幽隱妄想也行陰將盡未盡之間而十計生矣阿難當知是得正知不遭邪慮方得正知破後二陰名遍知矣奢摩他中即圓定發明也諸善男子凝不動也即始終不起愛求明不迷也即魔來先覺正雙承不動不迷而頭正尾正也心用心如此十類天魔不得其便以上想陰盡也方得精研此下行陰現也窮生類本於本類中生元露者觀彼幽隱密難見曰幽擾清微波輕動曰清擾圓十二同基曰圓擾擾動元於圓元中圓元勒成行名起計度者是人墜入二無因論先世外道修心邪解所立違理背正之惡見今現之解適與之同故即墮彼論中如後車蹈前車之故轍同墮一坑塹也此下明行現十計而此先明計無因也阿難當知是得云云其便良以想破之後天魔無可奈何不復更至方得加功用行精研窮究十二類生之根本故十二類生根元方得披露元即行陰也露則顯見矣於是觀彼幽清之相皆以圓擾動元然雖觀察動元實未曾識得藏識種子喻觀水者只見細浪之水而未覩無浪之水乃於圓元中忽起異計是人必墜入外道二種無因論矣一者是人見本無因何以故是人既得生機全破生機發動之本即指行陰破乃顯意非盡也乘於眼根八百功德見八萬劫所有衆生業流灣環死此生彼秪見衆生輪回其處八萬劫外冥無所觀便作是解此等世間十方衆生八萬劫來無因自有由此計度亡正遍知墮落外道惑菩提性何謂二種無因一者是人見前際無因何以故是人既得行陰披露乘此定中眼根全分功德徹見過去八萬劫中諸類衆生逐業流浪死此生彼灣環不斷而八萬劫前冥然無覩妄計冥無所覩處為冥諦為自然為渾沌不知己之見量有限而便作是解謂一切衆生皆八萬劫前無因而有由此計度邪計而非正知不了業道無始而非遍知所謂依舊認賊為子墮外道之邪覺而迷菩提之正覺矣二無因論此其一二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移此猶是詳推過去下方是倒定未來也今盡此形盡未來也亦復如是決定其皆不改移也而我本來不見菩提元不見其從菩提性起云何更有成菩提事當知今日一切物象皆本嶽師云本字當是末字無因由此計度失正遍知墮落外道惑菩提性二者是人見後際無因何以故是人於劫內類生既見其根於劫外無因則知生人生物皆以無因為類生元本且如烏非黑耶鵠非白耶人天非竪耶畜生非橫耶而白豈待於洗成黑豈由於染造皆是自然而然皆本無因自八萬劫以來此理未嘗改移過去如此則未來可知然則自今以往盡未來際此理不移亦復如是且我於過去元不見十二類生從菩提性起也云何後來又有從菩提性起之事乎是故當知一切物象皆末無因也八萬劫盡終成斷滅無因無果返於冥初而已由此計度亡失正遍知全落外道迷菩提性二無因論此又其一二種無因皆由未見識陰不能別見各命由緒但是總相見於多分衆生輒起斯計如人總觀閙市但見人行不見坐立遂計行者是人而坐立者非人也若四果羅漢行開識現便能別見各命由緒終不執於自然矣舊解無復改移謂人物皆長時難變玩文意但重無因何故又添不變故知無復改移但謂此無因自然之理歷久而不移也學者詳之是則名為第一外道立無因論二種無因皆先世外道所立違理背正之論奈何行陰將開之時而妄計墮此也哉由彼不達善惡循業發現妄計八萬劫前自然而有八萬劫後自然而無成斷滅論邪見中攝也賀云西域外道自有一種無因論師今此行人忽墮其中非謂此人自立無因論也阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四遍常論此明第二計遍常也阿難是三摩中云云常擾動元雖然窮至行陰尚猶被覆而未見其幽隱遷流於未遍未常者早計遍常是人則墜入外道四遍常論四種雖皆不離行陰起計而前三皆兼窮他法且以法之廣狹而分劫之多少惟第四則無所兼而亦不言劫量此其別也長水曰行陰生滅相續不失故名常而所計四種遍一切法故名圓溫陵曰遍即圓也故此標名遍常而後結名圓常一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常何謂四遍常論一者是人想破行現乘此心開遂以窮研內心外境本元自何而起則見心境二處皆起於無因然所窮之法粗略而狹故其見量有限即窮心境之修習窮至二萬劫外冥無知見但能知此二萬劫中所有衆生生滅循環不曾散失故不計劫外無因為斷滅唯計劫內相續為遍常所以異乎前計而為第一遍常論也二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常二者是人想破行現乘此心開見萬法皆從四大和合而成故作意窮之究極本元則見四大種性本來常住依此修習遂能洞照四萬劫中衆生雖有生滅而四大之體常恆元來不曾散失則又計以為常惟所窮之法稍為詳廣故其照劫數倍於前而為第二遍常論也三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住計以為常三者是人乘心開後窮究眼耳鼻舌身意之六識及末那七識執受八識將此八識之心七識之意六識之意識其中本元由處悉窮盡之不知彼尚為行所覆所謂本元由處亦但行陰而止耳限於七而未至於八也乃遂妄謂真常依此修習能觀八萬劫中一切衆生死此生彼本性常住良由六八二識皆以第七為生滅根元故即計此生滅根元為常住性如見細流謂之止水尚未望見八識真常流注況菩提妙性乎所謂無量劫來生死本癡人喚作本來人也特以所窮八識法門深廣詳切倍前四大故所知劫數亦倍前人而為第三遍常論也問行陰未開豈能頓窮八識答八識但是此人乘心開後所用進修法門徹固未徹窮乃許窮例如聲聞窮四諦法但盡生滅豈能徹無作底也四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常四者是人既盡想元想陰更無再生之理遂謂此流止運轉種種生滅皆屬想心今已永滅則不生不滅之理自然屬行不復研窮觀察便計為常比之第一尚為淺劣何況二三故不復立能知之劫量度其所知必不逮於二萬劫矣此為第四遍常論也溫陵謂生理為行陰則更無二字説不去矣若行陰更無又何有下之妄計耶由此計常亡正遍知墮落外道惑菩提性是則名為第二外道立圓常論由此計常之故非遍圓而計遍圓非真常而計真常故墮邪覺而失正覺是則名為第二外道立圓常論奈何行陰將開之時而妄計墮此也哉此四皆計生滅為圓常在邊見中攝也首楞嚴定頓窮八識今於想陰盡處不了行陰微細生滅妄認為常豈頓窮哉若了八識何得異計又三摩中諸善男子堅凝正心易一堅字較勝於前魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論此明第三雙計常與無常也又三摩中諸善男子當想盡行現之後於自而己身他而衆生國土中起邪妄分別者是人墜入外道四種顛倒邪見一分無常一分常論蓋平等性中本無自他而妄計自他中道了義本無偏執而妄執兩邊且首楞嚴王一切事究竟堅固方為正覺今乃常與無常分計之故成顛倒見也一者是人觀妙明心遍十方界湛然以為究竟神我外道二十五諦中名為主諦謂一切法皆是我所悉以此神為主也從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅中真無常性何謂常無常論一者是人觀此妙明之心周遍十方湛然澄徹量同虗空以為一切法皆以此神為主謂之究竟神我從是起計我心遍於十方凝明不動而凡一切衆生皆自生自死於我心中者也心無生滅豈非常乎衆生生滅豈非無常乎無生滅之心即自是常也有生死之衆生即他是無常也此一顛倒見也二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常此舍自觀他也二者是人不觀己心但觀十方國土自三禪以下三災所及處計為無常自四禪以上三災所不及處計以為常豈知所謂常者非真常而所謂無常者亦非種性乎此二顛倒見也三者是人別觀我心精細微密外道所計我相有三一微細我二廣大我三大小我此微細我也精言非雜細言非粗微言非著密言非顯猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性此舍他觀自也三者是人不觀世界但觀我心見此心精細微密其難見有如微塵雖然流轉十方而本性元無改移心為身主能令此身有生有滅其無改移為不壞性者即我性常也其一切生死之身從我性流出者即無常性也豈知所觀之心細如微塵者即是幽清常擾之相行陰未破豈能頓見真心哉計常非則計無常亦非矣此三顛倒見也四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常此觀四陰而雙計也四者是人知想陰已盡見行陰密流即此眼前行陰常流便計為常三陰已滅便計為非常此四顛倒見也由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論由此四種計度雖自他不定總是一分無常一分常以此雙計墮落外道迷失菩提故名第三外道一分無常一分常論行陰將開而妄計墮此可惜也已此亦邊見中攝也賀云此與四遍常異者彼計一切俱常此計自他之中止有一分是真常耳又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中分位有四謂三際分位見聞分位彼我分位生滅分位生計度者是人墜入四有邊論此明第四計無邊有邊也又三摩中諸善男子當想盡行現之時於四分位中起妄計者是人則墜入外道四種有邊無邊論經文不言無邊者或是省文或可兼攝也賀云前二種計真常此種計廣大也一者是人心計生元行陰也流用不息計過未者名為有邊計相續心名為無邊何謂四有邊論一者是人觀行陰現在遷流無有間斷遂計過去者已滅未來者未見名為有邊惟現在心相續不絶名為無邊此在無邊際中妄立邊際所謂刻畫虗空也豈知菩提之道無去來今者哉二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊此與前計相反所謂回互倒計是也前計過未為有邊似計無聞見處也計現在為無邊似計有聞見處也今却計劫內有聞見處為有邊以其限於八萬之數也計劫外無聞見處為無邊以其無窮極而不可測知也吳興曰後八萬劫亦合如前今恐存略三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性三者是人計自己神我色來見色聲來聽聲無不遍知自謂唯我一人得無邊性而彼一切衆生皆現我遍知之中然我但見其人曾不知彼之別有知性是則彼人元不得無邊之心但有邊性而已豈知汝自不見非彼人性有邊也且汝非人安知人之有邊哉前後以物體有無名邊此以際畔有無名邊四者是人窮行陰空心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊四者是人窮究行陰不了區宇未空而遂謂真空寂滅之性從有心路處妄自籌度謂衆生身中自想陰以前半屬於生自行陰以後半屬於滅推而至於世界一切所有皆是半生半滅生為有邊滅為無邊則是一半有邊一半無邊也意取行陰空寂為無邊際之勝性矣由此計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論由此四種計度或無邊或有邊總落外道迷菩提性以菩提性中無分位無邊際故也是則名為第四外道立有邊論行陰將開而妄計墮此可惜也已此在邪見中攝也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死婆沙論外道計天常住名為不死不亂答者得生彼天故有問時答言祕密言辭不應皆説或不定答也矯亂執拗而不順理為矯心無主正為亂今詳第一第四言皆兩可亂意為多而終非順理亦兼於矯第二第三言惟一偏矯意為多而終非主正同歸於亂也遍計虗論四種屬於遍計執故曰遍計虗謂虗妄非實也執繩為蛇妄之至也此明第五矯亂虗論也又三摩中諸善男子當想消行現之時據彼定中所知所見而生倒計者是人墜入四種顛倒不死矯亂遍計虗論蓋前計常與無常邊與無邊尚未至混殽此則亦常亦無常亦邊亦無邊一向矯亂此顛倒之尤者也一者是人觀變化元是遷流處名之為變見相續處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處凡言相續必是前後相續中間亦必有缺乏之處如出入二息缺於中交缺少即減也名之為減各各生處名之為有互互亡處即各各滅也名之為無以理都觀用心別見都觀者以觀行陰也別見者別生八義也有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減答中略舉六義皆兩楹而答也於一切時皆亂其語令彼前人即問義之人遺失章句何謂四種矯亂一者是人觀變化之元就上遷流有邊處名之為變中間相續無邊處名之為恆非隨緣不變之旨也以八萬劫內所見處名之為生八萬劫外不見處名之為滅非果生因滅之旨也相續不斷處名之為增中間所離處名之為減非不增不減之旨也各各生處名之為有各各滅處名之為無非有無俱遣之旨也以理總觀行陰而用心分別八義若有求法人來問義於我即以兩楹之説而混答之生滅不定有無不定增減不定時時錯亂其語令彼問義之人遺失章句或因其矯亂而自難憶持故隨聞隨失或因其是非不決而翻疑平日舊習經論喪其所守皆遺失也此一種亂多於矯也二者是人諦觀其心互互無處因無得證有人來問惟答一字但言其無除無之餘無所言説二者是人在無處觀心即從無處有箇入路便執一切法皆無逢人來問唯一字無以答之而無之外別無所説此一種矯多於亂也要識得趙州無字所以不同於此者在何處便識得邪正之分矣三者是人諦觀其心各各有處因有得證有人來問惟答一字但言其是玩經文與上節一例如何是字不同若強解是字畢竟不通固知當是有字之誤矣除是之餘無所言説三者是人在有處觀心即從有處得箇入路便執一切法皆有逢人來問惟一字有以答之而有之外別無所説此一種亦矯多於亂也要知若是真實得底人道有道無總有出身活路四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不即字之誤是亦有一切矯亂無容窮詰四者是人既見其各各有又見其互互無所見之境枝岐能見之心惑亂故逢問即答云亦有即是亦無如冰即是水也亦無即是亦有如水即是冰也知見紛錯杳冥恍忽中無定衡故總歸矯亂而不可容其窮詰矣此一種又亂多於矯也由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂遍計虗論行陰將開者慎毋妄見而墮此也此四種邪見中攝也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流即行陰也生計度者是人墜入死後有相發心顛倒此明第六計後際有相也又三摩中諸善男子當想盡行現之時於無盡流之行陰妄生計度見行陰有相併前已滅三陰皆成有相是人則墜入外道死後有相發心顛倒若真悟無生了知初生本即有滅則生前尚空洞而無相何況死後豈可妄計有相耶或自固身云色是我或見我圓含遍國土云我有色或彼前緣目前之色也隨我回復運用也云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相何謂死後有相行人或自堅持護養其身云色乃是我或見我性圓能遍含國土我大色小而云我有色或見彼目前之色隨我運用云色乃屬我或復我依行中相續行中即是色中色大我小而云我在色以現在之生有推未來之死有妄生計度死後有相色陰既爾三陰亦然以四推之則循環有十六相此即六十二見中之四見也從此或計畢竟煩惱畢竟菩提兩性並驅各不根觸觸猶礙也又從此轉計畢竟煩惱一切染法畢竟菩提一切淨法既四陰是常則知煩惱菩提二性並行各不相礙故凡則決定凡聖則決定聖決無轉凡成聖轉煩惱成菩提之事總為執定有相故認確死常如此亦迷於不變隨緣之旨矣由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中通結五陰止在前四雖在前四義惟行陰耳死後有相心顛倒論行陰將開者慎毋妄計而墮此也此亦邊見中攝也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒此明第七計後際無相也又三摩中諸善男子當想消行現之時於前所除滅三陰中生計度者是人則墜入外道死後無相發心顛倒此與上計敵體相翻故變有成無蓋上覩未滅之行陰見其無盡而因計前三併萬法皆當無盡此睹已滅之前三見其無相而因計行陰并萬法皆當無相也見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性消散謂色受想滅也縱有生理指行陰也而無受想與草木同謂無受想則行亦滅也此質通指四陰現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相何謂死後無相色為形想為心而受則雙以連持色心是人見其色滅則形無所因矣觀其想滅則心無所繫矣知其受滅則無復連綴矣三陰消滅如此縱有行陰微細生理而既無色受想則亦與草木同其無知而俱歸斷滅矣此以斷而推斷也且此四陰之質現在生前者尚無相之可得云何死後更有諸相耶此因生而推死也因之推勘比校死後相無如是循環有八無相每陰各計現未二無四陰故成八無相矣問此與前解中初生有滅等意何以別乎答彼約即有而空木自無生前後一際是佛正教此約昔有今無今滅後無全是生滅顛倒邪計何殊天壤哉從此或計涅槃因果一切皆空徒有名字究竟斷滅又從此轉計涅槃因果皆依現陰而修後陰而證陰既叵測修證何有故涅槃因果皆空且因果攝世間法涅槃攝出世間法涅槃因果空則一切諸法皆空徒有名字而究歸斷滅上因三陰而推行陰同滅此因四陰而轉計諸法皆同滅也由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論行陰將開者慎毋妄計而墮此也此亦邊見中攝也通前計有觀之豈知菩提性中不立一塵不捨一法真空妙有妙有真空非不斷滅亦非斷滅也哉又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論此第八雙計有無俱非也又三摩中諸善男子當想盡行現之時於行存中見行陰未滅區宇宛在兼受想滅見前三已滅體相全空於是雙計有無於存計有於滅計無自體相破以行陰之有破前三之無以前三之無破行陰之有破無則成非無破有則成非有是人墜入外道死後俱非起顛倒論受色想中見有非有行遷流內觀無不無曷言乎自體相破也是人於色受想中正在滅境時見行陰雖有亦同於滅而非有如暗使中看皎潔之物亦同暗而非皎潔矣於行遷流內正在擾動處觀前三雖無亦同於動而非無如動水中看靜定之影亦同動而非靜定矣互破以成雙非正自體相破也如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相如是循環歷四陰而遍計之每於一陰計此二非合四陰而成八俱非相於是隨得一緣皆成雙非非無故言死後有相非有故言死後無相此但窮盡四陰而已又計諸行性遷訛故心發通悟有無俱非虗實失措遷流也訛變也又從正計八非而轉計之謂萬法無不皆然其性遷訛例皆死後有無交相破奪也於是心發通悟而增廣邪見邪解其究歸於有無俱非虗實失措何嘗有一定哉由此計度死後皆非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論由此計度以生存例死後而謂死後俱非盡未來際杳冥恍忽道有不得道無不得而皆不可道職此之故墮邪覺而迷正性是則名為第八外道立五陰中死後俱非心顛倒論也良以未得真知灼見揣摩倣佛而創為此論若真得見諦者不妨道有道無皆成妙論矣此亦在邪見中攝也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論此明第九計七際斷滅也又三摩中諸善男子當想盡行現之時見行陰念念滅處名後後無於此妄計設生人天七處後皆斷滅是人則墜入外道七斷滅論此之斷滅雖似第七無相而起計不同彼計現在無故死後亦無此單計死後斷滅為無耳或計身滅欲界人天或欲盡滅初禪或苦盡滅二禪或極樂滅三禪或樂捨滅四禪及四空如是循環窮盡七際現前消滅滅已無復何謂七斷滅論是人計此陰性如無源之水有流近而竭者有流遠而竭者至近如人間即滅至遠如有頂方滅故自身滅以至極捨滅如是循環窮盡四洲六欲初禪二禪三禪四禪四空之七處現前終歸消滅滅後必不復生則止有現陰而中陰與後陰全無矣此方儒宗末流惡聞輪轉之説亦是計此然但計人間即滅仍不許有六處也由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論豈知菩提真性亘古亘今常住不斷也哉此亦邊見中攝也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論此明第十計五涅槃也又三摩中諸善男子當想盡行現之時於行陰念念生處名後後有而起計度者蓋觀見行陰念念相續新新成有故計其當有實果必不滅無是人則墜入外道五涅槃論五涅槃者不待灰斷即於現所生處計此是果其數有五也此計與第六有相大不相同彼計死後有相此計現所生處即常住極果舊言從彼流出甚無謂也或或者不定之詞顯非一人遍計五處各隨所見各計一處而已以欲界如仙家計玉皇橫統三十三天為玄都上清之境無生無死不知此即六欲之帝釋也為正轉依轉生死依涅槃故曰正轉依觀見圓明生愛慕故或以初禪性無憂故初禪苦惱不逼今曰無憂誤錯下苦字耳按二句中間皆當有為正轉依四字而經家省文也或以二禪心無苦故二禪憂懸不逼今曰無苦亦錯上憂字也或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟何謂五涅槃論或以六欲天上為真涅槃境謂可轉生死而依之以彼初得天眼普觀天光圓滿明麗超過日月心生愛慕故計此處是現涅槃也或以初禪為正轉依以初禪苦惱不能逼故或以二禪為正轉依以二禪憂懸不能逼故或以三禪為正轉依以三禪歡喜畢具故或以四禪為正轉依以四禪苦樂雙捨三災不壞不受輪回生滅故凡此皆有漏天也迷有漏為無為妄計為離繫自在之果此誤濫涅槃之真我也以稍離下界之不安遂計五處為安隱此誤濫涅槃之真樂也以稍離下界之濁穢遂計五處為勝淨依此誤濫涅槃之真淨也如是循環妄計惟此五處為究竟極果此誤濫涅槃之真常也於無常苦空無我不淨中而妄計常樂我淨其顛倒為何如哉由此計度五現涅槃以現在受樂不待來生故墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論豈知菩提涅槃尚在遙遠也哉此亦邪見中攝也通論十種不出斷常空有四字而已前五屬斷常後五屬空有第一斷見第二常見第三雙亦第四第五推廣雙亦第六執有第七執空第八雙非第九推廣畢竟斷空第十推廣畢竟滯有若更以空有攝入斷常仍惟斷常二見而已阿難如是十種禪那狂解前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深孽凡見道不真多岐妄計皆即狂解是謂心魔最宜深防也皆是行陰用心交互故現斯悟即邪解也衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末流遍令衆生覺了斯義無令心魔自起深孽保持覆護消息邪見教其身心開覺真義於無上道不遭枝岐木旁出曰枝路旁出曰岐勿令心祈得少為足作大覺王清淨標指此結勸覆護也阿難來是十種禪那狂解皆是行陰與用心交攻互戰故現斯邪悟衆生頑焉而正悟難發迷焉而邪解易生又不揣己之修證至何地位逢此心魔現前以迷為解輒敢自專判決立論且僭稱聖位成大妄語墮極重獄汝等必須將如來今日之語傳示於我滅之後遍令末法衆生覺了斯義而迷解分明無令自心之魔自作其孽於以保持覆護正法而消除滅息邪見焉凡若此者乃教其身心開覺真實了義逈然不屬於斷常空有然後於無上道直修直證不遭枝岐蓋遭枝岐即墮外道矣又勿令心之所求得少為足而以偃鼠鷦鷯之見自限蓋求少足即落二乘矣此二者皆極果中途之險阻心目洞開不為所惑乃堪為衆生作成佛之標指也教示之責汝其勉哉要知心正事正心邪事邪若未達一心觸途皆偽正行亦成邪行佛門變作魔門若了一心則無往不利邪行亦成妙行邪宗即是正宗即如五熱炙身外道一法若了之則勝熱為無分別智𦦨之門若昧之則尼乾作大邪見嚴熾之解是以法無邪正道在變通也賀云十種狂解皆是誤認行陰為妙真如性故有此異見耳第一無因論誤認精覺妙明非因非緣也第二第三遍常及一分常論誤認湛然常住也第四邊無邊論誤認清淨本然周遍法界也後六種誤認如來藏遂生空有二見如第七死後無及第九斷滅俱誤認空如來藏也第六死後有及第十現涅槃俱誤認不空如來藏也第五矯亂及第八死後俱非論乃誤認如來藏離一切相即一切法也先德云佛法中誤了多少人豈不然與阿難彼善男子修三摩地行陰盡者諸世間性幽清擾動同分生機即同生基也基表生之根機明動之始其意一也倐然隳裂沉細綱紐亦指行陰言幽隱深微故曰沉細生滅總要故曰綱紐補特伽羅此云數取趣即中有身也酬業深脈感應即因果也懸絶於涅槃天將大明悟如雞後鳴涅槃性天為五陰所覆昏如長夜每一陰現如雞一鳴故色陰現如雞初鳴受陰現如雞二鳴至識陰現則如雞後鳴矣顧瞻東方已有精色六根虗靜無復馳逸按圓通此當聞所聞盡已得六消之時內外湛明入無所入深達十方十二種類受命元由所謂各命由緒即識陰也顯異前之總相故曰深達觀由執元諸類不召於十方界已獲其同界指情界同有二解一同者一也言其消六和合復一精明也一同者空也言其根塵既盡惟一空性也此即已得六消猶亡未一小乘涅槃正齊於此精色不沉發現幽祕精色不沉者如曉天可辨色也發現幽祕者如具見暗中之物也此是行除識現如脫盡外衣方見最內貼體汗衫也此則名為識陰區宇若於羣召即指類生十二皆能牽引受生故曰羣召已獲同中消磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃寶石青色甚堅一切寶刀皆不能壞惟鬼神有神通力者能攻之為器也內外明徹名識陰盡行盡者在七信位齊小羅漢識盡乃十信滿心住位初心方以證入圓通是知凡言羅漢獲圓通者皆指初住以圓住齊於別地是大乘羅漢也是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本此總敘識陰始終之相也阿難彼善男子修三摩地者由前堅凝正心十計不墮功夫徹至行陰自有盡時行盡則凡諸世間異生之性所謂幽清動擾而為同生基者忽然隳裂其沉細綱紐舉結縛之深根一旦解散如冰裂為水綱紐既裂則三界諸趣受生償業之深脈此感而彼應者皆懸遠隔絶矣由分段生死既絶而涅槃性天將大明悟如雞亂叫而天將曉起視東方曙色已微露也前者行陰未盡六根尚爾馳逸今行陰既盡無復遷流則六根始得虗靜不復馳逸於是內根外塵化為一味湛明之境而內不見有能入之根外不見有所入之塵矣根塵既消業識始露深達十二類生各各受命元由非復前之未通各命由緒也既觀其由復能執守受生元本故十二類中不能牽召其受生至此則斷異生性障證遍行真如於十方情界已獲其同矣然此才是初見佛境界如見東方曉色方萌已能發現幽祕中物但所見佛境如黎明時觀物非若大明當空無不洞徹以有一層識陰區局而宇覆之故名識陰區宇此識陰未盡之相也若於羣類既不能召十方又獲其同之中更用金剛智力消磨六門使其分者合壅者開皆得成就則見聞等六根如鄰之相通可以互用眼家能作耳家佛事餘四六然逈脫根塵清淨無礙而世界身心內外明徹如吠琉璃成一圓融清淨寶覺非復發現幽祕之比是識陰已盡之相也夫受命之濁本乎識陰識陰已盡則連持色心不斷者亦已斷盡故是人得超命濁至此方見受命之元皆是罔象虗無恍忽不真總名顛倒妄想者以為此識陰之本也識陰既本於罔象虗無其可誤認之而起下十種之執哉通議云身心世界皆識體所變今觀歸識性故云已獲其同蓮師云開合成就古解根合而不分界開而不隔義猶未盡愚謂合者根門雖行布成六而六處未嘗不一返流歸源喻如鉼鐶叉釧元是一金也開者六根雖圓融成一而一處未嘗不六從體起用門門相通喻如一金而各成鉼鐶叉釧也開合自在名為成就然下節方在識中何亦曰根隔合開乎蓋止曰合開不曰成就猶乍合乍分乍開乍隔不得互用故第六節亦但互用中得隨順而已阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓既空行陰是已滅生滅也尚依識元是寂滅未圓也識陰即首卷所謂見精明元也蓋阿賴耶識已切近妙真如性但尚有二種同別妄見故曰未圓耳此第一因所因執也行陰即是前楹識陰即是後楹而十執起處正當此二之中故十執皆以此科冠之也阿難當知是修定善男子既已研窮照見行蘊是空行空而識現則前之行相泯然沒入於識海之中蓋元從識海騰躍而生者自然反本還元是則已滅清擾之生滅超出分段生死而變異生死尚在於末後之寂滅不帶纖毫生滅之精惟餘一味寂常之妙者猶未圓滿此正識陰未破尚為所覆之象也能令己身根隔合開亦與十方諸類通覺覺知通吻能入圓元大凡起執必睹大定中殊勝之相以發端今行空識現者能令己身之六根隔者合之合者開之則六根近於互用矣又與十方諸類之有通覺者其覺知通同吻合如千燈共室光通無二則內外幾於明徹矣用能入於圓焉而諸類遍含入於元焉而萬化託始蓋四陰蕩盡歸宿於斯如諸浪已停消落於海斯非殊勝之相乎然未離乎識陰區宇也若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅此云黃頭外道所歸冥諦冥諦者從冥生覺從覺生我知從我知生五唯量從五唯量生五大從五大生十一根中間二十三法皆以神我為主謂諸法從冥諦生而神我即受用此諸法者也成其伴侶迷佛菩提亡失知見因所因者妄立一因以為所因之地也蓋真因非所有所皆妄耳夫入於圓元固得其所歸乎然而終非真常也良以識乃無明幻影罔象虗無畢竟非實如人夢見依歸得托之地妄生慶幸豈有真實哉行人當此更用金剛智力消磨前去可也若便於所歸之中立真常因生勝妙解而不求更進是人則墮因所因執因者依也本非可依而妄計能依之心所依之境也既墮此執則黃頭外道立冥諦而歸冥諦者為其同類之伴侶而迷佛菩提不知正果亡失知見不知正因矣是名第一立所得心成所歸果違遠圓通背涅槃城生外道種夫如是是名第一立有所得心成有所歸果向焉根隔合開圓通將近今則圓者偏而通者隔反違遠矣向焉於涅槃天將大明悟今則背涅槃城而不見矣向焉覺心欲發將為佛子今則反生外道種而斷佛種性矣豈知圓滿菩提究竟歸無所得也哉賀云此誤認獲本妙心常住不滅也阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸上科已將識陰作所歸果故今所歸二字仍躡前識陰也覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅色頂魔王現無邊身成其伴侶迷佛菩提亡失知見是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種西域第十五外道説三界中所有一切情無情物皆是摩醯首羅天生摩醯首羅者虗空是頭大地是身水是溺山是糞一切衆生是腹中蟲風是氣火是暖與此方所言盤古生天地者略同也此第二計能非能執也阿難又善男子於行空識現之時若於所歸之識陰前但計為歸托之性者今復覽為自體而謂一切衆生皆從我體流出遂生勝妙之解執我能生彼彼不能自生是人則墮能非能執正與摩醯首羅能現無邊衆生身遂謂一切衆生皆我生出者同一種類故首羅為其伴侶由此迷佛菩提亡失知見如窺見海內生漚而不知己身尚未離漚也是名第二立我能作為心成我能辦事果違圓通背涅槃生摩醯大慢之天輕慢一切皆自我生而成我遍我圓之種矣豈知圓滿菩提自然造化生心也哉上計所此計能賀云此誤認十方唯識及識性流出無量如來等也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種此第三計常非常執也又善男子當行空識現之時若於所歸識陰既喜有所歸依遂自疑我之身心乃從彼中流出即十方世界亦從彼中生起計此生起流出之處即是真無生之體此則在生滅中早計常住既惑真不生性又迷現生滅法住沉迷而生勝解以非常為常是人則墮常非常執既計彼能生我即與計自在天能生一切者同故計自在天為其伴侶良以自在亦非常之天外道不知遂執此為生天生地之本如此方太極生兩儀是也由此迷佛菩提亡失知見是名第三立因依心成妄計果謂依識元妄計常住也違圓通背涅槃而生倒圓種謂前計我圓生物此計彼圓生我故曰顛倒也豈知圓滿菩提方許説萬法唯識也哉此與上執皆從識起而所計不同上謂識即是我能生萬物此謂我從識出彼是真常是其差別也問萬法唯識是如來説云何此中皆墮外種答內教萬法唯識從緣變起悉如夢幻不是實生故不立知見不生法執今曰立所得心立能為心立因依心皆是知見立知又唯識正明無識外之法此計識能生他法宛是顛倒安得混同也賀云此誤認色身外洎山河虗空大地咸是妙明真心中物也與第一種相似但彼以識元為所歸此復以所歸為能生耳又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知即所歸之知亦識陰也知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執計無情有知而實本無知故曰知無知執也婆叱霰尼二外道執一切覺覺即知也成其伴侶迷佛菩提亡失知見是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種此第四計知無知也又善男子當行空識現之時若於所觀識陰見其知性無處不遍無境不圓故因此遍圓之知而妄立見解謂一切法由知變起知無異法亦無異則草木之無情亦可稱為有情人之有情亦何異於無情草木可以為人人死還成草木不擇有情無情而遍皆有知於此生勝解者是人則墮入知無知執婆吒霰尼執一切有知者成其伴侶迷菩提而失知見是名第四外道計圓知以為因心則果終虗謬無成徒遠圓通背涅槃而生此倒知之種類矣以無知為知故名倒知也豈知圓滿菩提則十方世界應念化成無上知覺也哉問觀國師有情與無情共一體之説忠國師有無情作佛之談與此有何差別答內教謂由迷真如而成業識從業識而起相見二分遂分有情無情各自安立既悟之後則轉業識而成真如故有情無情同一圓融清淨寶覺通為一佛國土謂之法性身法性土全身是土全土是身豈復有草樹為人人為草樹種種差別是知內教所説無情説法是説破識之後渾成一心時也此則業識尚在相見猶存未能融為一體是妄計也問前文草木金石皆能作妖為孽豈非有情乎答此是依草附木之精靈有知非草木元有知也曰若老楓化為羽人朽麥化為蝴蝶此自無情而之有情賢女化為貞石山蚯化為百合此自有情而之無情則又何謂答此偶有所感而化也非老楓朽麥元有情亦非賢女山蚯元無情也今之未破識陰而妄言天地同根萬物一體者皆婆吒霰尼之儔也昔晦堂老人與夏倚公立論道至會萬法為自己及情與無情共一體時有一犬臥香案下以壓尺擊犬又擊香案曰犬有情便去香案無情自住情與無情何得便成一體去夏不能答堂云才入思惟便成剩法何曾會萬法為自己也耶賀云此誤認浮塵及器世間諸變化相應念化成無上知覺也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融根互用中中之一字足見互用之妙含之未發也已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵塵即地大成就能成器界及凡有形塊者皆塵所為耳各各崇事以此羣塵即四大也發於本因發者出生也作者辦造也本因根元也邪計四大為出生一切辦造一切之根元也立常住解是人則墮生無生執妄計能生萬法而實不能生也諸迦葉波別姓也并婆羅門總姓也勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種顛倒化理此第五計生無生也又善男子當行空識現之時彼識陰盡者消磨六門諸根互用今雖未得互用而於圓融根互用中已得隨心順意於十八禪變如身上出水身下出火之類凡阿羅漢皆有神通變化是也然亦才得隨順而已互用之妙尚含而未發也行人便於隨順中圓化種種起著妄謂一切變化皆從四大發生於是背自己之性火光明而求火光明背自己之性水清淨而樂水清淨背自己之性風周流而愛風周流背自己之性地無法不生而獨觀地大為能成就萬物於是事水事火事風事地各各崇事以此四大為發生造作之本根遂立此四大為司物之真宰而常住不壞妄計能生萬物而實不能生是人則墮生無生執諸迦葉波并婆羅門勤苦身心以事水火而求出生死者來為伴侶迷惑正果亡失正因是名第五計著邪惑崇事邪業迷靈覺之心從四大之物非因計因而立妄求因無果望果而求妄冀果圓通日遠涅槃明背而生顛倒化理之種類也豈知心為化元識是化種四大為所生所化而實非能生能化者哉賀云此誤認七大皆如來藏妙真如性也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明即識陰也計明中虗非毀也滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中略舉非非想以該四空非取四禪無想也諸舜若多空神成其伴侶迷佛菩提亡失知見是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種此第六計歸無歸也又善男子當行空識現之時若於識陰圓明遂計明中罔象虗無之體為畢竟空性於是毀滅羣化便欲灰身滅土纖塵不立謂永滅可依以此永滅依為所歸休之地生勝妙解者是人則墮歸無歸執良以永滅空亦是幻境非實歸處也由此四空天中諸趣空天衆為其伴侶迷菩提失知見是名第六以罔象虗無為因以斷滅空亡為果違圓通背涅槃而生斷滅種也豈知圓滿菩提自然真空妙有也哉問此與後二乘何別答棄有取空見解皆同但先心各別此凡外種伏惑取空彼聖性種斷惑取空也此方儒者駁佛動曰空亡曰斷滅矣豈知斷滅空亡先佛訶為魔種又何待儒氏之譏切耶賀云此誤認空與三有一切本無也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓常歷觀上來於此一境稱圓元圓融圓明圓常義各有表元表諸法統歸融表萬化含畜明表徹體虗朗常表究竟堅牢各與本文關涉細尋可見然同是識海周遍故皆稱圓且均是識陰相似之相行人不達似而非真故各隨所見而起異計異執耳固身常住同於精精即性也如見性轉稱見精之類圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見是名第七執著命元立固妄因趣長勞應作牢果違遠圓通背涅槃城生妄延種此第七計貪非貪也又善男子當行空識現之時若於識陰圓常見性常而并欲命常遂欲堅固其身使之常住世間同於性之圓常而常不傾逝如仙家性命雙修形神俱妙之類於此生勝妙之解妄起貪著留形世間不知此身如芭蕉電露本不可貪以為常也不可貪而貪故是人則隨貪非貪執貪求長命故諸無比仙人求長命者成其伴侶迷佛菩提亡失知見是名第七執識陰為長命之元立堅固妄因趣長牢妄果違圓通背涅槃而生妄想延長之種矣豈知法身是亘古亘今不毀不壞之體也哉外書云造化勞我以生逸我以老息我以死故長勞勞字亦不必以牢字換之也長命本無足貪況所托之性但唯識陰已是似常而非真常所兼之命全是生滅虗幻縱經多劫終落空亡豈真實常住哉昔洞賓參黃龍龍曰饒你八萬劫是箇守尸鬼洞賓大悟有槭瓢碎琴之偈嗟乎阿思陀仙之古者為佛訶斥如此今之提罐子講房術者不又斯陀之罪人哉而士大夫惑而不悟亦足哀矣又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通識壽暖三連持不斷者為命今以識陰為主是識陰互通一切命也却留塵勞恐其消盡便於此際坐蓮華宮廣化七珍多增寶媛恣縱其心生勝解者是人則墮真無真執叱枳迦羅欲頂自有天類成其伴侶迷佛菩提亡失知見是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種此第八計真無真也又善男子當行空識現之時既以識為命元觀此命以連持色心為名而塵勞不出運心役色是則命元本與塵勞連持則存與俱存亡與俱亡故懼塵勞盡而命元必斷由是妄起留塵之計不令消盡又乘此行盡識現之際圓化隨心故恣意化諸欲境七珍美女於中放逸反生勝解以為大菩薩行事豈若菩薩真見命元人塵勞而度生也由彼妄計此是真菩薩行而不知非真故墮真無真執而欲頂自在天能化欲境以自娛樂者為其伴侶而正果正因俱迷失矣是名第八發邪思因立熾塵果夫始求圓通乃云緣思淨盡為因今反以邪思縱恣為因是違遠圓通也始求涅槃乃以纖塵不立為果今反以塵勞熾盛為果是背涅槃城也方以類聚其生天魔種也必矣豈知識陰若盡圓滿菩提固不妨淫房酒肆尋彌勒柳巷華街覓普賢也哉昔頭藍弗以世俗智伏下地惑得非想定具五神通時君尊敬迎以入宮宮中女子接足而禮藍弗觸女子手遂生貪愛便失神通故曰才生一念欲便失五通神豈有邪思熾塵而不退墮者乎若羅什娶妻三車縱欲其所造莫測又不可例論也又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中猶言命光即識陰也分別精粗流決真偽因果相酬惟求感應修道為因曰感證滅為果曰應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種賀云前八皆誤入岐路此二則止息化城此第九計定性聲聞也又善男子當行空識現之時因窮識陰深明衆生受命元由於命明中見此識既含藏漏無漏種即於此分別決擇苦集種子是有漏是粗是偽滅道種子是無漏是精是真雙明二種因果尅定相酬惟求執因之感以招果之應實修實證但要速出生死而不順無修之修無證之證是為背清淨道於所謂見苦斷集證滅修道者一居寂滅即便休息於諸菩薩遊戲神通淨佛國土不生好樂所以戀住化城不趣寶所於此中生勝解者是人則墮定性聲聞不回心鈍阿羅漢諸無聞僧愚法聲聞未證謂證未得謂得者為其伴侶於佛菩提亦竟迷也於正知見亦亡失也是名第九滿其專精求應之因心成其遍趣冥寂之斷果此有餘涅槃僅齊七信識陰所覆尚不達圓通因地安能至無餘果地哉吾見其為空所縛祗生纏空種類而已矣是雖未即真魔也約其沾著法執處實與衆魔無異矣又善男子窮諸性空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫緣覺獨覺之同倫也不回心者成其伴侶迷佛菩提亡失知見是名第十圓覺吻心圓即圓融覺即覺明吻心即清淨成湛明果違遠圓通背涅槃城生覺圓明不化圓種不能融化透過所悟徒執空淨圓影祖家所謂隱人胸次自成情也此第十計定性辟支也又善男子當行空識現之時若於消六入一之圓融破有歸空之清淨了見命元之覺明而發研深妙獨覺則觀物變易發深妙之悟緣覺則觀十二因緣發深妙之悟即於發深妙處立為涅槃歸休之地堅執不捨滯在圓明一路不趣寶所所謂水澄月滿道人愁也於此而生勝解是人則墮定性辟支比之聲聞稍勝一步諸緣覺獨覺之同倫不回心趣大乘者為其伴侶於佛菩提亦竟迷也於正知見亦亡失也是名第十以其圓融覺明清淨之心成其發研深妙之果其所謂圓覺者亦但吻合而已實去圓通遠矣其所謂湛明者亦但悟境而已實背涅槃多矣是雖有覺圓明而不能融化透過所悟豈若菩薩之常覺不住哉故生不化圓種也雖未即真魔也約其沾著法執實與衆魔無異矣昔有僧問曹山朗月當空時何如山云猶是階下漢僧云請師接上階出云月落後相見問聲聞辟支皆是出世聖人何故亦列魔數答此經以圓通為宗略有纖毫沾滯便是違背圓通墮之者則枝岐鈍置害正事均非魔而何然以定性簡之是但取其不回心者若肯回心便名大阿羅漢不墮斯類矣阿難如是十種禪那中途成狂前八居多因依迷惑因迷而起依迷而住故曰因依於未足中生滿足證後二居多皆是識陰用心交互故生斯位衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終七是外道八是邪魔墮無間獄聲聞緣覺不成增進汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔分別曰見前七純是見第八是見愛至於二乘界內見愛雖盡而法愛尚存總屬分別見妄也自作沉孽保綏哀救消息邪緣令其身心入佛知見從始成就不遭岐路此總結囑護也阿難如是十種禪那或中途成狂如前八種或因依迷惑於未足中生滿足證如後二種皆是識陰區宇與行人用心交攻互戰故生斯位衆生頑迷不自忖量己之所造何如逢此現前各以無始來墮貪愛境所薰習氣因境打動發其痼疾自迷其心自畫不進妄謂究竟極證而大妄語成其在外道邪魔如前八種所感邪業既終墮無間獄其在聲聞緣覺雖能斷惑取證但惟永閉化城不達寶所不成增進亦歸墮落矣汝等既已存如來大悲之心秉如來二利之道是必將此辨魔法門於我滅後傳示末世普令衆生咸知此辨魔之義無令見魔各隨所墮自作深孽於以保而安之哀而救之消磨息滅此等邪緣令其障盡理現於佛知佛見自然證入而從始至終更無諸委曲相而不遭岐路矣傳示之責汝其勉哉初卷云皆由不知常住真心用諸妄想至此則知妄想即是五陰若此五陰妄想有一毫不盡不能得入佛知佛見若破除五陰方得真無生法忍譬如髯公五關斬將方能得見真主也以上五種見解並是迷宗失旨背湛乖真揑目生華迷頭認影若敲冰索火緣木求魚畏影逃虗捫空捉電苦非甘種砂豈飯因皆不能以法性融通一旨和會盡迷方便悉入見纏不達正宗皆投見網所以天魔外道本無其種修行失念遂派其原故知但有所重所依立知立解絲毫見處不忘皆成外道故華嚴云見在即凡情亡即佛祖師云不用求真唯須息安是以悟宗之士尚不得無見無解豈可更隨言執意而起有見有解乎如是法門先過去世恆沙劫中微塵如來乘此心開得無上道此又通結五陰而此顯諸佛共證也夫如是五陰中辨魔法門非獨今日莫能外也乃從先過去世無數劫中無數如來乘此心開得無上道第於一陰未開之時要須依此法門以辨別之不為十種魔境所惑方得一陰破除從色至識無不皆然乘此陰破入住可以超證極果矣諸佛先證如此識陰若盡單舉識盡者將齊此以明超證則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地於地而特言所行者意表入地乃真修聖位耳等覺圓明於等覺而復言圓明者見始終惟此一心但至等覺則發化之極也入於如來妙莊嚴海圓滿菩提歸無所得賀云從前五十種邪境總為有所得故此明入住菩薩亦不外此法門也夫諸佛既爾菩薩可知菩薩用此辨魔法門歷破五陰至於識陰若盡則汝現前諸根互用每一根中皆具五根之用此正初住圓通位也從初住位中便能一超直入等覺後心特其圓明精心於初住等覺兩楹之中發化諸位亦自歷歷不昧耳正如淨琉璃內含寶月琉璃可譬圓明精心而含月可譬發化諸位也試即發化諸位而確指之識陰既破正信滿入住之初如是乃超越滿過之十信以及十住十行十回向四加行心菩薩所行金剛十地等覺圓明皆是一超直過中間更不取證如飛隼上山本最迅疾然自下歷上亦自徹見階級也由此入於如來妙莊嚴海是福究竟圓滿菩提是智究竟歸無所得是理究竟福即解脫智即般若理即法身不縱不橫三德祕藏於茲具顯至此而所謂金剛乾慧者既已底於妙覺矣然皆自識盡入住中來何莫而非用此辨魔法門乎按圓宗只有二位一斷前通惑從觀行位一超直入初住中間更不取證二斷後別惑從初住位一超直至等覺中間亦不取證非若別教一位必經多劫漸斷漸證直待滿三祇劫因圓果滿方證菩提也而佛於圓家仍列多位者有二意一者為引漸機令欣從圓頓也二者見佛眼明極能於至迅速中詳見詳晣也此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔消滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶此言先佛授受心法以示行人也夫此辨魔法門豈自我創始哉乃是過去古佛世尊在止觀中用始覺智觀察魔事歷歷分明故立此五重使人隨陰檢察免受其害耳然害定雖由諸魔而致魔實因心垢汝能依此明誨則當魔境現前便能諳其根腳識其名色良以自家所愛先習迷心而為心垢者洗除淨盡主人既正不怕客邪自然不落邪見如是則心見兩魔稱為陰魔者早已消滅絶根何況外魔焉敢留難是以天魔及鬼神精魅悉摧心喪魄而逃逝不復更出也出天魔等逃逝則破前三陰者自初因以至無上智果圓滿菩提略無缺乏矣由陰魔消滅則破後二陰者小乘下劣皆得增進直至如來大涅槃海亦不迷悶矣向非先佛分析微細立此法門安能直修直證利有攸往如是哉若諸末世愚鈍衆生未識禪那不知説法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動汝當恭欽十方如來究竟修進最後垂範此轉令勸人持呪也夫利根之人依法辨魔一超直入更無留難矣若諸末世愚鈍衆生既不識禪那而明悟處少又不知説法而多聞性缺而心復好樂直修反聞大定汝恐落於邪見將何以保護之惟勸彼專心一意持我佛頂陀羅尼呪若誦亦不能則寫於禪堂或帶於身上一切諸魔自不能擾蓋此呪心是至尊至勝第一法門有不可思議之力也十方如來所以垂範修進者無以復加矣合而言之論自利之智則究竟之修進非中路化城之止息也論利他之悲則最後之垂範非始教不了之權義也汝可不敬承以利己利他哉最後有二義若約當經則此魔事在末後宣揚若約一大時教則此經在法華已後宣説也無問自説五陰魔境已竟阿難即從座起此句疑在下聞佛示誨此句疑在上頂禮欽奉憶持無失於大衆中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併消除為次第盡如是五重詣何為界惟願如來發宣大慈為此大衆清明心目以為末世一切衆生作將來眼此復問五陰所以名妄想也阿難聞佛示誨頂禮欽奉憶持無失於大衆中即從座起重復白佛云世尊尋常但説此五陰法皆是仗因托緣而生曾未説此五陰皆本妄想生起如色名堅固妄想受名虗明妄想等我等今日雖一往聞此微細開示然不知此五種陰何故通名妄想既此五陰總名妄想今日若欲剗除為當一時併盡為復次第漸除若欲斷除至於何處方得盡其邊際更願大慈無倦重為發宣為此現前大衆清明心目使不致迷眩兼為末世衆生作將來眼使有所尊循焉可也鍾云歷觀五陰種種邪魔皆生於各陰將盡未盡交界處所謂邊際也處最宜著眼佛告阿難精真妙明本覺圓淨非留死生根身正報及諸塵垢器界依報乃至虗空皆因妄想之所生起斯元當是緣字本覺妙明精真妄以發生諸器世間如演若多迷頭認影妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是衆生妄心計度阿難知妄所起説妄因緣若妄元無説妄因緣元無所有何況不知推自然者是故如來與汝發明五陰本因同是妄想此總示五陰皆以妄想為本也佛告阿難我説五陰皆本妄想者豈無其故哉原夫精真妙明本覺之體本來圓滿本來清淨纖毫不著一物不留若夫有生有死之根身為塵為垢之器界乃至虗空皆因妄想之所生起死生即界內分段受想行之三陰也塵垢即界外涅槃識陰也虗空即色陰也取要言之但是本覺中元無五陰皆因五種妄想次第生起而已所以然者斯緣本覺妙明精真本來圓淨由妄想發生諸器世間正如演若多妙自己之頭而認鏡中之影真本有而妄迷如失如演若頭本在而妄驚其失也妄本空而誤迷為有如演若影非實而錯認為真也夫五陰既從妄生則本無因矣汝等尋常但知五陰從因緣生迷無因之妄想立有因之因緣又迷有因之因緣而立無因之自然二計不忘則五陰牢不可破矣豈知彼虗空性不動不壞猶是虗幻而非真何況因緣自然本出衆生顛倒分別豈有真實義哉阿難且汝果能知妄起處猶可許汝説因緣也若妄本無起處可得而説則説因説緣本非實有而為不了義矣何況並此因緣亦未通達復違因緣而謬説自然豈非迷執中之迷執耶是故如來今日與汝發明五陰本是妄想一欲衆生了見五陰真正本因而破除無難二欲衆生捐捨五陰偏執情計而達妄無惑也鍾云開卷指人病根在用諸妄想此處乃將五重妄想一一發明是全經大起結汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虗妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想此下詳示五種妄想而此先明色陰為堅固妄想也色陰雖兼五根六塵今圖易顯其與想相應故且單就內身而言也且汝不知色陰為堅固妄想耶即汝形體先因父母妄想生起以父母俱動愛染之想而後有赤白二陰也雖有父母想心若汝中陰愛涎不發決不能流愛為種而來父母想中結胎以續其命則知渾身都是妄想所成矣正如我先所言心想酢味而口中涎生心想登高而足心酸起懸崖不曾有酢物不曾來汝之身體若非與妄想通為一類則口中之水如何因人談酢而出乎是故當知汝現前色身名為堅固第一妄想以父母己三和合一處固結而不可解也知根身則知器界矣彼堅明立礙及堅覺寶成等何莫而非堅固妄想乎識動為想必我之想合當生父母之想而成胎則前陰之命轉為後陰之命嗣續不絶所謂想中傳命也即此所説臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想此明受陰為虗明妄想也欲知受陰即前色陰中一語可以通之如前所説臨高虗想能令足心真受酸澀豈非汝之胸中已先領受懸崖高峻之境故能動汝色體而酸澀乃在汝形乎即此推之而諸受之妄例可知矣然則汝今現前因違順二境而生損益二受交驅互馳而不休息皆是虗明妄想所成蓋受陰無體虗有所明故名為虗明妄想且以虗故受如太虗之受物以明故受如明鏡之受形也即前足心受酸澀處發明者所謂一滴水墨雨處成龍也按受有三謂苦受樂受不苦不樂受順益即樂受也違損即苦受也合有非違非順即不苦不樂受但是文略耳由汝念慮即意識也使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想此明想陰為融通妄想也夫汝有念慮所謂意識也念慮一動凡眼耳鼻舌身皆聽其使役若汝色身非與念慮同類則身實念虗虗實不倫何因隨念所使令耶故凡目前種種取像必因意識先動而後諸根方取足知此身與念相應無頃刻離正如歌舞工伎之人隨他拍轉拍緩則步緩拍急則步急五根於意亦然意地若生身輪動作意地若息根境寂然故寤與形接則為想寐與神交則為夢想與夢皆是獨頭意識為體因想念而搖動妄情頓失寂靜真心此想陰所以名融通妄想也曰融通者謂此想心在五根中圓融通貫非若諸根之滯而不融局而不通也化理不住運運密移甲長髮生氣消容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想此明行陰為幽隱妄想也夫行陰以變化為性故又名化理此化理遷流不住運而又運密密推移在人一身甲長髮生遷少至長也氣消容皺遷壯成老也生生滅滅日夜相代乎前所謂剎那剎那不得停住而無一人能覺悟者其密移為何如也阿難若此行陰非汝身者云何使汝甲生髮長等可見不離汝矣若此行陰真汝身者云何日夜變遷曾無覺悟可見不即汝矣非汝是汝二不可定足知虗妄而非真矣然則汝今諸行念念遷流而不停者幽而難見隱而難知良由幽隱妄想以為其本豈不名為幽隱第四妄想乎大抵受想行之三陰雖皆屬心而文中皆要顯與色身通貫受則能令色身領境想則能驅使於身行則能遷變乎體然雖説三陰通貫色身而實要顯身為念倫非真實有也又汝精明即識精明元也湛不搖處即湛若止水皆指第八識也迷位識陰雖通收前七而修斷位中前四陰盡無復粗浮遷動更何論於前七應知此惟第八也名恆常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受薰有何籌算猶云不可算量言此方是驗一物之不忘而實持種之無量積習之無邊也阿難當知此湛即湛不搖處也非真如急流水望若恬靜流急不見非是無流若非想元此想為前四妄想根本故曰想元寧受妄習非汝六根互用合開此之妄想無時得滅故汝現在見聞覺知中串習幾串貫也幾微也中串習幾者即覩物不忘念念受薰也則湛了內罔象虗無第五顛倒微細精想似無曰罔似有曰象此明識陰為微細精想也夫純一不雜而橫竪洞照曰精明浮想已盡而遷擾俱停曰湛不搖皆所謂第八識也又汝今者將以此精明湛不搖處為真常乎則汝一身不出見聞覺知之六根此根中之性即是第八實體若果精真則不雜不妄不應復受雜妄薰習矣何因汝等昔年曾覩之物忘失已久而再覩時宛然如故蓋最初薰習雖由前六而記持不失則第八之功以第六如聚斂之臣第七如傳送之官而第八如庫藏之吏也由一物之不妄推之則此精了湛不搖中尚能憶持多劫無量種習念念受薰不可籌算豈止現生之多年乎阿難當知此湛不搖者薰之以真則真薰之以妄則妄斷非真常不動之性也譬如急流之水望之若安恬寂靜此但流急故不見其流相非真不流藏識亦復如是非真不動以此是前四妄想根元故受妄習若非妄想根元寧受前四妄習之薰哉夫識陰既非確實精真猶屬妄習然則此妄何時而方滅耶要須六根互用之時根隔合開之後此之妄想方以滅除否則終不可滅也故汝今現在見聞覺知六根之中貫習幾微如所云覩物不忘念念受薰者似實而虗似有而無則湛了內罔象虗無第五顛倒微細精想而已顛倒者顛倒妙圓真淨妙心而有也微細者陀那細識也精想者識精明元也何莫非妄想為之本哉既云見聞覺知根中之性即第八實體識體是妄而又剋取根性者何居六祖云識即覺也何用轉乎所謂亡國破家由汝化家為國亦由汝矣鍾云二乘不知八識認湛不搖處以為妙真如性所不必言即地上菩薩所破止住相無明能除轉現二識猶未離湛不搖中至湛不搖中所帶和合之妄為生死根者則生相無明是也惟如來能照見而直指之如急流水四句盡情描出此即四纏所分之湛但彼槩指識陰此專指識陰邊際湛入合湛之時伏似無形薰則復起必至六根互用識陰已盡此之妄想方得滅除乃佛境界耳阿難是五受陰五妄想成此總結五陰為妄想也阿難是五陰者由一念迷妄受此取此以自蔽藏故總名五受陰又名五取蘊雖淺深粗細不同而要之皆妄想所成非真心本有若見五陰有即衆生世間也若見五陰空即真諦世間也若了五陰實相即中道第一義正覺世間也離此五陰三世間外更無一法能建能立為俗為真一代時教所詮除此別無方便迷此為凡悟此成佛在人認取而已受想並列五陰而五陰皆有受有想故曰五妄想成汝今欲知因界因字新舊注不同俱涉強解愚以為陰字之誤耳淺深惟色與空是色邊際惟觸及離是受邊際惟記與亡是想邊際惟滅與生是行邊際湛入合湛是識邊際此答前五陰詣何為界也陰之為界有淺有深汝今欲知陰界之淺深乎如色陰中有相為色無相為空尋常但知有相之色為色陰邊際矣而不知無相之空亦是色陰邊際也蓋離諸色相而棲心空淨謂之一色邊是知盡色而不盡空皆未出乎色陰邊際而一切空忍皆非究竟也受陰中根境相對曰觸根境不對曰離尋常但知領納違順二境為受邊際而不知不領納二境亦是受邊際也蓋斷諸取著而不忘厭捨猶住捨受之中故佛於離幻之後復教離離是知盡觸而不盡離亦未出乎受陰邊際而一切背捨皆非究竟也想陰中有念為記無念無忘人但知念一切法為想邊際不知不念一切法亦是想邊際也蓋除諸念而不除無念是仍住於靜念之中故曰有念無念同歸迷悶又云莫謂無心真是道無心猶隔一重關是知盡記而不盡忘亦未出乎想陰邊際而一切無想皆非究竟也行陰中迷位散心粗行為生相修位定心細行為滅相人但知散心粗行喻如瀑流者為行邊際而不知定心細行喻如野馬者亦是行邊際也蓋細行似滅非滅仍是清擾細遷如定中人不免爪生髮長足可為驗是知盡生而不盡滅亦未出乎行陰邊際而一切滅定皆非究竟也識陰中以有入為湛入謂泯行流而沒歸識海以無入為合湛即流急不見其流人但知行陰方消識海初入位當七信齊於四果者為識邊際而不知識海久停區宇漸啓位當十信待入初住證圓通者亦是識邊際也蓋合湛雖視湛入有加居然仍在識境咸不免於最細四相所遷是知盡湛入而不盡合湛終未出乎識陰邊際所謂清光照眼猶似迷家而一切明白法身俱未究竟也以陰界之淺深而總較之但知色為色而不知空亦是色者知色界之淺者也知空色之皆色者知色界之深者也如是乃至但知湛入為識而不知合湛亦識者知識界之淺者也知湛入合湛皆識者知識界之深者也至此而五重妄想可謂極盡其境界矣鍾云上湛字是工夫下湛字是本體謂以澄湛之功入流旋元與圓湛之體倣佛相合也人知流逸奔塵分汝湛圓者為識不知湛入合湛亦是識之邊際何以故以湛了內微細流注未斷故此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併消事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界此答前問五陰頓除漸斷也汝問斷除五陰為頓為漸抑知其有理有事乎夫此五陰根元原是一重疊一重次第而生起也其生也由一念不覺而轉此覺心為業識因識有行因行有想因想有受因受有色是生因識有也其滅也先除色次除受次除想次除行而後除識是滅從色除也生則從細至粗猶如著衣滅則從粗至細猶如脫衣生滅之序如此若單論滅除次第則理與事政自不同蓋五陰之理圓元從一念妄想而生故一言之下心地開通乘其一悟而疑惑頓消如暗夜驚杌為鬼奔馳荒越一旦被人説破鬼想全消也若破除之事顯明從五層重疊逆破故一念之間未能頓除心因次第乃可得盡如鬼想雖以全消馳途豈能遽返要須歷返前途方歸舊處也夫此破五陰而入初住與前解六結而入圓通總是一理故從色空以至湛入即解前三結也自湛入至於合湛即解後三結也我前示汝劫波巾結次第而解法喻照然何不明了汝當即彼悟此方為善領佛誨何乃忽略於彼而再問於此耶我之告汝盡於此矣汝應將此五陰一一了達知其根元全是妄想使心得開通不為所惑則自利之道在是矣又復將此傳示將來使末法之中諸修行者皆識得五陰虗妄則深厭自生識妄則知有涅槃果性之為真厭生則不戀三界生死之可樂而利他之道在是矣阿難勉之問頓悟漸除之義何如答如大海猛風頓息是頓悟也波浪漸停是漸除也如孩子諸根頓生是頓悟也力量漸備是漸除也似曦光頓出是頓悟也霜露漸消是漸除也似春笋頓長即與母齊是頓悟也枝葉分敷節節而上是漸除也頓悟而不漸除則有解無行執理迷事終非正修真三摩地也此四句乃千佛相傳之的訓萬世不易之宏規也正宗分竟流通分第三問此經與法華既為一轍法華流通勸讚之文品品有之而此流通之文何甚少耶答法華廢立之初疑深信淺故洗蕩疑情為詳而發揮理行為略此經開顯之久疑消信定故發揮理行為詳而洗蕩不信為略也阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不此先舉功令較也阿難若復有人於此舉遍滿十方虗空盈滿都是七寶財無盡也將此七寶持以奉上微塵諸佛田無盡也承事供養心無虗度念無盡也於汝意云何是人以此施佛功德得福為多與否蓋不問而知其多矣阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充遍皆施珍寶窮劫思議尚不能及是福云何更有邊際此較定無量也阿難答言如佛所云十方虗空則無盡矣盈滿珍寶則無邊矣以我所聞昔有衆生施佛七文之錢功至微也而捨身之後猶獲轉輪王報況復現前虗空既窮十方佛土充遍皆施珍寶思議尚不能及其視七錢何如以彼例此而得福更有邊際耶阿告阿難諸佛如來語無虗妄此因向下弘經之功至少而滅罪獲福至多恐難信及故此先明佛無不實不真之語令其諦信之也佛告阿難諸佛如來設立戒律先戒妄語若諸佛如來而語先自妄必不然矣故知其語無虗妄也既無虗妄則今日之語汝可不諦信之哉若復有人身具四重殺盜淫妄十波羅夷即十惡也譯名棄五刑如斬蓋惡報之極重者瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示末學是人罪障應念消滅變其所受地獄苦因成安樂國得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及此言弘經獲福之多也若復有人身具四重十惡惡因極矣瞬息遍經十方地獄惡果極矣此將墮地獄之人若能暫爾發心將此大定圓通深入之一門於末劫聖遠魔強之日開示末學難進易退之人將見是人罪障應此一念即得消滅如湯潑雪如火爇草無不灰蕩者矣且不但只消惡業而已復能轉苦為樂令其所受地獄變成安樂國土而往生其中樂何如也且不惟只滅重罪而已而且獲福超前視前七寶供佛之人所得之福百千萬億倍乃至算數譬喻所不能及福何如也良以斯經開如來祕密之寶藏獲本然周遍之家珍成塵剎互融之佛果故非財施之多執相之供有為之果所能及矣夫一念弘經尚能如此何況久弘一念之弘不過一句一偈尚能如此何況一句半部乃至全經重罪之人尚能如此何況輕罪無罪乃至有福多福之人其果報殊勝又何可量哉阿難若有衆生能誦此經能持此呪如我廣説窮劫不盡此顯無罪者之持經持呪功德無盡也阿難若有衆生能誦此首楞嚴經能持此首楞嚴呪如我八音四辨稱揚斯人滅如上罪獲如上福窮盡劫數尚不能盡夫持誦方得聞慧其功德已有如是何況進於思修者哉依我教言如教行道直成菩提無復魔業若乃從聞思修者依我教中之言如我之教而行道頓悟漸除一門深入從初發心以至成佛中間更無諸委曲相如水赴壑似箭穿空無復魔障為之留難又何慮小乘化城之中止漸教歷證之遲延哉是則此之流通據文無幾而研究詞旨雖重篇纍帙亦不能過豈非以約收博無所遺餘所謂我為法王於法自在信不誣矣佛説此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子於仙而特加聖字是居仙趣而修內教希獲童真妙果者并初發心大力鬼神於鬼神特加發心者表其建志護法而具大神通力洞無畏此之二衆皆能弘護流通八部收之未盡故增列之於此也皆大歡喜作禮而去此經家所設以明法會欣慶也佛説是楞嚴經已在會大衆自比丘以至鬼神既聞正宗而獲本妙圓心復聞流通而知究竟弘益近無墮惡之憂遠有證真之望慶幸非常皆大歡喜向佛作禮而去歸本處各歸自心不動道場或修習或弘通非如世人離法會而遂成散亂也鍾伯敬云此經首楞嚴王具足萬行總持三昧薰修奢摩他路開示衆生妙在一門超出由慶喜限多聞而未全道力故迦文因妄見而直指人心七處之破寶鏡磨塵而本明自現十番之顯金錍刮膜而幻影隨消斥攀緣則心不是心示真覺則見猶離見既顯真而破妄仍即妄以談真窮陰入處界而列為四科因緣自然二俱排擯會地水火風而通名七大真俗中道三諦圓融本如來藏而含吐十虗隨衆生心而發揮諸相乃至一多相即大小互容現寶剎於毛端轉法輪於塵裏得無罣礙者倒想銷於億劫不隨分別者狂心歇即菩提圓頓機已解密因中下器須陳妙行於是開遠客還家之路指天王賜屋之門詰諸聖之本因依證悟説最初方便順此方之教體選音聞為第一圓通次為攝心乃重持戒依先世尊舉揚清淨明誨現化身佛宣演祕密伽陀三學圓具而所證非偏諸妄消亡而不真何待況復精研七趣隨業受生痛喻六交因習招報示五十重禪那之境深防愛見邪魔具八萬種解脫之機對治塵勞煩惱保持覆護囑勸弘宣在始在終無非修證了義或破或立不離常住真心琴瑟箜篌既逢妙指林木池沼皆演法音令諸闡提隳彌戾車從三摩地得無生忍或自分真而安立聖位或從互用而超至後心坐大道場登無上覺一切事究竟堅固廣開菩薩多方便門十方界任運縱橫同入如來妙莊嚴海其教至矣
