body:
  text: 巴縣居士非眼劉道開纂述成都沙門離指方示鑒訂爾時阿難及諸大衆聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性此第三番顯見不滅也爾時阿難及諸大衆從佛訶為非心即起驚疑及聞離塵斷滅轉更不安良以離識心外更不見心今蒙根中指出宛然別有寂然不動驚疑頓息所以身心泰然自念從無始來失却本有不動真心反認緣塵分別影事今日始得開悟正如失乳之兒忽遇慈母昔日窮子捨父今日乳兒遇母何快如之然此寂常不生滅性雖蒙印許若據尋常見即是眼則眼與見皆屬生滅若據今日手開合而見無開合頭搖動而見不搖動則是生滅身中有不生滅性今雖領得見無所動之旨尚未明其所以猶存疑惑於是合掌禮佛願聞如來顯出身心誰真誰妄誰虗誰實要於現前動搖生滅身中的的指出不生滅性令此真妄二性皎如星月方到自信不疑之地耳鍾云二發明性者發明二字要從理上發顯義看蓋謂真性理中自有不生不滅所顯發性即下一為無量無量為一大中現小小中現大等是也妄明理中所顯發性即下晦昧為空空晦暗中結暗為色色雜妄想想相為身等是也有作發明二性看者便是言語發明矣文義不順時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大衆諸有漏者咸皆樂聞此匿王自陳斷見以請不生滅也匿王昔事外道曾有邪心種子入其心腑今被阿難抓著癢處遂乘機發問所謂因逢桃李樹却憶故園春也迦旃延此云剪髮毗羅胝此云不作乃外道六師之二其道皆以斷滅為宗以不解第八阿賴耶識去後來先為生死根本轉此八識名為涅槃而反計此身斷滅為涅槃若此方所計生為七尺軀死作一棺土即有挫燒舂磨無所用之等皆此類攝豈知有死而不亡者在也時波斯匿王起立白佛我昔未承諸佛誨敕時曾見二種外道皆説此身死後斷滅即此斷滅便名涅槃我今雖遇如來猶懷狐疑未決必要現前有箇證據方能信得此心是不生滅世尊云何發揮證知此心不生滅地今此在會大衆未到無漏者咸皆樂聞焉據除斷見粗惑則此有漏似惟指界內凡夫二乘有學若辨見性真常則雖小乘四果別教三賢亦須普指以彼自來未明見性是真常心故佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡佛言如是欲示不生滅性故先審其生滅也佛告大王汝在未來死處生疑我只據現在生處問汝汝身今現在矣我問汝此肉身為金剛常住不朽之物耶為復畢竟是變壞之物耶匿王言世尊我今此身非常住之物終從變滅而已佛又重重細審釣出狐涎乃言大王汝身現在未滅有何所憑預知其斷滅耶匿王言世尊我此無常變壞之身今雖未滅然我觀察現前念念遷謝新新不住如火之成灰漸漸銷殞趨於殞亡無刻寧息決知此身到底滅盡方得了當佛言汝身必滅誠如是也只此數語已可以警念無常劇貪世務者寧不惕然大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頽齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時此又細審其自少至老精神容色是同是別也佛又言大王汝今有生之齡已從衰老矣汝之顏貌何如童子之時乎匿王言世尊我昔當孩孺時肌膚腠理滋潤鮮澤及年至長成精完神足血氣充滿而今齡已頺矣迫於衰耄形色則枯悴矣精神則昏昧矣雞皮鶴髮行步龍鍾日在桑榆殆將不久如何乃以精神充足盛滿之時而見比耶佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀二紀實惟年變豈唯年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住故知我身終從變滅此又細審生滅之頓漸也佛言大王一氣不頓盡一形不頓虧汝之形容應非一旦頓朽必以漸而朽矣王言世尊世間變化密密推移我誠不覺但見日往月來寒暑迭遷以漸至於此何以故人生光景有長有促今且以十年為率如我二十之時雖號年少顏貌已老於十歲時及至三十之年又衰於二十至於今六十又二矣回觀五十宛然強壯豈非十年一變耶世尊我見此密移者雖此壯色日去而殂老相日催而落然其間流易尚且限於十年是特舉其粗略而言耳若復令我微細思惟推窮其變寧獨十二年之一紀二十四年之二紀實惟一年一變豈惟年變亦兼一月一化何直月化兼又一日一遷若更沉其思慮審諦觀察則即此一念具九十剎那中剎那剎那念念之間皆在遷流未嘗停住質非金石何以堪此由年紀之長以至剎那之短變化密移如此特任運者不覺作意推度始得知之故知我身終必從於變滅也教中以利刃透九十紙為一念故一念具九十剎那也佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知佛言我今示汝不生滅性世尊見匿王歷敘變滅之相絲毫不漏故於急處一提乃言大王汝見變化不停悟知汝滅矣亦於滅時知汝身中有不滅者耶王合掌白佛云我實不知古人道不知處最親切所謂日用而不知也使其知此決不迷於斷見矣佛言汝既不知我今可以示汝不生滅性矣大王汝年幾時見恆河水王言我生三歲慈母携我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所説二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異此審觀河之見以明年變而見不變也佛又更端問云大王汝年幾歲乃見此恆河水耶王言我生三歲時慈母抱我謁長命天經過此水爾時即知是恆河矣佛言大王如汝所説從十歲以至六十歲時時遷變則汝見亦應遷變矣但不知自汝三歲見此河時至年十三又見此河中間十年其水有以異乎王言我十三觀河如三歲時宛然無異也不特十三即至於今六十二矣觀此河水與三歲時亦無有異也佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽黎等都言此身死後全滅王聞是言信知身後捨生趣生與諸大衆踊躍歡喜得未曾有此復審見無童耄以結破斷見顯不生滅性也佛又言汝今自傷髮白面皺我且就面皺一端問汝汝面必定皺於童年則是面有童耄矣但不知汝今觀河之見與童時觀河之見亦有童耄不乎王言不也世尊佛既一一審明無所逃遁乃語之言大王汝尚未識不生滅性耶夫汝面雖皺而此觀河之見即汝之見精也汝此見精其性實未曾皺皺者其可變者也不皺者非可變者也變者其受滅者也不變者其元無生滅者也既無生滅云何復隨汝現在身中同受汝之生死耶即此便是生滅身中不生滅性矣而猶引彼不見道外道等都言此身死後全滅不亦謬哉王聞是言乃信知性無生滅此身死後捨此生彼從一暗室投一暗室出一苦輪入一苦輪未曾斷滅與諸大衆踊躍歡喜得未曾有焉此章由匿王在身上觀察故成斷滅世尊在見上發明故無生滅所謂不離華下路引入洞中天也此則不唯破匿王斷滅之見抑亦酬阿難二發之請矣問昔忠國師問禪客從何方來客曰南方來師曰南方知識如何示人曰彼方知識直示學人即心是佛離此之外更無別佛此身即有生滅心性未曾生滅身生滅者如龍換骨蛇脫皮人出故宅師曰若然者與彼外道有何差別彼云我此身中有一神性此性能知痛癢身壞之時神則出去如舍被燒舍主出去舍即無常舍主是常審如是者邪正莫辨矣今佛言皺者為變不皺非變得無與國師相忤乎答國師破一時之執如來開一時之權皆妙辨也當以意得不可妄生卜度獲戾佛祖又往往宗家謂不離身中即有不滅性體正謂根中見聞等性非謂方寸之中臟腑之內別有性命即同阿難所執身內識心也鍾云前屈指飛光是就一時一事中指出不生滅性此示觀河之見是就一生中指出不生滅性也至第四卷中杵音之喻云縱汝形銷命光遷謝此性云何為汝銷滅則死後不生滅之性乃透底拈出矣第三番顯見不滅竟阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢此第四番顯見不失也上惟舉見此復兼聞聞字當是性字之誤匿王知見不多故一言之下心地開明驀直信去阿難多知多見觸事生情故方信而忽疑也於時即從座起禮佛合掌長跪而白佛云世尊見性必是生滅可名遺失既此見性必不生滅便是寂常即與諸佛等無差別云何世尊名我等輩遺失真性顛倒行事而諸佛不名遺失顛倒乎我心蒙蔽如染塵垢願興慈悲一為我洗之也豈知佛言遺失真性但因顛倒而説遺失非因斷滅而説遺失也故下文全示顛倒之相以詰之即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間衆生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來竪臂兜羅綿手上指於空則名為正佛即竪臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明如來之身名正遍知汝等之身號性顛倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒於時阿難與諸大衆瞪瞢瞻佛目睛不瞬不知身心顛倒所在此示顛倒之相以驗其倒情也即時如來垂手下指示阿難言汝今見我母陀羅手為正為倒阿難曾遭毒手不敢自任嫁禍於人云我見世間衆生咸以此下垂為倒而我不知果誰正誰倒也世尊就與一拶云若世間人以此為倒又將何等為正阿難拗直作曲云若如來竪臂此手上指則名為正矣世尊將錯就錯即竪臂而告曰若汝果以上指為正即此便是冠履倒置翻頭作尾翻尾作頭矣何處別求顛倒哉且此一臂本無倒正諸世間人分倒分正差一倍瞻視豈知下垂為倒固倒也上指為正亦倒也何得以上指為正下垂為倒哉由汝等倍生此見而如來不作是見故將汝身與諸如來清淨法身比例發明則如來身號正遍知汝等之身稱性顛倒則汝自謂與佛等無差別不名顛倒者誤矣既與發明顛倒復加錐劄令其循名求實自揣顛倒實處故曰今又隨汝諦審觀察汝身比於佛身稱為顛倒者既有顛倒之名必有顛倒之實從何實處而得此名乎阿難被世尊一問有眼如盲有口如啞無言可對無理可伸惟與大衆瞪瞢瞻佛呆呆然目睛不瞬而不知身心顛倒所在也所謂大智慧人面前常有三尺暗不其然歟鍾云倒與正同此臂也特首尾相換耳正遍知與性顛倒同此身也特迷悟相反耳知此則知即遺失顛倒不妨元不生滅矣母陀羅此云印手佛興慈悲哀愍阿難及諸大衆發海潮音遍告同會諸善男子我常説言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷此下正與發明顛倒實處也阿難願興慈悲佛果興慈悲哀愍阿難及諸大衆發應不失時海潮之音遍告同會諸善男子我常説言十一色法八識心法生心之四緣生色之二緣及心所使五十一心法廣至善惡邪正世出世間一切事業因果諸所緣法如是五位皆是如來藏心之所顯現如明鏡之現影像可見萬法即心也汝今五根之身八識之心皆是妙明真精妙心中所現之物可見心包萬法也夫心之與性體用互稱心則從妙起明圓融照了如鏡之光性則即明而妙清淨堅實如鏡之體此心此性元是汝自家有的云何汝等遺失此本來自妙不假修成之圓妙明心寶明妙性而認本悟中之執迷不知萬法即心心包萬法而反謂法皆心外心墮法中乎是乃於不顛倒中而妄計顛倒未遺失中而義同遺失矣問前謂見性是黎耶體即如來藏心又即萬法實體似為能現今色心之心既該八識則黎耶已為所現而惟心之心當另有純真之心何得仍取如來藏心以釋之答前七等但為所現真心但為能現而此黎耶能所俱通以對真心降為所現以對萬法升為能現蓋與真心本無二體但惟帶妄而已晦昧為空空晦昧中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來説為可憐愍者此下發明身心所以為悟中迷也夫此妙明心性本無身心之相皆由最初不覺忽起無明將此第一義空晦昧而成無知無覺之頑空所謂迷妄有虗空也所變頑空與能變無明二法和合故於頑然晦昧中凝結而成四大之色所謂想澄成國土也以四大之色雜妄想之心妄心妄色想相和合結成五蘊根身所謂知覺乃衆生也此即身之所以為悟中迷也既有根身四大內外合成妄有緣氣於中積聚於是內緣影事而動搖不休外緣實色而奔馳不已昏昏擾擾不明不淨復執此昏擾擾者以為圓妙明心寶明妙性此即心之所以為悟中迷也既一迷此昏擾擾者以為吾心決定惑此心為在色身之內依肉團而居矣殊不知不獨我此色身是妙明心中所現之物即外洎山河虗空大地皆是妙明心中所現物也今汝棄此廣大妙心而妄認四大為自身相六塵緣影為自心相何異棄彼百千里澄清大海而反認海中一浮漚體以為海中之全潮在是即窮盡瀛渤亦在於是哉由是觀之則知汝身與如來身比類發明雖同是一體本無差別但如來了得海是海漚是漚不棄海認漚故曰正知不認漚為海故曰遍知汝等既棄海認漚復認漚為海故曰性顛倒所以目汝等即是迷中加一倍迷之人也正如我垂手時實無正倒差別而汝以下垂為倒上指為正此即是汝顛倒所在故知汝等本無遺失因顛倒而稱遺失如來説為可憐愍者此也良以汝等若真遺失猶不足深愍今由顛倒故常如遺失正如持珠作丐枉受貧窮不亦深可愍哉問前謂見性是八識實體今復以聚緣為八識功能得失何分哉答此識真妄和合故見性取其一分真理聚緣取其一分妄情凡言八識去後來先等者皆以妄情言耳又云一迷為心決定惑為色身之內至哉言也自非佛了義之教誰不計性命在於身中萬法但為心外者乎然命在身中道教計之特甚久矣衆生不信身中本無性命矣又問認一浮漚目為全潮此何異於一毛孔中包盡剎海答彼達諸法性全法界故一毛稱性即包無餘如説真摩尼珠價值一國誠不虗矣此不達諸法實相但將昏擾妄想謬計身中而又倒執能包虗空大地是尚無體可得憑何廣包如説水泡價值一國真大迷妄安可同乎前阿難聞訶非心驚謂捨此更無將同土水如來安慰許以真心有體而已非正開示真心也譬如許人以物後日方以與之長水於彼處即謂開示真心以許為與殊欠體認至此章方是開示真心之正文而阿難到此方知於緣塵外更有如此廣大心體而如來所許果爾非虗矣第四番顯見不失竟阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現説法音現以緣心允所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道此第五番顯見無還也阿難承佛悲救深誨萬劫倒懸一生迷惑一旦發明感佛深慈故至於垂泣然心猶有疑故復叉手而白佛言我雖承佛如是妙音悟得此妙明心即是自己本來具足圓滿不生不滅常住心地但我等一向遺此廣大心性而認此昏昏擾擾者為心性故名我等為性顛倒宜矣然我現今見佛聞法皆用此緣慮之心世尊雖不欲我認而斥為非心若是別種緣心或可捨擲今者悟佛法音承聽領納方倚用之豈可遽捨乎由得其用故不敢不認也世尊要我所認者是圓滿妙心雖則廣大現今不得其用徒然獲此故不敢認為本元心地以認此須當捨彼今既不忍捨彼則亦不敢認此又若捨了緣法之心却後將何承領佛法縱不惜此緣心而獨不重於佛法乎願佛哀愍宣示圓音拔我疑根到不疑之地乃得歸於無上道也賀云正脈謂阿難不捨緣心故不認真心恐認此須當捨彼不知本文云未敢認非謂不肯認也持以初獲此心尚未受用未敢遂認為主人翁耳必求世尊徹底發明使得親見本來面目乃敢承認故曰拔我疑根此正古人真參實證處鍾云機有生熟阿難平日受用於緣心熟於見性生生處不能遽用熟處自不能全捨此亦人情也但此處重在求真而不在捨妄耳此正尊者方搖未穩之際而緣心真心兩持不決之時如人惑於岐路恍惚不定先德云易開終始口難保歲寒心尊者以之自此直至各各自知心遍十方獲本妙心常住不滅處方肯承認耳佛告阿難汝等尚以緣心聽法此法亦緣非等法性如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是此責其認聲塵而不達法性也佛告阿難我今如此傾心吐膽落草盤桓欲汝捨妄緣而達心性豈意汝之見解尚與昔時一毫無異而以攀緣之心聽我圓滿常住心法則此圓滿常住心法亦成所緣之境汝又安能契此法性哉不知説法者如指月人耳今有人焉以手指月示人彼人因指便當看月若即觀指以為月體愚哉是人豈唯不識月亦不識指豈唯不識指亦復不識明之與暗以月明而指暗故也若汝聽法之後絶言語黜聰明一切放下默究自心此是因指看月不存指相之人也若汝依舊多知多解不肯消歸自己是逐句尋言執指為月之人也今汝執法音而不達法性何異執指為月皂白不分昏曉不覺者哉故曰汝亦如是鍾云緣心者能緣之心也法緣者所緣之塵也法音即聲塵故亦非真法性者真理也教銓真理理是衆生之心豈可執教為心哉指喻法月喻聽法者之自心説法顯心聞教自合觀心若執聲教不解反觀自心此人豈惟不達自心亦復不知教意何以故以他聲教為己自心自他不分故豈惟不知教意兼亦不了教心體相何以故教屬聲塵不能覺照心體靈知具有覺照以無照之塵為有照之心有照無照二不別故阿難之迷心迷教及迷教心體相亦如是耳按阿難之不捨緣心重佛法也豈知此法亦緣而當并捨乎鍾云若欲研究佛乘披尋寶藏一一須銷歸自己言言使冥合真心但莫執義上之文隨言生解直須探銓下之旨契本會宗如是則天真之道不昧無師之智現前若一向背己徇文執學興辨是對木人而索語期石女以生兒空歷塵沙終無得理緣心之緣攀緣也法緣之緣塵緣也以法音即聲塵攝故亦非真若落紙墨更是色塵矣今宗家不許説義理以才涉義理又落法塵亦可得而緣矣若以分別我説法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若汝真心則無所去云何離聲無分別性斯則豈惟聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等昧為冥諦離諸法緣無分別性則汝心性各有所還云何為主此責其認妄心而不認真心也汝今不捨緣心是取分別我説法音者為汝真心矣既認此分別法音之心以為真者此心自應離分別音而確有分別之禮性矣何也妄心如客真心如主假喻以觀譬有客焉寄宿旅亭一宿便去終不常住故名為客也若掌亭人都無所去故名為主也此亦如是若真是汝之心當如亭主而無所去矣云何離却聲音遂無分別之性但如客之暫止便去耶由是推之豈惟聲上分別之心哉即分別我容之心離我色相亦無有性以此皆屬前六妄識分別皆非真心也不特此也如是乃至前六分別都無處以為別有自性不屬色不屬空正是第七緣八屬帶質境亦是分別亦非自性從數論師昧而不知遂執此為冥初自性蓋外道立二十五諦首號冥諦彼謂冥初生覺是萬法之元始尊為極則之理今非色非空正齊此見矣豈知分別都無亦但離於粗分別耳微細流注固所未覺色空都盡亦但離於法處所攝半分生塵耳其半分滅塵固不能離若離諸法半分滅塵之緣即無分別之性與上之離聲色而無性者一類無別也夫六處緣心各隨本塵而生亦隨本塵而滅如影隨人亦隨何人而來者亦還隨何人而去則汝心性俱屬客邊各有所還何以為無去無來常住之主人乎鍾云前以客喻身境此以客喻緣心而見性為主人以聲例色相從而説非但聲分別心離聲無性即色分別心離色亦無其性也乃至兼舉香味觸法分別都無所謂內守幽間也都無故有而非色猶守故無而非空非色非空冥然一識此正六識無記性也六識有還不能為主若八識則為識精元明無還則能為主矣阿難言若我心性各有所還則如來説妙明元心云何無還惟垂哀愍為我宣説此因還而請不還也還者如借來之物必要還人若是自己家裏物無處可還阿難言若我緣心各有所還而如來説妙明元心無還處者何也惟垂哀愍而為我宣説焉昔張無垢謁善權清禪師問云此事人人有分箇箇圓成是否清曰然公曰為甚麼無箇入處清於袖中出數珠示之曰此是誰底公俯首無對清復袖之曰若是汝底即拈取去才涉思惟便不是汝底公悚然故知才有分別即有可還也佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地此下借見精以示不還真性也良以妙淨明心寶明妙性具有三大謂體相用由無明不覺一念妄動轉此本體而成業識轉此智光而成見分名轉識復轉此真境而成相分名見識此中見精即皆光所轉之見分也佛告阿難且汝見我三十二相時此見未落分別豈非見精本來元具不從日月燈光借來豈非明元此見既為六精之一而又在處明了不昧固已現具精明之體特以二種顛倒見妄未除尚存能所不得互用故雖具精明而但欠於妙耳然雖非妙精明心却如第二月揑目所成與真月本無二體非若水中月影與真月有天淵之隔也是則未得第一月者當亟認第二月猶之未得妙精明心者當亟認見精明元矣汝應諦聽吾示汝以無還之實焉月有三相第一是天上淨月第二是人以手揑目望月遂成二輪取其揑出者為第二月第三是水中月影今以第一月喻純真之心第二月喻見精明元第三月喻緣塵分別意欲令人決定捨於第三月而決定認取第二月則第一月不遠即在矣問何不即指純真之心而乃用此曲示乎答純真之心惟佛乃具等覺尚帶生相無明何況地前諸位乃至五位凡夫現前何有純真之心然而真雖不純體終不變如金在礦離礦無金特礦有真偽非金師莫能辨耳故佛直指根性為心如指礦説金金即在礦非離礦外而別有金也此處祗因其無明未剖尚有欠於妙之一字故佛略抑揚之意在表其真切耳非如緣塵呵其非心無體也諸注於此發妄太過如輕加緣塵之名將濫同於第三月強索有還之處似公抗於佛言徒引人之猶豫不敢直認見性為心其失非小不知衆生現量離此根中之性別無可指故諸祖指示率多取於六根門頭者奉佛密旨也行人時中但請認取此性萬無一失譬如收買金礦者時下雖非精金真金終不外礦而得使其棄礦求金非惟并金亦棄將必惑於鍮石而真金終不可見矣豈不大可惜哉鍾云二月雖非真月然離真月必無二月可得見精雖非真心然離真心必無見精可得蓋從真所起全體即真但當由見精覔真心不可以見精當真心去見精中之妄即是真心去月之揑即是真月固不可分為二亦不得遽混為一也阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦瞑則復昏暗戶牖之隙則復見通墻宇之間則復觀壅分別之處則復見緣頑虗之中遍是空性𡋯之處則紆昏塵澄霽斂氛又觀清淨阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還墻宇緣還分別頑虗還空𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別諸可還者自然非汝不汝還者非汝而誰則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍此備舉塵相有還以顯見性不與俱還也阿難我所謂無還者何哉試觀世間可還之境其體有八其相亦有八如日輪也夜晦也戶牖也墻宇也分別也空性也昏塵也澄霽也八者其體也明也暗也通也壅也緣也虗也也淨也八者其相也阿難汝通看此諸變化相各有所因吾今為汝各還本所因處云何本因阿難如日為明因則此諸變化明還日輪何以故以無日不明明因屬日是故還日也即是推之則暗還黑月通還戶牖壅還墻宇緣還分別頑虗還空𡋯還塵清明還霽可類而還矣更廣推之則諸世間一切凡有相可還者皆不出斯類矣若汝見此八種之見精明性於此八相之中當與何相而俱還乎姑舉一相以徵之若此見性與明俱還者此見便隨明去當不明時又將何物見暗知一相則知諸相矣今諸相任遷一一皆見足知明暗等相於見性之中自相往來自相凌奪種種差別而此見體朗然常住不動不遷元無差別也以是知諸可還者皆由假借外塵而有自然不是己物若汝之不還者不由假借非汝自己之物更是阿誰但汝識此見性不還則知汝心本妙本明本淨矣以見性是賓中主真心是主中主故也由汝迷悶不醒既不識主中主又不識賓中主所以喪失本性枉受輪回於生死中頭出頭沒無有出期是故我説汝等為可憐愍者此也此八塵作四對各取其相之相反為對也惟虗空塵體相顛倒然下文還處自見分別即前塵分別指種種諸物而言如松𣗥鵠烏雜在之處也緣指種種異相而言如直曲白玄差異之相也頑虗則是全無諸物之處遍是空性者逈然惟見一空相而已蓋緣是異色空是同色同異相反生成對偶舊注乃以分別作分別之心則下緣字與上何別且下虗空又與何為對乎是以一句錯解而使全文皆纍也又舊將八還辨見對前七處徵心夫七徵已是潦草之言而又獨以此八還為辨見尤為夢浪之語前後十番皆示見性而獨指八還餘皆辨於何法乎且前七處乃七大科豈與此一科為對耶今總改之云七處破心十番顯見則非惟法數相稱而心妄見真之旨亦攸分矣第五番顯見無還竟鍾云汝但知此見性無還則知汝心本妙明淨正欲其由見性而悟本妙明心非即以見性為本妙明心也以見性屬第八識猶帶業識本妙明心屬第九識即如來藏妙真如心故阿難言我雖識此見性無還云何得知是我真性此第六番顯見不雜也阿難言我今承佛開示雖知此見不與諸相俱還而實常與水陸空行等物混難無分今於諸物之中將辨何者是我見性何者是物相乎言未易分晰也鍾云阿難意以見性雜在萬物之中無見而非物無物而非見安辨何者是我之見性乎佛意一切凡聖見量雖別見性是同今只據汝所見之境其種種差別者是物其能見者是汝汝有汝見不干我事我有我見不干汝事可謂分明之極矣云何不自認取苦苦向我求討豈我見可作汝見耶此問只重我字不重真字詳下答意自然應合吳興之解非是佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提恐是娑婆界三字之誤如觀掌上菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚衆生洞視不過分寸此先標出五種現量見精以啓下文也佛告阿難吾今問汝今汝方證初果未得無漏清淨徒仗佛神力加被乃得見於初禪一四天下得無障礙是有學人慧眼之見量如此若阿那律見此娑婆世界如觀掌中菴摩羅果是無學人天眼之見量如此若諸菩薩等見百千世界豈非法眼之見量乎至若十方如來窮盡微塵清淨國土無所不矚豈非佛眼之見量乎若乃一切衆生只見目前其所洞視不過分寸是又肉眼之見量也夫此五種廣至窮盡國土狹至不過分寸見量雖殊均為能見之性而已菴摩羅此云難分別似桃非桃似奈非奈此方所無也阿那律佛之從弟畫眠被訶精進失目遂證四果得天眼也阿難且吾與汝觀四天王所住宮殿中間遍覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰是物相此則獨約阿難所親見者欲其自審擇也阿難姑置五見吾且與汝上從四天王所住宮殿觀起中間遍覽水者陸者空行者雖有或昏或明種種不齊之形像無非皆是前塵分別之見停留障礙處汝應於此能見所見之中自家分別其為自為他自即見性他即諸物也設汝自不能乎必假佛智我則將汝擇於我汝共見之中誰是我體而能見物者乎誰為物相而為所見者乎如此分明是物是見必有歷歷不混者矣自即能見所謂我體也他即所見所謂物象也阿難極汝見源從日月宮是物非汝至七金山周遍諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝此正言物不是見也見源即眼根也阿難盡汝眼力從日月宮而觀此最上物相是物也而非汝又至七金山周遍諦觀此居中物相雖種種光亦物也而非汝漸漸而下更觀於雲之騰也鳥之飛也風之動也塵之起也樹木也山川也草芥也人畜也此最下物相亦物也而非汝則所謂誰是物相者此是矣七金山者須彌外七重圍繞皆以純金為體光明最多也雲騰鳥飛自金山視之亦居最下也阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性此正言見不是物也阿難是諸在近在遠諸有物相千態萬狀雖復差殊然同是汝清淨見精所矚則物類自差而見性只是朗然一照無有殊也此無殊者精而不雜即前所説妙淨明心此妙淨明心實汝見性何嘗混雜於有差殊之物相乎則所謂誰是我體者此是矣若見是物則汝亦可見吾之見若同見者名為見吾吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝此反辨前見不是物也夫我謂見不是物而汝或未之信耶試再明之若我無殊之見性見於差別之物相時此見即是彼物則見性當成可見即汝亦可見吾之見何以故見既是物當成差別之相豈不歷然可見乎然吾觀物實無一定有時縱目取相則見物有時收視離相則不見汝若當吾見物之時依彼同見之物謬言見吾之見者設當吾收視離相不見物時何不并吾不見之體亦見之而指其所在耶不見之時既不能見同見之時亦豈真能見哉又汝若執言我已見汝不見之處矣夫正當不見時見性是我不見之體諸物是彼不見之相今我見既已離物汝又見我自體此不消費力辨之我此不見自然非彼不見之物相矣又汝若不能見吾不見之地者此更不消費力辨之我此不見自然非物矣何以故可見尚然非物而況不可得見豈猶同於物相乎夫合可見不可見而展轉皆非是物云何非汝之自性乎又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立阿難若汝見時是汝非我見性周遍非汝而誰云何自疑汝之真性性汝不真取我求實此反辨前物不是見也夫我謂物不是見而汝亦未即信耶更再窮之又則汝今見此差別物時若彼諸物即皆是見彼亦一物此亦一物汝既見物物亦當見汝有情無情之體性紛亂混雜無復情器之分是物混也有情無情尚無從分有情與有情益不可辨是則汝見我時反成我見於汝世間諸人莫不皆然壞世間彼我之相不成安立是人混也阿難若汝見我時一定只是汝見而非我見彼我分明曾無壞亂是人分也夫有情與有情尚不混濫則汝見性雖周遍一切諸物有情無情判然逈別是物分也即是物莫能混非汝之真性而誰且此真性是汝固有之物云何不自信而反疑耶真性在汝自不信其為真而反從我口角邊討分曉乃言云何得知是我真性不亦迷乎宗鏡云若信入之時自然洞鑑圓明了達之際尚不因於心念何況就他人而求自法取彼眼以作圓通數寶終不濟貧説食焉能得飽但自親到頓入絶學之門惟在發明方達無為之旨第六番顯見不雜竟阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓遍娑婆國退歸精舍秪見伽藍清心戶堂但瞻簷廡世尊此見如是其體本來周遍一界今在室中唯滿一室為復此見縮大為小為當牆宇夾令斷絶我今不知斯義所在願垂弘慈為我敷演此第七番顯見無礙也阿難因見性周遍一語疑見大不當復小見通不當復塞故興問端而白佛言世尊若此見性本來周遍必我真性不雜於物者則應隨處不變矣今我與如來觀四天王勝藏寶殿或時而居日月二宮俯觀一四天下則此見周圓遍滿娑婆國界何其大也及退歸精舍秪見此園更入堂中清心而觀但瞻簷廡又何小也世尊若是此見體本來周遍一娑婆界矣大者不應更小何故今在室中唯滿一室大小不定如此為是此見自縮其大而為小耶為是墻宇所隔夾之令斷耶或縮或斷義必有在我今不知斯義所在故願垂慈為我敷演其義焉天王殿中衆寶俱在故稱勝藏日月宮皆摩尼寶成宮殿臺池天人充滿日宮雖火摩尼成而亦清涼同月但光勝下注成熱耳阿難隨佛或時居之孤山謂初禪唯見一四天下則娑婆國應指一小剎而言也伽藍此云園鍾云見性必我非餘知是自非他也既是自非他當能作主云何大小由他不自由耶若是縮大令小猶能作主若被物夾斷則不能為主明矣佛告阿難一切世間大小內外諸所事業各屬前塵不應説言見有舒縮此明舒縮大小在相而不在見也佛告阿難汝言此見縮大為小斯言誤矣夫一切世間大小內外以及明暗通塞諸所事業皆屬前塵根身器界相分邊事相則有形可言舒縮見本無形豈應説言見有舒縮耶縮心兼舒者有縮則有舒也譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應説言更除虗空方相所在以喻明之見性本無大小隨界空而現大小亦如虗空本無方圓隨瓶器而有方圓也今有方器於此其中惟見方空耳我且問汝此方器中方空為定方耶不定方耶若定方者易以圓器空應不圓乃器圓空圓是不定方也若不定者在方器中應無方空乃器方空方是又定方也定與不定俱不可定總之器在則然耳汝言不知斯義所在夫此大小舒縮之義性其無定亦如是無定則無在云何必欲求其在耶阿難若復欲令入無方圓但須除了方器器方一除方相即隱不應更向虗空尋一方相而除之以空體無方也則知欲令見無大小但須除却前塵不應説言更除見性大小之相以見體本無大小也方圓但由於器器除而方圓泯矣虗空更何所除乎大小但由於塵塵忘而大小泯矣見性更何所除乎忘塵功夫在起行因中但是觀想亦惟達界室本空頓息執持縱觀純熟心地豁然泯身空廓不見界室始是似無礙非真也直待觀行功極色陰消盡十方洞開無復幽暗身界內外影相分明如見掌果方是真無礙也然亦但是體無礙非用無礙大用無礙更在下文若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築墻宇能夾令斷穿為小竇寧無續迹是義不然此正斥其問之不當也若如汝縮小夾斷之問此見入室時既可縮之令小則應仰頭觀日時亦可舉之令上而世有挽見齊於日面者無有哉若謂築墻處既可夾之令斷則應穿竇處亦可引之令續而世有穿墻續見者無有哉既不能挽之令上又安能縮之令小既不能引之令續又安能夾之令斷故曰是義不然上云義性無定猶許其立義今云是義不然并所立之義而斥之矣一切衆生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端遍能含受十方國土此指其迷而重與發明也夫見本不可礙物本不能礙然衆生畢竟成礙者非由物礙但由無始以來不達萬物皆己而迷己為物遂失萬物一體之本心物既不屬於自心則非惟不隨心轉而反以轉心心既為物所轉是故動為物礙而於是前塵之中觀大觀小皆無自由分矣是知物本是心迷之為物則礙心亦如氷本是水結之為氷則礙水成礙之由正在自迷而為物轉耳夫為物轉者為衆生若能轉物則同如來矣蓋迷時身則蕞爾彌封滯殼心則暗然逐境偏局所以被轉成礙今能轉物則萬物一體圓而不偏達物皆已明而不昧身心圓明六根互用如是浮塵及世界應念化成無上知覺則身為法性身土為法性土盡十方世界為一隻眼盡十方世界為一佛土以如是眼觀如是土則數量銷減理事圓融故能不動道場而身遍十方於一毛端含受國土毛端含十方即小攝大十方在毛端即大入小毛中看國而國不小即小中現大國外觀毛而毛不大即大中現小此即事事無礙法界廣狹自在玄門又何舒縮大小之有哉見性之妙無以加矣此較前忘塵境界更是甚深彼方圓照此則圓用照用具足圓融亦性能之極致矣乎鍾云物即前文認物為己之物乃指生滅心非指前塵也迷即起信所謂最初不覺也自己真性本來周遍衆生不自覺知遂變為業識及相見二分於是本來真心全然遺失反被賴耶三分所轉故於前塵境上觀大觀小蓋見分又為相分所礙矣若能內脫身心外遺世界中翻業識則同如來身心萬物一體圓而不偏達物皆已明而不昧不動道場毛含十方小中現大大中現小自在無礙又何大小舒縮之有哉説到此則此見性已會歸如來藏妙真如性中矣道開云按世典大學曰格物中庸曰萬物育焉又曰能盡物之性孟子曰舜明於庶物又曰萬物皆備於我矣又曰物交物則引之而已矣此皆不為物轉而求轉物者但不知其力量作用果能轉物否耳若能轉物則同如來矣故肇論曰會萬物為一體者其唯聖人乎第七番顯見無礙竟阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身若實我心令我今見見性實我而身非我何殊如來先所難言物能見我惟垂大慈開發未悟此第八番顯見不分也阿難白佛言世尊若依佛今旨將此周遍一切之見精必是我湛然之妙性今此妙性現在目前外物上目前者既是我真則我現今身內之心能分別者復是何物耶而今身內之心分別外物實有作用而彼遍外物之見性實無別作用分辨我身彼見性若果實是我心主宰於我令我外見萬物內見自身者則是無別分辨者實乃是我而分別有實者反非是我矣且見性既在身心之前又能內見自身即同物能見我然物能見我佛前已斥其謬今何不為謬乎展轉推窮實所未喻故願垂慈重為啓迪也問既與物不分即成萬物是見何故文中又言無是見乎答文殊喻中明言有是則成二體不得成一體矣要須無是無非方成一體之妙蓋一體即是不分當知不分者是非雙絶之旨也賀云阿難疑處只認見性與身心為二耳復是何物物字從前咸是妙明真心中物生來蓋疑實有一物在妙明之中不能和會為一也不知身心器界當體本空全一真見譬如鏡中景像即鏡所現豈真有一物居於鏡中耶故佛以或是或非兩端詰之使之兩路俱窮然後正告之云本無所有元是菩提妙淨明體可謂盡情吐露矣鍾云前文因用真心不得故捨緣心不得此處因銷妄心不得故用真心不得雖聞汝身汝心皆是妙明心中所現物然此一物字無處安頓至陰入處界皆如來藏妙真如性則妄即是真所用身心即此見性初無二體矣佛告阿難今汝所言見在汝前是義非實若實汝前汝實見者則此見精既有方所非無指示問意雖多惟此在前是其謬本故但破一前相而諸疑盡釋矣佛告阿難汝今所言見在汝前是誠妄説都無實義若此見精實在汝前汝實見其相狀者既有相狀決有方所既有方所決可指示其在某處某處矣且今與汝坐祇陀林遍觀林渠及與殿堂上至日月前對恆河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑此令其從萬象中指出在前之見性也夫在前則必可指矣且今與汝坐祇陀林遍觀林渠殿堂日月恆河汝於師子座前舉手指此種種之相陰者林明者日礙者壁通者空乃至草樹纖毫無大無小但有形者無不指著若此見性必在汝前亦應以手確實指陳何者是見矣阿難當知若指空是見性既已成見矣又何者是空乎若指物是見性既已是見矣又何者為物乎舉空與物而萬象備矣汝可加番微細功夫披剝此之萬象要於萬象中剖析出這精明淨妙之見元指陳示我同彼諸物有相有狀分明無惑可也阿難言我今於此重閣講堂遠洎恆河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所説況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性佛言如是如是此印見性離一切相也阿難承佛確實指陳之命果然向萬物上目觀手指一番然舉手縱目俱皆是物絶不見在前之見性故曰無是見者又承佛微細披剝之命果然於萬象中著實剖析一番然欲其分明而轉不分明故曰雖菩薩亦不能即物而剖出精見使離於物逈露自性菩薩不能而況我初學乎是則在前之見誠為非實矣佛亟印之云如是如是許其無一物而是見也此科惟離一切物句難會蓋正表見性離一切相矣又謂不能剖出使離一切物不幾矛盾乎細詳語意謂即物求見固無是見者即物剖見使離於物而分明顯示亦無是見者如此方是離一切相也讀者詳之佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見然無一物是見見性固不在前即無一物非見見性又豈在前也哉佛恐阿難知見性離一切相而不知其即一切法也故復告云汝既決定不能向萬象前指出何者是汝離物之見性矣良以所指諸物之中無是見者今復問汝汝與如來仍是坐林觀苑乃至日月種種象殊必無見精受汝確指豈一切諸物果皆非見乎汝又發明此諸物中何者非見阿難言我實遍見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是此印見性即一切法也阿難承佛發明非見之旨乃言我實遍見此祇陀林以至萬象而不知是諸物之中何者非見也何以故若謂樹非見者云何見乃在樹若謂樹即見者云何又名為樹如是遍歷諸物乃至於空莫不皆然我又思惟是萬象中微細發明實無物非見者佛又印之云如是如是許其無一物而非見也先德云是他得的人道是也有出身路道非也有出身路所以世尊無是見無非見兩皆印許按此本明無非只合云若樹非見云何見樹足矣又曰若樹即見復云何樹復兼無是者恐聞無非番又墮是示此雙絶蓋權人之妙旨有焉夫見性量括十方體含萬法其與萬法非即非離惟其非即也故能靈光獨耀逈脫根塵身界無干生死不繫衆生不達斯義則混淆真妄沉溺輪回既無智以自分終何由而得脫乎惟其非離也故能塵剎混融萬物一體用彌法界存泯自由衆生未達斯義則沉冥滯寂灰斷纏空既自昧其家珍亦何由而能用乎故前自指見以來不動不滅不還不雜及無礙之前半皆約不即之義分真析妄以決擇乎離塵獨立之體今此不分之科乃約不離之義泯妄合真以顯泄乎與物混融之妙將使衆生明乎不即之義則不淪生死明乎不離之義則不滯涅槃若相背而實相成也於是大衆非無學者聞佛此言茫然不知是義終始一時惶悚失其所守如來知其魂慮變懾心生憐愍安慰阿難及諸大衆諸善男子無上法王是真實語如所如説不誑不妄非末伽黎四種不死矯亂論議汝諦思惟無忝哀慕此由聞兩番印許故一衆茫然也於是大衆有學聲聞聞佛如是之言茫然不知無是見無非見之二義後度而莫測其終前推而莫尋其始河漢其言亡其故步蓋或是或非決於一定則可為守今則雙許俱無曾無一定故惶悚而失其所守也如來知其魂慮變懾乃心生憐愍安慰阿難及大衆云諸善男子勿用驚疑無上法王是真實語稱真如理説無賺誤之誑無虗偽之妄非同末伽黎外道託言有不死天一生不亂答人者當生彼天立為四種矯亂論議曰亦變亦恆亦生亦滅亦有亦無亦增亦減皆持兩可終無決定今無是見無非見決定雙遣二俱不立豈同彼矯亂不定哉但汝等心粗慮淺不諦思惟若肯諦思當有落處必不孤負汝哀慕之誠也賀云前用一喝使阿難矍然此用雙許使大衆茫然蓋妄須頓破故一刀兩段以掃之真難直説故委曲擒縱以窮之是時文殊師利法王子愍諸四衆在大衆中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大衆不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮惟願如來大慈發明此諸物象與此見精元是何物於其中間無是非是此因大衆茫然故須大智慧人代請決疑也是時文殊師利愍此四衆乃從座起頂禮恭敬而白佛言世尊此諸大衆不悟如來所發明二種精見色空無是無非是二義世尊若此前緣色空等象若是見者應當即萬象而指出其象胡為不能若非見者應當即萬象而一無所見胡為一矚之時無處不是今此大衆正由聞此深法義趣玄遠無所歸著卒難領會故有驚疑怖畏非若疇昔在法華會上善根輕鮮聞大法而不肯擔當也惟願如來大慈再為發明此諸物象與此見精元是何等物件乃在兩楹之間既無有是又無非是乎是非是義者是與非是二種義也是義者無是見之義非是義者無非是見之義缺二無字語之略耳佛告文殊及諸大衆十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是此會見與物而歸一真體以發明無是無非之旨也見即見精見緣即六塵色空等物想即六處識心相即六根身相并指身心也佛告文殊及諸大衆由汝等未得首楞嚴大定故於萬象中分物分我分是分非若諸佛諸大菩薩自證首楞嚴三昧所謂那伽常在定無有不定時住此定中凡見分之見精及相分之見緣并所想相之身心皆如目病見空中華本無所有良由此見相二分元是菩提妙淨明體所謂法性如虗空諸佛於中住住此法性尚不見有色空精見云何於中有是而復有非是乎世尊至此和盤托出矣問佛初惟以見為性而曲明其不與身心萬物為侶似謂見獨真而餘皆妄矣今乃論妄則降見性同是空華論真則升諸法同為真體固是極理之論其奈無所適從何答下文雖自了然今更助一喻一真如大海中水見精如水之光諸所物象如水中之影特因愚者認影為實反忘其水今欲令其捨影認水其奈水體瑩徹不見其形故且令其認彼水面之光故一一斥影為妄讚光為真欲其即光以識水也而彼愚者復執光影各自有體橫起是非故復明其光影皆無有自體全惟一水是其實體故知光影雖曰皆虗然以光較影則影有生滅光無去來影各偏局光通周遍又光影雖皆即水然取影則有淪溺之危識光則有得水之益且影自是外境所映而光實自體無餘然則由斯喻而詳彼見精之與萬法雖同妄同真而得失差別仍判然矣文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月世尊既與發明復恐不能信解要令文殊從旁添注故問之曰文殊吾今問汝即汝此身是箇真文殊還許此文殊外更添一箇文殊喚作是文殊得麼還許此文殊內減却一箇文殊喚作無文殊得麼文殊是大智慧人氣味相投自然同聲相應故曰即我一箇是真文殊此外不得更添一箇是文殊何以故若更添一箇是文殊則我便有兩箇文殊然我有一箇真文殊在又不得喚作無文殊蓋副本體而更有方可説是并本體而全無方可説非今不有不無於中焉有是非二相此喻正言除却一箇真體外添一箇萬物是見不得減一箇萬物非見亦不得以真如體不剩一法不欠一法圓同太虗無欠無餘故也佛言既知真文殊上本無是非則此妙明之見與諸空塵之物亦復如是蓋此見與物本是妙明無上菩提淨圓真心由最初不覺而起一念故迷為業識轉為見相二分相分所攝則有色空見分所攝則有聞見良以色空聞見依真而起如第二月既如二月則知本無豈可在第二月上妄生卜度曰誰為是月又誰非月不知生是生非皆是未見真月者也文殊若但見一月為真則不妄立是非矣如第二月與前不同前單喻見此則兼喻色空也是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是真精妙覺明性故能令汝出指非指此汝字指阿難此又以法合喻重與發明也見即見精塵則內而身心外而萬物咸皆該盡心亦屬塵者以其為塵影故也由汝未曾住此首楞嚴定智眼不明於依他法上生種種遍計約身心而言見性在前約萬物而言是見非見俱是虗妄亂想不得真實故不能於中出是出非如觀第二月而恣其卜度終不出於是月非月之妄論也若得妙發真三摩提了知見精與身心萬物元一真精妙覺明性本惟一體方得頓悟萬法悉無自他之別肯復擬見性於身心之前而言其可指度見性於萬物之內而言其不可指哉如淨眼人得見真月決不指此月為是月非月也蓋初堅執在前似妄謂可指及對物詳辨又似謂不可指是皆妄想所惑擬度紛然今悟一真斯疑頓絶故曰出指非指故知迷現量則是非橫生悟真性則空明廓徹如是而已第八番顯見不分竟出者超也指非指應前既有方所非無指示阿難白佛言世尊誠如法王所説覺緣遍十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種説有真我遍滿十方有何差別世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常説自然我説因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入群邪獲真實心妙覺明性與字猶類字此第九番顯見超情也自然因緣皆是妄情計執今此見性並不屬此故曰超情也覺緣即見性也以見性能見明見暗見塞見通遍緣一切故目之為覺緣也阿難見如來發明精見色空元是菩提妙淨明體方得領悟見性周遍之語而復疑其濫於外教違於自宗也故白佛言世尊誠如法王所説覺緣果然周遍果然常住果然不生滅者則先梵志金頭外道所立二十五諦中第一冥諦謬稱冥性常住及投灰等諸苦行外道計有神我遍滿十方而今所説覺緣遍十方界與彼所計冥諦神我遍十方界者有何差別乎此與認魚目為明珠認山雞為彩鳳者無異矣又昔世尊亦曾於楞伽山為大慧等廣辨內教與外道所以不同之義彼外道等常説自然謂內而心性外而萬物悉本無因自然而然如云誰開河海堆山嶽誰削荊𣗥畫禽獸世無一切能生者是故諸法常自然斯則撥無因果不立修證故佛廣説因緣以破之以我所證境界非彼所證境界故也我今觀此覺緣見性亦是自然本有不遺故非生究竟不壞故非滅一真一體故遠離虗妄無自無他故遠離顛倒千差之內處處現成萬象之中頭頭逈出如是不特與如來所説因緣相違反與外道自然相合違反自宗濫及外教一涉於邪又成虗偽復入昏冥不知世尊更有何等方便開示如來所説與彼外道所計各有不同我等始得不入羣邪方得真實心及妙覺明性也因謂因生種子緣謂助發資緣如百等物須以根種為因水土為緣方能生出萌芽也佛為權乘説法皆談因緣鍾云楞嚴圓教全相是性阿難分性相為二故疑外道真我與妙覺混前文云見必我真我今身心復是何物謂身心之外別有見性即是疑根也即此便成和合不和合二相何以明之謂有一真我在十方之中便是和合謂真我與十方體不相雜便是不和合世尊不與分疏但舉五陰六入十二處十八界本如來藏妙真如性及七大圓融周遍乃是遠離和合與不和合及因緣自然諸計消亡外道之真我不辨而判然矣與彼自然與字猶類也云何開示者阿難實以為自然而但求不同於外道不知何但不同且了無自然之義也道開曰此方道教謂天法道道法自然真計自然也佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明此破自然也佛告阿難我今如是破妄心顯見性不知費多少曲折開多少方便真實為汝汝猶不悟乃復惑為自然耶阿難若汝必執見性為自然者須當甄別明白自己有箇實體不遷不變方是自然且汝觀此妙明見性所見諸相明暗空塞之中定指何法為自然體若以明為自然者則此見性只合見明不合見暗若復以空為自然者只合見空不應見塞如是乃至諸暗等相但以為自即不復見明以在此自然即應在彼斷滅也今既明來見明暗來見暗隨見隨變則知覺性定非自然云何執為自然耶鍾云自然謂自體本然也自體本然則不隨境變今皆隨變非自然矣阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞此破因緣也阿難言必此妙見既非自然定屬假借如四緣生識之類我今發明是因緣生矣然心猶未明必當咨詢如來此覺性本來遍常性非生滅云何方得契合因緣之旨佛言汝言因緣吾復問汝汝今因見明暗空塞而後有見性現前者則此見性於明暗空塞中因何而有阿難若以明為種子而得生者及其以暗代明即如以沙易苗何以生應不見暗因暗亦然乃至因空因塞亦同明暗復次阿難汝此見性於明暗空塞中緣何而有阿難若以空為生見之助緣者及其以塞代空即如以火易水芽何以發應不見塞緣塞亦然乃至緣明緣暗亦同空塞今既見明又能見暗見空又能見塞則知體性不變不從因生不隨緣生明矣鍾云假物為因循物為緣既無定趣非因緣矣按見性是自體明暗色空是他法自體能隨他法非自然也他法不能變自體非因緣也當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉此下重重拂迹結顯覺性不變隨緣隨緣不變也以執自然者不解隨緣執因緣者不知不變故有外道小乘之別若夫不變隨緣隨緣不變是世尊説法之弘範入理之深談故結示云當知如是精覺妙明不屬因緣不屬自然非不自然非不因緣本無非與不非亦無是與不是以此精覺妙明元清淨體離一切相故非則皆非即一切法故是則皆是擬心即差動念即隔云何汝等於妙覺中指心作意乃以世間戲論名相所謂自然因緣者測度如來妙覺明性何異以手撮摩虗空虗空云何隨汝執捉耶宗鏡云因緣自然皆是世間言論有無真俗悉是分別識心若不直見其事欲以意解情求如將兔角弓架龜毛箭以無手人擬射須彌山徒役塵勞終無是處又先德云非因緣非自然妙中之妙玄中玄森羅萬象光中現尋之不見有根源與此互相開發也諸世間者相宗中有學者世間非學者世間自然者外道所宗即非學者世間戲論因緣者權乘所宗即學者世間戲論也第九番顯見超情竟此非以精覺妙明混為見性也然隨緣不變不變隨緣亦從見性悟出世尊語自分曉阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣説見性具四種緣所謂因空因明因心因眼是義云何此第十番顯見離見也夫見精既曰真妄和合則可約義而分真妄二見但約真見帶妄時即名妄見離妄時即名真見今言離見者即真見離於自體中一分妄見而已非謂離身邊等見也阿難白佛言自然之非則吾既得聞命矣世尊若謂此妙覺見性為非因緣者世尊云何常與比丘宣説見性具四種緣所謂因空因明因心因眼目前不空不明何以有見吾心無眼何以能見所以必墮因緣今示見精全不託此豈今是而昔非耶抑今昔義同而我未達耶阿難所引見性蓋是眼識如來所示乃是根中之性大乘眼識九緣方生小乘法中粗具四終缺一不可然皆眼識得生之緣心指第六識以小乘不達七八心法惟一也儒云心不在焉視而不見是也規矩謂愚法聲聞不分根識信乎鍾云因緣自然二皆被斥而不問自然者非自教也因緣自教故重起問法相宗中但説因緣生識初未曾説四緣生妙覺性以妙覺性非生因之所生故阿難認妙覺性從因緣生混誤甚矣故下文先破見性不屬四緣反顯妙覺性是見性所不及者決不屬因緣也佛言阿難我説世間諸因緣相非第一義此明昔教與今教大不同也佛言阿難我昔説因緣但為對治自然誘引小乘一時權宜之説非今所説第一修證了義之教也何得取彼而難此乎昔日常談四緣生識者正為外道妄執自然故借因緣以破之所謂以楔出楔第二門頭事也阿難吾復問汝諸世間人説我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相陵奪非汝見性於中暫無如是則知二俱名見云何不見此探其所藉之緣而折之也佛云阿難吾復問汝即如世人各各自説我為能見是因何物而成見既已成見復因何物而不見阿難答言世人因日月燈光見種種相故名為見若無日月燈光則不能見此明見與不見皆屬因緣故知見性從因緣生矣世尊借其語以破之曰阿難若此見性無此三種光明名不見者應不見暗矣若謂雖不見明必能見暗者斯則但是無明云何稱為無見耶阿難若謂在黑暗中不見光明名不見者則應在白畫時不見黑暗亦名不見如是則見暗見明俱名不見有是理乎若謂明來暗謝暗來明謝自是明暗二相自相傾奪非關見性暫有暫無如是則知見暗見明皆名為見云何見暗之時名為不見哉當知順世間法惟許明見不許暗見須假多緣今自指根以來即取暗中有見然則暗中之見尚不用眼何假空明及分別心耶是則顯一暗中之見則四緣俱破矣阿難誤認妙覺性為因緣法然且不獨妙覺性不屬因緣即見性又何曾屬因緣哉故此且借名見者以破之是故阿難汝今當知是明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就汝復應知見見之時見非是見見猶離見見不能及云何復説因緣自然及和合相此引自體離緣以例真見離見也是故阿難汝今當知我從前所説此見見明非明見暗非暗見空非空見塞非塞明乎能見之性非即所見之境皆是離緣第一義已自超乎因緣宗矣明暗空塞之四義既成就能例之法如此汝復應知此見精中真妄和合有本體真見即帶一分無明妄見當真見忽爾現前便能徹見妄體然才一見時則斯真見之體己即脫於妄見不復墮於其中故曰見見之時見非是見良以上之四義皆以能見之性見於所見之境而性即非境今亦例此以能見之真見見於所見之妄見而真見即非妄見也夫此真見尚猶離於雜妄之見精而使見精不能及則豈有並見亦離而尚可謂其待於因待於緣乎云何復以世間戲論妄為擬議而説因説緣與對因緣之自然及類因緣之和合相也此是世尊引尊者向萬仞懸岩處更與一推要令撒手承當耳鍾云將明暗色空推論成就見性離此四塵之義是則見性不屬緣生明矣然見性雖不屬緣生猶屬自己業識變現與妙覺性尚隔一層故乘便破之曰汝復應知云云見見之時見非是見見猶離見三句上三箇見字指性體下三箇見字指見精蓋又以見精為妄而性體為真矣是則性在見中名為見精性離於見名為見見語意若謂見明見暗見空見色特見耳妄見也見此見者方稱真見真見已離見矣非彼見所能及況因緣自然和合等相而能及之哉見精屬第八識真中帶妄故下文舉別業同分二種妄見説明下三箇見字所謂眚即見勞影見俱眚等是也妙覺性屬第九識純真無妄故下文又以彼見真精性非眚者故不名見説明上三箇見字蓋清淨實相即真見也即前之精覺妙明也此正起信論中所謂從等入妙用究竟覺觀照生相無明識陰已盡之時乃入地菩薩隨分覺中所不能及宜阿難之迷悶也又云見見之時見非是見見猶離見見不能及蓋直顯真性離却見精矣近交光以為如來意重顯見力闢破見之説不知八還以前可云顯見如金在礦不能去礦至此則真性獨存而見精自然銷落如一月是真更無第二月矣乃見自破非人破見也汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路此極口勉勵也良由汝等聲聞局溺舊聞得少為足既狹且劣而無甄別之智一向只在遍計依他上尋覔生活不能通達一切無染諸相非相之實相吾今既已誨汝汝已得聞當更深思細察努力勤行勿得悠悠忽忽半途止息自生疲怠良以欲至菩提唯此見精一路為最妙也第十番顯見離見竟通上十科論之初科則顯其脫根脫塵逈然而靈光獨耀二科則顯其離身離境凝然而本不動搖三科則顯其盡未來際究竟不滅四科則顯其從無始來本有不遺五科則顯其無往無還挺物表而常住六科則顯其不雜不亂超象外以孤標七科則顯其性元自在轉萬物而大小何拘八科則顯其體本混融譬一月而是非莫辨九科則顯其諸情不墮遠越乎外計權宗十科則顯其自相亦離轉入於純真無妄顯見至此可謂顯之至矣舊解總將如是顯意而悉為破見亦獨何歟特就衆生迷位尚有二種見妄未除故曰帶妄顯真耳帶妄顯真已竟此下剖妄出真也二種顛倒見妄如璞蘊玉而見之真精如玉在璞故帶妄示真如指璞説玉雖珍貴非虗而粗石未剖美玉未瑩此科剖妄出真如剖璞出玉精瑩煥發矣是以前之破識破至無體乃為真破此之剖妄實體反露所謂不畢竟破似破而實顯也可槩以為破乎阿難白佛言世尊如佛世尊為我等輩宣説因緣及與自緣諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨此因疑見見非見而重請發明也阿難白佛言世尊如佛為我等宣説因緣自然是我所已問者並及諸和合相與不和合是我所未問者此等四義見性皆離我心猶未開悟已是迷悶又聞見見非見之説夫世尊既曰見性不動不滅非舒非縮乃至見與見緣元是菩提妙淨明體則此見精即妙覺性明矣而忽復云見見之時見非是見見性是一何故説真説妄時抑時揚反覆無定令我迷悶益增尤不知其所以然伏願弘慈施大慧目開示我等覺心明淨良以纖疑在念則覺不明淨必須釋迷悶而開未開然後覺心無不明淨矣作是語已悲淚頂禮以承受聖旨焉佛啓清淨實相而阿難又乞慧目則此下圓發空如來藏無疑矣鍾云破和合不和合在後而此牒已聞則後文應置前破因緣之次況因緣自然和合皆是遍計義類相從合居一處破之爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路此經家敘佛意也陀羅尼此云總持謂總一切法持無量義也諸三摩提總目二十五圓通妙修行路密指耳門以此二句釋上陀羅尼顯修門中耳根圓通即大總持也不依舊注平派定慧止觀等蓋凡欲事妙修先求真智廣開真智皆所以為妙修之地故佛方近談微密觀照而經家先遙敘之觀將欲二字則其意甚遠在五六卷中也爾時世尊憐愍當機及諸大衆將欲敷衍大總持門諸三昧中最簡最要妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果佛意如此乃告阿難言汝雖強記但恣口耳未了實義於奢摩他性具本定微密觀照本具照體朗然現前者心猶未了汝今諦聽吾當分別開示亦令將來諸有漏者盡獲菩提極果焉有漏尚令成佛無漏不待言矣起心對鏡思惟粗觀非微也制身靜坐出入定相非密也簡異於此故曰微密又離妄絶相曰微即相無相曰密今所説見見非見乃至七大遍周正離妄絶相微觀照也下文滿慈二答正即相無相密觀照也此意照盡三如來藏是謂真智由此真智方能造後妙修也鍾云微密觀照者對粗疏言故曰微密以分別覺觀為粗疏故以反觀之智為微密以用此而見暗見明謂之覺觀用此而反觀自性破除業識直見覺性即名微密觀照非二物也阿難一切衆生輪回世間由二顛倒分別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見此將見性演為二種見妄也阿難我謂見見非見者豈無故哉良以真見中元有二種妄見耳彼一切衆生自凡夫上至二乘未免分段變易生死而輪回世間者皆因最初一念不覺無明妄動轉此覺性遂成見分以有見分遂有相分而成二種顛倒分別見妄以背覺性而合無明故曰顛倒以有微細流注分別根身器界故曰分別是二見妄背清淨覺突然而起但有惑現未及業招故曰當處發生即於當處惑境之中取著造業隨業受報次第遷流故曰當業輪轉是則見妄能招如是大患故不可不了悟而遠離也然所謂二見者云何為二一者衆生別業妄見約一人一識所見根身器界而言也二者衆生同分妄見約多人多識所見根身器界而言也要知見性是不龜手之藥在人善用不善用耳若果善用則即妄是真若不善用則全真是妄而又何疑於見見非見之旨哉問阿難既疑見見非見世尊不直答而廣明二種見妄者何耶答若不廣示妄見有見不能顯發真見無見故下文廣約一人多人對辨應知未離無明眚病者無論凡小即等覺菩薩亦名見妄唯佛一人眚病盡除方名真見耳當處發生者當處顯不動意如夢所見無量多境無量奔馳不離床枕寸步無移此即根本無名三細識相為二乘變易生死之因也當業輪轉者即發潤二種無明六粗識相為凡夫分段生死之因也云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應説言此揑根元是形非形離見非見此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見此設喻以明別業妄見也云何名為別業妄見阿難如世間人目有赤眚則夜見燈光別有圓影而五色重疊焉於意云何此燈所現圓光為是燈之色耶為是見之色耶阿難若是燈色則無眚人應同見矣何不同見而唯有眚者見之若是見色見既成色矣則彼眚人又用何等見此圓影是則圓影不即燈見而有矣復次阿難若此圓影離燈別有者則合傍觀屏帳几筵皆有影出矣而何獨燈有若此圓影離見別有者則應不用眼矚矣云何見圓影者仍是眚目也是則圓影亦不離燈見而有矣既非即燈見而生又非離燈見而有然則從何處起是故當知燈上只有光明眚病乃成圓影不惟所見圓影是赤眚生即能見圓影者亦是赤眚所成故曰影見俱眚然能見眚之見體實未嘗墮眚病中也故曰見眚非病是則圓影從赤眚生無關燈見不應執此即燈見生而曰是燈是見離燈見有而曰非燈非見也正如第二月非真月體亦非月影何以故以此第二之觀揑目所成故既從揑出豈應執此是月之形非月之形離我見生非離我見生此亦如是眚即揑也圓影即第二月也既惟目眚所成燈見總無干涉更欲名誰是燈是見何況分別非燈非見耶所謂別業妄見如此當知目喻自覺聖智也燈喻本覺真理也赤眚喻無明業識也圓影喻根身器界也以如如智契如如理理智一如本無能所無明一動能所遂分故有根身器界發見耳經云凡所有相皆是虗妄旨哉此章只表喻未表法以法在進退合明下也諸講法喻混攙遂增葛藤且難為下文矣鐘云別業同分正阿賴耶中業識所變相見二分然觀燈中圓影既非是燈又非離燈既非是見又非離見可見妄元無因見圓影者更無他故只是目眚怪頭走者更無他故只是心狂眚除即是清淨眼狂歇即是妙明心一部楞嚴只明非惟真心非因緣非自然即妄心亦非因緣非自然所謂識迷無因妄無所依尚無有生欲何為滅言不出此云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其中或有三兩百國或一或二至於三十四十五十阿難若復此中有一小洲祗有兩國唯一國人同感惡緣則彼小洲當土衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負珥虹霓種種惡相但此國見彼國衆生本所不見亦復不聞此明同分妄見也云何名為同分妄見阿難此須彌山南閻浮提洲除却大海水中間平陸共有三千洲正中大洲東西括量大國凡有二千三百其餘二千九百九十九洲在諸海中所有國土或三百兩百最小者或一國二國以至於三四五十俱皆無論阿難若復其中最小一洲洲中止有兩國其一國中共感惡緣當土衆生覩諸不祥或見二日兩月乃至惡氣還匝之暈薄蝕之適妖氣近日而如珮玦星芒遍指之彗芒氣四出之孛橫去之飛下注之流氣夾日而如耳之負耳氣映日而成形之虹霓如是種種惡象但此一國人見彼國衆生不惟不見亦復不聞見者共業所感也不見者以無同業也所謂同分妄見如此此比別業中既略即離二義復缺妄因略者意欲準上也缺者留待下進退文中例出也阿難吾今為汝以此二事進退合明二事者同別二喻同別二法也進退者先進別業之喻合明別業之法次退別業之法復進別業之喻以例同分之法次復退一人別業之喻進一國同分之法例大千之同分也合明者謂以法喻同別比例發明也阿誰如彼衆生別業妄見矚燈光中所現圓影雖現似境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎例如今日以目觀見山河國土及諸衆生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚覺所覺眚覺非眚中此實見見云何復名覺聞知見是故汝今見我及汝并諸世間十類衆生皆即見眚非見眚者彼見真精性非眚者故不名見此進別業之喻合明別業之法也阿難如彼衆生別業妄見矚燈光中所現圓影此影雖有相現非是實有名為似境終彼見者目眚所成眚即見病妄發勞相實非燈色所造然見此赤眚者終非有眚病之咎良以眚不見眚而見眚者乃見之真體彼固無恙耳吾今以喻合法例汝今日以目觀見山河國土之器界及諸衆生之根身皆是無始見病所成目觀是見分國土衆生是相分無始見病即無明業識由彼無明初成業識轉生見相二分則見如眚翳相如燈輪從此浩劫莫復清淨故曰見病所成正合終彼見者目眚所成也夫見與見緣二分俱依自證而起由依他起不是實有故亦曰似正合雖現似境也然此見相二分元是我本覺妙明心體忽起一念而成眚妄遂有能見及所緣耳此合眚即見勞非色所造也若以本覺明心覺此見精從赤眚生則此本覺明心雖在日用遍覺諸緣實非有眚之妄見可並此合然見眚者終無見咎也夫既覺緣非眚矣則知覺本是真眚本是妄未覺眚時覺常墮於眚中才覺是眚覺早出於眚外此即向前所説見見之時見非是見之義也蓋覺眚即脫於眚便是見見即脫於見云何將此離見之見而與覺聞知見齊稱並列何異將荊山之璧與碔砆共價不亦誤哉是故當知汝今見我及汝並見十二類生此見有能有所皆是目中帶眚之見非是照見眚病之見似彼照見眚病之見真而不雜於妄精而不雜於眚若摩尼之映色似明鏡之現形終日見而不見有世間相故不可以帶眚之見目之故曰見猶離見見不能及也汝何迷悶於此哉言見復兼覺聞知者一體同具也眼所現見名見從他傳聞名聞自運己心之所思搆名覺自內所受及自所證名知黃檗云學道人莫認見聞覺知但於見聞覺知處認本心以本心不屬見聞覺知亦不離見聞覺知故也仁王經云金剛定前所有知見皆不明見唯佛頓解其一切智所有知見而得名見故曰妄知有知有所不知真知無知無所不知妄見有見有所不見真見無見無所不見是故衆生知見盡而後佛知見現也阿難如彼衆生同分妄見例彼妄見別業一人一病目人同彼一國彼見圓影眚妄所生此衆同分所見不祥同見業中瘴惡所起俱是無始見妄所生此退別業之法復進別業之喻合明同分之法也以別業妄見虗而易明同分妄見實而難信意欲將實者皆同於虗也阿難如彼衆生同分妄見退而就彼別業妄見之例以一病目人同彼一國人彼病目人所見圓影屬眚妄生例此一國之人所見不祥從共業中惡緣所起雖虗實有異所見不同然俱屬無始見妄所生進燈輪以合明災象則災象固一國之眚翳也退災象以合明燈輪則燈輪亦一人之瘴惡也例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死此退別業之喻進同分之法以例大千也既一國所見不祥從瘴惡起則南閻浮提三千洲中諸國皆然南洲諸國既爾其餘三洲諸國皆然一日月所統世界既爾則釋迦所統百億日月大千世界亦然大千世界既爾則釋迦十方分身諸佛所統世界諸有漏國亦然良以此等衆生同是覺明無漏妙心最初一念妄動轉為見聞覺知由此四種根中積生無始虗習乃至分劑頭數和合一處為虗妄病緣俱時而生俱時而死生死根本實基於此故起信云生滅與不生滅和合非一非異名阿黎耶識為流轉生死因也問別業之喻何以不例大千答以大千與一國同在同分妄見中收但恐一時不能領會故以喻合明一國之同分即以一國之同分例大千之同分也進退合明竟若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住此發明轉二種見妄為涅槃菩提元清淨體也諸和合緣者即發潤二種無明以與境界為緣和合而起即六粗識相為分段生死因前文所云當業輪轉者是也不和合緣者即根本無明背清淨覺突然而起即三細識相為變易生死因前文所云當處發生者是也若將此微密觀照照破二種無明則二死之因永離二死之果永絶矣至此可稱圓滿菩提可稱不生滅性可稱清淨本心可稱本覺常住今汝二種見妄未除二死未出業識茫茫無本可據便欲將此生死根本當妙覺性不亦太早計乎若善思惟能以微密觀照照見生死根本從命根下猛力一刀一斬齊斷方與清淨妙覺名目相應矣密嚴偈云如來清淨藏世間阿賴耶如金與指鐶展轉無差別以諸佛了之成清淨藏衆生執之為阿賴耶如真金隨爐火之緣標指環之異名真心隨染淨之緣成聖凡之異號認假名而二見俄興悟真體而一心圓證也賀云此正所謂離見也和合緣即下文分為六和合也不和合即下文湛入合湛歸識邊際也二種俱屬見精但和合是行陰不和合是識陰與首卷二種根本相應前以攀緣心為生死根本以識精元明為菩提涅槃元清淨體此又以識精中一分妄見為生死根本須離此妄見然後滅除生死根本純是菩提涅槃元清淨體故曰見猶離見見不能及正應此段遠離諸和合緣離字按二種見妄雖曰顛倒分別然此分別乃任運歷然不昧而已所謂微細流注分別非作意計度粗分別也總謂之見妄者體即陀那細識見分中和合一分深惑下文諸佛所稱俱生無明生死結根是也十番所顯即其本具之真何干於妄二見所破即其本具之妄何礙於真向後四科七大所顯如來藏性非別有體即此見性轉名藏性耳破二種見妄竟阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合見見已明迷悶已解但阿難原問因緣自然諸和合相與不和合心猶未開而前超情科中已明因緣自然二義獨和合與非和合未與發明故稱呼而告之云阿難此覺妙明非因非緣亦非自然乃我所已説汝所先悟者無煩再贅矣若乃如是覺緣非和合生及不和合汝實未悟我亦未説今豈吝為汝開示哉阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者則汝今者妙淨見精為與明和為與暗和為與通和為與塞和若明和者且汝觀明當明現前何處雜見見相可辨雜何形像若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義彼暗與通及諸群塞亦復如是復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合若明合者至於暗時明相已滅此見即不與諸暗合云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗彼暗與通及諸群塞亦復如是此破和合也和合者混萬物而為一也若果和合應無菩提故破之云阿難吾今復以所見前塵問汝汝今猶以世間妄想諸因緣性而自疑惑執此清淨覺心亦是和合而起者則汝妙淨見精在明暗通塞之內與誰和耶且所謂和者如水和土混而不分之謂也若謂見精與明和者且汝舉眼見明適當明相現前之時從何處所雜此見精而與之和耶且明之與見兩不相雜故歷歷可辨若兩相雜則明失其明見失其見復何形像而知見與明和耶且凡物之雜和者必先相離而後相即若謂明相現前而非是見則相在相處見在見處各不相知不應有見云何見明若謂明相現前即是見者則見不自見今乃云何見見是則雜即雙絶又何由而成和乎必曰見性圓滿則無空處可與明和若曰明相圓滿又無隙處可容見性若謂見必是見明必是明各各相異今若雜和則見失其名明失其字豈不失彼本明名字不惟失其名字又雜則並失見與明之本性名性俱失而曰見與明和決無是義是則和明之義不成矣彼暗與通及諸群塞亦復如是可例而知其非和也復次阿難汝此見精在明暗通塞之內與誰合耶所謂合者如蓋合函附而不離之謂也若此見精既與明合至於暗時明相已滅此見亦隨明滅決不復與暗合云何暗來又能見暗若謂雖則見暗而實不與暗合者既見時不合則必合時不見前言與明合者應非見明既不見明云何明合時了然知其是明而不是暗今既能見明復能見暗決知此見不與明合是則合明之義不成矣彼暗與通及諸群塞亦復如是可例而知其非合也阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶妙覺元根中之性也諸緣塵塵也心念慮識也正辨根性連帶塵識非則俱非也阿難白佛言世尊和合不成即非和合如我思惟此妙覺元與諸緣塵及心念慮果非和合耶才離於是又墮於非矣鍾云妄計分別不出自他共無因四性自然即無因因緣即共阿難所執空明心眼空明即他心眼即自又佛説同別二種見境見亦自境亦他既有自他必含共性由共性難破更作和合而説然則非和合義亦從自他開出為防惡習委曲搜揚耳佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成彼暗與通及諸群塞亦復如是又妙見精非和合者為非明合為非暗合為非通合為非塞合若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理彼暗與通及諸群塞亦復如是此破不和合也不和合者不與萬法為侶也若果不和合應無生死故又破之云汝今又言此覺性非和合者吾復問汝此妙見精在明暗通塞之內與誰非和耶且體相雜入既謂之和則體不相入方為非和如磚石並砌二體各不相入而中間必有邊畔乃調之非和也若此見精不與明和則見與明各有界限汝且諦觀二種界限何處屬明何處屬見在見在明以何為畔阿難若謂明邊際中必無見者則彼與此各有疆界各不相及已不知明在何處齊何處而分畔云何成不成畔義則自不成非和義矣彼暗與過及諸群塞亦復如是可例而知其非不和也又妙見精非和合者在明暗通塞之中與誰非合耶且非合即離故逈不相遇方為非合若謂見性不與明合則見與明正如牛之兩角兩相乖戾又如以耳聽明了無關涉既不相觸則此見精且不知其明相所在云何甄別合與不合耶不能甄別則自不成非合義矣彼暗與通及謂群塞亦復如是可例而知其非不合也此後無結尾者以本屬前超情科中餘意故不另結必欲結之可準前文云當知如是精覺妙明非和非合非不和合乃至隨汝執捉自此顯見已極而奢摩他從根指心方便亦盡向後轉名如來藏性不復呼為見性之遍名矣剋就根性真指真心已竟舊説以上正當法界觀中會色歸空觀此下會通四科即性常住也前科言寂常妙明之心最親切處現具根中故剋就根性直指真心然雖近具根中而實量周法界遍為萬法實體今於萬相中一一剖相出性是以不復稱其見性之別名乃舉其總名曰如來藏心妙真如性雖總別異稱體惟一而已矣阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得上云見妄即見之相妄也見精即見之性真也此承上而言阿難不但見精相妄而性真也汝猶未明世間一切浮塵諸幻化相如陽𦦨空華乾城夢境塵埃野馬無根之物當處出生來無所從隨處滅盡去無所止此等浮塵徒有虗偽名相實無自性若論其性真即衆生妙覺明之實體而已良以妙覺明體如鏡浮塵幻化如鏡上之影影雖至虗境體原實所以諸相至虗其體皆實以其即妙覺明體故也彼等至虗之法尚是真覺之體況陰入處界是衆生自己護惜之物而獨非真覺之體乎且舉平日所談諸世間法如色受想行識之五陰眼耳鼻舌身意之六入六根六塵之十二處以至根塵識之十八界如是四科人皆知其因緣和合虗妄有生因緣別離虗妄有滅殊不知此生滅去來既皆虗妄既無自體而所以能現乎此者果是何物當知本是如來藏中常住妙明不動周圓妙真如性隨緣乍現而已夫不達妄是真如故妄似有體今既是真常性體則去來迷悟生死於真常中亦是幻妄稱相杳無實之可得矣如覩鏡中之物不知是鏡中之影故誤謂有體才知是鏡中之影則惟鏡而已豈復有一物之可得哉因緣和合四句今惟解明色陰餘可例知如五根六塵合為十一色法謂之色陰須於前世對此諸法取著薰種納於賴耶識中所謂因也至於中有自求父母之時即父母為境引發憎愛所謂緣也此固因緣和合由是在胎而結五根出胎而住六塵名之為生若深究此生亦同夢等來無所從當處出生故曰虗妄有生然此因緣本是生滅之法隨前業力而為修短之限限盡自當分散此固因緣別離由是五根六塵一時俱失名之為滅若深究此滅亦同夢等去無所止隨處滅盡故曰虗妄名滅色陰如是餘一切法亦復如是如來藏者言衆生心中隱覆如來故名如來藏即起信論中之一心也一心開二門一者心真如門二者心生滅門衆生順生死流故生滅全顯而真如全隱然生滅無體而其體全是真如故佛明此生滅去來即衆生如來藏中妙真如性也常住不動離於凡夫之生死妙明周圓揀於二乘之涅槃八字皆稱真如之德也雖曰妙真如性亦即前十番所顯見性之全體耳賀云上文破妄心破二種妄見是破妄之極絲毫混真不得曰見非是見曰非因緣非自然非和合及不和合是顯真之極絲毫容妄不得至此阿難剖判明白不復認漚為海矣但恐阿難看得真妄太分未免離波覔水故曰汝猶未明云云使知全相是性全漚是海依他圓成本無二體方是事事無礙一真法界也又云此處本意非欲人知其為妄乃欲人知其為真蓋妄無自體全是一真非以相妄與性真對説也按後細剖陰入處界虗妄本如來藏妙真如性近五千言文繁語奧初學急難理會只將此總標一切浮塵諸幻化相至求於去來迷悟生死了無所得百餘言熟讀死味義旨了然此學經簡要之法也阿難云何五陰本如來藏妙真如性此先徵起也五陰古翻為陰新譯為蘊蘊是積聚陰是蓋覆積聚有為蓋覆真性二義兼之始備以下四科總不出色心二法此蓋合色開心為愚心不愚色者説也意謂陰等本是世間有為之法今一旦許即藏性豈無其説乎鍾云陰若有性則與真如敵體並立惟其無性全是真如故下釋中只明其無性也阿難譬如有人以清淨目觀晴明空惟一晴虗逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是此先明色陰也色以質礙為義既合五根六塵為一色陰則非惟根身亦兼器界也瞪直視貌阿難何謂色陰譬如有人以清淨目觀晴明空晴虗逈然無所有也其人無故不動目睛直視發勞則見虗空中狂華亂墜復有一切狂亂非相如毛輪二月飛蠅垂髮等色陰當知亦復如是以妙覺明圓照法界清淨本然一法叵得不覺動念轉成見相而十一色法彌滿亂生何異虗空見華耶四空天與舜若多神乃至二乘涅槃妄解色滅若無此破彼等遂謂離於色陰矣阿難是諸狂華非從空來非從目出法中凡小計色從心外有權教計色從心內生故喻中標定二義而雙破之阿難是諸狂華雖現空中非從空來雖屬目見不從目出如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難此破華從空來也如是阿難若此狂華從空來者既從空來還從空入若有出入便有內外既有內外即非虗空空若非空便是實體自不容其華相起滅如汝阿難既有實體更不復容阿難生起云何而言華生於空耶若約法中計色從心外有者亦説色法俱從空出如西域凡小推論身界成壞皆是微塵聚散而折塵無已必至虗空故執諸色皆從空出此方儒道經書不一而意旨皆謂虗以生氣氣以成形是萬相固本於一氣而一氣乃始於太虗質之西域旨趣大同大抵世智不達太虗何所從來但見萬有皆從無起遂謂無為有源豈知非其源乎賀云還從空入還字與旋字同猶言滅也既從空中出來則滅時定鑽進虗空去了有出有入便是有體之物既是一物豈容他物在中起滅如阿難身中又豈容一阿難鑽進鑽出耶喻此色陰若從淨法界中來者色陰破時當鑽入淨法界中去矣有出有入則淨法界便是一件實物既是實物又豈容色陰於中出入耶若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時眼應無翳云何睛空號清明眼此破華從目出也又若此空華從目出者既從目出即應還歸於目若從目出則此華性當合有見若有見者出去既為空中之華旋歸應見自己之眼若無見者徒而遮障出則既能翳空旋亦合當翳眼又若華從目出華已出目當見華時眼應無翳無翳便可稱清明眼何故必見晴空無華方號清明眼耶是則計從目出者無有是處矣若約法中破色從心內生者應云迷時色既出心悟時色應入心有知入當見心無知入常障心又迷者色出心應無障悟者色入心應有障云何無障然後號清淨心乎問萬法唯心何又破心內生乎答法雖唯心而實亦不曾生故終亦無所滅此圓頓人一悟無生全妄即真權人不忘法從心生必滅妄始真故須破之也是故當知色陰虗妄本非因緣非自然性此結妄即真也二處求之既無從出足知色陰虗妄本無生體曰虗循業偽現曰妄相既虗妄而能現者竟何物乎本即是非因緣非自然之妙真如性也蓋常住不動則體恆無變故非因緣妙明周圓則隨緣變現故非自然夫性本非外豈從心外而有性本無生何曾心內有生此二處所以俱非也所謂色陰本如來藏妙真如性者如此阿難譬如有人手足晏安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓亦應覺知入時蹤迹必有覺心知出知入自有一物身中往來何待合知要明為觸是故當知受陰虗妄本非因緣非自然性此下開一心法為四陰而此明受陰即妙真如性也受者領納為義謂對違順俱非之境而生苦樂捨之三受也四陰皆心衆生認為己靈不同色陰計從內外但計實有今亦以二處無從顯其虗而非實耳阿難何謂受陰譬如有人手足晏安百骸調適忽如忘生無違無順尚不覺有身安知有受其人無故以二手掌自相摩擦於二手中妄生澀滑冷熱諸相受陰當知亦復如是藏性無受如人晏安迷生諸受如摩手覺澀等也阿難是澀滑冷熱諸相所謂幻觸也是諸幻觸不從空來不從掌出如是阿難若謂此觸從空來者既能觸掌亦能觸身不應虗空有所選擇而獨來觸掌是則不從空來矣若謂此觸從掌出者應須獨掌自生何須待合又若必從掌出掌合則知其出掌離應知其入若必有入則其鄰近之臂腕骨髓應亦知其入時蹤迹云何不知若使臂腕骨髓實有覺心知其出入則是元有一物身中往來自觸何必更待掌合而知其出方始名為觸耶是則不從掌出矣既知二處皆非則當知此受陰虗妄元無自性本即是非因緣非自然之妙真如性也所謂受陰本如來藏性者如此此章喻即是法故不必法喻配合但當了喻之妄即會法之妄矣又諸識中皆有受相而前五識受用偏多固當分屬眼等五識以眼等五識必根境相對而生觸也阿難譬如有人談説酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是阿難如是酢説不從梅生非從口入如是阿難若梅生者梅合自談何待人説若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想踏懸崖與説相類是故當知想陰虗妄本非因緣非自然性此明想陰即妙真如性也想以緣慮為義謂於前境領納之後憶持不忘固當偏屬第六意識也阿難何謂想陰譬如有人談説酢梅口中水出思踏懸崖足心酸澀口不食梅而口中水出足不至崖而足心酸澀者豈非想乎想陰當知亦復如是目前根身器界為想所分別憶持者皆如念中之酸味思裏之懸崖本非實有而堅滯不忘者想陰覆之也阿難如是酢説所引之水不從梅生非從口入如是阿難若此水從梅生者梅合自談何待人説而後水出若此水從口入者口應先聞何又待耳若獨耳聞此水何不即從耳出而又從口出乎梅不談則非梅生口不聞則非口入耳不出則非耳致追究此水無所從來足知想陰不實矣想踏懸崖與此説相類崖不思則非崖生足未觸則非足入心不酸澀則非由心致酸澀無所從來足顯想陰之虗矣是故當知想陰虗妄元無自性本即是非因緣非自然之妙真如性也所謂想陰本如來藏性者如此談子化書云言臭腐之狀則輒有所噦聞珍羞之名則妄有所咽臭腐不曾來珍羞未嘗見而有噦咽者非妄而何與此相發阿難譬如瀑流波浪相續前際後際不相踰越行陰當知亦復如是阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此暴流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流是故當知行陰虗妄本非因緣非自然性此明行陰即妙真如性也行以遷流為義即是遍行心所之思以能驅役自心造善不善等故即是業行於百法中攝法最多雖八識皆有遷流而末那遷流最勝以念念不斷故雖八識皆有思而末那思為最勝以思量為性故故當偏屬第七識也阿難何謂行陰譬如瀑流之水波浪相續前際後際不相踰越前不待後後不及前日夜滔滔無有間歇行陰當知亦復如是心心不住念念遷流亦猶瀑流之不可遏也阿難如是瀑流之性不因空生不因水有亦非水之本性是不即空水矣非離空水是不離空水矣如是阿難若此瀑流因空而生者則十方無盡之虗空應成無盡之瀑流而世界俱受淪溺矣無是理也則不因空生可知若此瀑流因水而有者則體應不與水一別有處所別有相狀兩俱現在如父生子各有體性然而無有則不因水有可知若此瀑流渾濁之時即是水性者則澄清時反非水體矣既澄清是水之體則瀑流亦非水性可知是則即義俱不成矣若此瀑流離空離水別有自體者則空非有外豈能離空水外無流豈能離水是則離義亦不成矣即離俱非究此瀑流本從何起是故當知行陰虗妄元無自性本即是非因緣非自然之妙真如性也所謂行陰本如來藏性者如此若約法釋空喻外境水喻內心流即行陰不因空生喻此行陰不因境生也不因水有喻此行陰不因心有也亦非水性喻此行陰亦非心性也非離空水喻此行陰非離心境也若計境生則境應有知一切無情悉能有念矣若計因心則應別有自體矣若計即心本性則行陰盡者反失心性矣然則行豈即心境乎若計離於心境則境實無邊而心外無行然則行豈離心境乎阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是阿難如是虗空非彼方來非此方入如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應是空出是故當知識陰虗妄本非因緣非自然性此明識陰即妙真如性也識以了別為義雖諸識皆能了別而此識全收八海七浪又名業識以即生滅本故又名藏識以即真如體故固知識陰偏屬第八識也阿難何謂識陰譬如有人以頻伽鳥形之瓶塞其兩孔滿盛虗空於中而擎之千里遠行用饋他國識陰當知亦復如是妄業如瓶妄識如空業牽識走如瓶擎空行三界六道無處不往如千里遠行捨身受身如用餉他國阿難如是虗空非從彼方而來不自此方而入如是阿難若謂此空從彼方來者則本瓶中既貯空去彼方置本瓶之地應少一瓶虗空矣而彼方之空未少也則雖來而實未曾來矣若謂此空於此方入者則當開孔倒瓶時應見虗空從瓶出矣而此瓶之空未出而入此方也則雖入而實未曾入矣來無所來至無所至皆由業遷使然妄見去來而實無去來是故當知識陰虗妄元無自性本即是非因緣非自然之妙真如性也所謂識陰本如來藏性者如此若約法釋捨身如彼方來而前身之識未嘗少受身如此方入而後身之識未嘗來當知身死非去未死之先本不偏局於此身生非來未生之先本亦常遍於此但因不了互成明昧迷則任牽悟則同體體常不動用可牽移佛正欲衆生悟全體而周大用也瓶喻牽識之業即第七末那又名業行也塞其兩孔喻煩惱所知障塞二空也良以真如不動由七八二識遷流不住似有去來故有彼此今彼方不見空少此方不見空出則知識陰之無自體而如來藏性逈然獨露矣永嘉明一念之中即具五陰謂隔礙真性即是色陰領納在心即是受陰心緣此理即是想陰相續不斷即是行陰歷歷分明即是識陰此五陰者舉體即是一念此一念者舉體即是五陰若以微密觀照照見五陰則聚沫之色既虗水泡之受何有陽𦦨之想非實芭蕉之行惟空幻妄之識無住而究竟堅固之體不越當前而得之矣五陰一科竟
