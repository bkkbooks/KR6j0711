body:
  text: 巴郡居士非眼劉道開纂述成都沙門離指方示鑒訂大佛頂如來密因修證了義諸菩薩萬行首楞嚴經大佛頂三字若據他經即是佛身三十二相中之無見頂相也若據經顯義是指菩提涅槃元清淨體如來藏心言也由此心體含吐十虗彌綸萬有為大覺最尊最勝之頂法也如來密因修證了義者不變名如隨緣為來小乘如而不來凡夫來而不如唯我大覺亦如亦來故名如來獨知獨見之謂密出生聖果之謂因磨鍊治習之謂修忘心默契之謂證無不究盡之謂了不落言思之謂義謂大覺依此頂法為因而實修實證障盡惑空因窮果滿能事已畢更無餘事一義皆了更無餘義故曰如來密因修證了義也諸菩薩萬行首楞嚴者首楞嚴此云究竟堅固謂始從乾慧以至等覺皆以此頂法為因而修萬行分斷無明分證真理上歷聖位踏佛階梯以至事事得成堅固也除諸佛菩薩其餘出世小果治世聖賢雖亦各有悟入依稀倣佛窺見一班類皆坐在相似覺中以不能空五蘊銷六根盡五住超二死未超心量未至圓極故也經者常也作終古之常規為佛燈之後焰故也一大二佛頂三如來密因四修證了義五諸菩薩萬行六首楞嚴七經也第一大者稱讚之詞具洪濶包含周遍衆多深奧元始恆常超勝八義二佛頂者法華為佛全身此經為如來頂顯斯經為法華中精要之義也三如來密因者如為本覺來為始覺本始究竟名如來也曰密因者取如來在凡夫時於六根門頭頓悟圓湛不生滅妙明真心此心為四科七大根本實性具足三如來藏全體大用本來是佛豈惟但是因性亦乃即是果性以諸如來無別所證乃至證時更無毫髮增添所謂從初發心即成正覺也所以為最密者以此即是二根本中真本所謂識精明元菩薩涅槃元清淨體佛言一切衆生不成無上菩提皆為不達此本錯亂修習至後偈中又言常不開演足顯根中所具如來藏性乃是難測難知最深最密之法經文首從請定至四卷身意輕安得未曾有即此密因也然此一段即是阿難所請三名中妙奢摩陀以此三如來藏性即是自性本定而頓悟了達於茲者即微密觀照故也四修證了義者以前段全彰自性本具天真現成然既曰密因豈礙修證是故雖歆藏性之已知更喻華屋之未入由是開決定義門示解結次第蓋必解六結而越三空方為了義之修獲二勝而發三用方為了義之證然謂之了義者有二義一者用根不用識故蓋用識則以生滅為本修因如蒸沙作飯畢竟不成常住菩提故非了義用根則以不生滅性為因地心如依金作器決定能成無上菩提故為了義又用根已為了義而特選耳根更為了義中之了義以其超二十四聖而獨妙為十方三世諸佛一路涅槃之要門也二者從性起修因該果海故蓋依密因無修證果海中不妨幻修幻證故修而無修非事相之染修證而無證非新成之實證故為了義而非不了義也經文自四卷後半請華屋之門直至七卷前半百靈護呪即此了義也然此一段即是阿難所請妙三摩提以此耳根圓通為第一如幻三摩提故也五諸菩薩萬行者諸菩薩即本經分證諸聖五十五位之數也萬行者即諸位中歷修之行如十信十住十行十回向四加行十地以至等覺其行應無有量也此之萬行躡前了義而更進深玄要之根抵於三如來藏而歸極於無障礙法界經文自七卷後半阿難請位至末結經名以前即此萬行也此一段即阿難所請三名中妙禪那也六首楞嚴者大定之總名也圓含上三別目而為一定全體當知此定逈不同於常途止觀蓋常途止觀全屬功夫此則不爾涅槃經佛自釋首楞嚴云一切事究竟堅固而古德即明其徹法底源不動不壞細詳其旨分明取自心本具為首楞嚴何曾取起心對境止觀為定哉七經者是諸經通題至於文詞之妙本於如來精義巧辨而加以房相潤色之工極為華藻流麗妙含無盡觀者研味自當得之賀中男云經中見猶離見見不能及大佛頂也得元明覺不生滅性為因地心即密因也如幻三摩提彈指超無學即修證了義也二十五圓通五十位真菩提路即諸菩薩萬行也大定有三義一曰此是妙定正以本性自具天然不動不假修成總在迷位動中其體本然故稱為妙不然何以為徹法底源不動不壞之定哉據此則凡不即性而別取功夫為止觀者皆不妙之定也二曰此是圓定正以此定不但獨取自心不動乃統萬法萬事皆悉本來不動為一定體不然何以為一切事不動不壞之定耶據此則凡不兼萬有而獨制一心者皆不圓之定也三曰此是大定正以此定縱在迷位尚本不曾動搖開解之後豈有出退當知此定自發解起行之後直至歷位成佛終無退出何況有壞不然何以為究竟堅固之定耶據此則凡有入住出縱經長時皆不為大定也一經科為三分一序分二正宗分三流通分序分第一有通序別序如是我聞一時佛在室羅筏城祇桓精舍與大比丘衆千二百五十人俱皆是無漏大阿羅漢序經之意若曰如是之法我從佛聞彼一時也佛在舍衛城祇陀太子林中須達布金精舍與大比丘衆千二百五十人俱此諸人者皆是無欲漏無有漏無無明漏回心大阿羅漢而非定性聲聞可比者佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫衆生拔濟未來越諸塵纍試以大阿羅漢之德言之以言其自利也安住如來宮殿掌握如來法印能行法王令能紹法王位謂之佛子住持而於欲有色有無色有則善超之蓋小乘以出三界為超不名為善今則即三界而出三界非若昔日之畏三界如牢獄也自利之德如此以言其利他也能於十方國土成就三千威儀成就已亦成就人非若昔日之耽寂滅而不肯成就衆生也又能助揚佛化轉大法輪荷擔家業妙堪如來付託之遺囑非若昔日之不堪受是法也又能身嚴心淨三聚之戒言為世法行為世則而大範乎三界焉非若昔日之戒有漏缺不能為法於三界也又能應身無量度脫衆生非若昔日之膠柱鼓瑟無方便也于以拔濟未來衆生墮見刺者拔之溺欲泥者濟之使之超越乎污根之塵牽心之纍而不落陷穽焉非若昔日之唯為一身如獐獨跳也利他之德如此此之謂回心佛乘之大阿羅漢也鍾伯敬疏云嚴淨毗尼一語該上下文義毗尼戒律也在身曰嚴在心曰淨六卷之四清淨明誨七卷之安立道場總躡於此見善超諸有及弘範三界數句皆以此為根本蓋以此經以戒為重故也其名曰大智舍利弗摩訶目健連摩訶拘絺羅富樓那彌多羅尼子須菩提優波離沙陀等而為上首其名維何曰大智舍利弗此云鶖子也曰摩訶目健連此云採菽氏也曰摩訶拘絺羅此云大膝即舍利弗之舅長爪梵志也富樓那彌多羅尼子此云滿慈子也曰須菩提此云空生也曰優波離沙陀此云塵性空也是諸羅漢各有過人之能出人頭地故為上首焉法華言授記成佛却從二乘説來而卒於一乘故開經歎德先言聲聞而後及於菩薩楞嚴言最初方便揀却二乘聲聞緣覺直斥之為錯亂修習列於十種邪見之末蓋楞嚴始終止談上乘不及其餘故歎德處直從無漏大阿羅漢説起已是極頂之談法華如宰相功成身退追敘其作秀才孝廉假途託迹之由楞嚴如蒙養初學其父師便教以立志作宰相勿令豫作秀才孝廉之想所謂修證了義也復有無量辟支無學并其初心同來佛所屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密義即時如來敷坐宴安為諸會中宣示深奧法筵清衆得未曾有迦陵仙音遍十方界恆沙菩薩來聚道場文殊師利而為上首不特此也又有無量獨覺緣覺之辟支真窮惑盡之無學并其研真斷惑之初心同來佛所不謀而至不約而親焉是時也適當諸比丘九旬坐夏日滿解制恣其自陳以考九旬德業之日十方菩薩恣問決通心之所疑欽奉如來攝物之慈折物之嚴且將更求密修密證之了義焉即時如來敷展坐具宴然安居為諸會中宣示幽深祕奧之法于是法筵清淨之衆皆聞所未聞而得未曾有似迦陵鳥之仙音遍徹十方世界恆沙菩薩聞如來音聲皆來聚集道場文殊師利而為上首蓋此菩薩表根本智為擇法眼也休夏自恣者比丘當初夏時即結制禁足安居不令乞食名休夏亦名坐蠟自恣者是期滿解制之日即七月十四十五十六三日也自知有過恣其自陳自不知過恣任僧舉正是嚴淨毗尼之義益顯戒為重矣時波斯匿王為其父王諱日營齋請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齋主于是有舍衛國勝軍王為其父王諱日營齋請佛於宮掖之中自己迎接如來廣設珍羞無上之妙味敬之至也又敬師及弟兼復親延諸大菩薩而城中復有福德俱隆之長者清淨自居之居士同時飯僧佛以不能遍及也乃敕文殊分領菩薩及阿羅漢應諸齋主以慰衆心焉通序竟唯有阿難先受別請遠遊未還不遑僧次既無上座及阿闍黎途中獨歸其日無供即時阿難執持應器於所遊城次第循乞心中初求最後檀越以為齋主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切衆生無量功德諸弟子既已分應齋主矣唯有阿難自恣之前先受別方之請遠遊未還無暇列於衆僧之次當其遠出既無上座及阿闍黎而防間軌範之無人及途中獨歸不列僧次則是日無供矣即時阿難乃執持應量之器於所遊城挨門而乞心中初求最後檀越未曾飯僧行施者以為齋主無問或淨或穢自剎利之王家以至旃陀羅之屠家方行我平等之慈不擇微賤惟發意圓成一切衆生無量之功德焉殊不知才有求心便有分別既有分別便有淨穢有貴賤安能一目平等視之哉故知初求二字便是阿難走作處也阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗經彼城隍徐步國門嚴整威儀肅供齋法所以發意行乞者何也蓋阿難已知如來世尊曾訶須菩提及大迦葉皆為阿羅漢一則捨貧從富一則捨富從貧而不均平今我欽仰如來昔日之語故發是意一以開闡平等無遮無礙之慈一以度衆人生疑生謗之口蓋專向貧家則富者疑專向富家則貧者謗也惟其如是故於高門懸薄次第循乞經彼城外之隍徐步國門之內嚴整威儀而肅恭齋法焉觀此行履便是可入淨而不可入穢可入佛而不可入魔可比丘而不可菩薩視金剛經中如來著衣持鉢入舍衛城乞食舉動自然中節毫無勉強不啻天淵之隔矣爾時阿難因乞食次經歷淫室遭大幻術摩登伽女以婆毗迦羅先梵天呪攝入淫席淫躬撫摩將毀戒體爾時阿難因乞食之次既無揀擇不覺經歷淫女之室遭大幻術摩登伽此云本性妓女者用金頭外道所傳先梵天呪攝入淫席淫躬逼近撫摩將毀戒淨之體焉由尊者求心未歇作意未忘心未曾平見何曾等乃欲平等行慈竟遭毒手故知非得事事無礙者斷不能入泥入水平等行慈矣鍾疏云阿難所發之心正是耻小慕大宛然方等法相如人出門應舉期中首選中途遇盜遇盜自遇盜首選自首選豈可以遇盜之故云不當期首選耶如來知彼淫術所加齋畢旋歸王及大臣長者居士俱來隨佛願聞法要於時世尊頂放百寶無畏光明光中生出千葉寶蓮有佛化身結跏趺坐宣説神呪敕文殊師利將呪往護惡呪銷滅提獎阿難及摩登伽歸來佛所如來方在王宮如彼淫術所加阿難有難於是齋畢速歸王及大臣長者居士見佛不遑説法異乎常儀故俱來隨佛願聞法要於是世尊頂放百寶無畏光明無善不具故曰百寶無惡不摧故曰無畏光中出生千葉寶蓮示此智光為萬行之本也有佛化身結跏趺坐示此智光為諸佛之母也佛不自説呪令化佛宣説神呪示此呪心是不動智必是不動佛説也乃敕文殊師利大智慧人將呪而往以此呪力加之淫根如湯銷氷如明破暗故令摩登淫火頓歇阿難戒體如初提撕獎勸歸來見佛焉此上別序也序分竟正宗分第二大科為二一是菩提涅槃根本一是生死流轉根本初科復分為四一見道分二修道分三證道分四結經分阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨此下見道分也古人得一指頭禪終身用之不盡阿難歷劫憶持如來祕密妙嚴不能免離摩登伽難故知博學多聞若不真修實證盡落鬼家活計及對境風一吹便倒皆由平日學力有餘道力不足故因誤墮而陡然發憤正如蘇季敝裘還鄉不得不刺股揣摩以圖卿相也阿難既見如來頂禮悲泣恨無始來一向多聞未全道力此一恨字便是獲法身之前矛向後悲淚痛責皆從此恨流出故道人不可無此一恨也從外入者為多聞從內出者為道力道力未全多聞何益於是殷勤啓請十方如來得成菩提之果覺必用妙奢摩他三摩禪那最初方便之因心梵語奢摩他此云止梵語三摩此云正定或翻等持梵語禪那此云靜慮此三者是大定之共名而首楞嚴王即此三名之總目也意謂此大定之名我已熟聞但不曾悟不曾修不曾證不得其用故為魔力攝持不能自脫始信多聞無益於己然我雖蒙如來授記作佛若不修因終難得果十方如來悉由此三得成正覺不知如來最初用何方便何由而得開悟何由而得證入也於是復有恆沙菩薩等俱願樂聞退坐默然承佛聖旨按佛下答奢摩他者蓋取本具不動搖不生滅周圓之心開解照了為義即正因佛性略兼了因為奢摩他體乃性具即定之慧也三摩提者蓋即攝前開解性定而契入之行起解絶寂定為義即正因佛性略兼緣因為三摩提體是性具即慧之定也禪那者蓋即於契入之後深位之中雙躡前之定慧中中流入歷位漸證至於究竟為義亦即於正因佛性略兼緣了二因為禪那體乃性具雙融之定慧也當知三名下各有最初方便如奢摩他中以悟見是心為初方便而以了識非心為最初方便三摩提中以反聞自性為初方便以入道場為最初方便禪那中以十信為初方便以乾慧地為最初方便是則見道一分為答奢摩他修道一分為答三摩證道一分為答禪那今經三處顯然各有單標三名遵佛明言判佛文義不易之定論也正脈懸示云三者決定不用天台止觀以見道一分原是如來開示衆生本有真心性具妙定始自眼根指出展轉通貫萬法仍令圓悟萬有總一如來藏性顯其未及加修而人人早先具此楞嚴妙體但惟教其悟明此之性海以為後文圓通入處而已本不曾立觀門教修習也而諸家瞢然強安三觀則是前文全説修門何阿難又有華屋之喻哉當知斯經所以大異於衆典者正以其指心在根斯定之所以大異於諸定者由説自性本定也若謂前文是説修門全障性定且有礙後耳門妙修全無用處矣故知阿難所請奢摩他等乃是大定之共名又於奢摩他上加一妙字正簡不妙良以諸乘皆言定不簡則濫彼諸定故也是則自性本定不取修定明矣諸師於未指耳行之前預立三觀以雜亂人心譬如國王將有事於東征遣一使臣宣傳敕命召集諸將宣示廟謨使臣妄傳諸將速往西征久之王問諸將何以不至使臣對以彼日傳命西征久矣王大震怒深怪使臣錯傳此命此亦如是佛欲專令行人修耳根圓通如王將有事於東征也乃先開其妙解令悟根性以為圓通入處如王先欲宣示廟算神謀以決東征之勝也注家於未説圓通之前輒立三觀令其修習如使臣妄傳王命指東為西也嗟今沿習既久業楞嚴者無不搜索三觀但是借經為敲門瓦子而正惟發明天台止觀而已畢竟令觀意獨明而經意障盡何迷錮支離一至於是哉鍾疏云奢摩他常翻寂靜三摩翻觀照禪那翻寂照不二請詞冠以妙字乃妙奢摩他妙三摩妙禪那也妙則舉一即三矣故後文或單説三摩直以三摩為大定也或單舉奢摩他例亦如是舊解分配天台三止觀而正脈駁之致天台後裔操戈不已豫謂楞嚴時未有天台縱使義合止可取以為證豈可徑以天台作楞嚴正解也佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難既請大定為成佛之因矣世尊即當答之如何是奢摩他如何是三摩如何是禪那不如是答而反詰其最初發心者何居蓋妙之一字是如來自證法門向人輕吐不得且阿難正當初發憤時又不可即施峻厲法藥故先逆探其病源而安慰之曰汝我同氣情均天倫非他人可比夫他人請問亦必盡情吐露豈有天倫同氣而反不盡情向汝道者哉但汝問我成道最初方便我却問汝出家最初發心夫世間至恩至愛莫如父母而汝當初發心於我法中有何所見頓將深恩重愛一時割捨而投我出家乎先德云末後牢關不離最初一句故阿難如是問世尊亦如是答之阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘濃血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落此初陳衆生知見也阿難承問而白佛言如來問我見何勝相乎我見如來三十二相勝妙殊絶形體映徹猶如琉璃我常自思維此相非是世間欲愛所生何以故欲氣粗濁腥臊交遘濃血雜亂安得發生三十二相之勝淨琉璃映徹之妙明而同紫金光聚乎以我見相合我思維生渴仰心是以頓捨恩愛而從佛剃落也阿難被世尊一問將底蘊盡情吐出却被三十二相一時換却眼睛豈知能見所見皆屬依他盡是虗妄耶又從見相處用心思惟分淨分染生愛生憎厭粗濁而欣淨明皆是識心分別計度夫染相不忘故為魔轉淨相不忘又為佛轉雖魔佛有異淨穢差殊無非知見立知總是合塵背覺而已此中所説見相是三細中之轉現思惟即六粗也為一經之發脈故下文先破六粗次顯三細次顯如來藏心次第紬繹方見深旨也三細者即根本無明之惑也一業相即從真起妄初動之相也二見相見初動之相也亦名轉相謂依初動之業識轉成能見之相也三境界相亦名現相由前轉相則境界妄現也六粗者一智相二相續相三執取相四計名字相五起業相六業繫苦相也又三細者一自證分二見分三相分也佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉此雙標真妄為一經之綱宗也如來見阿難説見相説思惟討得柄在手遂姑縱之曰善哉阿難汝見三十二相便能割愛出家豈非世間決烈大丈夫事何善如之第此一念厭染愛淨正是衆生知見正從發潤二種無明流出生死相續皆由於此汝等當知一切三界衆生從無始劫來生生死死死死生生相續不絶非有他故皆由不知常住真心性淨明體統此一心在紛擾而不變異曰常在生滅而無去來曰住在幻妄而不爛壞曰真在萬法而不動搖曰性在污濁而不染曰淨在欲氣而不昏曰明汝等有此心體勝淨妙明本周法界而不知反認如來勝淨妙明形體映徹之相以為奇特而生渴仰非妄想而何由汝日日所用者皆用此妄想此想不是汝之常住真心是汝生死根本汝乃錯用此心認賊為子故有生死輪轉耳如説云阿難慕佛妙定而此妙定非識心所修必須先悟此識非心別求真心故下文由淺入深漸次開示自此至卷末總是破妄顯真然有畢竟破者如説鍮石非金破盡不用也有不畢竟破者如説礦中有金欲其銷出真金因顯而破也經中於識全破其妄譬説鍮石非金也于根多顯其真少破其妄譬説礦中有金不可離礦而覔金也于陰入處界一一妄破顯真則鍮不能混金矣于七大全顯其真則純金而非鍮矣汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相此勉其直心答問也汝既欲研究無上菩提真欲發明自性應當真心吐露於我有疑直問有問直答不得半吞半吐藏頭露尾若爾便成委曲相矣彼十方如來同一道故出離生死皆以直心內心既直外言亦直心言既直內外一如如是乃至終於妙覺始於乾慧地位中間永無諸委曲相則生死可以直超妙莊嚴海可以直入矣淨明經云直心是道場先德云擬心思量早是曲了臺山婆子見人問路便云驀直去若有一毫委曲便落衆生知見即遭枝岐下文云狂心自歇歇即菩薩此直路也不成菩提乃至別成聲聞緣覺及外道天魔者此曲路也阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死此細審衆生知見也尊者索頭已在世尊手裡故捻定見相發心重翻問端曰阿難我今問汝當汝發心緣於如來三十二相時將甚麼物去見生渴仰時又是誰去愛樂尊者若向此處識得誰何二字一生參學事畢爭奈不分緇素信口答云如是觀見愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死而投佛出家耳豈知目即眼根心即意識眼見心知便是衆生知見生死根本耶此承見相發心出心目二字以為談經之柄下文重重開示不過翻衆生知見為佛知見耳佛告阿難如汝所説真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎我今問汝唯心與目今何所在此細審衆生知見所生處也由阿難認定見者是眼愛者是心不知生死顛倒正坐於此故世尊就上一拶鞠其所起之處乃告阿難汝既認愛樂三十二相者是心見三十二相者是目便當識此心目所在若不識知心目所在則不能得降伏染污之塵擾亂之勞且汝認心認目已著賊了譬如國被賊侵發兵討除要先知賊所依之處然後塞其去路絶其資糧搗其巢穴斬其首級則邊境肅清烽煙自息今使汝流轉生死不由外物元是自己家親作祟自劫家寶若欲以奢摩他神兵除之必先知其處所我今問汝唯汝能知之心與能見之目今何所在乎由尊者病根深厚故世尊將其病源一一審究明白方始對痔發藥也雖心目雙舉而意惟破心非心目並破也緣此雙徵微意難知以致諸家誤謂破心之後次當破目遂將顯見之旨盡成破見之宗千載迷根實基於是豈知根識元不相離而眼中見性即是菩提真本亦即奢摩他體衆生日用不知但惟認識為心隨識輪轉甚可哀憐故佛雙舉以觀阿難取何為心阿難果但以見為眼而終取愛樂為心于是極破非心之後所指妙明之心依舊即此能見之性而已豈有他哉鍾云經文明言使汝輪轉心目為咎故問惟心與目今何所在則如來所徵之心乃賊也非心也妄心也非真心也既謂之賊則宜不知所在如人為盜所劫豈能知盜之所往所在而為之巡緝乎阿難此時若真知妄心為賊則自然答以不知所在而直請真心矣惟其受用妄心極力護庇見如來指之為賊口雖不言心却不信歷歷指其七處所在若云既有所在豈可遽謂之賊乎觀後文云行諸一切難行法事皆用此心又云現以緣心允所瞻仰則曲護妄心認賊為子之本情乃始招出佛歷言無有是處而後文直斥云此非汝心正言此心之為賊而非子不必求其所在也若是常住真心則在七處亦可不在七處亦可無在而無不在亦可矣舊解不曰破心而曰徵心謂三如來藏亦不能加於七處之外是以所徵者即為常住真心也似是之言叛經不小賀云七處破心猶云七處破識非謂此識果有一定處所阿難不知而佛獨知之也正以此識本無處所衆生迷為有處故隨執隨破節節欲其悟此識本無處所而令其疑此妄識耳阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵祗在我面如是識心實居身內此是尊者初呈槍法執心在內也阿難白佛言世尊一切世間十二生中除了無色以其空散而無身相又除無想以其土木而無心相其餘十種異生有身心相者同將識心居在身內且我縱觀如來明淨修廣如青蓮華瓣之眼亦在佛面我今觀此肉眼粗浮之根日雜色香味觸之四塵者祗在我面是則自聖至凡莫非眼在外而心在內矣我寧不知如是識心實居我身之內乎尊者雖是伶牙俐齒旁若無人殊不知腦門已是著地即今三尺童子試問其心即以手指胸而曰在內者此由父母胎中受形之始吸取赤白二滴為身便有此執不待教而自能謂之俱生無明亦謂之堅固妄想故牢執此身為心之宅舍若瓶鵝井蛙終不能出更不知身反在於心中若大海之一漚也故尊者亦同此計若使尊者向心目所在一問處識得地頭便與世尊把手共行優遊覺海安得復有下文種種妄執耶只此一計凡一切衆生所以囚繫胎獄挃梏肉身乃至三塗汩沒受無量苦展轉不能自脫者皆由於此世間邪師猶言身為房舍心是主人甚可病哉鍾云心在身內乃一切衆生尋常所執所謂昏擾擾相以為心性一迷為心決定惑為色身之內是也餘六但因佛一時破奪逼成轉計耳佛告阿難汝今現在如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外阿難汝今堂中先何所見世尊我在堂中先見如來次觀大衆如是外望方矚林園阿難汝矚林園因何有見世尊此大講堂戶牗開豁故我在堂得遠瞻見尊者執心在內以為必然如壯士鼓氣上沖牛斗世尊是一切智人洞見肺腑不與分文析句展疏牒科就將目前淺近易了之事以反詰之令他親口答出無處躲閃然後用法窟法爪生擒活捉故先審定內外之境告阿難言汝今現坐如來講堂觀祇陀林今何所在阿難答云世尊此大重閣清淨講堂在給孤園若祇陀林實在堂外堂在林中林在堂外則內外之境定矣次復審定先後之見問云阿難汝今堂中先何所見答云世尊我在堂中先見如來次觀大衆如是外望方矚園林先見內而後見外則先後之見無容紊矣次復審其見外之因問云阿難汝矚林園因何有見答云世尊此大講堂戶牖開豁故我在堂得遠瞻見因戶牖開豁而得見外則見非無因矣世尊三問尊者三答一一皆落世尊綣繢中向下即用其語以破之所謂執子之矛刺子之盾也世尊七處多以見發難端亦含見性是心非眼之意爾時世尊在大衆中舒金色臂摩阿難頂告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨此先示大定之體為開佛知見之根本也阿難始問妙奢摩他三摩禪那最初方便世尊反詰其最初發心驗其知見是真是妄而阿難果用識心取著有相可見之如來却迷自己無相可見之真佛如來復詰其緣三十二相時將誰見而將誰愛樂尊者答以目見而心樂如來復徵心目所起之處尊者確然執定此心在色身之內至此則阿難賊身已露贓物現存無隱諱處今欲進而破之爾時世尊在大衆中舒金色臂摩阿難頂以示慈愍攝受之意告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽意謂此大佛頂周遍含容無法不具無行不圓然不可以知知不可以見見為菩薩父為諸佛母即我三十二相皆是此中所現形像云何反認此在色身之內耶今汝欲研無上菩提開佛知見要先識此無見頂相則不奢摩而自成奢摩不三摩而自成三摩不禪那而自成禪那謂之真如三昧亦名一行三昧又謂之首楞嚴王諸三昧中最為尊上菩薩得此三昧則萬行具足念念可以證真常頭頭可以到究竟十方如來依此一門超出妙莊嚴果海不遭枝岐更無委曲又何患畜聞之過誤道力之不全耶于是阿難頂禮伏受慈旨問此中不標奢摩禪那而獨標三摩提者何故答此三摩提即下文所指大陀羅門諸三摩提妙修行路也奢摩由此而悟禪那由此而證故曰如幻三摩提彈指超無學以除此一門別無修行之路即古觀音如來亦曰從聞思修入三摩地也三摩提此云等持既是諸定共名亦是全定總號不比阿難所請三名中之三摩提彼是總中之別也大佛頂等方是此定不共之號一經所説全為此定隨便寄居於此耳鍾云阿難啓請大定佛先破其緣心此是首次破心問答未竟急示以有三摩提云云蓋以鎮壓其乍復之魂安慰其初問之意如窮子見父先告以家寶使預知衣食有地驚定氣平然後徐徐推問以終七破之文後詳大定非惟心腸甚慈抑亦語次甚妙一有字可想如云汝所請三摩提已有在此不須忙也一門超出妙莊嚴路與一門深入相應一門深入因也一門超出果也由大定趨入故謂之路也佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內心頗有衆生先見身中後觀外物縱不能見心肝脾胃爪生髮長筋轉脈搖誠合明了如何不知必不內知云何知外是故應知汝言覺了能知之心住在身內無有是處此破心不在內也佛又重伸問難而告阿難如汝所言身在講堂戶牖開豁然後遠矚園林亦有衆生在此堂中不見如來先見堂外者乎阿難答言世尊在堂不見如來而能見林泉者未之有也佛言阿難今汝所計即是在堂不見如來而能外見林泉者矣何以故若汝靈知之心在六根門頭明明不昧了了常知而汝現前所明了心實在身內者爾時先合了知身內之物矣可有衆生先見身中腑臟而後方觀外物者乎夫心肝脾胃身中之最深者容許不見可也至於爪生髮長筋轉脈搖身中之膚淺者誠合明了矣如何深淺都不知耶若汝心靈必不能內知云何又能知外耶不內知而知外此與在堂不見如來而能外見林泉者何異吾于必不內知而知此心決定不在身內矣是故應知汝言覺了能知之心住在身內無有是處只此一破有緣者即當驚悟絶倒非佛妙典何常聞於他書有説心不在身中者乎奇哉真獅子吼也心肝脾胃深處也爪生髮長筋轉脈搖較淺然總屬身中之物阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶此第二執心在外也阿難稽首而白佛言我聞如來如是法音今悟知我心果不在內實居身外所以者何請以燈喻譬如燈光若是然于室中則是燈必能先照室內而從其室門後及庭際漸次照去亦猶心居身內必先見內而後見外也今一切衆生既不見身中而獨見身外矣是則亦如燈光居在室外則不能照室也是義決然明白將無所疑惑而同佛了義之談得無謬妄耶佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齋汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽世尊是大手宗匠左來左轉右來右轉這邊那邊無可不可在內在外皆可掃除亦將一喻相酬所謂投桃報李得馬還牛也佛告阿難是諸比丘適來從我於室羅筏城循乞形段之食及歸祇陀林我已宿齋矣汝觀此比丘當一人食時可使諸人盡飽不阿難答言不也世尊何以故是諸比丘雖皆是阿羅漢子縛雖盡果縛尚存不能合衆人為一體安能一人食而令衆人飽也佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外是故應知汝言覺了能知之心住在身外無有是處此正破心不在外也佛告阿難若汝覺了知見之心實在身外者夫身心相外則彼此了不相干故應心所知者身不能覺身所覺者心不能知如阿羅漢之軀命不同彼不飽此此不飽彼矣我今示汝兜羅綿細香霜色之手汝眼見時心分別是手否阿難答言如是世尊我眼見時心分別也佛告阿難眼見是身之知心分別是心之知二知同時曾無兩體與阿羅漢之分彼分此者不同即此相知云何乃判心在身外耶是故應知汝言覺了能知之心住在身外無有是處阿難點個紙燈與世尊相見却被世尊一吹頓滅矣阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟當在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裡猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故此第三計潛根也阿難白佛言世尊如佛所言不見內故不居身內身心相知不在身外內外不成我今思惟當在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖殆潛伏眼根裡乎猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼眼根隨見隨即分別今以琉璃喻眼以眼喻心琉璃合眼而不礙眼見與眼分別如眼根合心而不礙心見與心分別也然我覺了能知之心不見內而見外者豈無故哉既已在根根非在內宜乎其不見內也既潛根內根如琉璃宜乎其矚外而無障礙也是則只一潛根而從前二義俱無繆矣佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者常見山河何不見眼若見眼者眼即同境不得成隨若不能見云何説言此了知心潛伏根內如琉璃合是故應知汝言覺了能知之心潛伏根裡如琉璃合無有是處此正破心不潛根也世尊將錯就錯而告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼時只見山河亦見琉璃否阿難言如是世尊是人當以琉璃籠眼時實見琉璃也佛乃破之云汝心為眼根所合同琉璃合者當見山河何不見眼喻中眼見山河亦見琉璃法中既是心見山河亦應見眼矣而云何不見哉若使心能見眼眼即反為心家所緣之境不是能生之根則汝所計彼根隨見隨即分別義不得成是犯自語相違之過矣若使心不見眼眼何故又見琉璃又犯法喻不齊之過矣如是則二俱不成云何汝計潛伏根內如琉璃合是故應知汝言覺了能知之心潛伏根裡如琉璃合無有是處阿難捧出琉璃碗子與世尊鬪富又被世尊碎成虀粉矣阿難白佛言世尊我今又作如是思惟是衆生身腑臟在中竅穴居外有臟則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何此第四雙計內外也初計在內佛以不見臟腑為破次計在外復招身心相離之難又計潛根且乖琉璃籠眼之喻阿難乃白佛言世尊我今又作如是思惟是衆生之身臟腑在中竅穴居外良以有臟則暗有竅則明今我對佛由有竅則明故開眼見明即應見外不必責其身心相外矣由有臟則暗故閉眼見暗即同見內不必要見心肝脾胃矣內外若成又非獨潛根裡如此則可免前三者之過矣然不知此義當與不當蓋因三次負墮故未敢自信也鍾云由有竅則明故開眼見明由有臟則暗故合眼見暗見明即名見外見暗即名見內雖內外並列乃借見外形見內仍歸最初在內之執故佛下文唯破見內耳佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此暗室中皆汝焦腑若不對者云何成見此破見暗名見內也佛告阿難如汝所言汝當閉眼見暗之時此暗境界為與眼對為不對眼此暗相若與眼對則此暗相在汝眼前云何成得閉眼見暗名為見內若許眼前之暗即是內之臟腑即當不須合眼但居暗室中無日月燈光之處此眼前之暗即是汝之三焦六腑矣然豈有此理哉若此暗相不與眼對云何眼前又見黑暗如是則眼與暗相對與不對皆不成內矣若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即今如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛是故應知汝言見暗名見內者無有是處且汝言見暗為見內者得無曰所對之暗不是外對身外之暗乃是內對身中臟腑之暗耶若離外見內對所成即是眼能反觀矣既能反觀即當合眼開眼二俱能之可也今合眼見暗獨能返觀身中當開眼見明何不返見其面乎若開眼時既不能返觀己面則合眼時亦不能返觀身中而內對不成矣若謂開眼見明之時亦能見面則此了知心及與眼根皆在虗空中矣汝本計心仍在內又何成在內耶且心眼既在虗空則應虗空即是汝體汝身反不是汝體矣汝若執言離體見面不妨仍是自體即當如來亦離汝體亦見汝面亦應是汝之身耶且汝心眼既在虗空已有覺知則汝此身應無知覺必汝執言身自有覺空中之眼亦自有知則汝一身應有二知一在虗空一在己身既有二知則汝一身應成兩佛有是理乎是故應知汝言見暗名見內者無有是處單結見內足見此計同在內矣要知計內計外計潛根與雙計內外亦未常不是但阿難執迹生情故問處句句成病世尊隨方解縛故答處句句成藥古德云會得則死句皆成活句會不得活句皆成死句神奇化為臭腐臭腐復化神奇實無定法此上四計皆因世尊云何知外一句鈎動阿難故尊者捨一執一所謂承言者喪滯句者迷向後三計知見已窮復牽引世尊所説性相深義引蔓抽條妄生計度不知是則總是非則總非也阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思維即思維體實我心性隨所合處心則隨有亦非內外中間三處此第五計心在隨所合處也阿難言前此皆我之臆見也我常聞於佛矣佛昔開示四衆由心生故種種法生由法生故種種心生我今思維世尊所説心法相生即此能思維者實我心性此心隨與那一法合即隨那一法生何必定在內外及與中間三處乎不知世尊所謂心法相生正謂心法皆從業識變起同時妄有如兩束蘆互相依倚離心無法離法無心非謂心能生法法能生心也尊者繆認心法相生故計隨合隨生先引世尊所説者為證據欲以杜如來之口豈知如來渾身是劍觸之即死毫不容情哉阿難亦非謂心必有體正謂心無體而能合合即心之所在下文正辨有合者必有體無體則不能合無合則無所在也佛告阿難汝今説言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面此正破心不隨合也佛告阿難汝今説言由法生故種種心生隨所合處心則隨有所謂合者如蓋合函必彼此有體然後可合今汝思惟之心元是浮想實無自體既無自體則無合處若謂無體而能合者則於十八界外更加一界于六塵外更加一塵是皆無體虗名同于龜毛兔角憑何義以論合乎若有體者如汝以手自挃其體汝所知心為復內出為從外入若有出入必有內外既有內外便合見內見外復蹈前非豈能隨合而隨生乎隨合隨有奔逸昏擾何異野燒乃猶認作真心曲盡世人迷態阿難言見是其眼心知非眼為見非義佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死阿難一聞見內見面之語反生疑難意謂眼可名見心可名知見者是眼心知非眼今以心為見恐不合義佛破之云見者眼也能見者心也今且以汝喻心以門喻眼門雖通見須有門內之汝而後有見若謂眼能自見者設如汝在室中即同無汝而門能自見否乎是知眼雖通見亦須眼處有心而後有見若無有心而眼豈能見乎必謂徒眼能見者則諸已死尚有眼存應皆見物矣若見物者又不名死矣是則徒眼不見可見知見皆屬于心矣豈可妄分見屬于眼乎阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝若遍體者同前所挃若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然是故應知隨所合處心則隨有無有是處夫法有定相心無定體正如水上葫蘆按著便轉日中寶石色無定形安有定體哉阿難又汝覺了能知之心若必有體者我且問汝為復一體為有多體一體者四肢共一心體也多體者四肢各一心體也又汝心今在汝身為復遍體為不遍體遍體者一心滿于四肢也不遍者一心不滿于四肢也若四肢共一心體者則應拔一毛而群毛皆動觸一肢而渾身咸覺矣若渾身咸覺則挃又應無定在若挃有定所則又不成一體矣若多體者則又成多人以一人惟有一心多心即成多人以多人而各分一心各分一體此多體之中何體為汝也若遍體者同前挃一肢而四肢咸覺矣若不遍者當汝觸頭而并觸其足若頭知而足不知可名不遍今汝却又不然觸頭頭知觸足足知可云不遍乎然則心體非一非多非遍非不遍元無定體既無定體則不隨有定之法合可知矣是故應知隨所合處心則隨有無有是處阿難將個東瓜印子賣弄聰明又被世尊撇向大洋海底去矣鍾云非一體非多體非遍體非不遍體總是無體無體安得有合阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間外不相知不字當是又字之誤此第六計中間也阿難白佛言世尊我昔聞佛與文殊等諸法王子談真實本相時世尊亦言心不在內亦不在外不在內者不在根也不在外者不在塵也如我思惟第一計中內無所見第二計中外又相知內無知故明不在內身心相知明不在外以外之相知復內之無見不內不外意者此心當在根塵兩楹之中間乎不知世尊所言不在內外者正言心無定在非謂心在中間也才喚作中即有定在矣妄心無體則不在真心周遍則無所不在不滯一處原是三不在阿難引二缺中以立己論合佛旨也佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身若在身者在邊非中在中同內若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂此審定在身在境以兩破其中俱無在也佛言汝謂心在中間者中必確然不迷而非無所在矣今汝自推所謂中者中為何在為復在身外之處乎為當在身乎若在身者便有中邊二義在邊則不得為中在中則同前在內應當見內矣若在處者如修房舍必立標竿以表中位今為有所表為無所表乎無表則無中矣表則中無定在矣如人以表表中時東看則西南觀成北表體既混則心寧有一定之中而不雜亂乎是則在身在處皆不得成中矣阿難言我所説中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在阿難又言我所説中非此在身在處二種也如世尊所説眼色為緣生於眼識夫眼者根也色者塵也眼有分別則屬內根色塵無知則屬外境根塵內外相對而識生其中間作用分別豈不為心在之處乎阿難所引是佛相宗隨順世間之談不了義也且世尊之意以眼色二種為生識之緣非謂眼色即能生識也以識自有能生種子故且根境二法皆是色種豈有色種而生心現行哉且謂眼有分別亦是錯解殊不知眼能照境識能分別而眼實無分別故下文云其目周視但如鏡中無別分析汝識于中次第標指此其證也鍾云以眼對色則色為無知以心對眼則眼又為無知矣佛言汝心若在根塵之中此之心體為復兼二為不兼二若兼二者物體雜亂物非體知成敵兩立云何為中兼二不成非知不知即無體性中何為相是故應知當在中間無有是處佛言汝心若在根塵之中者此之心體為兼根塵二者如父母合而共生子耶為不兼二者如不因父母而自生子耶夫塵即物也根即體也若兼二者則根塵混合物體雜亂物非有知體是有知半有知半無知對敵而立墮成二邊豈得為中乎若兼二不成者則此心體既非根之有知又非塵之不知體性尚無中為何相乎是則兼與不兼皆不得成中矣是故應知當在中間無有是處阿難將箇不著邊際破沙盆呈似世尊又擊碎矣兼二者雙挾根塵而生其中也不兼二者兩離根塵而孤然中立也或泥此之心體體字遂以物體體字作心體非是阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不此第七計無著也世尊在般若會中談無著真宗不在內外中間正言心無處所無處住心不應復有所著尊者錯解佛意乃白佛言世尊我昔見佛與大目連等四大弟子共轉法輪常言此覺知分別心性不內不外不中間俱無所在一切無著名之為心我今將心不去著在一切法上如此可得名為心不殊不知將心不著早是著也故先德云喚作如如早是變也智不到處切忌道著道著即頭角生問曰佛之徵處本顯無處今已無處何須又破耶答曰佛之徵處固顯無處佛顯無處令悟無體今認無著即為心體是雖無處而執有體所以破也鍾云三不在即無著而以無著名心又著于無著矣佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同於龜毛兔角云何不著有不著者不可名無無相則無非無則相相有則在云何無著是故應知一切無著名覺知心無有是處世尊向開口不得處就與一拶云阿難汝言覺知分別心性俱無在者而計一切無著為心所謂一切者世間虗空水陸飛行諸所物象是也汝之不著是汝之心本有處所而不著一切法耶抑亦本無處所而不著一切法耶若汝心本無處所而自然不著此心則同龜毛兔角之本無云何更添不著乎若汝心本有處所而不去著一切法者則是汝心去了箇著又多箇不著安能名為無著哉所以然者著從相起若汝果無心相是真無心決無有著若非真無心則定有心相既有心相定有所在決定有著云何而説一切無著乎極而言之不惟有相不可名無著即無相亦不可名無著以才説無相即墮有相故也是故應知一切無著名覺知心無有是處阿難將箇沒著落死貓頭呈似世尊又被世尊擲向他方世界了也法身無在而無乎不在前六番計心在內在外雙計潛根隨合中間是以心為有在也故世尊皆以無在破之及至第七又計心為無在故世尊以相有則在破之雖是一期破執實顯無在無不在之旨先德所謂有佛處不得住無佛處急走過是也大佛頂首楞嚴王於此具見即至後文離一切相即一切法離即離非是即非即處雖是極力形容三如來藏亦不能加於七處之外智者於七處剖明一經大義思過半矣七番破處只是破自生他生共生與無因生如在內潛根雙計內外皆是計自生在外隨合是他生中間一計是根境共生無著一計是無因生又隨所合處是執一切相生無著一計是執離一切相生潛根是執相宗增上緣中間是執相宗增上所緣緣無著是執性宗無相甚深義據此七問足見尊者𡎺著滿肚皮佛法世尊七番逐破不過就其執處與他解粘去縛耳先德云佛法裏迷却多少人世法裏悟却多少人易曰神而明之存乎其人七番問處節節有頓挫如云如是識心實居身內只一實字見其意氣揚揚旁若無人如虎生三日有食牛之氣第二番云同佛了義得無妄耶雖是強項觀得耶二字亦少屈矣至第三番則曰如我思惟如我者謂以己意度之理或如此其志又稍降矣第四番則云是義云何言不知是與不是未敢斷以為必然也至第五番即思惟體實我心性由執聖言為證故復開強口又曰實也至第六番當在中間言據我所見或當如此當字覺郎當已甚至第七番則我無著名為心不不者疑而未定之辭阿難至此委靡不振矣所謂壯心一起春江怒濤鋭志一銷秋霜敗葉此經無論意趣深奧即譯人之筆潤色之手亦若郢人之運斤庖丁之解牛並入神化淵乎妙哉七處皆非則妄情已盡而世人計心之住處者不出於此至此則平日所恃以為心者杳無住處可根究矣然詳此七番確定成處者惟四處而已謂一內二外三根裏及第六根塵之中是也第四還在內第五乃無定處第七並處亦無也此密示妄識無處下文乃顯何妄識非心也鍾疏云須記前云若不識知心目所在則不能降伏塵勞又云維心與目今何所在是故七徵但破其所在所在既破賊無逃處下破能推之心正擒賊耳圓通疏云七徵之處最堅鋭難攻者在乎首尾蓋在內久為世人所守而無著又為學佛初機所宗也七處破心竟爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃嬌憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣惟願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大衆傾渴翹佇欽聞示誨阿難被世尊七縱七擒至此弓折箭盡納欵輸誠在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛倍於他人今雖出家猶恃嬌鄰良因蒙愛恃憐不肯進修反認多聞以為實證未得無漏不能折伏娑毗羅呪而為彼所轉溺於淫舍當由不知真心實際是我所當造詣之處所以不得無漏者由此為魔所轉者亦由此也惟願世尊大慈哀愍分明指出此心的在何處開示我等奢摩他大定之路使有所遵循而往不致惑于他岐且令諸信不具者皆能生信而隳壞其惡見焉作是語已五體投地及諸大衆傾渴翹佇欽聞示誨前請奢摩他三摩禪那今止請示奢摩他路可見奢摩他三總是大定之共名任舉其一即該其二而與三觀無涉矣爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽此放光默示也世尊將欲破六識以顯六根故先從其面門放種種光其光晃耀如百千日表諸智將現也普佛世界六種震動表衆識將破也如是十方微塵國土一時開現表覆蔽將開也佛之威神令諸世界合成一界表分隔將合也其世界中所有一切諸大菩薩皆住本國合掌承聽表流轉將息也由衆生有此本光昧而不知分為根塵識三於器世間不能超越若能內瑩發光根塵識三應時銷落見聞通鄰合開成就故以此瑞先示之果能了茲光瑞則菩提涅槃元清淨體不動步而得矣鍾疏云不與他説且與他看若遇宗門明眼人便直下領當矣佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮砂欲成嘉饌縱經塵劫終不可得云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣此下將前性淨明體用諸妄想復開二種根本為一經之綱宗也佛告阿難一切衆生泛爾凡夫不知修行者從無始來迷此覺心忽起無明種種顛倒由此無明轉成業識造種種業熏成種子名為業種種必有果子子相生則輪轉生死無有休息故惑業苦三生必同條如惡叉果生必三子一聚不知修行者如此又有諸修行人不能得成無上菩提乃至別成聲聞緣覺背大心而證小果者及成外道外正道而趣邪道者以及諸天修十善而欣樂果者魔王及魔眷屬耽欲境而亂正修者是等皆由不知真妄二途二種根本認妄為真獨修於妄盲修瞎鍊認砂為米猶欲煮砂成饌縱經塵劫之遠其能得乎錯亂修行者又如此乃吾所謂二種根本者云何為二阿難一者無始生死根本此由最初迷一法界不覺心起而有其念故曰無始如睛勞華現睡熟夢生本無緣起之由非有定生之處皆是妄念非他外緣從此而成細微業識次起轉相轉作能見後起現相現外境界由此三種細識復生智相相續執取計名四種粗識於是執內執外攀此緣彼念念不停無暫止息起惑造業輪轉生死此生死本即汝現今與諸衆生用此東攀西緣之心以為自性者即是別成聲聞緣覺天魔外道七趣之根本也二者無始菩提涅槃元清淨體此清淨體即汝今者現前第八微細精想名為識精本來具足元明一真法界不為生死所染不為涅槃所淨不為無明所迷不為菩提所覺者然此元明元清淨體雖不與妄染相應由不守自性隨緣而生種種妄想東攀西緣一切衆生但認此種種攀緣妄想以為心性而反將元明清淨之體棄而不顧即此棄而不顧者是菩提涅槃之根本也夫此識精元明衆生本有體遍十方用彌沙界非諸趣所能牢籠但由諸衆生遺此本明日用不知雖終日行而不自覺故諸趣本不當入而入甘受輪回豈不枉屈哉識精元明者六根所具圓湛不生滅性識精乃其總名本為一體若應六根而列別名當是見聞嗅嘗覺知六精也五卷云汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物驗知菩提涅槃元清淨體決指六根中見聞等精所以破識之後首即顯見精為妙明本心也舊注全不達此故迷為破見耳又復當知後偈中陀那微細識正此識精然亦以識為名者乃是第八識海非比前六虗妄無體矣因是真修之本所以修圓通中直選耳根聞性亦此識精而斯經始終要用所以迥異於諸經者由此根性以為之根本也諸緣者前六轉識也楞伽云藏識海常住境界風所動種種諸識浪騰躍而轉生是知前六皆此識海所生諸浪故虗妄也緣所遺者言前六能遍緣一切而獨於本生識海自緣不及如眼所起見能遍見一切而自不見眼也縱使悟時須一念不生方能默契六識若動體即隱矣故學人不捨緣心畢竟如生盲不見性也由其執認緣心必遺元明故曰緣所遺也賀云識精元明者取識精內本來妙明之體非即以識精為元清淨體也專言識精便屬阿黎耶識專言明猶是識陰邊際故加一元字見非因明立所之明也遺此本明正與元明相應圓通疏云所生諸緣即第六識能生識精即第八識按七處破心妄想已伏緣心欲逃何不直指真心使歸如來藏性而以識精元明為不生滅心耶蓋曰精曰元明本與如來藏心無異惟一落識中故不直曰精而曰識精識中有精故又曰識精而不但謂之識識去精存則全體如來藏性矣不可分之為二亦不得遽合為一其下手工夫全在第四卷以後旋妄伏真入流亡所等處蓋旋妄伏元除去八識真中一分之妄以終前文舉示識精元明之義然後于十信之前得無生忍為因地心歷五十五位真菩提路生滅既滅寂滅現前圓滿菩提歸無所得非惟見性無可指陳即如來藏亦屬強名矣此真大佛頂真密因真了義真首楞嚴也阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指話阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳耀我心目佛言汝將誰見阿難言我與大衆同將眼見此舉拳驗見也佛告阿難汝今欲知奢摩他路願出生死而詣真際故我為汝指出兩條大路一一分明不知現今從何路去今復問汝即時如來舉金色臂屈五輪指而語阿難言汝今見否所謂掇出中原無價寶不同趙璧與燕金也阿難不解向未舉拳時薦取具實而答曰見世尊就上一拶云汝何所見爛泥中有刺阿難當面差過却云我見如來屈指為光明拳耀我心目也只是認得拳頭世尊赤心片片更與一錐云汝將誰見阿難根鈍頭迷重重蹉過依舊道箇我與大衆同將眼見所謂昔年行處半步不移也溫陵云金拳舉處直下要識本明塵相未除依舊認賊為子佛告阿難汝今答我如來屈指為光明拳耀汝心目汝目可見以何為心當我拳耀阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心佛言咄阿難此非汝心此重徵出妄心而破之也世尊見尊者語不相投遂拈轉話頭別行一路云汝今答我如來屈指為光明拳耀汝心目縱許汝目可見汝將何物為心以當我拳之光耀乎所謂口裡雌黃舌端利劒爭奈尊者依舊刻畫無鹽唐突西子復認能推以為心性乃言如來現今徵心所在而我以心推窮尋逐即能推者我將以為心耳所謂好箇阿師又恁麼去也不知此心如鏡裡之形無體而全因外現似水中之月不實而遍現空輪認此為真迷之甚矣世尊見阿難頭頭不薦乃奮師子踞地之威振聲一喝云咄此非汝心易所謂擊蒙利用刑人用脫桎梏也當爾時若是黃檗德山臨濟巖頭也須耳聾三日故宗鏡云阿難執此妄心世尊所以訶斥二祖求此妄心了不可得初祖於是傳衣前七番破處是搗賊之𭔐穴此番訶斥是斬賊之首級也鍾云能推之心所謂攀援心也前七破破處此非汝心直破心矣阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉此直指妄心本名也阿難被世尊一喝果然措手不及搆副不上直得瓦解氷銷七華八裂於是矍然驚懼避座合掌起立而白佛云此非我心當名何等世尊見阿難驚疑不定即收機云阿難此心是因現前所對六塵虗妄相上所起名曰妄想由此妄想惑亂汝之真性豈可認此以為心乎由汝無始至今誤認為心如認賊為子反將常住真心棄而不顧故枉受生死輪轉無窮耳阿難既聞非心索要本名前塵虗妄相想直指本名以答也顯訶妄識非心已竟阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來説此非心我實驚怖兼此大衆無不疑惑惟垂大慈開示未悟此戀妄不捨而驚疑也世尊一片婆心翻成鈍置阿難乃白佛言我固佛之寵弟因我心愛樂佛故所以出家是令我出家者我之心也然我之心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心是此心可以為善矣縱令謗法永退善根亦因此心是此心可以為惡矣作善作惡許多功能皆是此心若如此番發明不是心者我乃無心之人也哉無心即同于土木矣何則以離此知覺之心更無別有心也而云何如來説此非心耶大有徑庭不近人情我實驚怖兼此大衆天上人間凡外權小無不説此為心今聞此説無不疑惑亦不得不怖不得不疑矣惟願世尊垂大慈愍開示我與大衆之未悟也殊不知作善作惡者原屬發業無明名曰妄想不思善不思惡者却是尊者本來面目棄本有而不知戀妄想而不捨亦獨何與先德云忽地晴天霹𮦷聲禹門三級浪砰訇許多頭角成龍去螃蟹依然努眼睛尊者之謂與爾時世尊開示阿難及諸大衆欲令心入無生法忍於師子座摩阿難頂而告之言如來常説諸法所生惟心所現一切因果世界微塵因心成體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體此曲示真心有體以釋無心土木之疑也爾時世尊開示阿難及諸大衆欲令其心入於無生法忍住此忍者於三界內外不見有少法生不見有少法滅超情離見當體真妙即無善無惡之心體也即一切事究竟堅固也於師子座摩阿難頂當其執妄為真則振威喝之及其矍然生怖復摩頂慰之所謂有時鐵𮖐綿團有時綿包鐵石假嗔假喜能放能收也既摩其頂而告之言汝不聞如來常説諸法所生唯心所現乎衆生迷惑妄謂萬物各有從生而不知一真心體隨緣變現若無一心即無諸法所由來久矣極諸法所生至於一切因果凡聖權實大而世界小而微塵既唯心所現則亦因心成體謂心無體者必諸法無體而後可阿難若諸世界一切所有其中乃至草葉縷結是有形之最細者苟詰其根元則咸有體性矣縱令虗空是無形之最巨者雖無體性亦有名貌既有名貌則亦有體矣可見有情無情若大若小之物無不有體何況清淨無垢妙淨不染湛寂本明之心與一切法為性之心而反自無體乎蓋一切之法皆是真心海中所現影像所現之物尚皆有體而能現之心反自無體必不然矣是則真心必定有體汝但執彼妄心故迷此真體豈真離此覺知更無所有乎賀云無生法忍者了法無生忍耐于心也諸經八地證無生忍華嚴等覺後方名無生忍此經未入十信即獲無生忍所謂理須頓悟也鍾云忍字非著力之謂已是如如不動矣細玩大定與究竟堅固皆具足此忍字之中金剛經得成于忍即此忍也若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽間猶為法塵分別影事我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於變滅其誰修證無生法忍此令尊者揣摩能推是妄以去其戀妄之心也佛又言若汝堅執不捨此能分別有覺觀了知不昧之性而必以為汝真心者此心即應離諸一切色香味觸等諸塵事業而別有無滲無漏完全之體性矣色香味觸舉四以該六也諸塵即六塵也事業猶云塵事塵業也下文浮根四塵本此如汝今者在座承聽我法此聽法心是亦因我説法音聲而起分別是滲漏心非完全體豈得為真哉不但汝今尚有六識現行分別不名為真縱汝將此見聞覺知六識現行種子一切滅盡成阿羅漢略舉見聞覺知者以四攝六合嗅嘗為一覺也若使內守幽間耽寂滅樂不肯放捨即此守幽間者尚屬意根意與法對猶是法塵與分別相為影現但是光影了無實事而不得為真矣況今現種未空乃欲認此以為真乎正脈云一切權乘有出入之定皆是微細分別蓋全以憑伏細分別心持彼寂境一不分別寂境即失名曰出定楞嚴大定豈有是乎即我今日亦非強汝定執此等以為非心但汝將此分別覺觀微細揣摩是有是無是真是妄若離前塵而有分別性者即真汝心矣若分別性離塵無體者斯則前塵分別影事而非真汝心矣今汝所執分別覺觀皆是因塵而有全託諸塵而現分別之影塵非常住倐變倐滅若變滅時心豈能存如形滅而影自亡此心豈不同於龜毛兔角乎心既隨塵而滅則汝法身亦隨灰斷更將何物為因地心而證此無生法忍耶知有生有滅者為緣塵之妄心則知無生無滅者乃常住之真心矣鍾云縱滅一切見聞覺知內守幽間猶為法塵分別影事法塵與意根對所謂第六識也此經所謂外道等錯亂修習由認八識未真其學問受用自第六識止或認聚緣奔逸昏擾擾相如阿難所稱能推之心以為虗靈不昧或認內守幽間及九次第定以為靜定所謂諸修行人不成無上菩提病根正在于此蓮師曰豫初入道憶子思以喜怒哀樂未發為中意此中即空劫以前自己也既而參諸楞嚴則云縱滅一切見聞覺知內守幽間猶為法塵分別影事夫見聞泯覺知絶似喜怒哀樂未發而曰法塵分別者何也蓋意者根也法者塵也根與塵對順境感而喜與樂發焉逆境感而怒與哀發焉是意根分別法塵也未發則塵未交于外根未起于內寂然不動應是本體不知向緣動境今緣靜境向固法塵之粗分別也今亦法塵之細分別也皆影事也非真實也謂之幽間幽特勝顯間特勝閙而已空劫以前自己尚隔遠在即時阿難與諸大衆默然自失佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果此結破所執妄心也即時阿難與諸大衆聞佛開示將平日倚恃為心者一旦杳無體性無可跟尋而又未審何者為心如人失其所寶之物欲戀不能欲捨不得乃默然自失世尊見其廉纖搭滯或又極口痛斥而告阿難世間三果以前諸修學人現前雖成四禪四空滅受想九次第定在小乘法中前八凡位所成第九無漏聖位所成得九定者宜乎超生死證涅槃得羅漢果矣乃不得漏盡成阿羅漢者皆由戀著滅定不肯放捨即此滅定猶為影事即此戀著猶然妄想由彼執此生死妄想誤為真實法性故雖修而不得成真正阿羅漢況汝滅定未修幽間未守且執前塵虗妄相想誤為真實而不肯捨故雖一向多聞道力未全而不得成聖果也前云守者抱定而不移此云執者固持而不捨守字執字皆病也除却守字便非影事除却執字便是真實矣又前文云一切衆生生死相續皆由用諸妄想此想不真故有輪轉此仍結歸前判世尊兩番作苦切語深錐痛劄皆是徹底為人要令尊者捨妄識而覔真心耳小乘法中既判第九為無漏聖位矣又云不得漏盡成阿羅漢者當知彼所謂無漏聖位皆一時權許誘進而已法華云汝當觀察籌量所謂涅槃非真實也既非真涅槃豈名真漏盡乎故長水謂十地為漏盡阿羅漢無可疑也又小教許四果皆聖阿難已登初果而謂非聖豈破初而獨存于四乎決定以十地方為分證之聖果矣蓋此經中以三賢四加尚名世間也四禪四空及滅受想名為九定此內守幽間之極功也猶為法塵影事故不成聖果執此生死妄想誤為真實非但指外道六識攀援者言并二乘認識精為元明而業識未破者亦在其中矣斥破所執妄心以開奢摩他路竟阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人説食終不能飽世尊我等今者二障所纏良由不知寂常心性惟願如來哀愍窮露發妙明心開我道眼此正請開示佛知佛是也凡悟深者而後發悲或悟妄而悲久苦或悟真而悲久失阿難聞佛語已始悟能推之心是妄於是重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家以來持佛威神常自思惟無勞我修將謂如來是我天倫必然惠我三昧正受豈知彼此身心本不相代正如父子上山各自努力替代不得今聞訶斥則知如來毫不容情將我一片希望之心全落空處顧我一向以來誤認妄心失我本心身雖出家實未曾有入頭處何異身處膏腴不能自潤而反向外奔馳如窮子捨父逃逝從人乞食者乎今日乃知説得一丈不如行得一尺雖有多聞若不修行終無所益與不聞等如人説食終不能飽以畫餅不堪充飢也世尊我等今者見思二惑未盡阿難初果方脫見惑而思惑未盡也則為煩惱障所纏取境法愛未空則為所知障所纏既不能斷煩惱而證人空又不能斷所知而證法空纏此二障不能自脫者良由不知不動搖無生滅又寂又常之心性而執此妄想誤為真實故也惟願如來哀我無法味資神之窮無法衣蔽體之露發妙明心開我道眼由我雖有妙心一向隱覆不識好惡誤認能推以為真實願世尊發其覆而出之我雖有道眼一向矇蔽不分皂白但認肉眼以為能見願世尊刮其翳而開之當知此請比前破處之後所求之意逈別前云溺於淫舍當由不知真際所詣是尚以妄識為真心責己不知真處但惟求處而已今云二障所纏良由不知寂常心性方始責己不知真心而別求真心矣賀云妙明心即如如理道眼即如如智發者發其藏也開者開其光也心眼二字暗應上文唯心與目今何所在即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆告阿難言我今為汝建大法幢亦令一切衆生獲妙微密性淨明心得清淨眼淨明心上當脫一妙字此先默示光相而後許説也即時如來從胸卍字涌出寶光正顯佛知佛見要從自己胸中流出方始蓋天蓋地非粘妄所發之光也其光晃昱有百千色顯萬德之所成就也十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆顯有情無情及與聖凡總在平等光中流出也于是告阿難言汝自性法幢墮地已久我今為汝建立使不復傾頽亦令十方一切衆生獲妙微密性妙淨明心蓋法界真理但惟一體自其本寂而言謂之性自其本覺而言謂之心性以微密故妙心以淨明故妙也此所謂如如理也得清淨眼前者妄心全體緣塵故不清淨此眼遠離分別諸塵不干稱理而周法界故名清淨所謂如如智也阿難求寂常心性而佛許以妙微密性求妙明心而許以妙淨明心求開道眼而許以得清淨眼亦請許相應矣賀云前度放光表破妄之相此處放光表顯真之相心眼二字應阿難所乞心眼獲字應上發字得字應上開字舊注自此以下總謂破妄見遂令學者不敢直認見體為心違佛立言本旨莫此為甚不知此經最殊勝處全在破識心而不用取根性為因心良以用識用根乃權實兩教之所由分用識而修者塵劫不成菩提從根而入者彈指可超無學若要決定成菩提決定證涅槃惟須直取根性為因地心而後可圓成果地覺也舊注救起識心反言破見豈旨也哉蓋此根中之性即第八根本識所謂識精元明緣所遺者此識據法相宗則有三位自凡位至七地名黎耶識此云藏識自八地至等覺名異熟識佛位名陀那識此云執持而今所顯者正惟凡夫分上黎耶實體後文偈首稱陀那細識舉勝稱揚也其體全是真心而具無明雖具無明而衆生分上捨此別無真體非比妄心無體非真也特以權小惟認前六識心以為勝用至於六根一向目為色法總攝無記故于修行分中不知不用常如遺失所謂衆生遺此本明也今佛於破妄之後應當機之懇求急欲其捨彼識心認此根性若不先以極顯其真何以使其決定取此新悟而捨彼舊執乎是以雖有二種顛倒見妄姑帶之而且不遽破直至十番顯後方乃一番破除非惟顯多破少而破處亦如脫衣露體不同前之破全無體也又六根中性雖同一陀那細識而最便於目前開示者莫過於眼根中見性故惟從此顯發而餘可例知然此見性所以別于眼識者但取照色之時一如鏡中無別分析即是見性起念分別即屬于識聞等倒此可見祖師云毫釐有差天地懸隔最為格言學者當細心甄別之也鍾云此下重重辨論舊科十番破見近改顯見似不若顯真之穩然真心實于見性中顯之雖謂之顯見可也阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相此第一番指見是心也前已斥緣心是妄今欲顯能見是真故拈前見性疊興三問以詳審之云阿難汝先答我見光明拳此拳光明因何而有又我之手云何成拳汝之六根將誰為見阿難答言由佛全體如閻浮檀金色赤𦦨如寶山此不從欲愛所生是從無量功德清淨所生拳之光明因此而有也佛問將誰為見而我現前實用眼觀佛問云何成拳我見如來五輪指端屈握示人以成此拳相蓋依舊認肉眼為能見矣衆生浩劫迷己為物但謂見性全屬肉眼無上勝性反成劣相今欲當機決定捨彼識心認此見性故須巧示令知此見非眼全不係眼而為有無判然有離眼之體是故但悟此見非關肉眼則豁同虗空無礙無邊所謂常住妙明不動周圓無窮妙義從此而漸顯矣賀云汝將誰見四字世尊已三問矣初云將何所見阿難答言由目觀見次云汝將誰見阿難又答以同將眼見可謂辜負婆心所以不即破者因阿難迷執方堅未可驟語故頭番且窮其妄心所在二番且破其妄心無體至此阿難自悲自悔捨妄求真然後重理前語以汝將誰見四字喚醒之阿難不悟仍執眼觀于是重重辨剝點出是心非眼從前公案一語了結矣佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類世尊見尊者依然認眼為見就將赤手空拳作個耀眼鏡子以為比例而告阿難如來今日不作虗謬當實言以告汝然言不盡意譬以通之諸有智者要以譬喻而得開悟也阿難譬如我拳若無我手不成我拳是拳全倚於手矣若無汝眼不成汝見是見全倚於眼矣以汝之眼根例我之拳理其義是同是別均齊不乎阿難只解順水推船不解逆風使柁遂順口答言唯然世尊既無我眼不成我見猶之既無佛手不成佛拳也以我眼根例如來拳事義適相類矣其答如此豈知將箇寂常心性例成斷滅知見哉佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損佛告阿難汝言眼根拳理事義相類是義不然何以故如無手人拳畢竟滅矣彼無眼者特無眼耳非見全無也所以者何汝試於途就盲人而問之云汝何所見彼諸盲人必答汝云我今眼前唯見黑暗更無他矚以是義觀黑暗即前塵也前塵自暗見前塵者自明而盲人之見何曾虧損哉此世尊就凡夫肉團上指出一雙定乾坤眼輝天鑑地故知無明窟裡具有大光明藏所謂靈光獨耀逈脫根塵者豈同妄心離塵無體者乎阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯覩黑暗與有眼人處於暗室二黑有別為無有別如是世尊此暗中人與彼群盲二黑校量曾無有異甚矣根識之難分也阿難一向將心眼認作兩物又不知眼根與燈光黑暗皆是見性增上緣一向認緣失真故一聞前塵自暗見何虧損之語撒呆粧癡便不敢信反申難云諸盲眼前一無所見唯覩黑暗耳云何亦名為見乎佛告阿難諸盲無眼唯覩黑暗與有眼人處于暗室此二黑相為有別乎為無別乎阿難言如是世尊此暗中人與彼群盲二黑校量無以異也阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼此例明能見屬心而不屬眼也佛言阿難若無眼人在黑暗中忽得眼光還於前塵見種種色而名眼見者彼暗中人在黑暗中忽得燈光而見色者亦應名為燈見乎若燈有見燈即是見不應名燈又則燈自觀耳何關汝事若眼有見眼即是見不應名眼矣是故當知燈為增上但能顯色不能見色其見色者是眼而非是燈則應例知眼為增上但能顯色不能見色如是見色之性是心而非是眼矣尊者向來誤以為二者世尊今日合而為一所謂離之則則兩傷合之則雙美也問見性與心有何差別答此中見性即是阿賴耶識見分以在眼名見故即指見性是心也由阿難一向但知見性是眼不知見性是心故反之曰是心非眼是心二字與前非心相應正謂前所斥能緣者非心即汝能見者是心既知能見者是心即知能見者非眼此則向來心知眼見之執一言了當矣所謂一滴水墨兩處成龍也觀佛前訶妄識則曰非心今薦見性則曰是心明以應阿難真心之求但令知其離彼肉眼不藉明塵別有全性所謂靈光獨耀逈脫根塵極顯其真何嘗破其為妄乎鍾云前呵眼識非心此指見性是心見性與眼識何別照色之時一如鏡中無別分折即是見性起念分別即屬于識矣毫釐有差天地懸隔六根性中同一陀那細識而最便開示莫過于眼根中見性故惟從此顯發而餘可例知第一番指見是心竟阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨此第二番顯見不動也阿難雖復得聞是心非眼之言與諸大衆反覆研味口已默然然識鎖未開故不能領悟意謂我之所求因前緣心不寂不常非妙非明故別求寂常妙明之心今佛示我此見為心雖知即心不知此心亦具寂常妙明等義否耶是以猶冀如來慈音宣示而合掌清心以佇佛之悲誨焉先德云只為分明極翻令所得遲信然矣爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道於鹿園中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果世尊雖以盲人矚暗見無虧損之語與彼發明妙心道眼而阿難久為二障所纏沉湎濡首不得開悟故巧施方便却舉舊時驗過良方佯問弟子令其同倫旁通一線所謂惜得自己殃及他人也爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我當初成道在于鹿苑中為阿若多阿跋提摩訶男迦葉五比丘等及汝四衆言一切衆生所以不成大乘菩提及小乘阿羅漢者皆由客塵煩惱所誤不知汝等當時因何開悟以至今成聖果也按佛初轉法輪當時所説客塵之喻乃喻集諦反顯主空乃喻滅諦但取能比之喻不取所喻之法以此中客塵但喻身境及緣身境之心主空俱喻見性故耳時憍陳那起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是此陳那自陳悟處所謂敲唱俱隨接拍成令也憍陳那亦云陳如即阿若多之性也時陳那立起白佛我是如來最初弟子今為長老在大衆中獨得先解之名憶我當初因客塵二字悟入遂得成果世尊何謂客塵譬如行客投宿旅舍或宿或食事畢前去又奔途程不暇安住若實主人日日在家自無所往如是思惟不住名客住名主人以不住者名為客義據陳那悟處是以行客喻色身以投宿喻旅泊三界以或宿或食喻大年小年以不遑安住喻報盡則遷由此身相遷流不住故喻如行客此悟妄身為苦諦也又如新霽清暘升天光入屋隙之中照見空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義陳那又以清暘升天喻破分別身見初得智慧日也以先入隙中發明塵相喻智慧日有一隙之明始得照見八十一品微細思惑也以塵質搖動虗空寂然喻于亂思中悟得空理也此悟妄心為集諦也佛言如是此但印其所説舊喻動靜分明不混欲以彰下文所示孰為動者同于客塵孰為靜者同于主空耳鍾云見聞中有動靜者俱屬客塵所以為妄即前生死根本是也見聞中無動靜者即是主空所以為真即前菩提涅槃元清靜體是也即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是此先以手驗見也世尊見陳那答出客塵主空二義要令阿難因客悟主因塵悟空引他向開手合手處識取即時如來于大衆中屈五輪指屈已復開開已又屈而問阿難言汝今何見阿難據實而答我見輪掌衆中開合世尊就上一拶云汝見我手衆中開合為是我之手有開合為是汝之見有開合阿難信口便答世尊寶手衆中開合我見如來之手自開自合非我見性之有開合當阿難端視佛時而其見性湛然盈滿於前乃視如來之手在此見性之中開合不住則佛手自同客塵而阿難見性何異主空是則動靜二相已顯然分明矣世尊見其言中有嚮故審之曰誰動誰靜令其自分動靜也阿難答云佛手不住而我見性尚不見有靜云何有動蓋靜必因動而顯如先時曾動今始不動方可説靜今此見性從來不動設説其靜尚為不可而有誰為無住者無住即動也可謂釣盡江波錦鱗始遇世尊見阿難已知痛癢便將寂常心性坐在他身上要令擔荷故印之曰如是許其所分外境為動見性不動皆不謬也當知此中但舉佛手為一切外境之例既知佛手開合與此見性無干則凡一切萬相及諸世界任其分亂動止皆與見性無干矣若人於萬相中忽然覷見此不動之性常恆不昧何至為境所奪妙之至也又宗家竪指伸拳發明于人者多密此意令人自悟但教家分明説透為異耳如來於是從輪掌中飛一寶光在阿難右即時阿難向首右盻又放一光在阿難左阿難則又回首左盻佛告阿難汝頭今日因何搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是此從疏至親又以頭驗見也外境動而見性不動人或易知自頭動而見性不動人實難辨良以世人認見是眼故頭搖眼轉宛似見性亦動故必以頭驗之也如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盻又飛一光在左則又左盻乃審之云汝今日左顧右盻汝頭因何搖動如此尊者不孤所問答云因見飛光左右故顧盻而頭動耳世尊婆心真切徹底為人故復勘云汝盻光動頭為汝頭動為復見動阿難向沒推托處盡力擔當重新答出頭動而見不動所謂縱有千般草終無兩樣風也故世尊復印之曰如是意謂若知頭動而見不動亦是客塵主空之義也既知頭動而見恆不動則凡此身往來千里萬里乃至恆沙世界死此生彼而此見性常如虗空無所動也若人悟此恆常不隨身轉則日用中行住坐臥皆在自性定中志公云不起絲毫修學心無相光中常自在者此也其與閉目想空自墮法塵之影者天淵懸絶矣又宗家從東過西乃至跳舞意亦顯此而迷者效之但弄精魂終不得旨也世尊欲阿難知真心所在阿難重重迷悶若在世典中憤悱之極自當代為啓發世尊雖反覆開引却不全為舉似待其自家托出而但以如是二字證之此所謂衣珠自覓也兩如是字正與七無有是處反應於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉此雖寄責大衆實借大衆以成就阿難也世尊見尊者解得主空不動之義故在衆中激揚所謂打草驚蛇意謂我今如此重重開示可謂明了若使更有衆生尚以搖動者為塵不住者為客不能領會不動之主空汝等但觀阿難在頭搖動處悟得見無所動手開合處見得見無舒卷即今現前已有樣在云何汝等但以動者為身而不解不動之主動者為境而不識寂然之空抑且從始至終但用念念攀緣生滅搖動者為心而反遺不動之真性真性即指不動之見性也豈非顛倒行事而何所依為心性者既非是不動之真體將見因差果謬必招認物為己之苦而輪回是身境之中生死流轉不絶然此流轉非從天降非從地出亦非人與特自取而已可不悲哉嘗謂才學道者便知覔主人翁却乃多認攀緣不住之客而不知目前朗然常住之見性方是真主人翁才聞般若者便説真空却乃閉目懸想搖動之法塵而不知目前廓然不動之見性正是真空快哉法王之妙示行人於此反覆體認必有豁然大悟者矣認物為己便是受身著境之苦果如凡夫妄説身為我境為我所身重而境輕權小妄認能證之心為我亦身也所證涅槃為我所亦境也境重而身輕圓覺云乃至證于清淨涅槃皆是我相圭峯解云凡夫所執我相是迷識境權聖所執我相是迷智境雖粗細不同皆名認物為己用是觀之權聖涅槃尚是認物為己則凡夫身境豈非認物為己其與一切精怪依草附木攬為己身者顛倒無異也豈可不猛省而生厭患乎鍾云搖動者名為塵不住者名為客阿難頭自動搖動者客也塵也見無動也如來手自開合開合者客也塵也見無動也云何汝今明知動為身動為境矣却乃自始洎終念念生滅遺失不動之真性認物為己將己逐物而自取生死流轉乎蓋既知動是身境便合了悟身境全是客塵不應隨逐而失主空也始終者遠則無始為始今生為終近則生為始死為終顛倒非惟世間事業也種種修行皆名顛倒以其動執身境靜依法塵依法塵者還同身境曾不覺知本有不動之見性也是中者身境之中也第二番示見不動竟
